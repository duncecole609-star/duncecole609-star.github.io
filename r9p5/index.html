<script id="data" type="application/json">{"title": "你相册里最舍不得删的照片，暴露了你还在害怕什么", "product": "相册记忆模式报告", "questions": [{"text": "看到一张很久以前的合照，你为什么没删？", "options": {"A": "怕删了以后那段经历像不存在了。照片不是你拍得最好的，但那个人是你还不想承认想念的", "B": "不是因为想留着那个人——是那张照片里的你看起来很好。你留的不是别人，是那个时候的自己", "C": "怕那个地方以后不会再去、那种状态不会再有了。你不是怀旧——是怕再也回不去", "D": "怕空白。删了这一张，那一年的相册就真的没什么剩下的了"}}, {"text": "相册提示空间不足时，你最先舍不得删哪类照片？", "options": {"A": "和人的合照。每张都在说\"我们曾经是朋友/恋人/在一起过\"", "B": "截图。聊天记录、证据、重要信息。删照片可以忍，删截图不行——那是你的保险", "C": "一张没有人、没有风景、没有特别意义的照片——但你每次翻到都会停住。最没用的那张，反而最不想删", "D": "以前自己觉得不够好但现在觉得\"那时候真好\"的。不是留念，是怕现在不如从前"}}, {"text": "删掉某张照片前，你会突然想到什么？", "options": {"A": "那个瞬间——\"那天天气很好，我们说了什么已经忘了，但那天我是真的开心\"", "B": "以后——\"万一哪天需要这张照片来证明什么，我就没了\"", "C": "别人——\"如果TA发现我删了这张，会不会觉得我太狠了、太快了\"", "D": "自己——\"如果删了之后后悔，那就是我自己做错了一个决定。我可以不删吗\""}}, {"text": "你最怕哪张照片被别人翻到？", "options": {"A": "一张你在某个人面前笑得完全不像自己的照片。被看到了就暴露了你还存着", "B": "一张截图。不是见不得人，是截图的上下文只有你知道。别人看到会觉得你\"在盯着什么\"", "C": "一张你觉得很丑但一直没删的自拍——因为那天你被夸过。你舍不得删的是被夸的感觉", "D": "一张你为某个人保留的、但那个人已经不在了的照片。怕人问\"这是谁？\""}}, {"text": "你会反复点开的那张照片，真正留住的是什么？", "options": {"A": "一个\"我曾经也很好\"的证明。不是怀念那个人，是确认自己曾经被认真对待过", "B": "一个\"有人真的爱过我\"的存档。照片留着，那个人的爱就还有证据", "C": "一个\"那天真的很开心\"的记忆。不是拍得好不好，是那天你觉得自己是对的", "D": "一个\"我还在这里\"的参照。以前的你和现在有个对比，照片就是那个你在意的参照点"}}, {"text": "你的相册里最多的三类东西是什么？", "options": {"A": "自拍+合照+风景。人最多，每一张都是你和某个人的关系的证据", "B": "截图+工作资料+照片。功能性内容占大半，相册是你的档案馆", "C": "自拍+随手拍+无意义的瞬间。什么都留着，不是懒，是每张都有感情", "D": "风景+文字+自己的记录。关于别人的很少。你的相册是你自己的日记"}}, {"text": "你最常因为什么理由删一张照片？", "options": {"A": "因为和那个人有关。不是照片不好，是那个人现在不能出现在你的相册里了", "B": "因为占空间。不是不想留，是手机提醒了，被迫清理", "C": "因为觉得矫情。\"留着干嘛，好像我还在意一样\"", "D": "因为看起来不够好。你对自己很挑。删掉的不是照片，是对自己的不满意"}}, {"text": "如果一直不删——你怕发生什么？", "options": {"A": "怕自己又翻回去看。不是看照片，是在看\"那个人\"。怕自己还放不下", "B": "怕以后真的需要的时候反而找不到了。没有分类，怕关键照片被淹没", "C": "怕别人翻你相册的时候看到。不是秘密，是需要解释。而你已经不想再解释那段关系", "D": "怕自己忘了怎么往前走。旧照片像拉着你不放。不是照片不想放手，是你不想让它丢"}}, {"text": "你觉得哪张照片最接近\"真正的你\"？", "options": {"A": "一张没发朋友圈的。没有表情管理，没有角度，就是一个真实的瞬间", "B": "一张和某个让你放松的人的合照。因为那时候你最不紧张", "C": "一张只有一杯咖啡、一盏灯的照片。你一个人，但你不觉得孤独", "D": "一张你拼命想拍好但最后选了\"算了就这张吧\"的。不是你不够好，是你对自己不够满意"}}, {"text": "如果相册里的照片可以替你说话，你觉得它们最可能在说什么？", "options": {"A": "\"我们还在这里，你还没删。删了就真的没有了——你是不是还没决定好？\"", "B": "\"我们被存着不是因为你还在意，是因为你怕没有证据。证据就够了吗？\"", "C": "\"我们不是照片——是你不舍得自己。不是那个人让你放不下，是你以前太认真了。\"", "D": "\"你留了五千张，但最常翻的只有三张。删掉的是空间，删不掉的是时间。\""}}, {"text": "你想用照片替自己留住的，到底是什么？", "options": {"A": "一个\"我也曾经被认真对待\"的证明。不用每天看，知道它在那里就够了", "B": "一个\"有人确实爱过我\"的记录。不是怀疑现在，是确认以前是真的", "C": "一个\"那天我真的很好\"的参照。不是自卑，是怕忘了自己曾经好过", "D": "一个\"我还在往前走\"的标记。照片不是停住原地——是在回看和跟过去的自己挥手"}}, {"text": "你最想让相册替你说的一句话是什么？", "options": {"A": "\"我还在等——但不等了。这些照片不是通往过去的路，是通往我曾经是谁。\"", "B": "\"我不是放不下——我是需要确认。照片删了可以再存，但再也找不回当初那种感觉了。\"", "C": "\"我那时候真的很好。留着不是怀旧——是记得：我曾经很好，我现在也可以。\"", "D": "\"请别再拉我回去了。我已经不是照片里的那个人了。照片只是记忆，不是命令。\""}}], "results": {"A": {"name": "怕没发生过型", "subtitle": "照片是你的时间戳——怕删了之后那段经历就没有证人了", "score": 86, "core": "你舍不得删的不是照片本身——是怕删了以后那段经历就像没发生过。合照是你的时间戳，每张都在说\"那天是真的\"。你不是放不下那个人——是放不下那个时候的自己。删除键在你手里，你怕的不是清空，是遗忘。", "evidence": "你删合照是怕以后那段经历像不存在了（Q1-A），你相册里最多的是和人的关系证据（Q6-A），你删照片的理由最常和那个人有关（Q7-A），你反复点开的是\"我曾经也很好\"的证明（Q5-A）。你不是在存照片——你在存\"被认真对待过\"的证据库。", "modules": [{"title": "照片是你的关系证据库", "body": "合照是你的\"关系简历\"——每一张都在说：我们曾经一起吃过饭、一起笑过、一起去过那个地方。你不是非要留着那个人，是留着\"被陪伴过\"的感觉。删了那张合照，那个人的痕迹就只剩你的记忆了——而你不确定记忆够不够可靠。"}, {"title": "你怕的不是清空，是被遗忘", "body": "删掉照片的瞬间，你脑子里不是\"空间终于够了\"，是\"那一天就这么没了\"。你怕的不是丢了图像——是丢了图像之后，那天从你的生命里消失了。你不是怀旧，是需要被记住。不是被别人记住，是被自己记住。"}, {"title": "容易误判自己的地方", "body": "你以为自己是放不下那个人。其实你放不下的是\"那时候的自己\"。那张合照里你笑得很好看、那时候你相信关系、那时候你还没被伤害过。你舍不得删的不是那个人——是自己还完整时的样子。"}, {"title": "你不是在存记忆，是在囤安全感", "body": "你相册里存的照片，很多你已经不看了。但它们在那，你就觉得安心——\"如果有一天我需要确认自己曾经被认真对待过，我有证据。\"但这种安全感不需要每时每刻都存在手机里。你可以把最重要的导出来，然后把手机里的删了——练习相信：不需要看也能确认。"}, {"title": "怎么整理相册也整理自己", "body": "先回答一个问题再删：这张照片留的是关系、是旧自己、是证据，还是在等一个回应？前两周：每删一张，用备忘录写一句话代替——\"这张照片教会我的是______\"。后两周：把最重要的3张导出存硬盘，然后删手机里的。告诉自己：它还在，只是不用每天翻到了。"}], "quote": "\"你留的不是照片，是怕删了之后那段经历就没有证人了。但证人在你心里，不在相册里。\"", "advice": ["【7天观察】打开相册，找出10张你从没删但说不清为什么留着的照片。每张问一遍：它在替我说什么——被爱过、被认真对待过、还是只是怕忘了？", "【7天观察】下次删照片犹豫时，不删。等一天，第二天再来。观察自己过了一夜之后对那张照片的感觉有没有变。", "【30天练习】每月1号新建一个文件夹叫\"这个月可以放的\"，把可以删但还不敢删的照片放进去。每个月打开一次，看看那些照片还在不在你的心里。", "【30天练习】给自己写一条备忘录：\"你不需要相册来证明你被认真对待过。你记得就够了。你的记忆比你的相册诚实。\""], "reminder": "你留着的不是照片，是怕那些瞬间从生命里消失。但消失的不是瞬间——是你在这些瞬间找到的自己。把自己找回来，相册就轻了。"}, "B": {"name": "怕找不到证据型", "subtitle": "相册是你的档案馆——不是怀旧，是需要\"万一有一天\"", "score": 82, "core": "你的相册不叫相册，叫\"证据库\"。聊天截图、资料、凭证——每张都在替你说\"以防万一\"。你不是舍不得删，是怕以后需要的时候拿不出来。但你需要的不只是证据——你需要的是一种\"我自己说了算\"的底气。", "evidence": "你相册里最多的是截图和工作资料（Q6-B），你舍不得删的首选是截图（Q2-B），你删照片前想的是\"以后需要怎么办\"（Q3-B），你最怕被翻到的是截图因为上下文只有你知道（Q4-B）。你不是在存照片——你在囤安全感。", "modules": [{"title": "你的相册就是你的档案馆", "body": "聊天记录截图、确认过的地址、别人答应过你的事——你的相册替你在打一场随时可能要上场的官司。不是你不信任别人，是某次经历教会了你：没证据的时候，你说什么都没用。但现在你已经不是那个需要靠截图来保护自己的人了。"}, {"title": "截图替你在说不安全感", "body": "每张截图都对应一个你不敢放手的不确定——怕别人不认账、怕自己忘了重要的东西、怕以后需要的时候找不到。你不在囤积信息——你是在囤积\"我不会被辜负\"的保护。"}, {"title": "证据太多反而找不到真正的了", "body": "上万张截图、几千条存档，真需要的时候就找不着了。多不一定是安全——多是负担。真正重要的东西不会藏在截图里——它在你已经处理过、已经结束的事里。剩下的截图，大部分是不再需要的东西。"}, {"title": "容易误判自己的地方", "body": "你以为自己是\"有条理\"，但其实更接近\"不敢丢掉\"。每张截图都对应一段往事，不是截图有多重要——是那段往事还需要个交代。你在用截图拖延那个交代。"}, {"title": "怎么把安全感从截图里赎回", "body": "最重要的证据打印或导出存进硬盘。大部分\"以防万一\"的截图，一年内从没用过。\"那件事会记得\"，不需要截图看守它。安全感不在一万张截图里——在你告诉自己：我已经处理过了，不会来了。"}], "quote": "\"你存的不是图，是万一有一天需要证明自己的时候手里有东西。但你不是法庭，不需要每件事都有记录。\"", "advice": ["【7天观察】打开截图文件夹，看最近100张截图。有多少是\"留着以防万一\"的？有多少是你后来回头看过的？", "【7天观察】下次想截图保存时，用备忘录写一句话代替截图。写\"此刻我为什么需要存这个\"而不是\"存了这个就放心了\"。", "【30天练习】把最重要的证据导出存硬盘——然后把手机里的删了。练习相信：东西在别处也是安全的。", "【30天练习】清空截图库——不是全删，是导出后清空。手机轻了。看看你接下来一周有没有需要翻那些截图。大概率不会。"], "reminder": "你存证据是为了安全——但如果证据太多，安全和负担就只差一个删。你不是法庭，不需要每件事都有记录。有些事，记得就够了。"}, "C": {"name": "怕先放手型", "subtitle": "你不是放不下——是怕别人觉得你不该放得这么快", "score": 79, "core": "你不是不知道怎么删——是怕删了之后别人发现\"你已经删了\"。合照里不只有你和TA，还有第三个人的感受：共同的朋友、家人、那个还在期待你们和好的人。你不删不是为自己——是怕别人觉得你太狠了、太快了、太无情了。你替别人在犹豫。", "evidence": "你删照片前担心别人发现（Q3-C），你最怕的是合照被共同朋友看到已经没了（Q4-C），你反复清空又恢复是怕被对方发现\"已经放下了\"（Q7-C），你把别人的感受放在自己的判断之前（Q9-C）。不是在留着照片——是在替别人留时间。", "modules": [{"title": "你在替别人犹豫", "body": "删了那张合照，你就等于宣布\"这段关系对我来说已经过去了\"。但共同朋友、家人、那个还在期待你们和好的人——你怕他们的反应。\"这么快就删了？\"\"你也不想想当时多好。\"你在替别人等，不是替自己等。"}, {"title": "误判：以为不删就等于不狠", "body": "你以为留着是一种\"我还有感情\"的证明。其实你留着只是为了给别人看。你的心早就翻篇了——手指还停在删不掉的那个上面。那不是留念——是多余的负担。"}, {"title": "容易误判自己的地方", "body": "你以为自己狠不下心。其实你对自己够狠了——犹豫不决比直接删了更消耗。你不是不果断——是把果断用在别人身上，对自己用的是\"再等等\"。"}, {"title": "放手和被觉得放手是两件事", "body": "快慢是相对的——你怎么放、什么时候放，不需要向任何人解释。那张合照删不删，你们的关系已经按自己的方式结束了。一张照片改变不了那个结局。"}, {"title": "怎么替自己做决定", "body": "删之前先问自己：我不删是因为我还不想删——还是因为怕别人知道我删了？\"这是我和他的事，与别人无关。\"把那些\"替别人不敢做的事\"写出来——再看看里面有多少已经不是你的责任。"}], "quote": "\"你不删不是因为放不下，是怕别人觉得你放得太快了。但翻篇不需要经过第三个人的批准。\"", "advice": ["【7天观察】列出那些你不删是因为怕别人发现你删了的照片。每张写一句：我在替谁害怕？", "【7天观察】下一次在朋友圈、聚会、家庭中，有人提到旧事——你的第一反应是解释还是沉默？记录你的反应。", "【30天练习】选一张\"替别人留着\"的照片，把它移到专门文件夹。告诉自己：东西还在但不用放在眼前提醒我了。", "【30天练习】如果有人问你\"你怎么删了那张\"，你试着说真话：\"因为我已经不需要了。\"\"不狠——我放下了。\""], "reminder": "翻页是自己的事。你不需要第三个人觉得你翻得够慢或者够温柔。照片删不删不是你决定的——是你和那个人之间已经结束的事决定的。删，是在确认——不是在对别人解释。"}, "D": {"name": "怕空白型", "subtitle": "你怕的不是删照片——是删完之后连自己都觉得空了一块", "score": 75, "core": "你最怕的不是某张照片没了——是删完之后整个相册空了一块。那张照片在的时候你不会翻它，但它不在的时候你会觉得少了什么。照片是你的人生背景音——不需要看，但需要知道它在那里。你在用照片填充一种\"我还在这里\"的感觉。", "evidence": "你不删是怕删了之后相册空了一块（Q1-D），你舍不得删\"以前觉得不够好但现在觉得那时候真好\"的那类（Q2-D），你最怕清空之后连自己都觉得少了一块（Q8-D），你拼命想留住的是一幅\"我在往前走\"的参照（Q11-D）。不是在存照片——是在存\"我还在\"的证据。", "modules": [{"title": "照片是你的背景音", "body": "你不看它们——但你每天划过的时候都扫一眼。它们在那，你就觉得自己还在。不在的话，你会觉得少了点什么——像是把房间里的一个旧沙发搬走了。空的位置比照片本身更让你不舒服。"}, {"title": "你留着不是因为喜欢，是因为习惯", "body": "那些从不打开看的旧照片、一年前的截图、三年前的自拍——你留着不是因为它们好，是因为有它们在那，你的相册看起来不空。你不是在存档案——是在维持一种\"我还是那个人的\"感觉。"}, {"title": "容易误判自己的地方", "body": "你以为你在怀旧——其实你在害怕改变的自己。\"以前多好\"是一种后退——不是你真的觉得以前好，是现在的你还没习惯现在的自己。你把旧照片当成锚——但锚太重了，你就走不动了。"}, {"title": "空白不等于缺失", "body": "删了会空出一块，但那一块不是失去——是给现在留的空间。每张你不敢删的照片都在告诉你：我还在，你不能走。但你不是靠它们确定自己还在——你每天都在活着，每天都有新的证据证明你还在这里。"}, {"title": "怎么清掉背景音", "body": "先删不重要的：模糊的截图、重复的风景照——它们不会让你觉得空。告诉自己：\"我不需要靠这些东西告诉我我是谁。\"用一个月删一点，看看自己的反应。最重要的是——删了之后看你还记不记得那张照片。不记得，就彻底没关系了。"}], "quote": "\"你怕的不是删照片——是删完之后连自己都觉得空了一块。但你不是靠照片来确认自己存在的。\"", "advice": ["【7天观察】打开相册，看最近一年没翻、没点开、只\"存在\"的照片有多少。它们不是你的人生——是背景噪音。", "【7天观察】问自己最害怕的是哪一个空白：没人、没证据、没从前、还是没自己。观察那个空白的位置。", "【30天练习】每周删掉100张你在过去一年都没看过的照片，不检查内容——直接删。", "【30天练习】删完100张之后的那个空白位置，用新拍的照片填上。新的照片代表你现在的自己——而不是从前的参照。"], "reminder": "你以为照片在替你记住你——其实你在用照片维持一种旧的自己。删了不是失去，是给现在的你让位置。你每天醒来都在成为新的自己——不需要三年前的截图来证明你还在这里。"}}}</script><script>
const data=JSON.parse(document.getElementById('data').textContent);let idx=0,answers=[];
function start(){home.classList.add('hidden');quiz.classList.remove('hidden');renderQ()}
function renderQ(){const q=data.questions[idx];bar.style.width=(idx/12*100)+'%';stage.textContent=idx<5?'免费测试 · 第'+(idx+1)+'题':'深度解锁 · 第'+(idx+1)+'题';count.textContent=(idx+1)+'/12';document.getElementById('q').textContent=q.text;opts.innerHTML='';for(const k of ['A','B','C','D']){const b=document.createElement('button');b.className='opt';b.innerHTML='<span class="letter">'+k+'</span><span class="text"></span>';b.querySelector('.text').textContent=q.options[k];b.onclick=()=>choose(k);opts.appendChild(b)}}
function choose(k){answers[idx]=k;idx++;if(idx===5)gate();else if(idx===12)result();else renderQ()}
function gate(){bar.style.width='41.7%';document.getElementById('q').textContent='前5题只是倾向，后7题继续追问原因、误判点和真实需要';opts.innerHTML='<div class="gate"><div class="section-title">继续完成12题</div><div class="body">后7题不会重复前面的问法，会从不同生活场景继续拆解。</div><br><button onclick="renderQ()">继续</button></div>'}
function result(){quiz.classList.add('hidden');const c={A:0,B:0,C:0,D:0};answers.forEach(x=>c[x]++);const key=Object.entries(c).sort((a,b)=>b[1]-a[1]||'ABCD'.indexOf(a[0])-'ABCD'.indexOf(b[0]))[0][0],r=data.results[key];const ev=answers.slice(0,5).map((a,i)=>'<div class="evidence-item"><b>Q'+(i+1)+' · 你选了 '+a+'</b><br>'+data.questions[i].options[a]+'</div>').join('');resultEl=document.getElementById('result');resultEl.classList.remove('hidden');resultEl.innerHTML='<div class="result-head"><span class="badge">'+data.product+'</span><div class="rtype">'+r.name+'</div><div class="score">'+r.score+'</div><div class="subtitle">'+r.subtitle+'</div></div><div class="card"><div class="section-title">核心结论</div><div class="body">'+r.core+'</div></div><div class="card"><div class="section-title">答案证据</div>'+ev+'<div class="body">'+r.evidence+'</div></div>'+r.modules.map(m=>'<div class="card"><div class="section-title">'+m.title+'</div><div class="body">'+m.body+'</div></div>').join('')+'<div class="card"><div class="section-title">可截图金句</div><div class="quote">“'+r.quote+'”</div></div><div class="card"><div class="section-title">未来30天建议</div>'+r.advice.map(x=>'<div class="advice">'+x+'</div>').join('')+'</div><div class="card"><div class="section-title">关键提醒</div><div class="body">'+r.reminder+'</div></div><div class="disclaimer">本测试仅作自我探索参考，不构成心理诊断、医疗、财务建议或效果承诺。</div>';scrollTo(0,0)}
</script></body></html>
