<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>被误读气质报告</title>
<style>*{box-sizing:border-box}body{margin:0;background:#eef5ed;color:#18302b;font-family:-apple-system,BlinkMacSystemFont,'Microsoft YaHei',sans-serif}.app{max-width:540px;margin:0 auto;min-height:100vh;padding:22px 18px 34px}.top{display:flex;justify-content:space-between;border-bottom:1px solid #c8dac7;padding-bottom:14px;color:#5f8664;font-weight:800;font-size:14px}.hero{padding:34px 0}.pill{display:inline-flex;padding:7px 14px;border-radius:999px;background:#d9e8d6;color:#5f8664;font-weight:800;font-size:13px;margin-bottom:16px}h1{font-size:30px;line-height:1.25;margin:0;font-weight:900}.sub{font-size:15px;line-height:1.7;margin-top:14px;color:#607066}.card,.section{background:#fffdf8;border:1px solid #c8dac7;border-radius:18px;padding:18px;margin-top:16px;color:#211c18}button{border:none;border-radius:14px;padding:14px 16px;font-size:16px;font-weight:850;cursor:pointer}.primary{width:100%;background:#18302b;color:#fff;margin-top:14px}.secondary{background:#eee2d3;color:#201b16}.quiz,.result{display:none}.progress{height:8px;background:#eadcca;border-radius:99px;overflow:hidden;margin-bottom:18px}.bar{height:100%;background:#5f8664;width:0}.qnum{color:#5f8664;font-size:13px;font-weight:850;margin-bottom:8px}.qtext{font-size:21px;line-height:1.4;font-weight:900;margin-bottom:18px;color:#211c18}.option{width:100%;display:grid;grid-template-columns:34px 1fr;gap:12px;align-items:start;background:#fff;border:1px solid #c8dac7;border-radius:14px;margin:10px 0;padding:13px 12px;text-align:left;font-size:15px;line-height:1.5;color:#211c18}.letter{width:30px;height:30px;border-radius:50%;display:grid;place-items:center;background:#d9e8d6;color:#5f8664;font-weight:900}.result{text-align:center}.score{font-size:52px;color:#5f8664;font-weight:950;margin:14px 0 4px}.tag{display:inline-block;margin:4px;padding:7px 11px;border-radius:999px;background:#d9e8d6;color:#5f8664;font-size:13px;font-weight:800}.section{text-align:left;line-height:1.7}.section h3{margin:0 0 10px;color:#5f8664;font-size:15px}.section p,.section li{color:#3b332c;font-size:14px;line-height:1.75}.section ul{padding-left:18px;margin:8px 0 0}.footer{font-size:12px;line-height:1.6;margin-top:18px;text-align:center;color:#607066}</style></head>
<body><main class="app"><div class="top"><span>被误读气质报告</span><span>12题报告</span></div><section id="intro" class="hero"><span class="pill">自我探索测试</span><h1>别人读不懂你，是因为气质还是防备？</h1><p class="sub">按第一反应完成 12 题，看看这件事背后真正牵动你的是什么。她想知道：我为什么总被误解？别人看不懂我是因为我有气质，还是我把自己藏太深？</p><div class="card"><div id="gainList"></div><button class="primary" onclick="startTest()">开始测试</button></div></section><section id="quiz" class="card quiz"><div class="progress"><div id="bar" class="bar"></div></div><div id="qnum" class="qnum"></div><div id="qtext" class="qtext"></div><div id="options"></div><button class="secondary" onclick="prevQuestion()">上一题</button></section><section id="result" class="result hero"><span class="pill">你的完整报告</span><h1 id="rname"></h1><div id="score" class="score"></div><div id="summary" class="section"></div><div id="sections"></div><p class="footer">本测试为自我探索参考，不构成专业判断、志愿填报建议、职业建议或效果承诺。请结合现实情况判断。</p></section></main>
<script>const data={"title":"别人读不懂你，是因为气质还是防备？","product":"被误读气质报告","intro":"按第一反应完成 12 题，看看这件事背后真正牵动你的是什么。她想知道：我为什么总被误解？别人看不懂我是因为我有气质，还是我把自己藏太深？","questions":[{"text":"别人最容易把你误会成什么？","options":["冷淡，其实你只是不想过早热络","高要求，其实你只是有自己的分寸","不好懂，其实你不喜欢把自己摊开","不在乎，其实你只是怕显得太需要"]},{"text":"你最不想被别人随便看见哪一面？","options":["真正脆弱和没底气的时候","很在意但假装无所谓的部分","对关系期待很高的那一面","其实很想被理解的那一面"]},{"text":"当别人靠近你太快时，你会？","options":["先后退一点，观察对方是否稳定","保持礼貌，但不马上交出真实想法","变得冷静甚至有点防备","开始担心自己会不会被误解或打扰"]},{"text":"你希望真正懂你的人先看到什么？","options":["你的分寸感，而不是冷淡","你的细腻，而不是难懂","你的边界，而不是拒绝","你的在意，而不是无所谓"]},{"text":"如果要让别人更容易读懂你，你愿意先放出哪一点？","options":["一点明确的喜欢和不喜欢","一个真实但不太沉重的小感受","一次主动回应，而不是等对方猜","一个可进入的边界，而不是完全关门"]},{"text":"别人读不懂你，最常发生在哪种关系阶段？","options":["刚认识时，你还没决定要不要靠近","对方太快热情，让你下意识后退","关系变近后，你反而更怕暴露真实需要","被误会以后，你懒得继续解释自己"]},{"text":"你被贴错标签时，最常被说成哪一种？","options":["冷淡，其实只是还没确认安全","高傲，其实是不想过度迎合","难懂，其实是不习惯直接袒露","防备，其实是怕被随便评价"]},{"text":"你的安全感通常来自哪种细节？","options":["对方不逼你马上表达立场","关系里有稳定回应，不忽冷忽热","你的边界被尊重，不被反复试探","你不用解释很多，对方也能懂分寸"]},{"text":"完整报告最该帮你解释哪件事？","options":["我到底是气质有距离，还是在防备","别人为什么总把我读成冷淡","我适合怎样靠近人但不讨好","哪些标签其实不属于我"]},{"text":"当你想减少误会时，最难做到什么？","options":["主动释放一点真实感受","在关系早期说明自己的节奏","被误会时不立刻关门","表达边界时不让语气太硬"]},{"text":"哪种人最容易让你变得更难读懂？","options":["过度追问你想法的人","把亲近当成没有边界的人","一边热情一边不稳定的人","喜欢用评价定义你的人"]},{"text":"你更自然的靠近方式应该是什么？","options":["慢慢给信息，不一次性打开自己","先观察行动，再决定投入深浅","用一句清楚回应代替长篇解释","保留边界，同时给对方可读的入口"]}],"results":[{"name":"慢热观察型","score":83,"summary":"别人读不懂你，是因为你不会马上把自己交出去。你需要先观察环境和对方，再决定要不要靠近。","sections":[["别人读不懂你的真实原因","你不是没兴趣，而是需要确认安全感。你会先看对方是否稳定、是否尊重边界、是否值得你放下防备。"],["你最容易被贴错的标签",["冷淡","端着","不好接近","太慢热"]],["适合你的靠近方式","你适合循序渐进的靠近：先有稳定互动，再有小范围分享，最后才进入真正的亲近。太快的热情反而会让你想退。"],["减少误会但不讨好的表达建议","可以给别人一点可读信号，比如“我只是比较慢热，不是不想聊”。这不是讨好，是减少无效误会。"]],"days":["给安全的人一个小入口","不要用完全冷淡测试对方","明确说出自己慢热","观察谁会尊重你的节奏"],"reminder":"慢热不是缺点，只要别人知道门在哪里。"},{"name":"防备筛选型","score":87,"summary":"你被误读，是因为你在关系里自带筛选机制。你不是谁都排斥，只是不想让不合适的人太快靠近。","sections":[["别人读不懂你的真实原因","你对细节很敏感。对方一句话、一个态度、一次越界，都会让你判断这段关系是否值得继续放松。"],["你最容易被贴错的标签",["戒备心重","难搞","挑剔","不合群"]],["适合你的靠近方式","你适合边观察边释放一点真实，而不是一直站在门后。对方稳定，你再逐步打开，既安全也不僵硬。"],["减少误会但不讨好的表达建议","把你的边界说成偏好，不要说成审判：我比较需要慢一点熟悉，这样我会更舒服。"]],"days":["区分警惕和偏见","把一个边界说得柔和一点","给对方一次证明稳定的机会","不要把所有靠近都当风险"],"reminder":"筛选是你的保护，但别让它变成孤立。"},{"name":"高敏共振型","score":79,"summary":"别人读不懂你，是因为你的反应比表面更细。你能捕捉很多气氛变化，却不一定会说出来。","sections":[["别人读不懂你的真实原因","你会感受到语气、停顿、眼神里的变化，但你不一定马上表达。别人只看到你突然安静，看不到你已经接收了很多信息。"],["你最容易被贴错的标签",["想太多","情绪化","不好哄","忽冷忽热"]],["适合你的靠近方式","你适合和能稳定回应的人相处。对方不需要秒懂你，但需要愿意问、愿意听、愿意修正。"],["减少误会但不讨好的表达建议","把感受落到具体事情上：刚才那句话让我有点不确定，而不是直接说“你不懂我”。"]],"days":["记录让你敏感的具体场景","把情绪翻译成事实","少用沉默让对方猜","找能稳定回应的人靠近"],"reminder":"敏感不是麻烦，它需要更清楚的表达来保护。"},{"name":"独立抽离型","score":75,"summary":"别人读不懂你，是因为你很少把需求放到台面上。你看起来独立，其实只是习惯自己消化。","sections":[["别人读不懂你的真实原因","你不喜欢麻烦别人，也不想显得自己需要很多回应，所以会把真实需求收起来。久了别人就只看到你的独立。"],["你最容易被贴错的标签",["不需要人","太理性","没什么情绪","难靠近"]],["适合你的靠近方式","你适合从小需求开始练习表达，比如一句请求、一次真实反馈，而不是等到完全撑不住才说。"],["减少误会但不讨好的表达建议","表达需要不等于低姿态。可以说：这件事我其实也希望有人一起商量。"]],"days":["说出一个小需求","允许别人帮你一次","减少自动说没关系","观察谁能接住你的真实"],"reminder":"你不是没有需要，只是太习惯一个人处理。"}],"gains":["你的被误读类型","别人读不懂你的真实原因","你最容易被贴错的标签","适合你的靠近方式","减少误会但不讨好的表达建议"]};let index=0;const answers=[];const letters=['A','B','C','D'];document.getElementById('gainList').innerHTML=data.gains.map(x=>`<div class="tag">${x}</div>`).join('');function startTest(){document.getElementById('intro').style.display='none';document.getElementById('quiz').style.display='block';renderQuestion();}function renderQuestion(){const q=data.questions[index];document.getElementById('bar').style.width=((index)/data.questions.length*100)+'%';document.getElementById('qnum').textContent=`第 ${index+1} / ${data.questions.length} 题`;document.getElementById('qtext').textContent=q.text;document.getElementById('options').innerHTML=q.options.map((t,i)=>`<button class="option" onclick="choose(${i})"><span class="letter">${letters[i]}</span><span>${t}</span></button>`).join('');}function choose(i){answers[index]=i;if(index<data.questions.length-1){index++;renderQuestion();}else showResult();}function prevQuestion(){if(index>0){index--;renderQuestion();}}function showResult(){const counts=[0,0,0,0];answers.forEach(x=>counts[x]++);let max=0;for(let i=1;i<4;i++)if(counts[i]>counts[max])max=i;const r=data.results[max];document.getElementById('quiz').style.display='none';document.getElementById('result').style.display='block';document.getElementById('rname').textContent=r.name;document.getElementById('score').textContent=r.score;document.getElementById('summary').innerHTML=`<h3>${data.gains[0]}</h3><p><strong>${r.name}</strong>：${r.summary}</p>`;const sections=(r.sections||[]).concat([['未来30天建议',r.days],['关键提醒',r.reminder]]);document.getElementById('sections').innerHTML=sections.map(([h,v])=>Array.isArray(v)?`<div class="section"><h3>${h}</h3><ul>${v.map(x=>`<li>${x}</li>`).join('')}</ul></div>`:`<div class="section"><h3>${h}</h3><p>${v}</p></div>`).join('');window.scrollTo({top:0,behavior:'smooth'});}</script></body></html>
