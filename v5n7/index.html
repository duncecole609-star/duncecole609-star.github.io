<body><main class="app"><div class="top"><span>关系软肋报告</span><span>12题报告</span></div><section id="intro" class="hero"><span class="pill">自我探索测试</span><h1>你一上头，就容易把软肋交出去</h1><p class="sub">这不是恋爱脑评判，而是帮你看清：为什么某类人总能轻易牵动你。</p><div class="card"><div class="list"><div>你的关系软肋类型</div><div>你最容易上头的信号</div><div>对方牵动你的真正原因</div><div>容易误判心动的地方</div><div>更稳的关系节奏</div></div><button class="primary" onclick="startTest()">开始测试</button></div></section><section id="quiz" class="card quiz"><div class="progress"><div id="bar" class="bar"></div></div><div id="qnum" class="qnum"></div><div id="qtext" class="qtext"></div><div id="options"></div><button class="secondary" onclick="prevQuestion()">上一题</button></section><section id="result" class="result hero"><span class="pill">你的完整报告</span><h1 id="rname"></h1><p id="rsub" class="sub"></p><div id="score" class="score"></div><div id="sections"></div><p class="footer">本测试为自我探索参考，不构成诊断、志愿填报建议、职业建议或承诺。请结合现实情况判断。</p></section></main>
