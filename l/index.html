<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>每天上班前都想辞职，是累了，还是这份工作真的不适合你？</title>
<style>
*{box-sizing:border-box}body{margin:0;min-height:100vh;background:#f7efe4;color:#201b16;font-family:-apple-system,BlinkMacSystemFont,'Microsoft YaHei',sans-serif}.app{max-width:520px;margin:0 auto;min-height:100vh;padding:22px 18px 34px}.top{display:flex;justify-content:space-between;border-bottom:1px solid #dac7ad;padding-bottom:14px;color:#a04435;font-weight:800;font-size:14px}.hero{padding:34px 0;text-align:left}.pill{display:inline-flex;padding:7px 14px;border-radius:999px;background:#fff6d5;color:#a04435;font-weight:800;font-size:13px;margin-bottom:16px}h1{font-size:31px;line-height:1.22;margin:0;font-weight:900}.sub{font-size:15px;line-height:1.7;color:#655b51;margin-top:14px}.card{background:#fffdf8;border:1px solid #e0d0ba;border-radius:18px;padding:20px;margin-top:18px;box-shadow:0 16px 40px rgba(70,46,22,.08)}.list div{padding:12px;border-radius:12px;background:#f6efe5;margin:10px 0;font-size:14px;line-height:1.55}button{border:none;border-radius:14px;padding:14px 16px;font-size:16px;font-weight:850;cursor:pointer}.primary{width:100%;background:#26211d;color:#fff;margin-top:14px}.secondary{background:#eee2d3;color:#201b16}.quiz,.result{display:none}.progress{height:8px;background:#eadcca;border-radius:99px;overflow:hidden;margin-bottom:18px}.bar{height:100%;background:#a04435;width:0;transition:.2s}.qnum{color:#a04435;font-size:13px;font-weight:850;margin-bottom:8px}.qtext{font-size:21px;line-height:1.4;font-weight:900;margin-bottom:18px}.option{width:100%;display:grid;grid-template-columns:34px 1fr;gap:12px;align-items:start;background:#fff;border:1px solid #e1d1bb;border-radius:14px;margin:10px 0;padding:13px 12px;text-align:left;font-size:15px;line-height:1.5;color:#211c18}.option:hover{border-color:#a04435}.letter{width:30px;height:30px;border-radius:50%;display:grid;place-items:center;background:#fff0c2;color:#a04435;font-weight:900}.actions{display:flex;gap:10px;margin-top:16px}.result{text-align:center}.score{font-size:48px;color:#a04435;font-weight:950;margin:14px 0 4px}.summary,.quote,.section{text-align:left;border-radius:16px;padding:16px;margin-top:14px;line-height:1.7}.summary{background:#fff;border:1px solid #e1d1bb}.quote{background:#27231f;color:#fff1d0;font-weight:850}.section{background:#fffdf8;border:1px solid #e1d1bb}.section h3{margin:0 0 10px;color:#a04435;font-size:15px}.tags{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin:14px 0}.tag{padding:8px 12px;border-radius:999px;background:#fff0c2;color:#7a3b2f;font-size:13px;font-weight:800}.footer{font-size:12px;color:#766c62;line-height:1.6;margin-top:18px}
</style></head><body><main class="app"><div class="top"><span>离职冲动指数</span><span>SELF CHECK</span></div><section id="intro" class="hero"><span class="pill">12 题自我探索</span><h1>每天上班前都想辞职，是累了，还是这份工作真的不适合你？</h1><p class="sub">按第一反应选择。它不会替你做决定，只帮你看清：你现在更需要休息、调整，还是开始准备下一步。</p><div class="card"><div class="list"><div>你的离职冲动阶段</div><div>你最容易误判自己的地方</div><div>适合你的下一步处理方式</div></div><button class="primary" onclick="startTest()">开始测试</button></div></section><section id="quiz" class="card quiz"><div class="progress"><div id="bar" class="bar"></div></div><div id="qnum" class="qnum"></div><div id="qtext" class="qtext"></div><div id="options"></div><div class="actions"><button class="secondary" onclick="prevQuestion()">上一题</button></div></section><section id="result" class="result hero"><span class="pill">你的阶段</span><h1 id="rname"></h1><p id="rsub" class="sub"></p><div id="score" class="score"></div><div class="tags" id="tags"></div><div id="summary" class="summary"></div><div id="quote" class="quote"></div><div class="section"><h3>下一步建议</h3><div id="advice" class="list"></div></div><p class="footer">本测试为自我探索参考，不构成职业建议或承诺。请结合现实情况判断。</p></section></main><script>
const data={"title": "每天上班前都想辞职，是累了，还是这份工作真的不适合你？", "questions": [["闹钟响了，你想到今天要上班，第一反应是？", ["只是想多睡十分钟。到了公司以后通常还能进入状态，心里知道自己主要是累。", "会叹一口气，但还是能把自己拖起来。你不是真的不想干，只是不想再重复昨天那种消耗。", "一想到要见那些人和处理那些事，身体先开始抗拒。不是困，是整个人发沉。", "会认真想今天能不能请假，甚至打开招聘软件。你已经不只是累，而是在本能地想逃离。"]], ["领导临时又加了一个活，你更像哪种反应？", ["先接下来，判断一下优先级。虽然烦，但还在可控范围内。", "表面说好，心里开始冒火。你能完成，但越来越不想再当那个兜底的人。", "会觉得特别委屈：为什么每次都是我？你开始怀疑这份工作是不是一直在透支你。", "直接开始想退路。不是这个任务有多难，而是你已经不想继续证明自己能扛了。"]], ["周日晚上想到明天上班，你通常会？", ["有点不想面对，但做点准备会安心。情绪来得快，过去也快。", "开始拖延睡觉，刷手机到很晚。像是在用熬夜抵抗明天的到来。", "胸口发紧，脑子里反复预演明天会发生什么。你已经很难真正休息。", "会冒出一个很清晰的念头：不能再这样下去了。你想要的不是假期，是换一种生活。"]], ["如果现在给你一周假期，你觉得回来后会怎样？", ["大概率会好很多。你需要的是休息，不一定是离开。", "前两天会好，后面一想到回去又开始烦。问题可能不只是假期不够。", "回来第一天就会被打回原形。你知道真正耗你的东西还在那里。", "你甚至不想回来。假期只会让你更确定，自己不想继续待在原来的轨道里。"]], ["你最常对自己说哪句话？", ["再坚持一下，可能只是最近太累了。", "我是不是该把边界立起来，不要什么都接。", "这份工作好像不适合我，但我还没准备好走。", "我不能再这样消耗自己了，必须开始找下一步。"]], ["别人劝你别冲动辞职时，你心里会？", ["觉得有道理，自己也怕只是情绪上头。", "知道不能冲动，但也希望有人承认我真的很累。", "会有点烦，因为他们没经历我的处境。", "会更想证明自己不是冲动，而是已经想了很久。"]], ["你对现在工作的最大不满是？", ["阶段性太忙，休息恢复后还能接受。", "边界不清，经常被额外任务挤占。", "价值感越来越低，做了也没什么反馈。", "方向不对，继续待下去像是在浪费自己。"]], ["如果明天换个领导/同事，你会留下吗？", ["可能会，说明问题主要在人和管理方式。", "会观察一阵，但不敢太乐观。", "不一定，因为我对这类工作本身也开始厌倦。", "不会，哪怕环境变好，我也想换一条路。"]], ["你现在最缺的是什么？", ["睡眠和恢复。先把身体状态拉回来。", "边界和节奏。别再什么都硬扛。", "选择感。至少知道自己还有别的可能。", "行动计划。不是想想，而是真的开始准备。"]], ["看到同龄人换工作/转行，你会？", ["羡慕一下，但也知道每个人节奏不同。", "有点心动，同时担心自己是不是太保守。", "会认真研究他们怎么做到的。", "会被刺激到，觉得自己不能再停在原地。"]], ["如果继续待半年，你最担心的是？", ["只是累一阵，还能缓过来。", "越来越麻木，边界越来越低。", "能力没长，情绪也被耗坏。", "错过真正该走的时间点。"]], ["现在让你做一个小动作，你更愿意？", ["先休息两天，观察情绪有没有恢复。", "列出最消耗自己的 3 件事。", "更新简历，看看市场反馈。", "定一个离开时间表，开始具体准备。"]]], "results": {"A": {"name": "短暂耗电型", "sub": "你不是不适合这份工作，你更像是电量被暂时用空了", "score": "28.3%", "summary": "你现在的离职冲动更像阶段性疲惫。你会厌烦、会抗拒，但当休息足够、节奏恢复时，仍然有机会重新进入状态。", "quote": "你不一定要立刻离开，先把自己从过载里捞出来。", "tags": ["恢复优先", "节奏修复", "短期疲惫", "先别裸辞"], "advice": ["先补睡眠和休息", "暂停做重大决定", "观察两周后的真实感受"]}, "B": {"name": "边界透支型", "sub": "工作未必完全错了，但你的边界已经被压得太薄", "score": "52.7%", "summary": "你不是单纯想逃，而是长期在兜底、配合、忍耐里把自己消耗掉了。真正的问题可能不是岗位，而是边界、节奏和话语权。", "quote": "你需要的不是再忍一忍，而是重新拿回一点边界。", "tags": ["边界过薄", "长期兜底", "情绪透支", "需要调整"], "advice": ["列出最消耗你的任务", "尝试拒绝一次不合理加活", "给自己设一个观察期限"]}, "C": {"name": "离开蓄力型", "sub": "你不是一时冲动，而是已经在心里准备离开很久了", "score": "78.4%", "summary": "你的抗拒不只是疲惫，而是对当前工作模式、成长空间或生活状态的长期不适配。此时最重要的不是立刻裸辞，而是开始认真准备下一步。", "quote": "真正成熟的离开，不是逃跑，而是有计划地把自己带走。", "tags": ["长期不适配", "需要后路", "离开准备", "重启节奏"], "advice": ["更新简历和作品", "测试外部机会", "制定 30 天离开准备表"]}}};const letters=['A','B','C','D'];let index=0;const answers=[];
function startTest(){document.getElementById('intro').style.display='none';document.getElementById('quiz').style.display='block';renderQuestion();}
function renderQuestion(){const q=data.questions[index];document.getElementById('bar').style.width=(index/data.questions.length*100)+'%';document.getElementById('qnum').textContent=`第 ${index+1} / ${data.questions.length} 题`;document.getElementById('qtext').textContent=q[0];document.getElementById('options').innerHTML=q[1].map((x,i)=>`<button class="option" onclick="choose(${i})"><span class="letter">${letters[i]}</span><span>${x}</span></button>`).join('');}
function choose(i){answers[index]=i;if(index<data.questions.length-1){index++;renderQuestion();}else showResult();}
function prevQuestion(){if(index>0){index--;renderQuestion();}}
function showResult(){const sum=answers.reduce((a,b)=>a+b,0);const key=sum<=12?'A':(sum<=24?'B':'C');const r=data.results[key];document.getElementById('quiz').style.display='none';document.getElementById('result').style.display='block';document.getElementById('rname').textContent=r.name;document.getElementById('rsub').textContent=r.sub;document.getElementById('score').textContent=r.score;document.getElementById('tags').innerHTML=r.tags.map(x=>`<span class="tag">${x}</span>`).join('');document.getElementById('summary').textContent=r.summary;document.getElementById('quote').textContent=r.quote;document.getElementById('advice').innerHTML=r.advice.map(x=>`<div>${x}</div>`).join('');window.scrollTo({top:0,behavior:'smooth'});}
</script></body></html>
