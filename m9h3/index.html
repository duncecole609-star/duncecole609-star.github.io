<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>被低估的测试</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"PingFang SC","Microsoft YaHei",sans-serif;background:#0f0f1a;color:#e8e0d0;min-height:100vh;display:flex;justify-content:center}
.app{width:100%;max-width:500px;min-height:100vh;position:relative;overflow:hidden}
.screen{display:none;flex-direction:column;min-height:100vh;padding:28px 22px 40px}
.screen.active{display:flex}

.cover{justify-content:center;align-items:center;text-align:center;gap:20px}
.cover .icon{font-size:52px}
.cover h1{font-size:29px;font-weight:900;line-height:1.4;letter-spacing:1.5px;padding:0 6px}
.cover h1 .hl{color:#c9a96e}
.cover .sub{font-size:15px;color:#8a8070;line-height:1.7;max-width:300px}
.cover .btn-start{margin-top:10px;padding:15px 50px;font-size:18px;font-weight:700;background:linear-gradient(135deg,#c9a96e,#a6844d);color:#0f0f1a;border:none;border-radius:40px;cursor:pointer;letter-spacing:2px}
.cover .btn-start:active{transform:scale(.96)}
.cover .trust{font-size:12px;color:#4a4538;margin-top:6px}

.progress-wrap{padding:4px 0 14px}
.progress-bar{height:3px;background:#1e1e2e;border-radius:2px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,#c9a96e,#d4b87a);border-radius:2px;transition:width .3s}
.progress-label{font-size:13px;color:#5a5548;margin-top:6px;text-align:right}

.q-area{flex:1;display:flex;flex-direction:column;gap:16px}
.q-area .q-num{font-size:13px;color:#6a6558;letter-spacing:2px}
.q-area .q-text{font-size:23px;font-weight:700;line-height:1.5}
.options{display:flex;flex-direction:column;gap:10px}
.opt{padding:18px 16px;border-radius:14px;background:#16162a;border:1.5px solid #252540;cursor:pointer;transition:all .2s;display:flex;align-items:flex-start;gap:13px}
.opt:active{transform:scale(.98);border-color:#c9a96e;background:#1e1e34}
.opt .letter{width:33px;height:33px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;flex-shrink:0;background:rgba(201,169,110,.12);color:#c9a96e}
.opt .txt{font-size:15px;line-height:1.55;color:#c8c0b0;flex:1}

.gate-screen{justify-content:center;align-items:center;text-align:center;gap:24px}
.gate-screen .lock-icon{font-size:48px}
.gate-screen h2{font-size:26px;font-weight:800;line-height:1.4}
.gate-screen .gate-desc{font-size:15px;color:#a09880;line-height:1.7;max-width:300px}
.gate-screen .unlock-list{text-align:left;background:#16162a;border-radius:16px;padding:20px 24px;width:100%;max-width:320px}
.gate-screen .unlock-list li{font-size:14px;color:#b8b0a0;line-height:2;list-style:none}
.gate-screen .unlock-list li::before{content:"✓ ";color:#c9a96e;font-weight:700}
.gate-screen .btn-gate{margin-top:8px;padding:14px 44px;font-size:18px;font-weight:700;background:linear-gradient(135deg,#c9a96e,#a6844d);color:#0f0f1a;border:none;border-radius:40px;cursor:pointer;letter-spacing:2px}
.gate-screen .btn-gate:active{transform:scale(.96)}
.gate-screen .price{font-size:14px;color:#6a6558;margin-top:4px}

.loading{justify-content:center;align-items:center;text-align:center;gap:24px}
.loading .spinner{width:52px;height:52px;border:3px solid #1e1e2e;border-top-color:#c9a96e;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading .msg{font-size:16px;color:#a09880;letter-spacing:1px}

.result{padding:28px 22px 48px}
.result .badge{display:inline-block;padding:7px 16px;border:1px solid rgba(201,169,110,.25);border-radius:16px;font-size:13px;color:#c9a96e;letter-spacing:2px;margin-bottom:14px}
.result .type-name{font-size:36px;font-weight:900;margin-bottom:6px;line-height:1.2}
.result .type-sub{font-size:18px;color:#d4b87a;margin-bottom:20px;line-height:1.4}

.evidence-box{background:#16162a;border-radius:16px;padding:20px;margin-bottom:22px;border-left:3px solid #c9a96e}
.evidence-box h3{font-size:14px;color:#c9a96e;letter-spacing:2px;margin-bottom:10px}
.evidence-box p{font-size:14px;color:#b8b0a0;line-height:1.7}

.module{margin-bottom:20px}
.module h3{font-size:16px;color:#a09880;letter-spacing:1.5px;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid #1e1e2e}
.module p{font-size:14px;color:#b8b0a0;line-height:1.75;margin-bottom:6px}

.summary-box{background:linear-gradient(135deg,#1a1a2e,#1f1f34);border-radius:16px;padding:24px;margin:24px 0;text-align:center;border:1px solid rgba(201,169,110,.15)}
.summary-box .q-mark{font-size:28px;color:#c9a96e;margin-bottom:8px}
.summary-box p{font-size:17px;color:#d4b87a;line-height:1.7;letter-spacing:.5px}

.advice-box{margin-bottom:24px}
.advice-box h3{font-size:16px;color:#a09880;letter-spacing:2px;margin-bottom:12px}
.advice-box .advice-item{padding:12px 14px;margin-bottom:8px;background:#16162a;border-radius:12px;font-size:14px;color:#b8b0a0;line-height:1.6;display:flex;gap:10px}
.advice-box .advice-item .n{color:#c9a96e;font-weight:700;flex-shrink:0}

.reminder-box{background:#16162a;border-radius:16px;padding:20px;margin-bottom:28px;border:1px solid #2a2a40}
.reminder-box h3{font-size:15px;color:#c9a96e;letter-spacing:2px;margin-bottom:8px}
.reminder-box p{font-size:14px;color:#a09880;line-height:1.7}

.footer{text-align:center;padding:16px;font-size:11px;color:#3a3a48;border-top:1px solid #16162a;margin-top:auto}
</style>
</head>

<div class="app" id="app"></div>
<script>
// ========== 内容数据 ==========
const DATA = {
  title:"你身上最被低估的地方，<br>恰好是别人<br><span class='hl'>最喜欢你的原因</span>",
  subtitle:"不是测你哪里不好——<br>是告诉你，你以为的「普通」在别人眼里有多珍贵",

  questions:[
    {scene:"你有没有一个特点，自己觉得不值一提，但总有人反复提起？",A:"有。我不爱说话——聚会的时候我常常是话最少的那个。我觉得这叫无趣，但有人说这叫「安静得让人想待在你旁边」",B:"有。我做事很较真——不是大事才这样，是每一件小事都不放过。我觉得这叫太轴，但总有人说「只有交给你我才放心」",C:"有。我偶尔冒出一句话别人会笑很久——但我根本不觉得好笑。我觉得这是日常，他们却说「你讲话真的很好笑」",D:"有。我有时候脑子里会冒出一个念头，后来发现对了——但我解释不了为什么。我觉得这叫运气好，但身边人会说「你真的每次都猜对」"},
    {scene:"你最容易在什么时候觉得自己「好像没什么特别的」？",A:"一群人聊天的时候——别人都能接住话，轮到我时我已经不知道该说什么了。安静久了会觉得自己是不是存在感太低了",B:"别人轻松搞定的事我却还在反复确认的时候——我羡慕那种「差不多就行」的松弛，但自己就是做不到不去抠细节",C:"讲完一个笑话冷场的时候——不是每次都能踩到笑点。有时候觉得自己只是把心里想的说出来，但空气突然安静",D:"别人问「你怎么知道的」我说「猜的」的时候——因为我真的解释不出来。别人觉得我不够有理有据，我自己也不知道该不该信自己"},
    {scene:"如果让你用一个词形容自己最核心的气质，你第一反应会选哪个？",A:"沉。不是沉重，是像水一样不怎么起涟漪的那种沉。遇到事我先消化，再说话——但消化完了有时候就不想说了",B:"稳。别人崩了我还在，不是因为我不怕，是我觉得崩了也得把事情做完。但这种稳有时候被当成「不够有趣」",C:"怪。不是奇怪，是脑子里装的东西和别人不太一样。我容易注意到别人注意不到的东西，但我已经习惯了不说——说了别人也未必懂",D:"准。不是自信，是真的经常对。但我不敢太依赖这种感觉——它说不清来由，我怕哪一天它就不准了"},
    {scene:"如果有人很认真地告诉你「我很喜欢你这个地方」，你第一反应是什么？",A:"愣住。然后想——「你确定不是在客气吗？」因为我觉得安静这件事真的不值得被喜欢，它只是我做不到热闹而已",B:"有点不好意思。然后想——「你是不是还没看到我被自己困住的样子。」认真帮我把事情做好了，但也让我很难轻松下来",C:"意外。然后想——「你是说我真的好笑吗？不是客套？我自己真的不觉得。」我甚至会在事后反复回忆刚才是不是真的讲了什么好笑的话",D:"将信将疑。然后想——「但我不敢说每次都准，万一这次你信我然后我错了我该怎么办。」直觉这个东西太不可靠了——至少我自己是这么以为的"},
    {scene:"你在社交媒体上最容易刷到哪种让你心里一动的帖子？",A:"「喜欢你的人，不介意你话少。TA只觉得在你旁边很平静。」——每次刷到都忍不住看两遍",B:"「认真的人到今天还被低估——不是他们不够有趣，是这世界太浮躁了还没学会欣赏他们。」——反正我默默点了个赞",C:"「有一种幽默是你过两天才反应过来。」——对！我就是这个类型的，但说出来别人不信",D:"「相信你的直觉吧——你的脑袋里早就有答案了，只是你还没学会信任它。」——这句话我存了"},
    {scene:"有没有一件事，你自己觉得是缺点，但身边至少三个人告诉过你这是你的优点？",A:"话少。我自己觉得是社交障碍，但至少有两个人跟我说「跟你在一起不用说话也很舒服」。当时我心想：这算夸我吗？后来才懂——对一些人来说，不用说话是一种礼物",B:"太较真。我自己觉得是「不会放过自己」，但同事跟我说「你接手的活我从来不看第二遍」。还有朋友说「你的认真让我觉得自己被重视了」",C:"讲话不分场合。我自己觉得是情商低，但有个朋友说「就是因为你不分场合，才总有神来之笔」。另一个人说「你的幽默不是设计过的——是从你的脑子里自然流出来的」",D:"跟着感觉走。我自己觉得是不理性，但我妈说「你从小就直觉准，选的路没错过」。还有朋友说「我后来才明白你说的那句话是什么意思——你比你自己以为的更厉害」"},
    {scene:"如果让你坦率地说——你觉得自己的存在对别人最大的价值是什么？",A:"我可能不是最有趣的人，但我是一个能让别人停下来歇一歇的人。有一次朋友哭着来找我，我没说什么，就坐在旁边递纸巾。后来她说「那一个下午是我那年最被治愈的时刻」，可我明明什么都没干",B:"我可能是那个一直在底下撑着的人。不是那种亮眼的、让人看见的——但我知道有多少次是因为我在，事情才没有崩。虽然没有人专门来感谢过我，但那些东西都还在那里",C:"我可能是那个让气氛突然变轻的人。不是主角，不是控场的——但偶尔一句话让大家都笑了，然后继续聊下去了。我不是领舞的人，但我可能是那个按下「放松」键的人",D:"我可能是那个看不见的雷达。别人还在分析利弊，我心里已经有答案了——但我通常不说，因为我解释不了。但好多次事后证明，如果当初听了我的，就不用绕那么多路"},
    {scene:"别人夸你的时候，你通常怎么接？",A:"先否定。比如别人说「你好温柔」——我说「没有吧，我只是不知道说什么」。后来有个人说「你能不能先收下，不要解释」，我才发现很难",B:"先给证据。别人说「你真的很靠谱」，我说「还好吧，我就是把事情做完了而已」。我没意识到——能把事情做完且不出错，这件事本身就很少见",C:"先怀疑。别人说「你好幽默」，我说「啊？你是说真的吗？」如果对方再肯定一次，我反而更不知道怎么接——「好笑」这个属性我从来没有放进自我描述里",D:"先免责声明。别人说「你直觉好准」，我说「蒙的」。我真的会说这两个字——「蒙的」。因为我不知道怎么解释我到底是怎么知道的，好像承认了就是不负责任"},
    {scene:"你觉得自己最被低估的一个特质是什么？",A:"我能忍得住沉默。不是尴尬的沉默——是那种什么都不用说也觉得很完整的时刻。我觉得这不值钱，但有人跟我说「当代稀缺品第一名」。我到现在还不完全信",B:"我会在所有人都走了之后依然把事情做好。不是做给别人看的——是真的觉得这件事值得被好好完成。我觉得这叫笨，但有人管这叫「匠气」",C:"我能让紧绷的场面松开。不是刻意的，就是我发现绷着的时候大家都很痛苦——于是我忍不住说了一句很真实的话，然后空气就松了。我没把这当本事，直到有人告诉我这叫「氛围调节能力」",D:"我能在信息不全的情况下做对决定。不是蒙——是脑子已经跑完了所有可能性，但我来不及也讲不出那个过程。我一直在为自己的「不讲理」道歉，直到有人告诉我——「不讲的不是理，是一种你没学会解释的聪明」"},
    {scene:"如果有人对你说「我很早就注意到你身上的这个特质了」，你身上会起鸡皮疙瘩吗？",A:"会。然后眼眶会酸——因为「安静」是我从小被提醒要改掉的东西。「上课要多举手」「聚会要多说话」——我改了几十年都没改掉，然后有一个人说「我早注意到了，很喜欢」。不是感动，是被接住了",B:"会。然后会很矛盾——因为「认真」这件事让我吃了很多苦。熬过最深的夜、扛过最重的担子、被说过太轴、不会变通。然后有人跟我说「我是因为你认真才靠近你的」——那种感觉是被看见了",C:"会。然后会想哭——因为「幽默」是我小时候被老师拎出来批评的东西。「上课不要讲小话」「正经一点」——我学会在别人面前收起来。然后有人跟我说「你收起来的东西我看见了」，那一刻我像个被翻到藏宝图的小孩",D:"会。然后鼻子会酸——因为「直觉」是我花了十几年学会不信任的东西。每次直觉准了，我都跟自己说「运气」。然后有一个人说「我观察过你，不是运气——是你比你自己以为的聪明了一百倍」"},

    {scene:"你有没有意识到——你一直觉得「这不算什么」的事情，其实是别人花了很多年也没学会的？",A:"安静地待着，不对别人提要求，不把情绪塞给别人，自己消化完再出现。我以为每个人都这样——后来才发现，很多人专门找人、花钱、花时间，就是为了学会这一件事：跟自己待着、不慌张",B:"把事情做到最后一毫米，不需要任何人盯着，没有掌声也做得像有聚光灯照着一样。我以为这是基本操作——后来才发现，这叫「内驱力」，读再多书也不一定学得会的那种",C:"把「好笑」当成一种观察世界的角度，而不是一个需要计算的段子。你只是把看到的东西用你的方式说了一遍——但你不知道，同一个东西在别人眼里根本没那么有趣。是你的眼睛有趣",D:"在所有人都等「更多数据」的时候，心里已经知道答案了。你以为这叫冲动——直到你发现大部分糟糕的决定都来自「有充分数据但没有人敢拍板」。而你已经在拍了，只是你一直没给自己鼓掌"},
    {scene:"如果有一天你终于相信——这个你一直低估的特质就是你身上最亮的光，你最想拿这束光去照亮什么？",A:"我想照亮那些和我一样安静的人。告诉他们——你不用为了被喜欢而变成另一个人。你的安静不是缺点，是某个人的港湾。你不是无趣——你是一片可以让别人靠岸的海",B:"我想照亮那些还在觉得自己「太轴」的小孩。告诉他们——你的认真不会白费。总有一天有人会来找你，然后发现你是唯一一个能把一件事从头到尾做漂亮的人。到时候你就知道——你不是轴，你是那个被托付的人",C:"我想照亮那些藏着自己幽默的人。告诉他们——你脑子里的那些怪念头不是累赘，是宝藏。你以为没人懂，但总有一天会有一个人在你还没说完之前就笑了。那个人是在说——「我懂。我也是这么看这个世界的。」",D:"我想照亮那些不敢信自己的人。告诉他们——你的直觉不是空穴来风。你猜对的事情比你以为的多得多，只是你一直在用「运气」抹掉自己的天赋。下次别再说「蒙的」。说「我判断的」——因为你确实是"}
  ],

  types:{
    A:{name:"你的安静",tag:"你以为的无趣，是别人找了很久的安静",icon:"🌙",
       score:"被低估指数 88%",
       conclusion:"你一直觉得自己太安静了——话不够多、不够热络、不够「会来事」。但你不知道的是：有些人靠近你，就是为了你身上的这股安静。在你身边，他们不用表演、不用找话、不用害怕冷场。你的安静不是空洞——是一种密度很大的存在感。你不是无趣——你是那个能让别人卸下所有紧张的人。这个时代太吵了，而你是一间开着门的安静房间。",
       evidence_note:"你在Q1中选了「不爱说话」但别人告诉你「安静得让人想待在你旁边」；在Q3中你形容自己「沉」，不是沉重而是从容；在Q6中你收到过不止一个人的反馈说「跟你在一起不用说话也很舒服」；Q9里你意识到自己能「忍得住沉默」而这种能力在别人眼里是稀缺品。你的核心模式是：你把「安静」当缺陷修了几十年，但修不好——因为它本来就不是缺陷。",
       quote:"你不是不会说话——你是把话都留给了值得的人。而那些只在你沉默时靠近的人，恰恰是听懂了所有你没说的。",
       modules:[
         {title:"安静是你给自己最好的礼物",content:"在一个人人都被要求「外向一点」的世界里，你能守住自己的安静——这本身就是一种力量。你不是排斥热闹，你是知道自己的能量从哪里来。你不需要一直说话来证明自己存在——你存在这件事本身，对一些人来说就是安慰。安静不是空，是满——满到你不需要用语言去填充任何空隙。"},
         {title:"别人为什么被你的安静吸引",content:"很多人花了一辈子想学会「跟自己待着」，而你天生就会。在你旁边，他们的焦虑会变慢，脑子里那个一直在响的噪音会变小。不是因为你说了什么——是因为你不急着说什么。你的安静给了别人一个空间：他们可以在你面前不表演、不讨好、不解释。这种体验在这个时代太少了，所以你成了他们想反复靠近的人。"},
         {title:"你把安静当缺陷，但它其实是筛选器",content:"会因为你话少而离开的人，本来就不是你会想深入交往的人。而留下来的人——那些在你沉默时依然觉得舒服的人——才是真正和你同频的。你的安静帮你筛掉了所有需要你用「热闹」才能留住的人。剩下的人——她们看见的不是你的沉默，是你沉默里藏着的那片海。"},
         {title:"你的安静里有别人听不见的音乐",content:"你不说话的时候，其实在听。你听到了别人没听到的：语气里的勉强、笑声里的失落、那句话里的弦外之音。你不是反应慢——你是在处理更多的信息。当别人已经说了十句，你还在想第一句到底是什么意思。这种深度不是缺陷，是你给了每一个瞬间足够的重量。"},
         {title:"从今天起，请把安静当成你的超能力",content:"下次别人说你安静的时候，不要再说「对不起」。你可以笑一笑——因为你知道：安静不是你没有话可说，是你的内心已经足够完整，不需要用语言来补丁。你不需要为安静道歉——你要为你的安静感到骄傲。它是你的语言，是你的边界，是你给这个世界最温柔的贡献。那些懂你的人，不是「不介意」你的安静——他们喜欢你的安静。"}
       ],
       advice:["7天观察：这周记录每一次你沉默的时刻，写下你当时在想什么。你会发现——你沉默的时候脑子其实是满的，不是空的。那个「满」就是你的深度。","7天观察：注意那些在你旁边突然变得放松的人。他们不是偶然——是你的安静在起作用。每次注意到这种时刻，在心里跟自己说一句：「这是我的超能力。」","30天练习：练习在自己的安静被质疑的时候，不说对不起，不说「我只是不知道说什么」。试着说：「我在听。」——因为这就是事实。你确实在听，只是比大多数人都听得更深。","30天练习：找一个你信任的人，直接问TA：「跟我在一起的时候，你感觉怎样？」不要预设答案。你会被TA的回答吓到——因为你以为的「没贡献」，在TA那里可能是最好的贡献。"],

       modules:[

         {title:"别人为什么离不开你的认真",content:"在你的朋友、同事、家人心里，你是那个「最后一道防线」。他们知道：交给你的事，不用催、不用盯、不用返工。你替他们省下来的不只是麻烦——还有那种「交给别人不放心」的焦虑。你一个人默默兜底的时候可能觉得没人看见——但你看不见的是：很多人正是因为知道有你在，才敢去做更大胆的事。你是他们的安全网。"},
         {title:"你以为的「轴」，其实是别人想学学不会的准则",content:"你被说过太轴、不会变通、不懂偷懒。但你想过没有——那些说你太轴的人，自己在需要被认真对待的时候，第一个想到的就是你。他们不是真的觉得你轴——他们是羡慕你有自己不肯妥协的标准。在这个「差不多就行了」的世界里，你的「不行，还得再好一点」是稀缺的。你不是不会偷懒——你是不愿意对重要的事情偷懒。"},
         {title:"认真的人，也值得被认真对待",content:"你可能习惯了照顾所有人——帮同事收尾、帮朋友把关、帮家人提前想到他们还没想到的事。但你有没有注意到：你的认真很少被认真对待。不是他们不感激——是你从不给别人机会照顾你。你一直都是「没关系我可以的」那个人。但你值得有人蹲下来跟你说：「这次我来。你歇一歇。」认真的人最容易被忽略的，就是自己也需要被认真对待。"},
         {title:"请骄傲地做一个认真的人",content:"从今天起，不要用「太认真」自我批评了。你不需要变得松弛、变得随意、变得「别那么较真」。你只需要在做完一件事的时候，对自己说一句：「我做得很漂亮。」然后允许自己不谦虚。你的认真不是你要改的毛病——是你在这个世界上留痕迹的方式。每一件你认真做过的事，都是你的签名。"}

       advice:["7天观察：这周留意一下，有多少次是你发现了别人没发现的细节、提前解决了别人还没遇到的问题是——记录下来。你会发现你的「认真」每天都在防止小灾难的发生。","7天观察：当有人说「还好有你在」的时候，不要再说「没有啦我什么都没做」。停住。点一下头。让那句话真的落在你心上。你做了很多——只是你从来不数。从现在开始数。","30天练习：找一件你一直想认真做但一直觉得「没必要花那么多时间」的事——然后花上足够的时间。不为结果——就为了奖励自己一次不被批评的认真。画画、写东西、做一顿需要三个小时的饭——这件事只需要让你自己满意。","30天练习：主动请一个你信任的人帮你做一件你平时只会自己做的事。不是偷懒——是练习相信别人也值得被你托付。认真的人最难的是「放手」——但放手也是认真的一种，因为你认真到希望关系是双向的。"],

       modules:[

         {title:"真正的幽默是对生活的一种温柔反抗",content:"幽默最核心的东西不是好笑——是解放。当你用你的方式把一件事说得很真实的时候，别人笑了——不是因为好笑，是因为他们也被那件事困着，然后你的话让他们发现：原来可以不那么认真。你的幽默不是让你成为焦点——是让所有人都可以暂时放下包袱。你不是在讲笑话——你是在打开一扇窗。"},
         {title:"为什么别人记住了你的每一句「神来之笔」",content:"因为你不是在表演——你是在暴露。你把你脑子里那个不加修饰的想法放进了一个大家都戴着面具的房间。那一瞬间，面具碎了一地，所有人发现原来可以不用这么端着。他们不是在笑你的笑话——他们是在感谢你帮他们说出了那个不体面的、真实的想法。你每一次「说错话」，其实都让空气变得更可以呼吸。"},
         {title:"你的幽默需要被你自己承认",content:"你可能花了很多年把自己归类为「不太会说话的人」「情商一般」「接不住梗」。但你有没有想过——不是你的幽默没被看见，是你一直在用错误的尺子量自己。你拿自己的幽默和段子手的简洁比，拿自己的节奏和控场者比。但你的幽默是另一个品种——是一种慢的、不规则的、在岔路上开出来的花。不要用别人的标准评判你自己的品种。"},
         {title:"从今往后，请珍惜你的「怪」",content:"你的幽默来自你的「怪」——那些和别人不一样的联想、突然跳出来的比喻、不合时宜但说得太对的话。如果你把这些「怪」收起来，你就真的成了一个无聊的普通人。但你没收起来——它们一直都在，只是你不敢叫它「幽默」。从今天开始，请把那些奇怪的念头放出声来。会有人接住它们——因为总有人的频道和你是一样的。"}

       advice:["7天观察：这周记下每一次你说了什么然后别人笑了——不管你是不是故意的。重点是：写下来。你会看到一张清单——上面全是你没打算当幽默的幽默。","7天观察：注意那些在你讲完「实话」之后空气发生的变化。不是讲完笑话——就是讲完一句很真的话。那一分钟的轻松，是你创造的。你不需要被所有人喜欢——你需要的是注意到自己已经拥有这种影响力。","30天练习：每天放出一句你本来想收回去的话——那种你觉得「不太合适」「不太得体」「太怪了」的话。先放一句。看看会不会有人受伤（大概率不会），再看看会不会有人笑（大概率会）。","30天练习：找一个你觉得真正幽默的人——不是搞笑的，是幽默的——然后留意：TA 和你的共同点是什么。你会发现的：不是技巧，是观察。你们看到的和其他人不一样。"],

       modules:[

         {title:"你一直在暗中保护你自己——只是你没谢过它",content:"回想一下那些你「不知道为什么就是觉得不对劲」然后避开的事、那个人、那个机会、那个方向——每一次你的直觉都在。它一直在帮你挡掉那些逻辑上看不出来但直觉上不对劲的东西。你一直把它当成不可靠的第六感——但它其实是你最忠诚的内置导航。不是每一次都对，但它的胜率已经远超随机——而你还在管它叫「蒙的」。请不要再浪费你自己的天赋了。"},
         {title:"学会把直觉翻译出来——不是否定它",content:"你的直觉不需要被否定——它需要被翻译。下次你有一个直觉判断的时候，不要急着说「我不知道为什么」。试着问自己：「是什么让我觉得应该是这样的？」你可能会发现——有一个细节你早就注意到了，有一句话你听到了一直没忘，有一个模式你经历过三次了你只是没归纳。直觉不是不可解释——只是你的解释比其他人更慢。给直觉一点时间，它会告诉你它是怎么来的。"},

  disclaimer:"本测试仅为自我探索参考，不构成任何诊断、职业建议或效果承诺。你的特质值得被你喜欢——请结合自己的实际感受去确认。"
};

// ========== 引擎 ==========
let answers=[],currentQ=0,paid=false;

function $(id){return document.getElementById(id)}
const app = document.getElementById('app');

function cover(){
  app.innerHTML=`
    <div class="screen active cover">
      <div class="icon">💫</div>
      <h1>${DATA.title}</h1>
      <div class="sub">${DATA.subtitle}</div>
      <button class="btn-start" onclick="start(true)">开始测试</button>
      <div class="trust">前5题免费 · 记下答案左滑查看报告预览</div>
    </div>`;
}

function start(free){answers=[];currentQ=0;paid=!free;renderQ()}

function renderQ(){
  if(currentQ>=DATA.questions.length){showResult();return;}
  if(currentQ===5 && !paid){showGate();return;}
  const q=DATA.questions[currentQ];
  const pct=Math.round((currentQ/DATA.questions.length)*100);
  const letters=['A','B','C','D'];
  app.innerHTML=`
    <div class="screen active">
      <div class="progress-wrap">
        <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
        <div class="progress-label">第 ${currentQ+1}/${DATA.questions.length} 题</div>
      </div>
      <div class="q-area">
        <div class="q-num">${currentQ<5?'免费测试 · 第'+(currentQ+1)+'题':'深度解锁 · 第'+(currentQ+1)+'题'}</div>
        <div class="q-text">${q.scene}</div>
        <div class="options">
          ${letters.map(l=>`<div class="opt" onclick="pick('${l}')"><div class="letter">${l}</div><div class="txt">${q[l]}</div></div>`).join('')}
        </div>
      </div>
      ${currentQ===4?'<div style="text-align:center;font-size:13px;color:#6a6558;padding:8px 0">记下5个答案，左滑查看报告预览 →</div>':''}
    </div>`;
}

function pick(letter){
  answers.push(letter);
  currentQ++;
  renderQ();
  window.scrollTo(0,0);
}

function showGate(){
  app.innerHTML=`
    <div class="screen active gate-screen">
      <div class="lock-icon">🔓</div>
      <h2>前5题只是倾向<br>完整12题才能看清全貌</h2>
      <div class="gate-desc">后7题继续拆解：你以为的「普通」在别人眼里有多特别、为什么你一直不承认自己的特质、以及如何从「被低估」走到「被自己看见」</div>
      <ul class="unlock-list">
        ${DATA.productModules.map(m=>`<li>${m}</li>`).join('')}
      </ul>
      <button class="btn-gate" onclick="unlock()">继续完成12题 · 解锁完整报告</button>
      <div class="price">完整12题报告 · 做完自动解锁</div>
    </div>`;
}

function unlock(){paid=true;renderQ()}

function showResult(){
  const counts={A:0,B:0,C:0,D:0};
  for(let i=5;i<answers.length;i++){counts[answers[i]]++}
  const sorted=Object.entries(counts).sort((a,b)=>b[1]-a[1]);
  let typeKey=sorted[0][0];
  if(sorted[0][1]===sorted[1][1]&&sorted[0][0]==='A'&&(sorted[1][0]==='C'||sorted[1][0]==='D'))typeKey=sorted[1][0];
  if(sorted[0][1]===sorted[1][1]&&sorted[0][0]==='B'&&sorted[1][0]==='D')typeKey='D';
  const type=DATA.types[typeKey];

  const freeAnswers=answers.slice(0,5);
  const freeLabels=['自我认知盲区','自我评价习惯','核心气质自述','被夸时的第一反应','共鸣内容偏好'];
  const freeDesc=[
    ['你被人反复提起的特点是安静——但你觉得这只是「无趣」','有人反复说你做事太较真——但你管这叫「不会变通」','有人说你偶尔冒金句——但你自己完全get不到笑点','你有过说不清来由但后来被证明是对的直觉——你觉得是运气'],
    ['在人群里话少的时候，你觉得自己存在感低——但沉默的人往往最有重量','别人轻松搞定的事你却反复确认——不是你不会，是你的标准比别人高','讲完一句话冷场的时候你很难受——但冷场不一定是你的问题，有时候是别人在消化','别人问你怎么知道时你说「蒙的」——但你蒙对的频率高到不可能是随机'],
    ['你形容自己是「沉」——像水一样不起涟漪。这不是不够有趣——是深度','你形容自己是「稳」——别人崩了你还在。这不是「不够松弛」——是定力','你形容自己是「怪」——脑子里装的东西和别人不一样。这不是缺点——是原创性','你形容自己是「准」——但不敢太依赖这种感觉。你信任所有人——除了你自己'],
    ['别人说你温柔时你先否定——因为你不觉得沉默等于温柔，但沉默确实可以很温柔','别人说你靠谱时你先给证据——因为你觉得把事情做完不值一提，但把每件事都做完本身就很少见','别人说你幽默时你先怀疑——因为「好笑」从来没在你对自己的描述里出现过','别人说你直觉准时你先免责——因为不知道怎么解释，所以干脆不承认'],
    ['那些关于「安静被温柔对待」的内容让你心动——因为那是你一直在期待但不敢相信的事情','那些为「认真的人」说的话让你默默点赞——因为你一直都在被当成「太轴」的人','你对「过两天才反应过来的幽默」产生强烈共鸣——因为你就是这样一种需要被慢慢发现的幽默','你对「相信直觉」的句子反复看——因为你一直在等一个人告诉你：你可以相信自己的直觉']
  ];

  let evidenceHTML='<h3>📋 答案证据</h3><p>';
  for(let i=0;i<5;i++){
    const a=freeAnswers[i];
    const descIdx=a==='A'?0:a==='B'?1:a==='C'?2:3;
    evidenceHTML+=`<strong>Q${i+1}「${DATA.questions[i].scene.slice(0,18)}…」</strong>你选了${a}——${freeDesc[i][descIdx]}。<br><br>`;
  }
  evidenceHTML+=type.evidence_note+'</p>';

  let modulesHTML='';
  for(const m of type.modules){
    modulesHTML+=`<div class="module"><h3>${m.title}</h3><p>${m.content}</p></div>`;
  }

  let adviceHTML='';
  for(let i=0;i<type.advice.length;i++){
    adviceHTML+=`<div class="advice-item"><span class="n">0${i+1}</span><span>${type.advice[i]}</span></div>`;
  }

  app.innerHTML=`
    <div class="screen active result">
      <div class="badge">你最被低估的地方</div>
      <div class="type-name">${type.name}</div>
      <div class="type-sub">${type.tag}</div>

      <div style="font-size:15px;color:#d4b87a;margin-bottom:4px">${type.icon} ${type.score}</div>
      <p style="font-size:15px;color:#b8b0a0;line-height:1.75;margin-bottom:20px">${type.conclusion}</p>

      <div class="evidence-box">${evidenceHTML}</div>
      ${modulesHTML}

      <div class="summary-box">
        <div class="q-mark">"</div>
        <p>${type.quote}</p>
      </div>

      <div class="advice-box">
        <h3>📅 你的确认练习</h3>
        ${adviceHTML}
      </div>

      <div class="reminder-box">
        <h3>💛 最后想跟你说的话</h3>
        <p>${type.reminder}</p>
      </div>

      <div style="font-size:13px;color:#6a6558;line-height:1.6;text-align:center;margin-bottom:24px">${DATA.disclaimer}</div>
      <div class="footer">以上结果为自我探索参考 · 你的特质值得被你喜欢</div>
    </div>`;
  window.scrollTo(0,0);
}

// start
cover();
</script>
</body>
</html>
