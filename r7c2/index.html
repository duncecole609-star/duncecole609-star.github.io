<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>消费奖励心理报告</title>
<style>*{box-sizing:border-box}body{margin:0;background:#fbf1ef;color:#302225;font-family:-apple-system,BlinkMacSystemFont,'Microsoft YaHei',sans-serif}.app{max-width:540px;margin:0 auto;min-height:100vh;padding:22px 18px 34px}.top{display:flex;justify-content:space-between;border-bottom:1px solid #dfc3c4;padding-bottom:14px;color:#b8646b;font-weight:800;font-size:14px}.hero{padding:34px 0}.pill{display:inline-flex;padding:7px 14px;border-radius:999px;background:#f0d8d7;color:#b8646b;font-weight:800;font-size:13px;margin-bottom:16px}h1{font-size:30px;line-height:1.25;margin:0;font-weight:900}.sub{font-size:15px;line-height:1.7;margin-top:14px;color:#7a6869}.card,.section{background:#fffdf8;border:1px solid #dfc3c4;border-radius:18px;padding:18px;margin-top:16px;color:#211c18}button{border:none;border-radius:14px;padding:14px 16px;font-size:16px;font-weight:850;cursor:pointer}.primary{width:100%;background:#302225;color:#fff;margin-top:14px}.secondary{background:#eee2d3;color:#201b16}.quiz,.result{display:none}.progress{height:8px;background:#eadcca;border-radius:99px;overflow:hidden;margin-bottom:18px}.bar{height:100%;background:#b8646b;width:0}.qnum{color:#b8646b;font-size:13px;font-weight:850;margin-bottom:8px}.qtext{font-size:21px;line-height:1.4;font-weight:900;margin-bottom:18px;color:#211c18}.option{width:100%;display:grid;grid-template-columns:34px 1fr;gap:12px;align-items:start;background:#fff;border:1px solid #dfc3c4;border-radius:14px;margin:10px 0;padding:13px 12px;text-align:left;font-size:15px;line-height:1.5;color:#211c18}.letter{width:30px;height:30px;border-radius:50%;display:grid;place-items:center;background:#f0d8d7;color:#b8646b;font-weight:900}.result{text-align:center}.score{font-size:52px;color:#b8646b;font-weight:950;margin:14px 0 4px}.tag{display:inline-block;margin:4px;padding:7px 11px;border-radius:999px;background:#f0d8d7;color:#b8646b;font-size:13px;font-weight:800}.section{text-align:left;line-height:1.7}.section h3{margin:0 0 10px;color:#b8646b;font-size:15px}.section p,.section li{color:#3b332c;font-size:14px;line-height:1.75}.section ul{padding-left:18px;margin:8px 0 0}.footer{font-size:12px;line-height:1.6;margin-top:18px;text-align:center;color:#7a6869}</style></head>
<body><main class="app"><div class="top"><span>消费奖励心理报告</span><span>12题报告</span></div><section id="intro" class="hero"><span class="pill">自我探索测试</span><h1>你买东西时，其实在奖励哪一个自己？</h1><p class="sub">这份报告不会劝你别买，而是帮你看清每次想下单时，你到底在奖励哪一个自己：辛苦的、空掉的、想变好的，还是想被认真对待的。看懂以后，你会更知道哪些钱值得花，哪些只是短暂补洞。</p><div class="card"><div id="gainList"></div><button class="primary" onclick="startTest()">开始测试</button></div></section><section id="quiz" class="card quiz"><div class="progress"><div id="bar" class="bar"></div></div><div id="qnum" class="qnum"></div><div id="qtext" class="qtext"></div><div id="options"></div><button class="secondary" onclick="prevQuestion()">上一题</button></section><section id="result" class="result hero"><span class="pill">你的完整报告</span><h1 id="rname"></h1><div id="score" class="score"></div><div id="summary" class="section"></div><div id="sections"></div><p class="footer">本测试为自我探索参考，不构成诊断、职业建议、投资建议或效果承诺。请结合现实情况判断。</p></section></main>
<script>const data={"title": "你买东西时，其实在奖励哪一个自己？", "product": "消费奖励心理报告", "intro": "这份报告不会劝你别买，而是帮你看清每次想下单时，你到底在奖励哪一个自己：辛苦的、空掉的、想变好的，还是想被认真对待的。看懂以后，你会更知道哪些钱值得花，哪些只是短暂补洞。", "questions": [{"text": "你最容易在哪个瞬间突然想买点什么？", "options": ["忙了一整天后，想用一个东西证明自己没白撑", "心里有点空，想让生活马上多一点变化", "看到别人状态很好，会想把自己也重新捞起来", "受了点委屈后，想用下单找回一点掌控感"]}, {"text": "你买东西时，最想被满足的感觉是什么？", "options": ["我也可以被好好照顾，不用一直将就", "我也能拥有那种精致、轻盈、被喜欢的状态", "生活虽然乱，但至少有一处是我能安排的", "我值得拥有更好的，不必总是压低自己"]}, {"text": "你买完最容易在哪一刻觉得空？", "options": ["快递拆完那一秒开心，过两天生活还是原样", "东西挺好，但它没有真的让我变成想象中的自己", "花钱时像被安慰，账单出来又开始怪自己", "买的时候很笃定，闲置时才发现是在补情绪"]}, {"text": "你最容易为哪种画面心动？", "options": ["一个人也过得很讲究，好像生活被照顾得很好", "妆容、衣服、房间都刚刚好，像终于变成理想状态", "小东西把普通一天变得有仪式感", "别人说“这个很值得”，让我觉得买了就不会错"]}, {"text": "如果要更舒服地奖励自己，你最该先分清什么？", "options": ["这是我真的高频需要，还是只是今天太累了", "这是适合我，还是适合我幻想中的那个人设", "这是让我生活变好，还是只让我情绪变亮一会儿", "这是我在爱自己，还是在补别人没给的肯定"]}, {"text": "你最常为哪一种自己下单？", "options": ["辛苦了一天、终于想被照顾的自己", "觉得生活太平、想制造变化的自己", "想变漂亮、变精致、变得更有底气的自己", "受了委屈后，想重新找回价值感的自己"]}, {"text": "哪类东西最容易让你觉得“我需要它”？", "options": ["能立刻改善心情的小物", "能让外表更精致的东西", "能让房间或生活更有氛围的东西", "能证明自己在变好的工具或课程"]}, {"text": "你最容易忽略哪个真实问题？", "options": ["我需要休息，不一定需要购物", "我需要被肯定，不一定需要变精致", "我需要秩序，不一定需要更多东西", "我需要被理解，不一定需要奖励自己"]}, {"text": "你最适合哪种下单前的停顿？", "options": ["先问：我是不是只是今天太累了", "先等24小时，看还想不想要", "先想三次真实使用场景", "先确认这不是为了讨好别人眼光"]}, {"text": "你最该减少哪种消费？", "options": ["买来安慰自己但很快闲置的东西", "为了像别人而买的不适合单品", "为了让生活看起来好而不是用起来好的东西", "为了证明值得却让自己更焦虑的钱"]}, {"text": "未来30天，你更适合怎样奖励自己？", "options": ["用一次真实休息替代冲动下单", "只买一个每天都会用的好物", "把小额预算留给稳定的仪式感", "把想买清单放一晚再决定"]}, {"text": "如果只给你一句消费提醒，哪句最有用？", "options": ["不要让疲惫替你付款", "不要为幻想中的自己买太多单", "真正的奖励应该让你更轻，不是更空", "值得更好，不等于什么都要立刻拥有"]}], "results": [{"name": "辛苦补偿型", "score": 84, "summary": "你买的常常不是物品，而是一句“我今天真的辛苦了”。", "why": "你习惯靠自己撑过很多事，所以消费会变成一种迟来的照顾。", "signals": ["忙完一天后特别想下单", "喜欢能立刻安慰自己的东西", "买的时候像终于被照顾"], "mistake": "你容易把奖励变成补偿，补偿越多，疲惫本身越没人处理。", "need": "你真正需要的是休息和被照顾感。", "action": "保留奖励，但先确认自己是不是更需要睡一觉、吃顿好的、被好好安放。", "days": ["设置辛苦预算", "先休息再下单", "买高频使用而非短暂安慰", "记录买完是否真的变轻"], "reminder": "别让每次疲惫都只能靠购物被看见。"}, {"name": "理想人设型", "score": 79, "summary": "你最容易为“想成为的自己”买单：更精致、更漂亮、更像理想生活。", "why": "你对美感和状态很敏感，所以很容易被一个画面带走。", "signals": ["被精致画面打动", "买东西时会想象自己变好", "不想显得粗糙或随便"], "mistake": "你容易买到适合理想人设、却不适合真实生活的东西。", "need": "你需要的是让审美落回日常，而不是一直追一个离你很远的画面。", "action": "下单前问：我现在的生活频率真的会使用它吗？", "days": ["整理闲置的人设单品", "保留最像自己的3个关键词", "减少跟风购买", "把预算给真正会用的东西"], "reminder": "风格不是买出来的，是慢慢筛出来的。"}, {"name": "秩序掌控型", "score": 87, "summary": "你花钱时常常是在给混乱生活找一个可控的小角落。", "why": "当现实里有太多不确定，你会想用整理、布置、工具或仪式感把自己拉回来。", "signals": ["喜欢收纳、香氛、生活小物", "买完会觉得终于有点秩序", "讨厌生活失控的感觉"], "mistake": "你容易以为东西越齐，生活就越稳，但真正需要处理的是节奏。", "need": "你需要的是掌控感，而不是更多物品。", "action": "把购买变成解决一个具体问题，而不是解决全部焦虑。", "days": ["每次只解决一个生活痛点", "先用完已有物品", "减少重复购买", "建立固定整理时间"], "reminder": "能让生活变好的东西，应该减少混乱，而不是增加负担。"}, {"name": "价值确认型", "score": 82, "summary": "你买东西时，有一部分是在确认：我值得更好，不必一直将就。", "why": "你可能经历过压低需求、照顾别人、舍不得给自己花钱，所以某些购买会带着补回来的感觉。", "signals": ["受委屈后容易想买", "喜欢有质感的物品", "买的时候会觉得自己被肯定"], "mistake": "你容易把“值得”寄托在价格和拥有上。", "need": "你需要的是稳定的自我价值感，而不是每次靠消费证明。", "action": "允许自己拥有好东西，但别把好东西当成唯一证明。", "days": ["列出不花钱也能确认价值的事", "保留真正提升生活的消费", "减少报复性购买", "把预算和自尊分开"], "reminder": "你值得更好，但不需要每一次都用下单证明。"}], "gains": ["你的消费奖励类型", "最容易下单的情绪入口", "买完容易空的原因", "真正想奖励的自己", "更适合你的奖励方式"]};let index=0;const answers=[];const letters=['A','B','C','D'];document.getElementById('gainList').innerHTML=data.gains.map(x=>`<div class="tag">${x}</div>`).join('');function startTest(){document.getElementById('intro').style.display='none';document.getElementById('quiz').style.display='block';renderQuestion();}function renderQuestion(){const q=data.questions[index];document.getElementById('bar').style.width=((index)/data.questions.length*100)+'%';document.getElementById('qnum').textContent=`第 ${index+1} / ${data.questions.length} 题`;document.getElementById('qtext').textContent=q.text;document.getElementById('options').innerHTML=q.options.map((t,i)=>`<button class="option" onclick="choose(${i})"><span class="letter">${letters[i]}</span><span>${t}</span></button>`).join('');}function choose(i){answers[index]=i;if(index<data.questions.length-1){index++;renderQuestion();}else showResult();}function prevQuestion(){if(index>0){index--;renderQuestion();}}function showResult(){const counts=[0,0,0,0];answers.forEach(x=>counts[x]++);let max=0;for(let i=1;i<4;i++)if(counts[i]>counts[max])max=i;const r=data.results[max];document.getElementById('quiz').style.display='none';document.getElementById('result').style.display='block';document.getElementById('rname').textContent=r.name;document.getElementById('score').textContent=r.score;document.getElementById('summary').innerHTML=`<h3>核心结论</h3><p>${r.summary}</p>`;const sections=[['你为什么会这样',r.why],['你最明显的信号',r.signals],['你容易误判自己的地方',r.mistake],['你的真实需求',r.need],['更适合你的行动方式',r.action],['未来30天建议',r.days],['关键提醒',r.reminder]];document.getElementById('sections').innerHTML=sections.map(([h,v])=>Array.isArray(v)?`<div class="section"><h3>${h}</h3><ul>${v.map(x=>`<li>${x}</li>`).join('')}</ul></div>`:`<div class="section"><h3>${h}</h3><p>${v}</p></div>`).join('');window.scrollTo({top:0,behavior:'smooth'});}</script></body></html>
