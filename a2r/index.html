<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>你是人缘好，还是太怕别人不高兴？</title>
<style>:root{--bg:#101216;--panel:#171b22;--text:#f4f1e8;--muted:#9da3ad;--gold:#d6ad48;--line:rgba(214,173,72,.24)}*{box-sizing:border-box}body{margin:0;min-height:100vh;background:radial-gradient(circle at top,#2a241d 0,#101216 52%,#090a0c 100%);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Microsoft YaHei',sans-serif;letter-spacing:0}.app{width:min(520px,100%);min-height:100vh;margin:0 auto;padding:22px 18px 34px}.topline{display:flex;justify-content:space-between;align-items:center;color:var(--gold);font-size:13px;font-weight:700;border-bottom:1px solid var(--line);padding-bottom:14px}.label{color:#737985;font-size:11px;letter-spacing:2px}.hero{padding:34px 0 22px;text-align:center}.pill{display:inline-flex;padding:7px 14px;border-radius:999px;background:rgba(214,173,72,.12);color:var(--gold);font-size:13px;font-weight:700;margin-bottom:16px}h1{margin:0;font-size:31px;line-height:1.2;font-weight:850}.subtitle{margin:14px auto 0;color:var(--muted);font-size:15px;line-height:1.65;max-width:360px}.card,.summary,.section,.quote{border-radius:16px}.card{background:linear-gradient(180deg,rgba(32,38,49,.96),rgba(21,25,33,.96));border:1px solid rgba(255,255,255,.08);box-shadow:0 18px 60px rgba(0,0,0,.26);padding:20px;margin:18px 0}.progress{height:8px;background:#252b35;border-radius:999px;overflow:hidden;margin-bottom:18px}.bar{height:100%;width:0;background:linear-gradient(90deg,#b88b2b,#f3d37a);transition:width .25s}.q-num{color:var(--gold);font-size:13px;font-weight:800;margin-bottom:8px}.question{font-size:21px;font-weight:800;line-height:1.42;margin-bottom:18px}.option{width:100%;display:grid;grid-template-columns:34px 1fr;gap:12px;align-items:center;padding:14px 12px;margin:10px 0;border-radius:14px;border:1px solid rgba(255,255,255,.08);background:#11151b;color:var(--text);text-align:left;font-size:15px;line-height:1.45;cursor:pointer}.option:hover,.option.selected{border-color:rgba(214,173,72,.66);background:rgba(214,173,72,.1)}.letter{width:30px;height:30px;display:grid;place-items:center;border-radius:50%;background:#252b35;color:var(--gold);font-weight:800}.actions{display:flex;gap:12px;margin-top:18px}button.primary,button.secondary{border:none;border-radius:14px;padding:14px 16px;font-size:16px;font-weight:800;cursor:pointer}button.primary{flex:1;background:linear-gradient(135deg,#c99c37,#f0d27a);color:#14100a}button.secondary{background:#242a34;color:var(--text)}.result{display:none}.score{margin:14px auto 8px;color:var(--gold);font-size:42px;line-height:1;font-weight:900}.score-label{color:var(--muted);font-size:13px}.summary{margin-top:18px;background:#151a22;border:1px solid rgba(255,255,255,.08);padding:16px;color:#e8e4d8;line-height:1.75;text-align:left;font-size:15px}.quote{margin-top:18px;padding:16px;background:rgba(214,173,72,.1);color:#f2d47e;line-height:1.65;font-size:15px;font-weight:800;text-align:left}.section{margin-top:16px;background:rgba(255,255,255,.045);border:1px solid rgba(255,255,255,.08);padding:16px;text-align:left}.section h3{margin:0 0 10px;color:var(--gold);font-size:15px}.section p{margin:0;color:#e5e8ee;line-height:1.75;font-size:14px}.title{margin:24px 0 10px;color:var(--gold);font-size:15px;font-weight:800;text-align:left}.grid,.list{display:grid;gap:10px;margin-top:10px;text-align:left}.grid div,.list div{padding:12px;border-radius:12px;background:#11151b;color:#d5d9df;line-height:1.55;font-size:14px}.footer{margin-top:22px;color:#7f8793;font-size:12px;line-height:1.6;text-align:center}</style></head><body><main class="app"><div class="topline"><span>你的人际边界报告</span><span class="label">RELATION · REPORT</span></div><section id="intro" class="hero"><span class="pill">自我探索测试</span><h1>你是人缘好，还是太怕别人不高兴？</h1><p class="subtitle">按第一反应选择。这个测试会帮你看清：你现在真正卡住的是哪一步。</p><div class="card"><div class="title">测试完成后你将看到</div><div class="list"><div>你的核心类型与倾向</div><div>你为什么会反复卡在这里</div><div>你最容易误判自己的地方</div><div>未来 30 天更稳的调整建议</div></div><div class="actions"><button class="primary" onclick="startTest()">开始测试</button></div></div></section><section id="quiz" class="card" style="display:none"><div class="progress"><div id="bar" class="bar"></div></div><div id="qnum" class="q-num"></div><div id="qtext" class="question"></div><div id="options"></div><div class="actions"><button class="secondary" onclick="prevQuestion()">上一题</button></div></section><section id="result" class="result hero"><span class="pill">你的类型</span><h1 id="resultName"></h1><p id="tagline" class="subtitle"></p><div class="score" id="score"></div><div class="score-label">参考指数</div><div class="summary" id="summary"></div><div class="quote" id="quote"></div><div class="section"><h3>一、你真正卡住的地方</h3><p id="root"></p></div><div class="section"><h3>二、更适合你的调整方式</h3><p id="path"></p></div><div class="section"><h3>三、你最容易误判自己的地方</h3><p id="risk"></p></div><div class="title">你的 30 天调整建议</div><div class="grid" id="actions"></div><p class="footer">本测试为自我探索参考，不构成诊断或承诺。请结合自身现实情况判断。</p></section></main><script>const data={"folder": "01_renyuan-vs-pa-bieren-bugaoxing", "link": "https://duncecole609-star.github.io/a2r/", "report_code": "RELATION · REPORT", "topline": "你的人际边界报告", "title": "你是人缘好，还是太怕别人不高兴？", "short_title": "人缘好/怕别人不高兴", "cover_lines": ["你是人缘好，", "还是太怕别人", "不高兴？"], "cover_sub": "别急着说自己脾气好，先看清你是不是把自己放得太靠后。", "style": "notes", "preview_type": "边界偏薄型", "preview_sub": "你不是没有主见，你只是太习惯先照顾别人的感受", "score": 81, "score_label": "边界清晰指数", "core": "你的答案显示，你在人际关系里很容易先考虑别人舒不舒服，再考虑自己愿不愿意。你不是虚伪，也不是软弱，而是太害怕拒绝以后关系变冷。", "quote": "你不是人缘太好，你是太怕自己让别人失望。", "gap": "关系边界模式", "product_desc": "不是教你变冷漠，而是帮你看清：你到底是真的好相处，还是太害怕别人不高兴。", "free_questions": [["别人临时找你帮忙，你第一反应是？", ["能帮就帮，关系就是互相照顾", "其实不想，但拒绝会很尴尬", "先答应下来，之后自己慢慢消化", "想拒绝，但会反复担心对方怎么想"]], ["有人语气突然冷下来，你会怎么想？", ["可能他只是心情不好", "是不是我刚刚哪句话说错了", "我会立刻想办法把气氛缓和回来", "我会一直复盘到睡前"]], ["当你不同意别人时，你通常会？", ["直接说，但尽量温和", "先附和一点，再小心表达", "能不说就不说，怕场面难看", "说完后很久都担心对方不舒服"]], ["你最怕哪种人际场面？", ["普通冲突，讲清楚就好", "别人觉得我不好相处", "我拒绝了别人，对方以后疏远我", "别人沉默、不回消息、态度变淡"]], ["如果一段关系让你很累，你更可能？", ["沟通边界，看能不能调整", "忍一忍，怕自己太计较", "继续付出，等对方看见我的好", "想离开，但又觉得自己很坏"]]], "h5_questions": [["别人临时找你帮忙，你第一反应是？", ["能帮就帮，关系就是互相照顾", "其实不想，但拒绝会很尴尬", "先答应下来，之后自己慢慢消化", "想拒绝，但会反复担心对方怎么想"]], ["有人语气突然冷下来，你会怎么想？", ["可能他只是心情不好", "是不是我刚刚哪句话说错了", "我会立刻想办法把气氛缓和回来", "我会一直复盘到睡前"]], ["当你不同意别人时，你通常会？", ["直接说，但尽量温和", "先附和一点，再小心表达", "能不说就不说，怕场面难看", "说完后很久都担心对方不舒服"]], ["你最怕哪种人际场面？", ["普通冲突，讲清楚就好", "别人觉得我不好相处", "我拒绝了别人，对方以后疏远我", "别人沉默、不回消息、态度变淡"]], ["如果一段关系让你很累，你更可能？", ["沟通边界，看能不能调整", "忍一忍，怕自己太计较", "继续付出，等对方看见我的好", "想离开，但又觉得自己很坏"]], ["别人夸你“好说话”，你心里更像是？", ["挺开心，说明相处舒服", "有点复杂，好像也说明我不太会拒绝", "他们需要我，我就有价值", "怕有一天我不好说话了，就没人喜欢我"]], ["你表达需求时最难的是？", ["把话说清楚就行", "怕显得麻烦、矫情", "怕对方觉得我要求太多", "怕关系因为这句话变差"]], ["如果朋友越界开玩笑，你会？", ["提醒一下别这样", "笑过去，别扫兴", "心里不舒服，但还是配合", "回去后越想越委屈"]], ["你对“拒绝”最真实的感觉是？", ["正常沟通的一部分", "有点不舒服，但可以练", "像是在伤害别人", "像是在证明我不够好"]], ["你最羡慕哪种人？", ["温和但有边界的人", "能自然拒绝又不内疚的人", "被需要、被喜欢的人", "不用反复猜别人心情的人"]], ["你最常牺牲的是？", ["一点时间和精力", "自己的真实想法", "自己的需求和边界", "自己的情绪稳定"]], ["你现在最需要的是？", ["更温和的表达方式", "练习拒绝的底气", "把自己放回关系里", "停止用别人反应判断自己"]]], "result_types": {"A": ["自然友善型", "你是真的温和，但仍然需要保留自己的位置。", "你的人际模式相对健康，愿意照顾别人，也能看到自己的感受。你需要做的不是变强硬，而是在好相处的同时不把边界交出去。", "你的好，不需要靠无限退让证明。", "你真正的优势是温和而不失清醒。", "你适合练习清晰表达：先说理解，再说自己的真实情况。", "你容易因为不想破坏气氛而延迟表达。", ["第1周：记录3次你真实想拒绝但没有拒绝的场景。", "第2周：练一句温和拒绝话术。", "第3周：在小事上表达一次真实偏好。", "第4周：复盘关系有没有真的变差。"]], "B": ["边界偏薄型", "你不是没有主见，你只是太习惯先照顾别人的感受。", "你常常把别人的舒服放在自己前面。你不是不会拒绝，而是一想到拒绝可能带来的尴尬，就会下意识退一步。", "你不是人缘太好，你是太怕自己让别人失望。", "你真正卡住的是边界感，而不是善良本身。", "你适合从低风险拒绝开始练习，比如拒绝临时请求、延后回复。", "你容易把别人的失落当成自己的责任。", ["第1周：把“我不方便”说出口一次。", "第2周：不要立刻答应，先说“我看一下”。", "第3周：拒绝一次不重要的请求。", "第4周：观察对方反应是否真的像你想象得那么严重。"]], "C": ["关系补偿型", "你常用付出来换安全感，也容易把被需要误认为被爱。", "你在关系里很愿意给，但有时给得太快、太多。你可能会用懂事、忍耐、付出来维持关系稳定，却忽略了自己也需要被照顾。", "你不是不累，你是太习惯用付出来证明自己值得留下。", "你真正害怕的不是帮忙，而是不被需要。", "你适合练习减少过度付出，让关系有来有回。", "你最容易在关系里变成单方面撑住的人。", ["第1周：停掉一个没人要求你做的额外付出。", "第2周：向对方提出一个小需求。", "第3周：观察谁会主动靠近你。", "第4周：把消耗型关系和滋养型关系分开。"]], "D": ["认可依赖型", "你很容易通过别人的反应判断自己是不是做错了。", "你的情绪容易被别人的态度牵动。别人冷一点、慢一点、不回应，你就会开始复盘自己是不是不够好。", "你不是太敏感，你是把自己的稳定交给了别人的反应。", "你真正需要的是把判断权拿回自己手里。", "你适合练习延迟解读，不把沉默立刻等同于否定。", "你最容易被消息、语气、表情牵着走。", ["第1周：遇到冷淡反应时先等30分钟再解读。", "第2周：写下事实和想象的区别。", "第3周：减少一次主动求确认。", "第4周：用自己的感受判断关系是否舒服。"]]}};const letters=['A','B','C','D'];let index=0;const answers=[];function startTest(){document.getElementById('intro').style.display='none';document.getElementById('quiz').style.display='block';renderQuestion()}function renderQuestion(){const q=data.h5_questions[index];document.getElementById('bar').style.width=(index/data.h5_questions.length*100)+'%';document.getElementById('qnum').textContent=`第 ${index+1} / ${data.h5_questions.length} 题`;document.getElementById('qtext').textContent=q[0];document.getElementById('options').innerHTML=q[1].map((text,i)=>`<button class="option${answers[index]===letters[i]?' selected':''}" onclick="choose('${letters[i]}')"><span class="letter">${letters[i]}</span><span>${text}</span></button>`).join('')}function choose(letter){answers[index]=letter;if(index<data.h5_questions.length-1){index++;renderQuestion()}else showResult()}function prevQuestion(){if(index>0){index--;renderQuestion()}}function showResult(){const counts={A:0,B:0,C:0,D:0};answers.forEach(a=>counts[a]++);const winner=[...letters].sort((a,b)=>counts[b]-counts[a])[0];const r=data.result_types[winner];document.getElementById('quiz').style.display='none';document.getElementById('result').style.display='block';document.getElementById('resultName').textContent=r[0];document.getElementById('tagline').textContent=r[1];document.getElementById('score').textContent=68+counts[winner]*5;document.getElementById('summary').textContent=r[2];document.getElementById('quote').textContent=r[3];document.getElementById('root').textContent=r[4];document.getElementById('path').textContent=r[5];document.getElementById('risk').textContent=r[6];document.getElementById('actions').innerHTML=r[7].map(x=>`<div>${x}</div>`).join('');window.scrollTo({top:0,behavior:'smooth'})}</script></body></html>
