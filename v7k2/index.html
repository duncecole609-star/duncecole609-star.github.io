<script id="data" type="application/json">{"title": "你删掉之后又后悔的东西，暴露了你一直在逃避什么", "product": "删除行为心理报告", "questions": [{"text": "你刚删掉一段聊天记录，下一秒你做了什么？", "options": {"A": "立刻后悔，去回收站看能不能恢复——不是因为那条记录多重要，是怕删掉的瞬间太冲动", "B": "松了一口气——\"终于清掉了，留着只会反复看\"。删完反而轻松了", "C": "打开相册或备忘录看看有没有存底——你怕的不是删掉，是以后需要证据的时候找不到了", "D": "什么都没做，但那一整天都会想起来——\"我是不是不该删？\"反复在心里翻那条已经没了的内容"}}, {"text": "你删掉一张照片后，为什么又去回收站翻？", "options": {"A": "怕删了以后那段经历像没发生过——那不是一张照片，是一个\"我经历过\"的证明", "B": "怕以后要用的时候找不到——照片是你的证据库，删照片等于删证据", "C": "怕删了会被别人发现——\"如果TA问起来那张照片去哪了，我怎么说\"", "D": "怕清空之后连自己都觉得空了一块——你留着不是因为想留着，是因为\"如果连这个都没了，还剩什么\""}}, {"text": "你删朋友圈/动态时，最怕谁看到？", "options": {"A": "最怕那个你在意的人看到你删了——怕他以为你在删关于他的东西、或者在暗示什么", "B": "最怕发出去的人看到你删了——怕他觉得你不喜欢他发的内容、或者你在嫌弃", "C": "最怕自己回头看到——删了是因为觉得太矫情，不删又觉得留着丢人", "D": "最怕任何人注意到——你只想让它悄悄消失，不要有人问\"你怎么删了\""}}, {"text": "清空搜索记录时，你最想假装什么没发生？", "options": {"A": "假装没搜过那个人——他的名字在你的搜索栏里待太久了，删掉像是在对自己说\"到此为止\"", "B": "假装没查过那个问题——你搜了很多次\"怎么判断对方是不是喜欢你\"，每次搜完都觉得丢人", "C": "假装没买过那件东西——那些反复比价、最后没下单的记录，看着像在提醒你\"你还是没下定决心\"", "D": "假装没在深夜里进过那个网页——那些凌晨两点查的东西，白天回头看像另一个人干的"}}, {"text": "删掉一个APP/联系人后，你真正想切断的是什么？", "options": {"A": "想切断那种\"忍不住点进去看\"的冲动——不是删APP，是删掉自己失控的感觉", "B": "想切断那个\"TA随时可能出现\"的不安——删掉之后世界清静了，但也更安静了", "C": "想切断\"我还在等\"的状态——删了就等于告诉自己不期待了，别再等了", "D": "想切断\"我还在乎\"的证据——删了之后可以假装自己从来没在乎过"}}, {"text": "你有没有删掉之后又去翻\"最近删除\"或者回收站的经历？那一刻你在找什么？", "options": {"A": "在找那个\"我还在乎\"的证据——删的时候觉得自己很果断，翻的时候发现自己根本没放下", "B": "在找有用的东西——\"等等，那段聊天里有地址/电话/证据，不能删\"", "C": "在确定自己不会后悔——\"再看最后一眼，确认删了就删了\"", "D": "在找一种感觉——\"那个东西在那的时候没觉得多重要，删了之后突然觉得少了点什么\""}}, {"text": "你反复清空的东西是什么？聊天记录、相册、搜索记录、还是备忘录？", "options": {"A": "聊天记录——和某个人的对话反复删、反复恢复。不是因为内容多重要，是因为那个人你还放不下", "B": "相册——截图、聊天证据、旧照片。你怕的不是没了那些图，是以后需要的时候没有", "C": "搜索记录——删了又搜，搜了又删。你在藏着一种不想被任何人知道的好奇", "D": "备忘录——写过很多话给某个人，从来没发出去。删了又写新的，删了又写"}}, {"text": "你最早开始\"删完又后悔\"，大概是从什么时候开始的？", "options": {"A": "第一次被删掉之后——有人删了你，从那以后你学会先删别人，免得自己是被留下的那个", "B": "第一次因为留着而受伤之后——留着某条消息反复看，最后决定删掉所有东西。但删完之后发现，疼的不是那条消息，是那个人已经走了", "C": "第一次被人翻手机之后——有人看了你的聊天记录然后质问你。从那以后你学会了定期清空，免得再次被抓到", "D": "第一次觉得自己\"太矫情\"之后——写了很长的话发出去又删掉、写了又删。最后养成习惯：写的时候就知道自己会删"}}, {"text": "你觉得你删掉的不是内容，而是什么？", "options": {"A": "删掉的是\"我还在乎\"的证明——只要那条记录还在，就说明我没放下。删了就可以假装自己翻篇了", "B": "删掉的是\"怕以后要用\"的焦虑——你是那种需要证据的人：聊天证据、照片证据、截图证据。删了之后最担心的是\"万一以后需要怎么办\"", "C": "删掉的是\"不想被评价\"的自己——那些发了又删的朋友圈、编辑了又删的评论，你不是怕别人看到，是怕别人看完之后对你有新的判断", "D": "删掉的是\"还抱期待\"的自己——留着那条消息就是在等一个回应，删掉就是在对自己说\"不会有了\""}}, {"text": "如果回收站会说话，它最可能对你说什么？", "options": {"A": "\"你又来了。你每次删的时候都说这是最后一次，但我已经帮你存了七遍了。\"", "B": "\"你不是来恢复的，你是来检查证据还在不在的。你其实不信任你自己会真的删掉。\"", "C": "\"你删掉的每一条内容，都不是因为你不想要——是因为怕别人看到你有多想要。\"", "D": "\"你每次来回收站，都不是在翻内容，是在翻你下不了手的决心。\""}}, {"text": "如果你再也不需要用\"删除\"来假装放下，你最想做哪件事？", "options": {"A": "留着那条消息，然后不再看它——不是怕自己还在乎，是接受自己还在乎", "B": "把自己最需要的那条证据截屏打印出来，放在抽屉里——然后把手机里的删了，知道它在就够了", "C": "发一条不带括号、不发完就删的朋友圈——就让它正常待在那里，不编辑也不删", "D": "在还没有开始删的时候，先问自己一句\"删了这个，是想放下什么\"——然后决定留或走"}}, {"text": "你最希望自己删掉的最后一个东西是什么？", "options": {"A": "删掉\"怕自己还在乎\"的习惯——你可以留着那条消息，可以不看不分析", "B": "删掉\"需要证据证明自己\"的焦虑——你不是法庭，不需要每件事都有记录", "C": "删掉\"别人会怎么评价我\"的担心——你可以发了就不删了", "D": "删掉\"删了就等于放下了\"的错觉——你真正需要的不删除，是不需要删"}}], "results": {"A": {"name": "删冲动型", "subtitle": "你删得很快，是因为你不想让情绪显得有痕迹", "score": 86, "core": "你不是不在乎，而是太怕自己看起来还在乎。删除对你来说像一次临时止痛：屏幕干净了，心里却会开始反问自己是不是太狠。这不是随手贴上的性格标签，而是你在多个具体场景里反复使用的保护方式；它曾经帮过你，现在也可能正在限制你。", "evidence": "你在前5题里反复选择了“上头、干脆、怕暴露需求”的反应，说明你最想逃开的不是内容本身，而是那一刻太明显的情绪。Q1里，立刻后悔，去回收站看能不能恢复——不是因为那条记录多重要……；Q2里，怕删了以后那段经历像没发生过——那不是一张照片，是一个\"……；Q3里，最怕那个你在意的人看到你删了——怕他以为你在删关于他的东……。这些选择指向的是同一套心理动作，而不是某一道题碰巧选中了。", "modules": [{"title": "你删掉的不是内容，是失控感", "body": "你打开聊天记录、点进去、又退出来、最后删了——不是为了清内存，是怕下次再点进去。你删朋友圈不是因为那条内容不好，是怕自己又回去反复看有没有人点赞。你删搜索记录不是因为搜了什么见不得人的东西，是怕自己搜太多次暴露了还在想TA。删除是你对失控的自己下达的指令：停。但指令会失效，因为你还会翻回收站——那是失控的你又不听话了。"}, {"title": "你最怕被谁看到自己的在乎", "body": "你删朋友圈最怕的不是随便谁看到——是那个特定的人。那个人看到你删了，你会紧张：他会以为你删的是关于他的？他会觉得你在暗示？他会觉得你太在意？其实你删的原因确实是因为太在意——你在意到觉得\"留着就太明显了\"。"}, {"title": "你为什么反复清空又反复存", "body": "每次清空你都觉得\"此后再也不会了\"，但每次重新存的时候你都知道自己在骗自己。你反复清空不是因为内容多，是因为你在和一段还没结束的关系做拉锯——你还在想TA、还在等一个回应、还在和自己打官司。只要心里没判完，手机里就会反复出现\"清空→恢复→再清空\"。"}, {"title": "你容易反复清空的关系模式", "body": "这种模式不只是在聊天记录里——在关系里你也是这样：说了重话又后悔、删了又加回来、拉黑了又解除。你不是不果断，是把\"删掉\"当成了沟通——想用删除让对方看到你的态度。但对方看不懂，因为对方不在你的回收站里。"}, {"title": "未来30天怎么停止用删除假装放下", "body": "回答自己三个问题再删：我是因为不想要，还是怕自己太想要？删了之后如果后悔，我能接受那个后悔吗？如果不删，我会怎么和它相处？前两周练习\"不删\"——把那条你想删的内容留着，但不去看它。后两周练习\"删了不翻\"——删了就不去翻，相信自己做了一个对得起当下的选择。 - 30天建议： 【7天观察】打开你的\"最近删除\"或回收站，看看里面最多的东西是什么——聊天记录、照片、截图还是搜索记录。不做什么，只观察：它们在替你说什么？ 【7天观察】下次你想删什么东西的时候，先写一句\"我现在删它是因为________\"，然后等10分钟再删。看看那10分钟里你的冲动怎么变化。 【30天练习】选一条你一直想删但怕后悔的内容，留着它——但把它放进一个\"不看不点\"的文件夹。不用删，也不用看，练习和它共存。 【30天练习】下次删完之后告诉自己：我删是因为不想要，不是怕自己太想要。如果后悔了，那是我的权利，不代表我做错了。 - 关键提醒：你删东西没有错。你只是用删除在做一件删除做不到的事——帮自己翻页。下一次，试着先翻页再删，而不是删了之后才发现自己没翻过去。"}], "quote": "你删得越快，越说明那一刻你很想保住自己的体面。", "advice": ["【7天观察】打开你的\"最近删除\"或回收站，看看里面最多的东西是什么——聊天记录、照片、截图还是搜索记录。不做什么，只观察：它们在替你说什么？", "【7天观察】下次你想删什么东西的时候，先写一句\"我现在删它是因为________\"，然后等10分钟再删。看看那10分钟里你的冲动怎么变化。", "【30天练习】选一条你一直想删但怕后悔的内容，留着它——但把它放进一个\"不看不点\"的文件夹。不用删，也不用看，练习和它共存。", "【30天练习】下次删完之后告诉自己：我删是因为不想要，不是怕自己太想要。如果后悔了，那是我的权利，不代表我做错了。"], "reminder": "真正的放下不是把痕迹删掉，而是看见痕迹时不再急着证明自己没事。"}, "B": {"name": "删证据型", "subtitle": "你不是想删除过去，你是想跳过整理过去的过程", "score": 82, "core": "你很容易在生活里给自己做“重启仪式”：删记录、清相册、换头像、整理桌面。可真正卡住你的不是东西太多，而是有些感受还没被你慢慢放好。", "evidence": "前5题里你更像在选择“整理一下、看最后一遍、留着也没用”。这说明你删除时不只是处理文件，而是在试图让自己进入一个新状态。Q1里，松了一口气——\"终于清掉了，留着只会反复看\"。删完反而轻……；Q2里，怕以后要用的时候找不到——照片是你的证据库，删照片等于删……；Q3里，最怕发出去的人看到你删了——怕他觉得你不喜欢他发的内容、……。这些选择指向的是同一套心理动作，而不是某一道题碰巧选中了。", "modules": [{"title": "你的\"证据人格\"", "body": "你是一个需要凭据的人——聊天记录是你的\"他说过\"、截图是你的\"你看\"、照片是你的\"那个时候\"。你不是不信任别人——你是不信任自己没证据的时候会被否定。这可能是某次经历教你的：一次被冤枉、一次被否定、一次你说\"真的有\"但拿不出证明。"}, {"title": "你最怕被问\"你凭什么这么想\"", "body": "别人删东西是为了轻松，你删东西会紧张，因为你的手机是证据库。删了某条聊天记录= 少了一份保底材料。你怕的不是没证据，是怕自己说了别人不信。那种\"信自己就够了\"的底气，你可能还不太有。"}, {"title": "你以为你在保存，其实你在防备", "body": "截图里很多话你从来没回看过，但你存着。存的不是信息，是\"如果有一天需要的话我能拿得出来\"的安全感。这种防备可能是对的——但你得知道：你是在保存证据，还是在保存对世界的不信任。"}, {"title": "证据太多的时候，反而看不清楚了", "body": "你的相册和备忘录已经变成了仓库——上万张截图、几百条存档，真要找的时候反而找不到。你以为多就是安全，其实多是负担。你不是需要更多证据——你是需要相信自己不需要那么多证据也能站得住脚。"}, {"title": "未来30天怎么不再用证据填满手机", "body": "重要证据打印或导出到U盘/云端——把证据变成可描述的记忆：关掉截图，\"那天的感觉是……\"写一句话代替一张图。他不需要存来防守。既已存在，就让它真的在那，不是随时准备拿出来用的。 - 30天建议： 【7天观察】打开你的截图文件夹，看最近50张截图——有多少是\"留着以后可能会用\"的？有多少是你回过头的？ 【7天观察】下次你想截图保存的时候，用备忘录写一句话代替。不是写\"证据\"，是写\"此刻我为什么觉得需要存这个\"。 【30天练习】把最重要的证据导出到硬盘或打印一张纸，然后把手机里的删了。练习相信：东西在别处也是安全的，不需要每时每刻捏在手里。 【30天练习】当有人说了一句话让你觉得\"我要记住这个\"时，不要截图。试着相信：如果它真的重要，你会记得——不需要靠手机替你记住。 - 关键提醒：你是对的——有些事确实需要证据。但不是所有事都需要。你留证据的初衷是保护自己，如果留到最后手机比你还重，那就不是在保护了，是在负重。"}], "quote": "你想删掉的不是过去，是过去还在影响现在的感觉。", "advice": ["【7天观察】打开你的截图文件夹，看最近50张截图——有多少是\"留着以后可能会用\"的？有多少是你回过头的？", "【7天观察】下次你想截图保存的时候，用备忘录写一句话代替。不是写\"证据\"，是写\"此刻我为什么觉得需要存这个\"。", "【30天练习】把最重要的证据导出到硬盘或打印一张纸，然后把手机里的删了。练习相信：东西在别处也是安全的，不需要每时每刻捏在手里。", "【30天练习】当有人说了一句话让你觉得\"我要记住这个\"时，不要截图。试着相信：如果它真的重要，你会记得——不需要靠手机替你记住。"], "reminder": "不要把每一次难受都处理成一次重启，你也可以慢慢过渡。"}, "C": {"name": "删过去型", "subtitle": "你删掉东西，是怕它证明你曾经那么在乎", "score": 89, "core": "你对痕迹很敏感。你不是单纯怕别人翻到，更怕那些记录把你的在意、委屈、期待都摆出来，让你无法继续说“我没关系”。这不是随手贴上的性格标签，而是你在多个具体场景里反复使用的保护方式；它曾经帮过你，现在也可能正在限制你。", "evidence": "你的前5题更靠近“证据、截图、怕被看到、怕证明不了”。这类答案说明你在关系里很需要凭证，也很怕凭证反过来暴露你。Q1里，打开相册或备忘录看看有没有存底——你怕的不是删掉，是以后……；Q2里，怕删了会被别人发现——\"如果TA问起来那张照片去哪了，我……；Q3里，最怕自己回头看到——删了是因为觉得太矫情，不删又觉得留着……。这些选择指向的是同一套心理动作，而不是某一道题碰巧选中了。", "modules": [{"title": "你删除的不是文件，是上一段关系", "body": "那张合照你一直没删，不是因为忘了——是每次看到它，你就想起了那天。你想删是因为不想再被拉回去了，你没删是因为怕删了之后那段回忆就没有证人了。你不是放不下那个人——你是放不下那个时候的自己。"}, {"title": "你是用删除在帮自己做决定", "body": "应该翻篇了，但你没有真的决定要翻。你让删除键帮你做决定——删了就算过去了，没删就是还在。但每一次深夜翻回收站的自己才是真正的决定者：还没。"}, {"title": "删掉和放下不是同一件事", "body": "删了不等于放下——你手机里已经没了那个人的痕迹，但你脑子里还在回放。你需要的不一定再删，是把手机关掉，跟自己说一句：手机不存了，但我没忘也不需要忘。"}, {"title": "旧的东西有时候不是拖累，是需要被理解的", "body": "合照不只是合照——是你曾经被人认真对待过的证据。你不需要删掉它来证明自己已经走出来了。你可以把它存到另一个地方，跟自己说：这个在，但我已经不在那个位置了。它不影响你往前走。"}, {"title": "未来30天怎么整理过去而不被过去拉回去", "body": "每天留一点时间处理，但不要一晚上不删所有。把中间自己最在乎的东西拿出来单独放在一个文件夹：这个东西代表了我的什么。它不需要保存在手机里的每一秒都存在——但它可以被记住，而不是被遗忘。 - 30天建议： 【7天观察】打开相册，找10张你一直不敢动的旧照片。不删，只观察：每一张在替什么说话——怀念、证明、等回应、还是怕空白。 【7天观察】每晚10分钟，翻聊天记录里的最后5条对话——只看，不分析。练习让这些记录只是记录。 【30天练习】把最在意的3张旧照片导出来存进硬盘，然后把手机里的删了。告诉自己：它还在，不用手机24小时提醒我。 【30天练习】给过去的那个人写一条不发出去的消息：\"我存过很久你的照片，今天终于导出去了。不是删了，是不用每天看到了。\"发给自己。 - 关键提醒：照片删不删不是重点——重点是你什么时候可以从\"不敢看那张照片\"变成\"看到它了，OK\"。那一天你不需要删——因为已经不在意它在那了。"}], "quote": "你不是心虚，你是在给自己保存被认真对待的权利。", "advice": ["【7天观察】打开相册，找10张你一直不敢动的旧照片。不删，只观察：每一张在替什么说话——怀念、证明、等回应、还是怕空白。", "【7天观察】每晚10分钟，翻聊天记录里的最后5条对话——只看，不分析。练习让这些记录只是记录。", "【30天练习】把最在意的3张旧照片导出来存进硬盘，然后把手机里的删了。告诉自己：它还在，不用手机24小时提醒我。", "【30天练习】给过去的那个人写一条不发出去的消息：\"我存过很久你的照片，今天终于导出去了。不是删了，是不用每天看到了。\"发给自己。"], "reminder": "证据可以保护你，但别让它替你活在每一段关系里。"}, "D": {"name": "删期待型", "subtitle": "你最怕的不是删错，是删完以后真的什么都没有", "score": 84, "core": "你留住很多东西，不是因为每一样都重要，而是它们一起撑住了某种存在感。删完又想找回来，是因为空白会让你突然意识到：有些阶段真的过去了。", "evidence": "前5题里你更常选择“找回来、还在、怕空、怕想不起”。这说明你删东西时面对的是失去感，不只是整理习惯。Q1里，什么都没做，但那一整天都会想起来——\"我是不是不该删？\"……；Q2里，怕清空之后连自己都觉得空了一块——你留着不是因为想留着……；Q3里，最怕任何人注意到——你只想让它悄悄消失，不要有人问\"你怎……。这些选择指向的是同一套心理动作，而不是某一道题碰巧选中了。", "modules": [{"title": "你删掉的是\"等不到的期待\"", "body": "搜索记录里有他的名字、备忘录里有写给他的话、朋友圈草稿里有一篇\"等你看到这个的时候\"。你删它们不是为了清内存——是怕自己又回来看。你看一次就在等他一次，删了就等下停了。"}, {"title": "你以为删了就不想了", "body": "删了关键词、删了APP、拉黑了人——想。因为等待没删除——它只是被你从手机里赶走，继续在脑子里蹲着。你需要的不一定再清空——是跟自己说：不等了，不是因为不期待，是因为期待太累了。"}, {"title": "你不知不觉把\"等待\"塞进了所有数字习惯里", "body": "半夜清空搜索记录，第二天又搜同样东西。不管多假装没事，这个习惯已经变成他。你需要看到这个模式——不是责怪自己，是承认：我为一个人等太久，手机已经替我记住了这个习惯。"}, {"title": "把等别人的自己，等回来给自己", "body": "删东西的那一瞬间，你其实在说：\"我想把留给他的时间和精力，拿回来给我自己。\"只是你还没做到。下一步不是删更多——是少删，多给自己。比如：不再搜他的名字——搜一个你想去的地方。"}, {"title": "未来30天怎么把等别人的等待，换成等自己的耐心", "body": "第一周：每天看到搜索记录，只记录不评判。第二周：把那个名字替换成一个你想学的东西。第三周：每想要搜，做另外一个小动作——喝水、站起来转一圈。第四周：写一条给自己消息： - 30天建议： 【7天观察】打开搜索记录，数一数那个名字出现了多少次。不删，不评判，不骂自己——只观察。 【7天观察】每次想搜索那个人的时候，先在备忘录写一句：我现在搜他是因为我觉得________。 【30天练习】在搜索栏输入一个你想去的地方、想学的东西、想看的书——用你想搜他的名字的时间，搜一个新的未来。 【30天练习】给自己写一条消息：\"你不用等TA。你等太久了。你值得被自己认真地回应一次。\"截图存下来，下次想TA的时候先看这条。 - 关键提醒：你每一次搜不到想的结果，不是找错地方了——是在找错人。你搜的人不在搜索栏里，在你的心里还没走。先把他从心里放了，搜索栏就干净了。 --- ## 商品详情承诺（对应5个解锁模块） 1. 你的删除人格类型 2. 你删完又后悔的真正原因 3. 你最怕被谁看到自己的在乎 4. 你容易反复清空的关系记忆模式 5. 未来30天怎么停止用删除假装放下"}], "quote": "你不是放不下旧东西，你是在学着和空白共处。", "advice": ["【7天观察】打开搜索记录，数一数那个名字出现了多少次。不删，不评判，不骂自己——只观察。", "【7天观察】每次想搜索那个人的时候，先在备忘录写一句：我现在搜他是因为我觉得___
