</style></head><body><main class="wrap"><section id="home" class="hero"><div class="badge">12题深度自测</div><h1>你对每个人都温柔，但你对谁最没耐心</h1><p class="lead">不是找标准答案，而是把同一个行为背后的不同动机拆开。</p><button onclick="start()">开始测试</button><p class="hint">凭第一反应选，别把自己修饰得太合理</p></section><section id="quiz" class="hidden"><div class="progress"><div id="bar" class="bar"></div></div><div class="meta"><span id="stage"></span><span id="count"></span></div><h2 id="q" class="q"></h2><div id="opts"></div></section><section id="result" class="hidden"></section></main>
<script id="data" type="application/json">{"title": "你对每个人都温柔，但你对谁最没耐心", "product": "耐心耗尽模式报告", "questions": [{"text": "别人反复问同一个问题，你为什么突然烦？", "options": {"A": "他不是在问问题——是在拖时间、等你替他做决定、或者假装自己在努力", "B": "你之前说得已经够清楚了。\"还要我说几遍？\"烦的不是人，是\"不被听见\"的感觉", "C": "他问的是你教过他很多次的事。烦的不是他学不会——是他根本没把你的话当回事", "D": "反复问让你觉得无效沟通本身就是一种消耗。不是他烦，是这通对话注定不会有结果"}}, {"text": "有人越界但装无辜，你的第一反应是什么？", "options": {"A": "先忍着不说——然后在心里确认他是装的之后突然冷下来", "B": "直接指出\"你越界了\"。不是没礼貌，是不想用沉默让他继续踩", "C": "退后一步——不是怕事，是在评估\"这个人值不值得我跟他说清楚\"", "D": "心里的开关直接关了。\"行，你赢了。但我从此不会再对你敞开。\""}}, {"text": "对方说\"我只是关心你\"，你为什么更没耐心？", "options": {"A": "那不是关心——是控制。他的关心有附带条件：我给你关心，你得接受我的标准", "B": "他关心的不是你过得好不好——是你有没有照他说的做", "C": "他的关心让你无法反驳——你一反驳就变成\"你不领情\"。他的关心是一种豁免权", "D": "他的关心没有\"问\"过你需不需要——他是来给的，不是来问的"}}, {"text": "明明你对外人很温柔，为什么对某个人容易冷下来？", "options": {"A": "对外人是应酬，对他是期待——期待他懂你、期待他不用你解释。期待越大失望越大", "B": "外人不会反复踩你同一个点，但他会。他给了你一条\"我会一次又一次让你失望\"的心得", "C": "你知道他不会走——对外人客套，对他敢冷是因为他不会因为一次冷战就离开", "D": "你的能量被外面用光了，回到家对着他只剩残电——他是最后一个分到能量的人"}}, {"text": "你最受不了别人把哪种事丢给你处理？", "options": {"A": "明明是他的责任，一句话就变成你的任务。\"你帮忙弄一下吧，我弄不来\"", "B": "他的情绪——他自己烦了找你吐槽，吐完之后他好了你开始烦了", "C": "不重要的决定。\"你觉得呢？\"\"哪个好？\"他连自己要什么都不愿意想", "D": "烂摊子。别人搞砸了叫你收尾。\"帮我处理一下\"\"就剩一点了\"\"你最擅长这个\""}}, {"text": "如果耐心是一格电，你最常被谁耗光？", "options": {"A": "不长记性的人——真正耗掉你的不是这一句话，而是同一件事已经解释、提醒和收拾过太多次。", "B": "不负责的人——你烦的是自己的拒绝又被当成情绪，对方听见了，却仍默认你最后会让步。", "C": "不消化情绪的人——这一刻的反应里混着旧经验，眼前的人无意间碰到了你一直防着的地方。", "D": "不珍惜你的人——你知道对方大概率不会离开，所以把白天没能表达的疲惫都留在了最安全的人面前。"}}, {"text": "你最想对那个人说什么？", "options": {"A": "我不是你的提醒器——真正耗掉你的不是这一句话，而是同一件事已经解释、提醒和收拾过太多次。", "B": "我不是你的兜底人——你烦的是自己的拒绝又被当成情绪，对方听见了，却仍默认你最后会让步。", "C": "我不是你的垃圾桶——这一刻的反应里混着旧经验，眼前的人无意间碰到了你一直防着的地方。", "D": "我不是因为爱你就没有限度——你知道对方大概率不会离开，所以把白天没能表达的疲惫都留在了最安全的人面前。"}}, {"text": "你变急的真正原因更像什么？", "options": {"A": "我已经说过太多次——真正耗掉你的不是这一句话，而是同一件事已经解释、提醒和收拾过太多次。", "B": "我又被迫负责——你烦的是自己的拒绝又被当成情绪，对方听见了，却仍默认你最后会让步。", "C": "我也需要被照顾——这一刻的反应里混着旧经验，眼前的人无意间碰到了你一直防着的地方。", "D": "我知道你不会真的走——你知道对方大概率不会离开，所以把白天没能表达的疲惫都留在了最安全的人面前。"}}, {"text": "你最容易在哪段关系里破功？", "options": {"A": "长期重复的小事——真正耗掉你的不是这一句话，而是同一件事已经解释、提醒和收拾过太多次。", "B": "权责不清的合作——你烦的是自己的拒绝又被当成情绪，对方听见了，却仍默认你最后会让步。", "C": "情绪密度太高的亲密关系——这一刻的反应里混着旧经验，眼前的人无意间碰到了你一直防着的地方。", "D": "太熟所以没分寸的关系——你知道对方大概率不会离开，所以把白天没能表达的疲惫都留在了最安全的人面前。"}}, {"text": "你失去耐心时最想保护什么？", "options": {"A": "自己的时间——真正耗掉你的不是这一句话，而是同一件事已经解释、提醒和收拾过太多次。", "B": "自己的责任边界——你烦的是自己的拒绝又被当成情绪，对方听见了，却仍默认你最后会让步。", "C": "自己的情绪空间——这一刻的反应里混着旧经验，眼前的人无意间碰到了你一直防着的地方。", "D": "自己的被尊重感——你知道对方大概率不会离开，所以把白天没能表达的疲惫都留在了最安全的人面前。"}}, {"text": "你最需要补的不是耐心，而是什么？", "options": {"A": "规则——真正耗掉你的不是这一句话，而是同一件事已经解释、提醒和收拾过太多次。", "B": "边界——你烦的是自己的拒绝又被当成情绪，对方听见了，却仍默认你最后会让步。", "C": "空间——这一刻的反应里混着旧经验，眼前的人无意间碰到了你一直防着的地方。", "D": "被珍惜——你知道对方大概率不会离开，所以把白天没能表达的疲惫都留在了最安全的人面前。"}}, {"text": "如果给未来30天一个练习，你最需要哪句？", "options": {"A": "我说一次，也只负责一次——真正耗掉你的不是这一句话，而是同一件事已经解释、提醒和收拾过太多次。", "B": "这件事不自动归我——你烦的是自己的拒绝又被当成情绪，对方听见了，却仍默认你最后会让步。", "C": "我可以先照顾自己的情绪——这一刻的反应里混着旧经验，眼前的人无意间碰到了你一直防着的地方。", "D": "亲近不是无限透支——你知道对方大概率不会离开，所以把白天没能表达的疲惫都留在了最安全的人面前。"}}], "results": {"A": {"name": "重复消耗型", "subtitle": "同一个人反复踩同一个点——你的耐心被慢慢磨穿", "score": 86, "core": "你不是对所有人没耐心——你是对那个\"说了三年还是不改\"的人没耐心。你的耐心不是一次性消失的——是一点一点被同一个问题、同一句话、同一个不改的行为磨穿的。每一次他问你、踩你、装无辜——你都少一点点耐心，直到有一天你一秒都不想给了。不是脾气差——是耐心账户被同一个人反复刷爆了。", "evidence": "你烦的是他反复问同一个问题——假装努力但不做决定（Q1-A），他越界被你发现是装的你就冷了（Q2-A），他的关心是控制——有附带条件（Q3-A），你对外人温柔对某人冷是因为他反复让你失望（Q4-B），受不了的是他的责任一句话变成你的任务（Q5-A）。你的耐心不是被消耗——是被同一个人的同一个招数反复提到。", "modules": [{"title": "你的耐心是一个被持续透支的账户", "body": "每一次他再问同样的问题、再做同样的事——你的耐心就从账户里划一笔。他不是在花今天的耐心——他在花你三年前借给他的、两年前再借的、去年再次的。账户空了——你一分钱都拿不出来了。那不是小气——是耗完了。"}, {"title": "他不是不知道——是知道但懒得改", "body": "你以为他不懂——其实他懂。他知道你每次都会再说一遍、再帮一次、再收一次。他不是不会改——是用你的耐心在维持他自己的舒服。你的耐心成了他可以随便用的燃料——因为从来没断过。"}, {"title": "容易误判：你以为自己没耐心——其实是透支后的自我保护", "body": "你说\"我对他态度太差了\"。不是差——是你的身体在替你保护你。你不能再给他了——你已经完全掏空。那不只是没耐心——是\"这件事我已经结束了，但我还没有宣判\"。"}, {"title": "为什么改不了的不是你——而是你和他之间", "body": "他的惯性靠你的耐心活下来——每次你再说一次、再解释一次、再等一次——他就不改。你的底线不需要向他解释——只需要对自己说：\"我不打算再重复这整件事情了。\"他改不改是他的事——你的耐心可以收回去了。"}, {"title": "怎么把钱从那个透支账户里提回来", "body": "不再说第二次。第一次说，他问就回他：\"我说过了。\"不再续。\"这不是我不帮忙——是他需要的时间到了。\"不再帮他填坑——让他自己来。下次他继续——你不需要再用\"但……\"只是沉默——留着你的耐心给值得的人。"}], "quote": "\"你烦的不是他说的那句话——是他说了三年的那句话。你的耐心是一条被同一双手反复扯断的线——打了无数个结，他还在扯。\"", "advice": ["【7天观察】列出那个人反复问你/让你做/改不了的三件事。每次他重复——你都画一个勾。看看他一个月多少次。看完你还想说你脾气差吗？", "【7天观察】停止解释一次：他问，你回一句\"我说过了。\"然后不帮。观察他的反应——也观察你的感觉。", "【30天练习】找一个最消耗你的重复场景——不再是你的责任。告诉他：\"这事以后你自己处理——不帮。\"", "【30天练习】把你的耐心专门分配给那些你看不见、但从来不需要你重复的人。他们会感到你的耐心比之前更稳。"], "reminder": "那个人用掉了你三年耐心——现在你是时候取回来了。不需要任何人允许。因为你的耐心不是用不完的油——是需要被珍惜的。"}, "B": {"name": "边界被踩型", "subtitle": "对方把你的界限当情绪——你的拒绝被当成不够配合", "score": 83, "core": "你对某个人没耐心的原因不是他做了多么大的事——是他反复踩到你的边界，而你每次说了他都不当回事。你把你的界限放在那里，他不是没看见——是绕过去或者直接踩下去。你的耐心不是因为在烦具体的事——是因为每一次你都要先说\"不要这样\"，然后被他当成\"你有点情绪\"。你说够了、不想解释、不想重复——不是没耐心，是不想被踩。", "evidence": "他越界你直接指出（Q2-B），他的关心是监控不是问（Q3-B），外人不会反复踩你但他会（Q4-B），最受不了别人把他的情绪丢给你（Q5-B）。你忍不了的事情不是他——是他踩过来的时候还觉得那是关心。", "modules": [{"title": "你的边界他一直当成了你的情绪", "body": "你说不——他说你太敏感。你说请不要——他说你过激。你的边界被当成你的脾气问题——所以他从来不觉得自己错了——是你有情绪要管。但你不是管理情绪——你是在保护一块他自己的脚从来没离开过的地。"}, {"title": "你在忍耐和他推回去之间一直看那条线", "body": "你已经说过不允许了——但他每次再踩过来的时候你还是要想：\"我要不要再原谅他一次？\"你在消耗的不是耐心——是能量。是每一次都要重新判断\"这次我要维护自己吗？\""}, {"title": "容易误判：你以为自己不够包容", "body": "被踩很多次的人常常学会怀疑自己——\"是不是我太计较了\"。不是。是一次又一次的脚踩进你家门口——你没把他踢出去——已经是最宽容的了。你不是不大方——你是没有把家当成公共区域。"}, {"title": "他的关心可以收回——你的边界不需要", "body": "\"我关心你\"——不代表他可以踩你。\"我只是想帮你\"——不代表他可以从不听你的。你可以把关心的部分收了——只留一件事——\"请你尊这条线。\""}, {"title": "怎么不再每次都从头解释", "body": "把边界说一次——如果有第二次，不必再说。直接行为上不停。他继续——你就收。\"你踩到了——我不跟你继续讨论了。\"\"你跨过了——我暂时不会回答。\""}], "quote": "\"你不是没耐心——是你对每句话都要先评估'这会得罪人吗'太累了。你的边界不是一道墙——是一道他一直认为是'建议'的线。\"", "advice": ["【7天观察】观察那几个人——每当你感觉到不被尊重时你身体的反应是什么——胸紧、喉咙堵、肩膀缩？记录你的生理信号。", "【7天观察】下次他又越界——别发火。只说两个字——\"请不要\"。不多解释——看他的反应。", "【30天练习】选一个一直踩你线的人——下个月之前告诉他：这件事我以后不做。不发——就做。", "【30天练习】为自己划三条最重要的边界，写下来。每次我横了其中一条——只做自己的动作：按那条线——不是失控。"], "reminder": "他不一定坏——只是习惯用你的柔软过路。你现在要做的不是变硬——是把那条一直以来被模糊的线，涂上颜色。然后让他看见——你不再解释你站在哪边。"}, "C": {"name": "旧伤触发型", "subtitle": "不是陌生人让你失控——是那个人让你想起了最不想面对的东西", "score": 80, "core": "你以为自己是对这个人没耐心——其实是对他让你想起的那个旧场景没耐心。他说这句话的语气像你小时候最怕的那个人、他敷衍的方式像伤过你的前任、他评价你的时候像那个从不认可你的人。不是现在这个人做了什么不可原谅的事——是他的存在不小心撞开了你一直不想打开的门。", "evidence": "你越界时心里的开关直接关了——从此不再对他敞开（Q2-D），他的关心是来给的——不是问的（Q3-D），他是你最后分到残电的人——因为外面已经消耗完了（Q4-D），你最受不了别人把情绪丢给你——因为你的情绪已经够多了（Q5-B）。不是他一个人的错——是被他触发了你一直没愈合的地方。", "modules": [{"title": "他的某部分让你\"闪回\"了", "body": "他的语气、表情、措辞——突然让你回到过去的某个场景——你被指责、被忽视、被放弃。他本人可能没有恶意——但你过去的经验已经弹出来告诉他：这个人危险。你的身体比你先反应过来——不耐烦是\"我要迅速结束这个危险信号\"。"}, {"title": "你在防御，不是在攻击", "body": "你对他没耐心的样子跟过去的经历有关——但现在的他不是那个人。你说服自己\"跟他少接触以免再被伤害\"。但你防御的是过去——不是今天。"}, {"title": "容易误判：你以为他真的有意识", "body": "很多时候他只是在正常说话——是你的旧伤让你把他的话听扭曲了。过去的人用过类似的话伤害你——这个人不一定。不是说他一定完全没有问题——而是你对他没耐心的程度已经不一致，因为旧伤加重了他话里的重量。"}, {"title": "他不需要道歉——你需要的是旧的自己不再掌控现在", "body": "那个人早就走了——你不需要再防着旧事重演。眼前的人或许确实不太灵敏——但不是你记忆里的那个。区分开：正在和你说话的人——和你还在心里害怕的人，是两个。"}, {"title": "怎么把两场不同的故事分开", "body": "每一次他触到你时，停两秒，告诉自己：\"他叫______，不是______（那个旧人的名字）。不同的两件事。\"——深呼吸。如果还是很难在接触后平复，可以跟他说明：\"你之前说那种话让我很难受。\"让对方知道你是有原因的——而你不是突然无理的。"}], "quote": "\"你对他没耐心，不是因为他做了多么大的事——是他踩到了你用十年都没愈合的地方。但他不是你过去那个人——他只是走路的声音像他。\"", "advice": ["【7天观察】记录每一次你对他格外没耐心的时刻——那一秒你想起了什么？写下那个场面——然后写下那个场面发生的时间。", "【7天观察】区分\"现在的他在做的事\"和\"过去的那个场景在做的\"。在他旁边加一个小标签：旧人=______（名字），现在的人=______（名字）。不一样的。", "【30天练习】下一次你又被他触到，先不去看他——看自己。对自己说：\"我安全了。这件事跟那个人没有关系——我是一个成年人。我可以应付现在的他——不需要防备十年前的危险。\"", "【30天练习】至少和他谈一次——告诉他哪句话让你非常不舒服。不用全盘解释过去——就让他知道：\"你那么说会让我回到一种不太好的感觉里。\"给你一个出口。"], "reminder": "过去的那个人很久以前就把这根绳递给你——你现在不需要再拽着。你可以放了这根绳——面对现在这个人只是现在。你不需要对过去的那个人负责——他已经不在了。"}, "D": {"name": "安全失控型", "subtitle": "因为知道他不会走——所以最敢对他发脾气", "score": 78, "core": "你对外人永远温和——因为你知道外人不会无限容忍。但对他，你偶尔失控、偶尔太直接、偶尔把情绪倒了一地——因为你知道他会留下来。你是把安全感用成了情绪的垃圾桶。你不是不爱他——你太相信\"这里安全，所以可以不用管\"。但安全也需要清理——他也需要你不是只把坏情绪留给他。", "evidence": "你对他冷下来因为知道他不会走（Q4-C），你越界时心里的开关关了（Q2-D），你是最后一个分到残电的人（Q4-D），你的能量被外面用完回到家对着他只剩残电（Q4-D）。不是你不在乎他——是你觉得这里是安全的，所以可以尽情丢掉不需要的东西。但他也需要你偶尔把\"好的自己\"也带回来。", "modules": [{"title": "他不是你每天积压的出口", "body": "白天你在外面忍了太多——回家的时候你已经没电了。他是第一个看到你\"没电版本\"的人——于是坏脾气、急躁、敷衍——全都流到他那里。不是他做错了什么——是他刚好站在门口。"}, {"title": "你把安全误解成了\"不用管理\"", "body": "你觉得这个关系够安全——就可以不假思索地倒情绪。但安全也需要维护——对他好、对他温柔、对他有耐心——不是因为怕他走——是因为他也是人。"}, {"title": "最容易被误判：你不是不在乎——是太在乎才敢对他差", "body": "你对外面都不太敢——因为怕得罪人。但对他是你唯一可以\"完全自己\"的地方。你做自己的代价是——有时候你的\"自己\"不太好看。你不是不珍惜——你是误以为这里不需要管理。"}, {"title": "处理\"残电状态\"的方法", "body": "学会回家前过渡——在外面缓冲一会儿——听一首歌、走一段路——让你回家不是\"扔掉今天\"。那些情绪是可以自己先处理掉一部分的——留干净的自己给他，不是因为你怕他——是因为你爱他。"}, {"title": "怎么把安全区重新打扫干净", "body": "告诉他你注意到了——\"我最近对你没耐心，不是你的错是我最近太累了。\"——这是给他安全感也是给自己承诺。每天回家给他专门一个好情绪分钟——哪怕只是问他今天怎么了、笑一下。把好的也带回安全区——不只是负担。"}], "quote": "\"你对外人温柔不是因为不强硬——是把所有强硬都留给了不会反击的那个人。但他不是你的出气筒——他是你最后的安全区。别把安全区当垃圾桶。\"", "advice": ["【7天观察】每天回家前先问自己：\"我今天对他有没有没耐心？是因为他做错还是我自己太累？\"把两者分开。", "【7天观察】每天回家给他一分钟——只问\"今天过得好不好\"，不让自己的坏心情占主角。", "【30天练习】如果你发现自己声音又大起来了——告诉他：\"今天不好——但不是你。我先缓一下。\"然后自己待一刻钟再开口。", "【30天练习】每周至少有一次的\"白天的你\"而不是\"回家残电版\"给他——一起做一件轻的事。让他看到你不是只有累——也有光。"], "reminder": "他是你安全区——不是垃圾桶。安全区需要爱护。给他一点好的——不需要多，但好到让他知道——你是安全区，不是宣泄区。"}}}</script><script>
const data=JSON.parse(document.getElementById('data').textContent);let idx=0,answers=[];
function start(){home.classList.add('hidden');quiz.classList.remove('hidden');renderQ()}
function renderQ(){const q=data.questions[idx];bar.style.width=(idx/12*100)+'%';stage.textContent=idx<5?'免费测试 · 第'+(idx+1)+'题':'深度解锁 · 第'+(idx+1)+'题';count.textContent=(idx+1)+'/12';document.getElementById('q').textContent=q.text;opts.innerHTML='';for(const k of ['A','B','C','D']){const b=document.createElement('button');b.className='opt';b.innerHTML='<span class="letter">'+k+'</span><span class="text"></span>';b.querySelector('.text').textContent=q.options[k];b.onclick=()=>choose(k);opts.appendChild(b)}}
function choose(k){answers[idx]=k;idx++;if(idx===5)gate();else if(idx===12)result();else renderQ()}
function gate(){bar.style.width='41.7%';document.getElementById('q').textContent='前5题只是倾向，后7题继续追问原因、误判点和真实需要';opts.innerHTML='<div class="gate"><div class="section-title">继续完成12题</div><div class="body">后7题不会重复前面的问法，会从不同生活场景继续拆解。</div><br><button onclick="renderQ()">继续</button></div>'}
function result(){quiz.classList.add('hidden');const c={A:0,B:0,C:0,D:0};answers.forEach(x=>c[x]++);const key=Object.entries(c).sort((a,b)=>b[1]-a[1]||'ABCD'.indexOf(a[0])-'ABCD'.indexOf(b[0]))[0][0],r=data.results[key];const ev=answers.slice(0,5).map((a,i)=>'<div class="evidence-item"><b>Q'+(i+1)+' · 你选了 '+a+'</b><br>'+data.questions[i].options[a]+'</div>').join('');resultEl=document.getElementById('result');resultEl.classList.remove('hidden');resultEl.innerHTML='<div class="result-head"><span class="badge">'+data.product+'</span><div class="rtype">'+r.name+'</div><div class="score">'+r.score+'</div><div class="subtitle">'+r.subtitle+'</div></div><div class="card"><div class="section-title">核心结论</div><div class="body">'+r.core+'</div></div><div class="card"><div class="section-title">答案证据</div>'+ev+'<div class="body">'+r.evidence+'</div></div>'+r.modules.map(m=>'<div class="card"><div class="section-title">'+m.title+'</div><div class="body">'+m.body+'</div></div>').join('')+'<div class="card"><div class="section-title">可截图金句</div><div class="quote">“'+r.quote+'”</div></div><div class="card"><div class="section-title">未来30天建议</div>'+r.advice.map(x=>'<div class="advice">'+x+'</div>').join('')+'</div><div class="card"><div class="section-title">关键提醒</div><div class="body">'+r.reminder+'</div></div><div class="disclaimer">本测试仅作自我探索参考，不构成心理诊断、医疗、财务建议或效果承诺。</div>';scrollTo(0,0)}
</script></body></html>
