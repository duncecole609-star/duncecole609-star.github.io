<body><main class="app"><div class="top"><span>剧情投射人格报告</span><span>12题报告</span></div><section id="intro" class="hero"><span class="pill">自我探索测试</span><h1>你容易被哪种剧情里的自己戳中？</h1><p class="sub">这份报告把“我为什么总被这种剧情戳中”拆开：你被打动的不是角色，而是自己没说出口的期待、遗憾和关系需求。看完会知道你在现实里最容易重复哪种情感脚本，以及该怎样把自己拉回来。</p><div class="card"><div id="gainList"></div><button class="primary" onclick="startTest()">开始测试</button></div></section><section id="quiz" class="card quiz"><div class="progress"><div id="bar" class="bar"></div></div><div id="qnum" class="qnum"></div><div id="qtext" class="qtext"></div><div id="options"></div><button class="secondary" onclick="prevQuestion()">上一题</button></section><section id="result" class="result hero"><span class="pill">你的完整报告</span><h1 id="rname"></h1><div id="score" class="score"></div><div id="summary" class="section"></div><div id="sections"></div><p class="footer">本测试为自我探索参考，不构成诊断、职业建议、投资建议或效果承诺。请结合现实情况判断。</p></section></main>

易戳中你的脚本，常常带着这些信号：能自己扛很多事；希望有人问累不累；容易被被看见的剧情打动。你会反复回看，不是因为故事陌生，而是因为它替你说出了现实里没说完的话。"}, {"title": "现实关系里的重复模式", "body": "你容易把能扛误会成不需要爱。 现实关系里最容易重复的，是把剧情里的感动带回生活，却忘了现实要看行动、边界和持续性。被打动不等于值得继续投入。"}, {"title": "你真正想要的回应", "body": "你需要的是允许自己被接住，而不是永远证明自己很强。 你真正想要的回应，不是某个戏剧化桥段，而是关系里更明确、更稳定、更不用猜的确认。看清这一点，就不会只被情绪高潮牵着走。"}, {"title": "情感选择提醒", "body": "从一个小需求开始开口，不必等崩溃才求助。 情感选择提醒可以先落到两个动作：说出一个具体需要；接受一次帮助。别急着否定自己的心软，但也别让心软替你做全部决定。"}]}, {"name": "遗憾回望型", "score": 76, "summary": "你最容易被遗憾和弥补戳中，因为你心里可能还有一个没真正结束的答案。", "why": "你对没说清、没被认真对待、没来得及完成的关系很难彻底翻篇。", "signals": ["容易反复想过去", "被迟来的解释打动", "对错过剧情很心软"], "mistake": "你容易把遗憾美化成值得等待。", "need": "你需要的是给过去一个解释，但不一定要回到过去。", "action": "把想要的弥补写下来，再判断现实里是否真的还有行动。", "days": ["写下没完成的问题", "区分怀念和想复合", "减少反复回看旧信号", "把一个选择放到现在"], "reminder": "有些遗憾值得被理解，但不一定值得继续住进去。", "modules": [{"title": "你的剧情投射类型", "body": "你最容易被遗憾和弥补戳中，因为你心里可能还有一个没真正结束的答案。 你被戳中的不是剧情热闹，而是角色身上有一块和你很像：某种没说出口的期待、遗憾、保护方式或关系脚本。"}, {"title": "最容易戳中你的情感脚本", "body": "你对没说清、没被认真对待、没来得及完成的关系很难彻底翻篇。 最容易戳中你的脚本，常常带着这些信号：容易反复想过去；被迟来的解释打动；对错过剧情很心软。你会反复回看，不是因为故事陌生，而是因为它替你说出了现实里没说完的话。"}, {"title": "现实关系里的重复模式", "body": "你容易把遗憾美化成值得等待。 现实关系里最容易重复的，是把剧情里的感动带回生活，却忘了现实要看行动、边界和持续性。被打动不等于值得继续投入。"}, {"title": "你真正想要的回应", "body": "你需要的是给过去一个解释，但不一定要回到过去。 你真正想要的回应，不是某个戏剧化桥段，而是关系里更明确、更稳定、更不用猜的确认。看清这一点，就不会只被情绪高潮牵着走。"}, {"title": "情感选择提醒", "body": "把想要的弥补写下来，再判断现实里是否真的还有行动。 情感选择提醒可以先落到两个动作：写下没完成的问题；区分怀念和想复合。别急着否定自己的心软，但也别让心软替你做全部决定。"}]}], "gains": ["你的剧情投射类型", "最容易戳中你的情感脚本", "现实关系里的重复模式", "你真正想要的回应", "情感选择提醒"]};let index=0;const answers=[];const letters=['A','B','C','D'];document.getElementById('gainList').innerHTML=data.gains.map(x=>`<div class="tag">${x}</div>`).join('');function startTest(){document.getElementById('intro').style.display='none';document.getElementById('quiz').style.display='block';renderQuestion();}function renderQuestion(){const q=data.questions[index];document.getElementById('bar').style.width=((index)/data.questions.length*100)+'%';document.getElementById('qnum').textContent=`第 ${index+1}
