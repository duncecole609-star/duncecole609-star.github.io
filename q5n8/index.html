<body><main class="app"><div class="top"><span>内在需求排序报告</span><span>12题报告</span></div><section id="intro" class="hero"><span class="pill">自我探索测试</span><h1>你的内在需求排序，暴露了你最缺什么？</h1><p class="sub">这不是欲望批判，而是帮你看清：你真正被什么需求牵着走，又最容易在哪里感到空。</p><div class="card"><p>□ 你的核心需求排序</p><p>□ 你最缺的安全感来源</p><p>□ 你容易被什么东西牵着走</p><p>□ 真实欲望和表面选择的差异</p><p>□ 未来30天需求补位建议</p><button class="primary" onclick="startTest()">开始测试</button></div></section><section id="quiz" class="card quiz"><div class="progress"><div id="bar" class="bar"></div></div><div id="qnum" class="qnum"></div><div id="qtext" class="qtext"></div><div id="options"></div><button class="secondary" onclick="prevQuestion()">上一题</button></section><section id="result" class="result hero"><span class="pill">你的完整报告</span><h1 id="rname"></h1><p id="rsub" class="sub"></p><div id="score" class="score"></div><div id="sections"></div><p class="footer">本测试为自我探索参考，不构成诊断、志愿填报建议、职业建议或承诺。请结合现实情况判断。</p></section></main>
<script>const data={"account":"账号1","folder":"02_neizai-xuqiu-paixu","path":"q5n8","publish_time":"下午5点","cover_title":"你的内在需求排序，暴露了你最缺什么？","note_title":"你的内在需求排序，暴露了你最缺什么？","product_title":"内在需求排序报告","direction":"内在需求排序","visual":"money_desk","colors":{"bg":"#f4eadc","qbg":"#f8f2e9","ink":"#193b35","accent":"#b46446","soft":"#e6d2b8","muted":"#74695f","line":"#dac8b1","report_bg":"#17201d","report_ink":"#fff5e8","report_muted":"#c3b7a6","report_card":"#222b27","report_line":"#40504a","locked_bg":"#fff8ed","locked_ink":"#2a231e"},"gains":["你的核心需求排序","你最缺的安全感来源","你容易被什么东西牵着走","真实欲望和表面选择的差异","未来30天需求补位建议"],"product_desc":"这不是欲望批判，而是帮你看清：你真正被什么需求牵着走，又最容易在哪里感到空。","product_main":"你以为自己想要很多，其实最缺的是某一种确定感","preview_type":"确定感缺口型","preview_sub":"需求排序会暴露你真正想抓住的东西。","core":"你最缺的不是更多选择，而是某种被确认的感觉","gap":"你到底是在追求成就、爱、自由、体面，还是安全感","questions":[{"text":"如果最近只能优先满足一件事，你会选？","options":["把钱和生活安排稳一点，不想再被不确定推着走","被一个重要的人认真选择，不想总靠猜确认位置","做出一点成绩，让自己觉得没有一直停在原地","拥有更多自由，不想再被别人期待绑住"]},{"text":"你最怕哪种状态持续下去？","options":["没有底气，遇到一点变化就开始慌","没人真正懂你，热闹里也觉得自己是多余的","努力很久却没有被看见，像什么都没留下","每天都被安排好，连自己想要什么都快忘了"]},{"text":"你最容易被什么打动？","options":["稳定、可靠、能让人放心的人和事","偏爱、回应、让你觉得自己很特别的细节","认可、掌声、别人看见你能力的瞬间","新鲜感、空间感、能让你重新呼吸的选择"]},{"text":"当你状态变差时，最想补什么？","options":["补钱、补秩序、补生活里的可控感","补陪伴、补回应、补被坚定选择的感觉","补成绩、补证明、补自己没有白费力气的证据","补自由、补变化、补一点不被困住的可能"]},{"text":"你最容易把什么误当成真正想要？","options":["把囤东西、攒钱、规划一切误当成安全","把别人短暂的热情误当成被爱","把忙和被需要误当成价值","把逃离和换环境误当成自由"]}],"h5_questions":[{"text":"如果最近只能优先满足一件事，你会选？","options":["把钱和生活安排稳一点，不想再被不确定推着走","被一个重要的人认真选择，不想总靠猜确认位置","做出一点成绩，让自己觉得没有一直停在原地","拥有更多自由，不想再被别人期待绑住"]},{"text":"你最怕哪种状态持续下去？","options":["没有底气，遇到一点变化就开始慌","没人真正懂你，热闹里也觉得自己是多余的","努力很久却没有被看见，像什么都没留下","每天都被安排好，连自己想要什么都快忘了"]},{"text":"你最容易被什么打动？","options":["稳定、可靠、能让人放心的人和事","偏爱、回应、让你觉得自己很特别的细节","认可、掌声、别人看见你能力的瞬间","新鲜感、空间感、能让你重新呼吸的选择"]},{"text":"当你状态变差时，最想补什么？","options":["补钱、补秩序、补生活里的可控感","补陪伴、补回应、补被坚定选择的感觉","补成绩、补证明、补自己没有白费力气的证据","补自由、补变化、补一点不被困住的可能"]},{"text":"你最容易把什么误当成真正想要？","options":["把囤东西、攒钱、规划一切误当成安全","把别人短暂的热情误当成被爱","把忙和被需要误当成价值","把逃离和换环境误当成自由"]},{"text":"如果别人不理解你的选择，你最真实的反应是？","options":["先不解释，自己再观察一阵。你不想为了证明自己，把还没想清楚的东西说得太满","有点失落，但还是会继续。你希望被支持，可你也知道最后只能自己负责","开始怀疑是不是自己太在意。别人一句话就能让你重新审视自己的判断","反而更想证明这件事重要。被不理解时，你会更想把答案做出来"]},{"text":"你最怕完整报告里看见什么？","options":["我其实没有想象中稳定，只是一直靠习惯撑着，让日子看起来没有问题","我一直在用旧方式保护自己，所以很多新选择还没开始就被我先否定了","我真正想要的和现在差很多，这意味着我可能已经不满足很久了","我已经忍了太久却还没行动，最怕报告把那个被我压下去的念头说出来"]},{"text":"你希望这次测试最后帮你确认什么？","options":["给我一个更清晰的倾向，至少让我知道自己不是随便被情绪带着走","告诉我真正卡住我的点，我想知道自己为什么反复在同一个地方犹豫","让我知道怎么开始改变，不要太宏大，只要一个能马上做的小入口","帮我确认我不是一个人在这样，有些感受被说出来，本身就会轻一点"]},{"text":"别人评价你时，哪句话最容易让你记很久？","options":["你其实很有潜力，因为这句话像是在提醒你，自己还有没被用出来的一面","你不用这么辛苦，听到这句会突然松一下，也会发现自己真的撑了很久","你很有自己的感觉，这会让你确认自己不是普通复制粘贴的人","你该更相信自己一点，因为你知道很多时候不是没能力，是太常怀疑自己"]},{"text":"完整报告里你最想看哪一部分？","options":["类型结论。想先知道自己属于哪种模式，给现在的状态一个名字","形成原因。想知道为什么自己会这样，而不是只拿到一个标签","误判点。想看自己最容易在哪些地方把需求、关系或选择看错","具体建议。想知道接下来怎么做，才能不只停留在看懂自己"]},{"text":"当几个需求同时拉扯你时，你最容易先牺牲哪一个？","options":["牺牲休息和稳定，先把别人期待的事情处理完","牺牲真实表达，先维持关系表面不出问题","牺牲自己的欲望，告诉自己以后再说，现在先懂事","牺牲安全感，去追一个看起来更能证明自己的目标"]},{"text":"如果要给内在需求补位，你最该先承认什么？","options":["我不是不努力，我只是太久没有被真正接住","我不是要求太多，我只是有些需要一直被自己压低","我不是突然迷茫，是以前太习惯顺着外界排序生活","我不是想要更多，而是想知道什么对我真的重要"]}],"score":86,"score_name":"倾向指数","cover_sub":"需求排序会暴露你真正想抓住的东西。","profiles":[{"name":"安全感优先型","score":82,"summary":"你最缺的不是物质本身，而是生活不会突然失控的底气。","why":"你对不确定很敏感，所以会本能地想存钱、规划、提前准备。稳定能让你安心，但过度追求稳定也会让你不敢尝试。","signs":["看到余额下降会明显焦虑","做选择前总先想最坏情况","很难真正享受当下，总觉得还不够稳"],"mistake":"你容易把“更安全”当成所有问题的答案。可有些焦虑不是靠再多准备解决，而是需要确认自己有应对能力。","advice":["列出3件真正让你慌的事，区分真实风险和想象风险","给自己设置一个安心底线，达到后允许小范围尝试","每周做一件低风险新尝试，训练自己面对不确定","把钱、时间、情绪分开管理，不要让钱承担所有安全感"],"reminder":"你需要的不是永远不出错，而是相信自己出错后也能处理。"},{"name":"被选择需求型","score":86,"summary":"你很在意回应，因为回应会让你确认自己是重要的。","why":"你的核心需求是被看见、被偏爱、被坚定选择。当回应不稳定时，你会开始怀疑自己的位置。","signs":["容易反复看消息和语气","别人忽冷忽热会让你特别上头","你嘴上说无所谓，心里其实很怕自己不重要"],"mistake":"你容易把别人的热情当成价值证明，也容易把冷淡当成自我否定。","advice":["不要用秒回和热情判断自己值不值得被爱","把需要直接说出来，不用靠测试确认对方","观察对方的持续行动，而不是单次高浓度表达","保留自己的生活节奏，不把全部情绪压在一个人身上"],"reminder":"真正稳定的爱，不需要你一直猜自己有没有位置。"},{"name":"价值证明型","score":80,"summary":"你最缺的是一种“我没有白活”的确认感。","why":"你很怕努力没有痕迹，所以会追求成绩、认可、进步和被看见。成就能点燃你，也可能让你长期紧绷。","signs":["休息时容易有负罪感","别人一句认可会让你撑很久","你害怕普通，害怕自己没有被记住的价值"],"mistake":"你容易把忙碌当成价值，把被需要当成存在感。久了会不知道自己是真的想做，还是怕停下来。","advice":["给每周设置一个非结果型目标，只看完成不看评价","记录3件没有被看见但你确实做好的事","把价值感从外界反馈里拿回一部分","练习拒绝低质量忙碌，别让消耗伪装成成长"],"reminder":"你的价值不只在别人看见你的时候才成立。"},{"name":"自由呼吸型","score":78,"summary":"你最缺的是空间感，害怕人生被一种轨道锁死。","why":"你对重复、被安排、被期待绑住很敏感。你需要变化和自主权来确认自己还活着。","signs":["一成不变会让你越来越烦躁","别人越催你稳定，你越想逃开","你经常想换状态、换圈子、换生活节奏"],"mistake":"你容易把逃离当成自由。真正的自由不是马上换掉一切，而是逐步拥有选择权。","advice":["先找出最让你窒息的一个环节，不要一次推翻全部","给生活加入固定的小变化，降低爆发式逃离","把想逃的冲动写下来，看背后是累、怕还是不甘心","做一个30天小实验，用行动验证而不是靠想象逃跑"],"reminder":"你需要的不是一直远走，而是拥有能选择停留或离开的能力。"}]};const letters=['A','B','C','D'];let index=0;const answers=[];function startTest(){document.getElementById('intro').style.display='none';document.getElementById('quiz').style.display='block';renderQuestion();}function renderQuestion(){const q=data.h5_questions[index];document.getElementById('bar').style.width=(index/data.h5_questions.length*100)+'%';document.getElementById('qnum').textContent=`第 ${index+1} / ${data.h5_questions.length} 题`;document.getElementById('qtext').textContent=q.text;document.getElementById('options').innerHTML=q.options.map((t,i)=>`<button class="option" onclick="choose(${i})"><span class="letter">${letters[i]}</span><span>${t}</span></button>`).join('');}function choose(i){answers[index]=i;if(index<data.h5_questions.length-1){index++;renderQuestion();}else showResult();}function prevQuestion(){if(index>0){index--;renderQuestion();}}function showResult(){const counts=[0,0,0,0];answers.forEach(a=>counts[a]++);let max=0;for(let i=1;i<4;i++)if(counts[i]>counts[max])max=i;const r=data.profiles[max];document.getElementById('quiz').style.display='none';document.getElementById('result').style.display='block';document.getElementById('rname').textContent=r.name;document.getElementById('rsub').textContent=r.summary;document.getElementById('score').textContent=r.score;document.getElementById('sections').innerHTML=`<div class="section"><h3>一、核心结论</h3><p>${r.summary}</p></div><div class="section"><h3>二、形成原因</h3><p>${r.why}</p></div><div class="section"><h3>三、典型表现</h3><ul>${r.signs.map(x=>`<li>${x}</li>`).join('')}</ul></div><div class="section"><h3>四、容易误判的地方</h3><p>${r.mistake}</p></div><div class="section"><h3>五、30天行动建议</h3><div class="advice">${r.advice.map(x=>`<div>${x}</div>`).join('')}</div></div><div class="section"><h3>六、关键提醒</h3><p>${r.reminder}</p></div>`;window.scrollTo({top:0,behavior:'smooth'});}</script></body></html>
