<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>心理测试</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"PingFang SC","Microsoft YaHei",sans-serif;background:#0f0f1a;color:#e8e0d0;min-height:100vh;display:flex;justify-content:center}
.app{width:100%;max-width:500px;min-height:100vh;position:relative;overflow:hidden}
.screen{display:none;flex-direction:column;min-height:100vh;padding:28px 22px 40px}
.screen.active{display:flex}

.cover{justify-content:center;align-items:center;text-align:center;gap:20px}
.cover .icon{font-size:52px}
.cover h1{font-size:29px;font-weight:900;line-height:1.4;letter-spacing:1.5px;padding:0 6px}
.cover h1 .hl{color:#c9a96e}
.cover .sub{font-size:15px;color:#8a8070;line-height:1.7;max-width:300px}
.cover .btn-start{margin-top:10px;padding:15px 50px;font-size:18px;font-weight:700;background:linear-gradient(135deg,#c9a96e,#a6844d);color:#0f0f1a;border:none;border-radius:40px;cursor:pointer;letter-spacing:2px}
.cover .btn-start:active{transform:scale(.96)}
.cover .trust{font-size:12px;color:#4a4538;margin-top:6px}

.progress-wrap{padding:4px 0 14px}
.progress-bar{height:3px;background:#1e1e2e;border-radius:2px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,#c9a96e,#d4b87a);border-radius:2px;transition:width .3s}
.progress-label{font-size:13px;color:#5a5548;margin-top:6px;text-align:right}

.q-area{flex:1;display:flex;flex-direction:column;gap:16px}
.q-area .q-num{font-size:13px;color:#6a6558;letter-spacing:2px}
.q-area .q-text{font-size:23px;font-weight:700;line-height:1.5}
.options{display:flex;flex-direction:column;gap:10px}
.opt{padding:18px 16px;border-radius:14px;background:#16162a;border:1.5px solid #252540;cursor:pointer;transition:all .2s;display:flex;align-items:flex-start;gap:13px}
.opt:active{transform:scale(.98);border-color:#c9a96e;background:#1e1e34}
.opt .letter{width:33px;height:33px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;flex-shrink:0;background:rgba(201,169,110,.12);color:#c9a96e}
.opt .txt{font-size:15px;line-height:1.55;color:#c8c0b0;flex:1}

.gate-screen{justify-content:center;align-items:center;text-align:center;gap:24px}
.gate-screen .lock-icon{font-size:48px}
.gate-screen h2{font-size:26px;font-weight:800;line-height:1.4}
.gate-screen .gate-desc{font-size:15px;color:#a09880;line-height:1.7;max-width:300px}
.gate-screen .unlock-list{text-align:left;background:#16162a;border-radius:16px;padding:20px 24px;width:100%;max-width:320px}
.gate-screen .unlock-list li{font-size:14px;color:#b8b0a0;line-height:2;list-style:none}
.gate-screen .unlock-list li::before{content:"✓ ";color:#c9a96e;font-weight:700}
.gate-screen .btn-gate{margin-top:8px;padding:14px 44px;font-size:18px;font-weight:700;background:linear-gradient(135deg,#c9a96e,#a6844d);color:#0f0f1a;border:none;border-radius:40px;cursor:pointer;letter-spacing:2px}
.gate-screen .btn-gate:active{transform:scale(.96)}
.gate-screen .price{font-size:14px;color:#6a6558;margin-top:4px}

.loading{justify-content:center;align-items:center;text-align:center;gap:24px}
.loading .spinner{width:52px;height:52px;border:3px solid #1e1e2e;border-top-color:#c9a96e;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading .msg{font-size:16px;color:#a09880;letter-spacing:1px}

.result{padding:28px 22px 48px}
.result .badge{display:inline-block;padding:7px 16px;border:1px solid rgba(201,169,110,.25);border-radius:16px;font-size:13px;color:#c9a96e;letter-spacing:2px;margin-bottom:14px}
.result .type-name{font-size:36px;font-weight:900;margin-bottom:6px;line-height:1.2}
.result .type-sub{font-size:18px;color:#d4b87a;margin-bottom:20px;line-height:1.4}

.evidence-box{background:#16162a;border-radius:16px;padding:20px;margin-bottom:22px;border-left:3px solid #c9a96e}
.evidence-box h3{font-size:14px;color:#c9a96e;letter-spacing:2px;margin-bottom:10px}
.evidence-box p{font-size:14px;color:#b8b0a0;line-height:1.7}

.module{margin-bottom:20px}
.module h3{font-size:16px;color:#a09880;letter-spacing:1.5px;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid #1e1e2e}
.module p{font-size:14px;color:#b8b0a0;line-height:1.75;margin-bottom:6px}

.summary-box{background:linear-gradient(135deg,#1a1a2e,#1f1f34);border-radius:16px;padding:24px;margin:24px 0;text-align:center;border:1px solid rgba(201,169,110,.15)}
.summary-box .q-mark{font-size:28px;color:#c9a96e;margin-bottom:8px}
.summary-box p{font-size:17px;color:#d4b87a;line-height:1.7;letter-spacing:.5px}

.advice-box{margin-bottom:24px}
.advice-box h3{font-size:16px;color:#a09880;letter-spacing:2px;margin-bottom:12px}
.advice-box .advice-item{padding:12px 14px;margin-bottom:8px;background:#16162a;border-radius:12px;font-size:14px;color:#b8b0a0;line-height:1.6;display:flex;gap:10px}
.advice-box .advice-item .n{color:#c9a96e;font-weight:700;flex-shrink:0}

.reminder-box{background:#16162a;border-radius:16px;padding:20px;margin-bottom:28px;border:1px solid #2a2a40}
.reminder-box h3{font-size:15px;color:#c9a96e;letter-spacing:2px;margin-bottom:8px}
.reminder-box p{font-size:14px;color:#a09880;line-height:1.7}

.footer{text-align:center;padding:16px;font-size:11px;color:#3a3a48;border-top:1px solid #16162a;margin-top:auto}
</style>
</head>
<body>
<div class="app" id="app"></div>
<script>
// ========== 内容数据 ==========
const DATA = {
  title:"你每次说「算了」，<br>压下去的<br><span class='hl'>到底是什么</span>",
  subtitle:"不是说情绪管理——<br>是测你咽下去的那些东西，最后变成了什么",

  questions:[
    {scene:"同事又把烂摊子甩给你，你张了张嘴，最后说了一句「算了」。那一刻你心里最真实的感受是？",A:"「不是不生气——是吵完架还要继续共事，成本太高。」你的「算了」是一笔账，不是原谅",B:"「已经不是第一次了。说再多也不会改，不如省点力气。」你的「算了」是一座坟，埋的是期望",C:"「其实我本来想说，这个活我接不了——但话到嘴边又觉得算了，说了显得计较。」你的「算了」是自我审查，不是大度",D:"「我怕吵起来之后，关系更僵，以后更难开口。」你的「算了」是恐惧在替你投票，不是理性"},
    {scene:"伴侣/好朋友又一次忘了你之前说过的事，你解释了一遍，内心飘过两个字「算了」。那个「算了」底下是什么？",A:"「你明明听到了，只是没当回事——但我不会为了这个发火，不值当。」你的「算了」下面压着怒火的火星",B:"「以前我会再说一遍，现在算了——反正你记不住，也不是第一次了。」你的「算了」下面是积了很久的失望",C:"「其实我想让你记住的，但好像我一开口提要求，就显得很麻烦。」你的「算了」下面藏着一个不敢出声的需求",D:"「怕说了你又觉得我计较、矫情——算了，我自己消化吧。」你的「算了」下面是怕被贴上『难搞』标签的恐惧"},
    {scene:"家庭聚会上，长辈又说了一句让你很不舒服的话。你低头吃饭，把想说的话咽了回去，心里默念「算了」。为什么算了？",A:"「顶回去场面会很难看——我不是怕TA，是怕我妈为难。」你的「算了」是被体面包裹的怒火",B:"「说了这么多年都没用，还指望今次能改？算了吧。」你的「算了」是长期失望凝结成的冷漠",C:"「其实我希望有人替我说一句——但我自己开口，好像就不对了。」你的「算了」是一个被搁置的需求：需要被撑腰",D:"「怕我说完之后，全家都觉得是我事多、不懂事。」你的「算了」是怕被全家人同时否定的恐惧"},
    {scene:"你在群里提了一个想法，没人回应。过了一阵你删掉了那条消息，假装什么都没发生，跟自己说「算了」。那一刻你在做什么？",A:"「你们不回应是吧——行，我记住了。」你的「算了」是记账本上又添了一笔，怒气在攒",B:"「又来了。每次我说话都像对着空气——算了。」你的「算了」是重复失望后形成的肌肉记忆",C:"「其实我很需要你们的反馈——但开口要反馈，好像显得我很没底气。」你的「算了」是把需求藏起来，假装不需要",D:"「怕你们觉得我太把自己当回事——算了，少说话比较安全。」你的「算了」是怕被归为『爱表现』的那种人"},
    {scene:"深夜刷手机，看到别人过得很好，你心里泛上来一句话「算了，反正我也就这样了」。这个「算了」和平时的有什么不同？",A:"「平时是对别人算，这个是对自己算——连愤怒都懒得发了。」你的「算了」开始反噬自己了",B:"「以前还会期待点什么，现在连期待都省了。」你的「算了」已经从失望过渡到了麻木",C:"「其实我也想活成那样——但说出来会显得不知足吧？算了。」你的「算了」把欲望本身当成了一种错",D:"「怕自己真的去争取了，结果还是不行——那不如一开始就算了。」你的「算了」是恐惧先替你判了死刑"},
    {scene:"你上一次把「算了」说出口之后，身体有什么感觉？——仔细回忆一下",A:"胸口发紧，牙关有点酸——你其实在咬牙，只是自己没意识到。愤怒在身体里找出口",B:"胸口往下沉了一下，像有什么东西从胃里往下坠。那是失望的重量，身体比你先感受到了",C:"喉咙发堵，像有什么东西卡在那里没出来——其实就是那句你没说的话。需求被吞回去的时候会变成物理的堵",D:"肩膀缩了一下，呼吸变浅了——你的身体在「缩」起来，像怕再被打一下。恐惧在帮你缩小自己的存在面积"},
    {scene:"如果有人对你说「你不要每次都说算了，有话就说出来」，你心里第一反应是什么？",A:"「说出来有用吗？你以为我没试过？就是因为试过没用才算了的。」——你不是不想说，是不想再白说",B:"「不是我不敢说——是我已经不在乎了。」——失望攒够了之后，连沟通的欲望都会消失",C:"「我怕我说出来之后，你们会觉得我不好相处。」——你把『有需求』和『讨人厌』画了等号",D:"「说出来的后果你替我扛吗？」——你怕的不是表达，是表达之后不可控的连锁反应"},
    {scene:"想想你最近一次本该坚持但最后说了「算了」的事——如果那天你把「算了」吞回去，把那句话说出来，最可能发生的后果是什么？",A:"当场会吵起来——但吵完之后事情可能会有转机。你怕的不是吵架，是吵架之后不知道该怎样收场",B:"对方可能会愣住，然后说『你怎么不早说』——但你心里清楚你早说过了，只是他从来没听进去",C:"对方可能会觉得『原来你这么在意啊』——但你在意很久了。你怕的是说出来之后被当成一个太认真的人",D:"对方可能会更生气，觉得你在翻旧账或者在挑战他——你怕的不是一次冲突，是关系从此变了味"},
    {scene:"你身边有没有一个人，让你几乎从不说「算了」？如果没有，你希望遇到一个让你不用再说「算了」的人吗？",A:"有——那个人在我发火的时候不会逃，也不会反骂回来。我敢在他面前不「算了」，是因为知道他不会被我的愤怒吓走",B:"没有——但我希望遇到一个能接住我沉默的人。我不需要说得很大声，他就能看到我咽下去的那些失望",C:"好像没有——我习惯了在所有人面前都说「算了」。但如果真的有一个人能让我觉得『提要求是安全的』，我大概会忍不住哭出来",D:"没有——但我希望有一个人能在我还没说『算了』之前，就先说一句『你说吧，我在听，不会怎样』"},
    {scene:"如果你的「算了」有一张脸，一个性格——它长什么样？",A:"它长着一张过分懂事的脸，站在所有人后面等，等到最后才走——但走的时候把门关得特别重。你的「算了」是个愤怒的成年人，用沉默惩罚所有人",B:"它坐在一张长椅上，看着来来往往的人，眼神很淡。不是不期待了——是期待过太多次，现在只是等着看。你的「算了」是个提前老了的人，不再对世界抱有幻想",C:"它站在橱窗外看着里面的东西——想要，但觉得自己不该要。你的「算了」是个把自己关在外面的人，明明有钥匙，却觉得门不是为自己开的",D:"它抱着膝盖缩在角落，眼睛一直盯着门口——不是不想出去，是不知道外面等着的是什么。你的「算了」是个被吓坏了的小孩，把沉默当成了唯一的护盾"},
    {scene:"你见过一个「不再说算了」的人吗？——就是那种敢直接说『我不高兴』、『我不同意』、『我需要』的人。你看到她的时候，心里是什么感觉？",A:"有点羡慕，但又觉得她太冲——「你这样会吃亏的。」但其实你心里知道，她才是那个不委屈自己的人。你的「算了」在替你看不起自己还会发怒的权利",B:"她看起来好轻松——不是说她不失望，是她失望了会直接让人知道，不攒着。你看着她的时候，突然觉得自己的「算了」好重。你的「算了」是一袋你背了很久的石头",C:"你会觉得她好敢——需要什么就说了，没有那种『会不会太麻烦』的犹豫。你看着她就想：原来提需求可以不用先道歉。你的「算了」是你给自己上的枷锁",D:"你会想——她不怕吗？然后你又想——她怕，但她还是说了。你的「算了」和她的区别只在于：你觉得危险的事，她发现其实没那么危险"},
    {scene:"如果从现在开始，你每咽下一次「算了」就有一个地方会亮一下灯——一个月后，你回头看，亮灯最多的地方是哪里？",A:"工作——你是职场里最能忍的那个人，但也是在心里骂了最多句脏话的人。愤怒是你的常驻燃料，只是你没让它点燃任何东西",B:"亲密关系——对伴侣、对家人、对好朋友，你把失望一个个收好，像攒一抽屉的过期车票。失望已经多到你再也不想去任何地方了",C:"所有需要开口说『我想要』的瞬间——加薪、被帮助、被关注、被爱。你把自己活成了一座自给自足的孤岛，然后安慰自己说不需要靠岸",D:"所有会让你处于下风的场合——权威面前、陌生场合、被评价的时候。恐惧把你说『算了』的频率练成了条件反射，你不说不是因为不想说，是说了会让你更害怕"}
  ],

  types:{
    A:{name:"压下去的是愤怒",tag:"你的「算了」是一座活火山——表面对世界说没事，底下岩浆一直在沸腾",icon:"🌋",
       score:"愤怒压抑指数 88%",
       conclusion:"你不是没脾气——你是太会管理脾气了，管到连自己都以为自己真的不在意。你的每一句「算了」都是一次精确的计算：发火成本太高、不值得、对方不会改、场面会变难看。你用理性把愤怒包裹得很好，好到身边没人知道你气过——但你的身体知道。那些没发出来的火，变成了慢性头痛、肩颈僵硬、半夜突然清醒的三点。你不是不愤怒的人，你是一个把愤怒藏得连自己都信了的人。",
       evidence_note:"你在职场攒火（Q1）、对记不住你话的人有愤怒但克制（Q2）、对家人把怒火包在体面里（Q3）、被忽视时用沉默记账（Q4），身体反应是牙关发紧胸口发紧（Q6）。你的「算了」下面压着的不是平静，是你觉得不值得释放的愤怒。但愤怒不会因为「不值得」就消失——它会换一种方式存在。",
       quote:"你不是没脾气——你是太擅长把怒火装进「算了」的盒子里。但盒子总有装满的一天。那些你不允许自己表达的愤怒，正在以另一种方式替你说话。",
       modules:[
         {title:"你的「算了」在掩盖什么：被包装成理性的愤怒",content:"你把每一次「算了」都当作一场成本核算——发火不值得、吵架成本太高、关系还要继续。你让自己相信这是理性选择，但其实你是在用「理性」给愤怒找一个体面的出口。真正的理性不是不表达——是把愤怒变成对方听得进去的话。你现在做的只是压抑，不是处理。"},
         {title:"你的愤怒从哪里来：被反复试探的边界",content:"你的愤怒不是凭空产生的——它是你的边界被人踩了一次、两次、第三次之后产生的信号。怒火的本质是你的自我保护系统在工作：它在告诉你，有人越界了。但你把警报器关了，告诉自己「没事」，然后在心里默默给对方记了一笔。这些没有表达出去的边界感，慢慢变成了你对世界的一层冷漠。"},
         {title:"你的身体在替你说什么：愤怒的物理储存",content:"你觉得自己控制得很好——不吵、不闹、不说重话。但你的身体没有「算了」这个功能。每一次咽下去的愤怒都会在身体里找一个角落：紧咬的后槽牙、不自觉绷紧的肩膀、半夜突然清醒的那个三点钟。你的身体比你诚实——它在替你记账。如果你不学会在愤怒还小的时候就把它说出来，身体会替你说——用头痛、胃痛、失眠的方式。"},
         {title:"为什么你不敢发怒：被训练成「懂事」的人",content:"你可能从小就被夸「懂事」「乖」「不让人操心」——这些表扬的代价是你学会了把愤怒当成一个危险品。你怕发火之后别人会觉得你不好相处、会破坏关系、会让场面尴尬。但你没有意识到的是：你已经在破坏关系了——是用沉默、距离、和假装的「没事」。这些比一次吵架更伤关系。"},
         {title:"你的「算了」如果会说话：它其实在喊「够了」",content:"你的每一句「算了」翻译过来都不是「算了」——是「你怎么敢又这样对我」「第三次了」「我不是好欺负的」。它是一句喊不出来的「够了」。下一次，在你要说「算了」之前，停半秒——问问自己：这句「算了」是谁在说话？是理性的你，还是一个被训练成不敢发火的你？"}
       ],
       advice:["7天观察：每次说「算了」之后，在备忘录里写一句「我刚才其实想说的是______」。不发给任何人，只写给自己看。一周后回看——那些没说的话会告诉你你真正在意什么。","7天观察：找一天——就一天——所有你本来想说「算了」的地方，全部改成说一句温和但真实的回应。不是发火，是表达。比如「这件事我不太舒服」「刚才那句话让我有点生气」。观察：世界塌了没有。","30天练习：给愤怒分级。不是所有愤怒都需要发火——把每件让你想「算了」的事记下来，标记等级（1=轻微不适、2=需要表达、3=必须划边界）。每次遇到等级2和3的事，练习用一句冷静但明确的话表达。","30天练习：找一个你信任且不会因为你的情绪就否定你的人，告诉TA：「我最近在练习不把所有事都「算了」，如果我哪天跟你说了我不高兴，不是针对你，是我想练习不再咽下去。」给自己一个安全网，再开始练。"],
       reminder:"你不是没脾气——你是把脾气关起来太久了，久到你觉得开一次门就会炸掉整个房子。但其实不是的。你可以慢慢打开那扇门——先从一次温和的「我不高兴」开始。那些真正尊重你的人，不会因为你不再「算了」就跑掉。那些跑掉的，本来就不值得你这么辛苦地替他们管理情绪。"
    },
    B:{name:"压下去的是失望",tag:"你的「算了」是一座博物馆——里面陈列着你曾经对这个世界抱过的所有希望",icon:"🏛️",
       score:"失望累积指数 85%",
       conclusion:"你的「算了」不是一次性的放弃——它是一个日渐沉默的过程。你曾经是那个会认真说「我希望你这样做」的人，是那个被忘记诺言之后还会再提醒一次的人，是那个愿意给第二次、第三次机会的人。但失望是一粒一粒的沙子，终于有一天把整片海都填平了。你的「算了」不是没脾气——是连脾气都不想发了。你觉得说再多都是白说，改变是不可能的，期待是幼稚的。你把失望当成了成熟，把沉默当成了洞察——但其实你只是把希望埋得太深，深到自己也找不到了。",
       evidence_note:"你对重复犯错的人选择沉默而不是沟通（Q1、Q2），对家人用「说了也没用」来说服自己（Q3），在群聊被忽视后默默删消息（Q4），深夜对自己说「反正我也就这样了」（Q5），身体感受是胸口下沉（Q6），你觉得说了也没用（Q7）。你在用「算了」完成一次次的微型哀悼：每说一次，就埋葬一个曾经以为会实现的期待。",
       quote:"你不是冷漠——你是期待太多次之后学会了不给世界发邀请。但那些被你「算了」掉的失望，每一粒都还在。它们没有消失，只是变成了你眼睛里的疲倦。",
       modules:[
         {title:"你的「算了」在掩盖什么：被伪装成成熟的失望",content:"你让自己相信这是一件好事——「看，我已经不期待了，我成熟了。」但你不是真的不想要了——你只是不想再体验想要之后又得不到的滋味。真正的成熟不是不期待，是知道如何管理期待落空之后的情绪。你现在做的不是管理——是提前放弃，然后把它叫做成熟。"},
         {title:"你的失望从哪里来：被反复辜负的信任",content:"每一次失望都不只是一个碎掉的期待——它是一个人又一次向你证明了「你的期待不重要」。那个人可能是伴侣、家人、朋友、同事、自己。你一次次表达自己的希望，一次次被忽略或遗忘，最后你学会了一件事：不表达就不会失望。但你忘了——不表达也不会被满足。失望没有消失，它只是从「我期待你会」变成了「我早知道你不会」。"},
         {title:"失望攒多了会变成什么：对自己的放弃",content:"最危险的「算了」不是对别人说的——是对自己说的。当你说「反正我也就这样了」的时候，你「算了」掉的不是一个具体的要求，是你对自己的想象力。每咽下一次对别人的失望，就会有一小部分的你自己变得认命。等到失望太多，你会发现自己已经不想再期待任何事、任何人——包括你自己。"},
         {title:"为什么你不敢再期待：被训练成「不麻烦」的人",content:"你可能有过这样的经历：你期待了、表达了、努力了——然后落空了。不止一次，是重复很多次。于是你学到了一课：不期待就不会落空，不开口就不会被拒绝，不想就不会痛。但你没有被教会的是：期待落空之后的哀悼是可以完成的，失望是可以表达的，关系是可以修复的。你现在卡在了从「又失望了」走到「我可以怎么调整」的中间路上。"},
         {title:"你的「算了」如果会说话：它其实在说「我不敢了」",content:"你的每一句「算了」翻译过来都不是「没事」——是「我不敢再问了」「我怕这次还是没回应」「我已经没有力气再失望一次了」。它是一句说不出口的「你能不能主动一次」。下一次在你准备说「算了」的时候，问自己一个问题：这件事如果我今天不说，三年后回头看——我会后悔今天没有开口吗？"}
       ],
       advice:["7天观察：每天睡前写下今天让你想说「算了」的三件事——旁边写下：如果不说「算了」，你最想得到什么回应？连续七天。你会发现自己在乎的比你以为的多得多。","7天观察：找一个最近让你「算了」的人——选一件事，用最简单的话重新说一次：「上次我说算了，其实我没算。这件事对我挺重要的。」不期待回应，只是把埋掉的东西挖出来晒一晒。","30天练习：练习在失望还很小的时候就表达——不是指责，是说感受。比如「你答应我的事没做，我有点失望。」不要等失望攒到变成绝望才说。每次在失望还新鲜的时候表达，它就不会变成腐烂的存货。","30天练习：区分「可以算了」和「不能算了」。用一个月记录所有「算了」的瞬间，每个后面标注：这件事三年后还重要吗？重要的事，练习在第一次想说「算了」时就发声。不重要的事，练习真正地算了——不是压抑，是放下。"],
       reminder:"你可以「算了」掉一件具体的事——但你不可以「算了」掉「你会被好好对待」的信念。失望是你曾经抱过希望的证据，不是你幼稚的证明。那些让你想「算了」的时刻，不是说明你不值得更好的——是说明你现在身边有些旧剧本需要被重写了。"
    },
    C:{name:"压下去的是需求",tag:"你的「算了」是一张未寄出的信——上面写满了你不敢开口的「我想要」",icon:"✉️",
       score:"需求隐藏指数 83%",
       conclusion:"你活得很周全——会替别人想、会替场合想、会替氛围想，但很少替自己开口。你的「算了」不是不想要，是不敢让人觉得你「太想要」。你把对自己的需求说出口当成一种打扰、一种负担、一种「太把自己当回事」的证据。于是你习惯了不说——加薪不好意思提、需要帮助自己扛、委屈了先想是不是自己的问题、想要被关注也觉得不说才对。你把「不麻烦别人」当成了美德，但美德底下藏着一个空荡荡的你。你需要练习的不是知足——是允许自己的需求和其他人的一样重要。",
       evidence_note:"你收到烂摊子时不敢拒绝怕被说计较（Q1），怕开口提需求显得麻烦（Q2），希望被撑腰但觉得不应该自己开口（Q3），希望被回应但觉得要回应显得没底气（Q4），深夜看别人过得好觉得自己不该有欲望（Q5），喉咙发堵有话说不出（Q6），把「有需求」和「讨人厌」画等号（Q7）。你的生存策略是：让别人觉得方便，来换取不被讨厌。但代价是你自己活得特别不方便。",
       quote:"你把每一个「想要」都打上了「太麻烦别人」的标签——然后把自己活成了一座不需要任何人靠近的岛。但你心底里一直在等一个人——等着有谁说：你不用说「算了」，我在听。",
       modules:[
         {title:"你的「算了」在掩盖什么：被自我审查的需求",content:"你的「算了」底下压着的不是大度——是你不敢说出口的需求。每次别人把活甩给你、忘了你的话、忽视你的存在——你心里其实有一句「我不高兴」或「我需要你这样做」，但它们卡在了喉咙里，最后变成了一声「算了」。你怕的不是说出来——你怕的是说出来之后，别人会觉得你不好相处、太认真、太计较。你在用沉默为别人省事，用委屈换自己的安全感。"},
         {title:"你的需求为什么变成了禁忌：被训练成「不为难别人」的人",content:"你可能从小就被夸「乖」「懂事」「不用大人操心」——这些夸奖帮你建立了一个等式：有需求 = 给人添麻烦。你不是天生不想要——你是一遍一遍练习了怎样才能不被嫌，练到自己也相信了「我不需要那么多」。但你不需要那么多吗？还是你不敢承认你需要那么多——需要被关注、被回应、被当成重要的那个？"},
         {title:"不敢说需求的人最后会怎样：习惯性自给自足的孤独",content:"你把所有想说的话都吞了回去，把所有想伸出去的手都收了回来——然后告诉自己「我一个人也可以」。你过成了别人眼里独立、省心、不麻烦的人。但只有你自己知道，在某些深夜，你会想：如果有人能看穿我的「算了」，说一句「你不用算了，你说」——该多好。你不是不需要别人——你是怕需要了别人也得不到回应，索性不开口。这种自给自足不是强大，是一种被失望训练出来的防御。"},
         {title:"你怎么区分「真的不需要」和「不敢需要」",content:"一个简单的测试：如果有一个绝对安全的人——TA永远不会嫌你麻烦、不会觉得你要求多、不会用你的需求来评价你——你会对TA说什么？如果你脑子里有一长串话想说，说明你不是不需要——你只是找不到安全的人说。如果连在想象中你都说不出来，说明你把需求压抑得太久，连自己都忘了自己想要什么。不管是哪一种，都是从「算了」开始的。"},
         {title:"你的「算了」如果会说话：它其实在说「可以问我吗」",content:"你的每一句「算了」翻译过来都不是「随便」——是「其实我在意」「为什么你不主动问一句」「我已经不想再开口了因为每次都是我开口」。你累的不是事情本身——是你一直在替所有人考虑，但很少有人反过来替你考虑。你的「算了」下面藏着一句你等了很久都没等到的话——不是你自己说的，是别人主动说的：你需要什么？"}
       ],
       advice:["7天观察：不再说「随便」——把每一天你本来想说「随便」的地方，改成一个真实偏好。比如「你想去哪家？——我想去这家，但可以商量。」先从小事开始，练习让自己的偏好存在。","7天观察：找一个人，练习完整地说一次需求——不是要求，是表达：「我这周有点累，如果你能帮我做______我会好很多。」必须说完整的句子，不能只暗示。观察自己说完之后的感觉。","30天练习：给你的需求分级——Level 1小事（去哪吃、看什么电影），Level 2中等（工作分配、时间安排），Level 3大事（薪资、边界、重要关系的调整）。每周至少在每个等级各练习一次不「算了」——不吞话、不说反话、不暗示，直接说「我需要/我不喜欢」。","30天练习：练习接受「提需求后被拒绝」——不是所有的需求都会被满足，但这不等于你提需求是错的。每次被拒绝后告诉自己：对方的拒绝反映的是他的能力或意愿——不是我的需求不值得。连续30天，把「被拒绝」和「我不值得」拆开。"],
       reminder:"你的需求不是负担——你的需求是你存在的证据。一个从来没有需求的人不是活的，是演的。你在这个世界上最有权利替自己开口做这件事——因为你才是那个陪你过一辈子的人。别再「算了」了——从今天开始，你每说一次「我想要」，都是把一封未寄出的信送到了收件人手里。即使对方没有立刻回信——至少你没有再让信烂在自己手里。"
    },
    D:{name:"压下去的是恐惧",tag:"你的「算了」是一间安全屋——你以为躲在里面能避过暴风雨，但其实天气早就晴了",icon:"🏚️",
       score:"恐惧驱动指数 80%",
       conclusion:"你的「算了」底下不是不在乎——是害怕。怕说出来的后果你控制不了、怕对方会因此对你更差、怕关系从此变得更脆弱、怕被贴上「不好相处」「太敏感」「爱计较」的标签。你把每一次「算了」当成一道安全门——关上之后至少现在的平静还在。但你有没有想过：你害怕的那些后果，有些是真的会发生，有些只是你小时候被吓到过，之后再也没有检查过门外面的天气？你活在一种持续的预警状态里，把沉默当成了护盾，把「不表达」当成了自我保护——但你真正害怕的，是一旦开口，就会被抛弃或被惩罚。这个剧本，可能已经不适合现在的你了。",
       evidence_note:"你怕吵起来关系变僵（Q1），怕被说矫情计较（Q2），怕被全家人否定（Q3），怕被归为爱表现（Q4），怕争取了还是失败不如不开始（Q5），身体缩起来呼吸变浅（Q6），怕说出来的连锁反应不可控（Q7），怕对方更生气觉得你在挑战（Q8），希望有人说不会怎样才敢说（Q9），看敢表达的人第一反应是「她不怕吗」（Q11）。你的恐惧贯穿了所有场景——职场、关系、家庭、自我。你活在一个时刻计算风险的状态里。",
       quote:"你不是不敢说——你是太多次开口之后发现自己更不安全了。但那些让你变小的经验是过去的事了。现在的你，已经比当年那个只能靠「算了」活下来的自己，大了很多很多。",
       modules:[
         {title:"你的「算了」在掩盖什么：被恐惧驱动的顺从",content:"你看起来是随和、好相处、不挑事——但你心里清楚，你的「算了」不是随和，是怕。怕一旦说了真话，现在勉强维持的关系就会碎、对方会对你更凶、或者你会在关系里处于更弱势的位置。你把沉默当成了保护层——但沉默不是保护，是延迟。延迟久了，对方习惯了你的沉默，你习惯了委屈，再想开口就更难了。"},
         {title:"你的恐惧从哪里来：曾经表达之后被惩罚的经历",content:"你很可能有过这样的经历：你表达了、抗议了、提需求了——然后遇到了更坏的结果。对方冷暴力、对你发脾气、或者用你的表达反过来攻击你。那一次的经历让你裂开了一道口子，之后每一次想说真话时，那道口子就会隐隐作痛——提醒你上次有多危险。但请仔细想一想：上次那个人是谁？现在这个人是谁？那件事是什么情况？现在的情况是什么？你害怕的不是面前这个人——你害怕的是记忆中那个让你闭嘴的人。"},
         {title:"恐惧让你的世界缩了多少：逐渐缩小的生活半径",content:"每次说一次「算了」，你就把自己的生活空间缩小一点。下次再遇到类似场景时，你的自动反应会更快——因为你上次算过了，这次不打算再算了。久而久之，你会在工作里不发言、关系里不抗争、自己面前也不相信努力会有结果。恐惧把你从一个大大的你，缩成了一个小小的你。不是别人把你关起来的——是你自己用一次次的「算了」把自己关起来的。"},
         {title:"你的恐惧有多少是真的，有多少是想象的：给恐惧做一次盘点",content:"拿出一支笔，写下来：最近五次你说「算了」的场景。每一件旁边写：如果我当时说了真话，最有可能发生什么？那个可能性有多高（百分比）？那个后果我真的承受不了吗？——我猜，你会发现很多你害怕的后果，要么概率很低，要么你其实能承受。恐惧最大的力量不是真正发生的后果——是你在脑子里反复预演那个后果，每一次都让它变得更真。"},
         {title:"你的「算了」如果会说话：它其实在说「保护我」",content:"你的每一句「算了」翻译过来都不是「放弃」——是「我需要保护」。它在说：我怕受伤、我怕失去、我怕变得更糟。这些话不是胆小的——是一个曾经受过伤的自己在求援。你需要做的不是骂自己为什么这么怕——是做那个曾经没有人对你说过的事：蹲下来对那个缩在角落的自己说：现在的门外面，已经安全了很多。你愿意跟我一起开一条小缝看看吗？"}
       ],
       advice:["7天观察：不带目的写「恐惧清单」——把最近每个想说「算了」的瞬间记下来，旁边写：我怕的后果是什么？这件事以前真的发生过吗？发过之后结果真的那么差吗？只观察，不逼自己改变。","7天观察：每天找一个极低风险的场景，练习说一句没有「算了」的话——对快递员说「这个箱子好像有点破」、对咖啡师说「麻烦少糖」。从连这点事都要「算了」到可以说出口，你会发现世界的反应比你以为的温和得多。","30天练习：从低风险到中风险，逐步把「算了」替换成一句话。第一周对陌生人说，第二周对熟人/同事说，第三周对亲近的人说。不要跳级——恐惧需要分步骤面对。只有你真的一层一层走过去了，你的神经系统才会相信：现在真的不一样了。","30天练习：每天做一次「最坏结果推演」练习。想一件你准备「算了」的事，问自己三个问题：最坏会怎样？我能应对吗？应对之后我会后悔开口了还是庆幸开口了？——连续30天，你会发现自己对「最坏结果」的预期在一点一点地变得更接近现实。"],
       reminder:"你不是没有话想说——你话很多，只是它们都被恐惧按在了喉咙以下。但你不需要一下子把所有「算了」都换掉。你只需要在今天——就今天——把你一百个「算了」中的其中一个，换成一句话。不用完美的句子，不用保证不吵架，不用管对方什么反应。只要你把它说出了口——你就已经推开了这间安全屋的第一扇窗。"

    "你的「算了」从什么地方开始形成——溯源核心创伤事件",
    "你的身体在替你的「算了」买单——身心关联解析",
    "如果不「算了」会怎样——后果推演与恐惧核查",
    "告别「算了」人格的行动框架——表达力重建方案"
  ],

  disclaimer:"本测试仅为自我探索参考，不构成任何心理诊断、治疗建议或效果承诺。如果你长期感到情绪压抑影响正常生活，建议寻求专业心理咨询帮助。"
};

// ========== 引擎 ==========
let answers=[],currentQ=0,paid=false;

function $(id){return document.getElementById(id)}
const app = document.getElementById('app');

function cover(){
  app.innerHTML=`
    <div class="screen active cover">
      <div class="icon">🤐</div>
      <h1>${DATA.title}</h1>
      <div class="sub">${DATA.subtitle}</div>
      <button class="btn-start" onclick="start(true)">开始测试</button>
      <div class="trust">前5题免费 · 记下答案左滑查看报告预览</div>
    </div>`;
}

function start(free){answers=[];currentQ=0;paid=!free;renderQ()}

function renderQ(){
  if(currentQ>=DATA.questions.length){showResult();return;}
  if(currentQ===5 && !paid){showGate();return;}
  const q=DATA.questions[currentQ];
  const pct=Math.round((currentQ/DATA.questions.length)*100);
  const letters=['A','B','C','D'];
  app.innerHTML=`
    <div class="screen active">
      <div class="progress-wrap">
        <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
        <div class="progress-label">第 ${currentQ+1}/${DATA.questions.length} 题</div>
      </div>
      <div class="q-area">
        <div class="q-num">${currentQ<5?'免费测试 · 第'+(currentQ+1)+'题':'深度解锁 · 第'+(currentQ+1)+'题'}</div>
        <div class="q-text">${q.scene}</div>
        <div class="options">
          ${letters.map(l=>`<div class="opt" onclick="pick('${l}')"><div class="letter">${l}</div><div class="txt">${q[l]}</div></div>`).join('')}
        </div>
      </div>
      ${currentQ===4?'<div style="text-align:center;font-size:13px;color:#6a6558;padding:8px 0">记下5个答案，左滑查看报告预览 →</div>':''}
    </div>`;
}

function pick(letter){
  answers.push(letter);
  currentQ++;
  renderQ();
  window.scrollTo(0,0);
}

function showGate(){
  app.innerHTML=`
    <div class="screen active gate-screen">
      <div class="lock-icon">🔓</div>
      <h2>前5题只是倾向<br>完整12题才能看清全貌</h2>
      <div class="gate-desc">后7题继续拆解：你的「算了」底下到底压着什么、它从哪来、不说出来会怎样</div>
      <ul class="unlock-list">
        ${DATA.productModules.map(m=>`<li>${m}</li>`).join('')}
      </ul>
      <button class="btn-gate" onclick="unlock()">继续完成12题 · 解锁完整报告</button>
      <div class="price">完整12题报告 · 做完自动解锁</div>
    </div>`;
}

function unlock(){paid=true;renderQ()}

function showResult(){
  const counts={A:0,B:0,C:0,D:0};
  for(let i=5;i<answers.length;i++){counts[answers[i]]++}
  const sorted=Object.entries(counts).sort((a,b)=>b[1]-a[1]);
  let typeKey=sorted[0][0];
  if(sorted[0][1]===sorted[1][1]&&sorted[0][0]==='A'&&(sorted[1][0]==='C'||sorted[1][0]==='D'))typeKey=sorted[1][0];
  if(sorted[0][1]===sorted[1][1]&&sorted[0][0]==='B'&&sorted[1][0]==='D')typeKey='D';
  const type=DATA.types[typeKey];

  const freeAnswers=answers.slice(0,5);
  const freeLabels=['第一反应','亲密关系咽话','家庭场景吞忍','社交沉默撤回','深夜自我放弃'];
  const freeDesc=[
    ['你不是不生气——你在做成本核算','你咽下去的不是脾气，是觉得不值得发火','你把「不说」当自保，不是大度','愤怒在你身体里找到了别的出口'],
    ['你记得每一次被忽略——但你不再说了','失望攒够了就会变成沉默，比吵架更远','你怕开口提需求会显得麻烦','恐惧让你先下手为强——在别人评价你之前自己先算了'],
    ['你的怒火每一年都在翻新包装——但底下是同一件事','长期失望已经变成了冷漠——你不再对那个人有期待','你希望有人替你说话——但又觉得自己开口就不对了','你怕不是怕一个人——是怕全家人同时站在对面'],
    ['你记下了每一条无人回应的消息——总有一天会清的','失望重复足够多次之后，连「又来了」都懒得说了','你假装不需要回应——但你删消息的动作出卖了你','你缩回了想伸出去的手——不是因为不想要，是怕被推开'],
    ['连对自己「算了」的时候，就是你愤怒反噬自己的时刻','深夜的「反正也就这样了」不是谦虚——是失望已经完成了内化','你把自己的欲望当成了贪婪——然后连对自己都省了','恐惧已经替你投了票——在你还没有努力之前']
  ];

  let evidenceHTML='<h3>📋 答案证据</h3><p>';
  for(let i=0;i<5;i++){
    const a=freeAnswers[i];
    const descIdx=a==='A'?0:a==='B'?1:a==='C'?2:3;
    evidenceHTML+=`<strong>Q${i+1}「${DATA.questions[i].scene.slice(0,18)}…」</strong>你选了${a}——${freeDesc[i][descIdx]}。<br><br>`;
  }
  evidenceHTML+=type.evidence_note+'</p>';

  let modulesHTML='';
  for(const m of type.modules){
    modulesHTML+=`<div class="module"><h3>${m.title}</h3><p>${m.content}</p></div>`;
  }

  let adviceHTML='';
  for(let i=0;i<type.advice.length;i++){
    adviceHTML+=`<div class="advice-item"><span class="n">0${i+1}</span><span>${type.advice[i]}</span></div>`;
  }

  app.innerHTML=`
    <div class="screen active result">
      <div class="badge">你的「算了」人格</div>
      <div class="type-name">${type.name}</div>
      <div class="type-sub">${type.tag}</div>

      <div style="font-size:15px;color:#d4b87a;margin-bottom:4px">${type.icon} ${type.score}</div>
      <p style="font-size:15px;color:#b8b0a0;line-height:1.75;margin-bottom:20px">${type.conclusion}</p>

      <div class="evidence-box">${evidenceHTML}</div>
      ${modulesHTML}

      <div class="summary-box">
        <div class="q-mark">"</div>
        <p>${type.quote}</p>
      </div>

      <div class="advice-box">
        <h3>📅 未来30天建议</h3>
        ${adviceHTML}
      </div>

      <div class="reminder-box">
        <h3>⚠️ 关键提醒</h3>
        <p>${type.reminder}</p>
      </div>

      <div style="font-size:13px;color:#6a6558;line-height:1.6;text-align:center;margin-bottom:24px">${DATA.disclaimer}</div>
      <div class="footer">以上结果为自我探索参考 · 每个选择都是了解自己的线索</div>
    </div>`;
  window.scrollTo(0,0);
}

// start
cover();
</script>
</body>
</html>
