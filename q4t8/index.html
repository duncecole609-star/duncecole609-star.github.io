<script id="data" type="application/json">{"title": "你接电话时突然变紧的声音，暴露了你在职场最怕谁", "product": "职场声音模式报告", "questions": [{"text": "老板的电话突然打来——你的声音在第一秒会怎么变？", "options": {"A": "声音自动调高半个调，变亮变紧——像被一根看不见的线提起来了。\"喂老板——好的好的——没问题\"连成一个词", "B": "声音不变，但呼吸先变——先深吸一口气再接通，那口气不是在呼吸，是在做准备：\"我要开始应对了\"", "C": "声音反而变慢变稳——\"喂，您说。\"你故意放慢语速，因为你知道自己一紧张就容易说错话", "D": "先看一眼屏幕，让铃声响两秒——不是不接，是需要那两秒从\"私人模式\"切换到\"工作模式\""}}, {"text": "同事午休打来，你心里最先冒出的念头是什么？", "options": {"A": "\"又有什么事——\"你的第一反应是防御，因为之前的经验告诉你：午休打来通常不是好事", "B": "\"能不能发消息说——\"你不是不想接，是不想被拖进一场不知道多长的对话", "C": "\"是不是出事了——\"你第一反应是担心，因为正常情况不会午休打来", "D": "\"假装没看到吧——\"你在心里已经挂断了，但手指还是按了接听"}}, {"text": "客户/甲方催你时，你为什么会越说越客气？", "options": {"A": "因为你知道——你越客气，对方越不好发作。你的客气不是讨好，是盾牌", "B": "因为你觉得——\"这是我的工作，抱怨也没用\"。你的客气是接受，不是尊重", "C": "因为你怕——\"万一他投诉我怎么办\"。你的客气是在防后果，不是在服务", "D": "因为你习惯——\"从小就被教要对别人客气\"。你的客气是肌肉记忆，不分对象"}}, {"text": "下班后工作电话响起，你最真实的反应是什么？", "options": {"A": "先叹气再接——那口气叹的不是电话，是\"又要开始工作了\"。但接起来声音又是正常的", "B": "不接——等响了十几秒之后回消息：\"不好意思刚才没看到，什么事？\"其实看到了，只是不想那个时间点接", "C": "接起来声音正常，但挂掉之后整个人会低落一会儿——不是累，是被拉回工作状态之后很难再出来", "D": "接得很快——不是因为积极，是因为\"不接明天会更麻烦\"。你的秒接不是效率，是止损"}}, {"text": "陌生号码打来，你为什么先犹豫几秒？", "options": {"A": "怕推销——但更怕是一个你不想处理的工作电话用了陌生号码打来的", "B": "怕麻烦——每一个陌生号码都可能意味着一个新的事要处理、一个新的关系要建立", "C": "怕是关于你的事——你怕对方上来就问你一个问题你要立刻给出答案", "D": "不接——如果重要会再打或发消息。你不愿意被未知的事情打断"}}, {"text": "你接电话时声音变紧，最常发生在什么时候？", "options": {"A": "电话那头的人有权力评价我——老板、客户、面试官。我的声音自动进入\"免得被挑错\"模式", "B": "电话那头的人需要我立刻做出反应——问题不是你问的，但答案要你给。你声音变紧是在争取思考时间", "C": "电话那头的人带着情绪——焦虑、愤怒、催促。你的声音变紧是在吸收对方的情绪，怕自己受牵连", "D": "电话那头的人打断了我正在做的事——不是内容让我紧张，是被打断让我烦躁。我的声音在替我藏住不耐烦"}}, {"text": "你什么时候开始不敢用正常的语气说\"不\"？", "options": {"A": "第一次因为说\"不\"被穿了小鞋之后——从那以后你学会了用\"好的\"代替\"不行\"", "B": "第一次因为说\"不\"被追问了十遍\"为什么\"之后——你发现\"好的\"比\"不行\"省时间", "C": "第一次因为说\"不\"被贴上\"不好合作\"之后——从那以后你把\"不行\"翻译成了\"我再想想\"", "D": "你一直都不太敢说——从小被教\"对别人要客气\"，长大之后发现\"客气\"等于\"别人可以继续\""}}, {"text": "你的声音在职场替你藏了什么情绪？", "options": {"A": "藏了愤怒——你对某些人早就不爽了，但你的声音永远平静。不是不气，是气在别的地方出了", "B": "藏了累——你不是不想好好说话，是已经没有多余的能量用来调整声音了", "C": "藏了怕——怕被否定、怕被开除、怕被认为不专业。你的声音在替你做\"不会被挑刺\"的版本", "D": "藏了\"不想\"——你不想接、不想回、不想处理，但你的声音永远说\"好的\"。你的声音比你诚实"}}, {"text": "如果有一种电话你永远不用接——你希望是哪一种？", "options": {"A": "下班后的工作电话——你的时间和你的声音一样，需要下班", "B": "带着未说出口的期待的同事电话——那些\"顺便问一下\"其实才是正事", "C": "打来不是为了沟通、而是为了把责任转给你的电话——对方说完之后，你的任务清单多了一项", "D": "所有需要立刻回答\"能还是不能\"的电话——你需要思考时间，但电话不给"}}, {"text": "你接电话的声音，和你说真话的声音，差多远？", "options": {"A": "差了一个完整的深呼吸。接电话的声音在上方——更亮、更快、更\"好的\"；说真话的声音在胸腔——更沉、更慢、更\"我不这么想\"", "B": "差了\"能不能直说\"的勇气。你在电话里从来不反驳，但挂了之后在脑子里反驳了一整遍", "C": "差了\"怕被讨厌\"的距离。你的电话声音一直在照顾对方的感受，真实声音想的是\"我现在不太方便\"", "D": "差了\"谁知道呢\"的松弛。你接电话时像在回答问题，说真话时像在聊天"}}, {"text": "如果你可以用你真实的语气接一次职场电话，你最可能说什么？", "options": {"A": "\"老板，这个时间我接你电话是因为我在乎工作——但我在乎自己更多一点。所以我明天上班再处理。\"", "B": "\"你不要每次午休打来都不说清楚来意，先发消息。不是每次都要立刻回应才叫负责任。\"", "C": "\"你的焦虑是你的，不是我的。我可以帮你，但我不需要替你的情绪负责。\"", "D": "\"我不是不想帮你——我只是需要你提前说，不要每次都像紧急一样打过来。这种节奏我吃不消。\""}}, {"text": "你最想让自己的声音，替你做什么？", "options": {"A": "替我说一次\"不行\"——不用解释，不用抱歉，不用换个说法", "B": "替我说一次\"我现在不方便\"——不用假装我在忙，不用编理由", "C": "替我说一次\"你这样让我很紧张\"——不是为了指责，是让对方知道我在紧张", "D": "替我说一次\"我需要时间想一下\"——不是为了拖延，是让我有空间做决定"}}], "results": {"A": {"name": "怕被责备", "subtitle": "你声音变乖，是怕一拒绝就被评价态度不好", "score": 85, "core": "你在电话里会自动调低自己：声音更软、话更圆、反应更快。你不是没脾气，是你太熟悉“态度不好”这顶帽子。这不是随手贴上的性格标签，而是你在多个具体场景里反复使用的保护方式；它曾经帮过你，现在也可能正在限制你。", "evidence": "前5题里你多次选择了客气、变乖、怕语气出错的选项，说明你最紧张的是被评价，而不是电话本身。Q1里，声音自动调高半个调，变亮变紧——像被一根看不见的线提起来……；Q2里，\"又有什么事——\"你的第一反应是防御，因为之前的经验告诉……；Q3里，因为你知道——你越客气，对方越不好发作。你的客气不是讨好……。这些选择指向的是同一套心理动作，而不是某一道题碰巧选中了。", "modules": [{"title": "你的紧张来源", "body": "你害怕对方不是来沟通，而是来给你打分。于是你先把自己调成安全模式。例如领导只问一句‘方便说话吗’，你已经开始回放今天可能做错的每个细节；这种预演会让普通来电也带上审讯感。"}, {"title": "最容易被拿捏的场景", "body": "一句“你方便吗”就能让你把不方便吞回去。你怕拒绝以后，自己在别人眼里变得难相处。例如领导只问一句‘方便说话吗’，你已经开始回放今天可能做错的每个细节；这种预演会让普通来电也带上审讯感。"}, {"title": "误判点", "body": "你会把好沟通理解成好说话。可真正的专业，不等于随时把自己的边界让出去。例如领导只问一句‘方便说话吗’，你已经开始回放今天可能做错的每个细节；这种预演会让普通来电也带上审讯感。"}, {"title": "行动建议", "body": "接电话前先准备一句缓冲：我先看一下，十分钟后回复你。它能替你争回判断时间。例如领导只问一句‘方便说话吗’，你已经开始回放今天可能做错的每个细节；这种预演会让普通来电也带上审讯感。"}, {"title": "完整报告继续给你的东西", "body": "会拆出你在哪类人面前最容易变乖，以及怎么把客气和服从分开。例如领导只问一句‘方便说话吗’，你已经开始回放今天可能做错的每个细节；这种预演会让普通来电也带上审讯感。"}], "quote": "你的声音不需要一直好听，它也可以有边界。", "advice": ["【7天观察】记录一次你明明不方便却说方便的电话。", "【7天观察】练习用“我确认后回复”替代立刻答应。", "【30天练习】给三类电话设置固定回应句。", "【30天练习】每周练习一次温和但清楚的拒绝。"], "reminder": "你不是态度不好，你只是终于不把自己放在最后。"}, "B": {"name": "责任预警型", "subtitle": "你怕的不是电话，是一句话之后任务突然变成你的", "score": 87, "core": "你接电话前先紧起来，是因为太熟悉‘顺便问一下’后面会发生什么：问题不是你造成的，收尾却落到你身上。你不是抗拒协作，而是已经厌倦别人用一通电话跳过责任边界。", "evidence": "你更容易在午休来电、临时追问和需要立刻给答案的场景里绷紧。你在意的不是语气，而是通话结束后自己的任务清单会不会莫名多一项。Q1里，声音不变，但呼吸先变——先深吸一口气再接通，那口气不是在……；Q2里，\"能不能发消息说——\"你不是不想接，是不想被拖进一场不知……；Q3里，因为你觉得——\"这是我的工作，抱怨也没用\"。你的客气是接……。这些选择指向的是同一套心理动作，而不是某一道题碰巧选中了。", "modules": [{"title": "一听见‘帮我看一下’就紧的原因", "body": "你听到的不是一句请求，而是一段熟悉的后续：先帮看、再帮改、最后帮收尾。真实场景里，对方可能只说两分钟，你却要用半天承担结果。"}, {"title": "你声音里藏着的问责预演", "body": "你会边听边想：哪里会被追责、这句话会不会被当成承诺、我现在答应是不是就甩不掉了。别人以为你谨慎，你其实是在提前给未来的自己排雷。"}, {"title": "最容易误判自己的地方", "body": "你会责怪自己为什么接个电话都这么防备。问题不在敏感，而在过去很多口头请求没有被清楚记录，最后只能由最负责的人兜底。"}, {"title": "通话结束前必须确认的三件事", "body": "先复述：谁负责、什么时候交、你只做到哪一步。不要用‘我来看看’结束通话，改成‘我今天只确认信息，执行部分仍由你负责’。"}, {"title": "把责任还回去的电话边界", "body": "当对方用焦虑催你接手时，先慢下来问：你希望我提供判断，还是由我执行？这句话会把模糊的帮忙重新拆成可选择的责任。"}], "quote": "你不是怕接电话，你是怕挂断以后，别人的事又变成了你的。", "advice": ["【7天观察】记录三次让你挂断后多出任务的电话，写清责任最初属于谁。", "【7天观察】每次结束前复述一次分工，不用客气地模糊过去。", "【30天练习】把‘我来弄’改成‘我可以提供哪一部分’。", "【30天练习】对一次临时甩锅明确说：这部分需要由原负责人完成。"], "reminder": "愿意帮忙是能力，替所有人收尾不是义务。"}, "C": {"name": "情绪接管型", "subtitle": "对方一着急，你的声音就先替他承担后果", "score": 84, "core": "你最容易被带走的不是工作量，而是电话那头的焦虑。对方语速一快、语气一重，你就自动变得更客气、更快答应，像必须立刻把他的不安处理掉。", "evidence": "你更容易在客户催促、对方带情绪和‘现在就要答案’的场景里改变声音。你藏住了自己的不舒服，只留下一个不会让局面继续升级的版本。Q1里，声音反而变慢变稳——\"喂，您说。\"你故意放慢语速，因为你……；Q2里，\"是不是出事了——\"你第一反应是担心，因为正常情况不会午……；Q3里，因为你怕——\"万一他投诉我怎么办\"。你的客气是在防后果……。这些选择指向的是同一套心理动作，而不是某一道题碰巧选中了。", "modules": [{"title": "你的声音为什么先去安抚别人", "body": "你很会听出情绪，也知道什么语气能让对方降温。但久而久之，你把‘让他别生气’放在了‘事情到底归谁’之前。"}, {"title": "真实场景：对方好了，你却缓不过来", "body": "通话中你一直说好的、理解、马上处理。挂断后对方轻松了，你却要花很久从那股紧张里出来，这就是情绪被接管后的延迟消耗。"}, {"title": "最容易误判自己的地方", "body": "你以为这是职业素养，其实职业素养不等于替对方消化全部焦虑。你可以理解他的着急，同时不接受被他的语速决定节奏。"}, {"title": "先说事实，再接情绪", "body": "把‘您别急，我马上处理’改成‘我听到你很着急；目前能确认的是……’。先把事实立住，情绪才不会直接变成你的任务。"}, {"title": "让声音回到自己的身体里", "body": "接起前先把呼吸放慢，第一句话刻意比对方慢半拍。你不需要用更快的语速证明负责，稳定本身就是一种边界。"}], "quote": "你可以听见别人的着急，但不必让它住进你的声音里。", "advice": ["【7天观察】记录哪类语气最容易让你马上说‘好的’。", "【7天观察】通话后给自己的紧张程度打分，分清事情压力和对方情绪。", "【30天练习】每次先复述事实，再回应情绪。", "【30天练习】练习三次慢半拍回答，不被对方语速带走。"], "reminder": "稳定不是冷漠，是让沟通重新回到事情本身。"}, "D": {"name": "节奏守门型", "subtitle": "你不是怕电话，你是不想自己的时间被突然征用", "score": 82, "core": "电话最让你不舒服的地方，是它要求你立刻离开正在做的事。你需要那几秒切换，不是故意晾着谁，而是在保护自己的注意力和生活节奏。这不是随手贴上的性格标签，而是你在多个具体场景里反复使用的保护方式；它曾经帮过你，现在也可能正在限制你。", "evidence": "你会让铃声先响两秒、希望陌生号码先发消息、下班来电时明显烦躁。你的紧张更接近被打断后的防御，而不是对某个具体人物的害怕。Q1里，先看一眼屏幕，让铃声响两秒——不是不接，是需要那两秒从\"……；Q2里，\"假装没看到吧——\"你在心里已经挂断了，但手指还是按了接……；Q3里，因为你习惯——\"从小就被教要对别人客气\"。你的客气是肌肉……。这些选择指向的是同一套心理动作，而不是某一道题碰巧选中了。", "modules": [{"title": "电话为什么像突然闯进来的门", "body": "消息可以晚点回，电话却把‘现在’直接变成对方的时间。你烦的不是内容，而是自己没有选择什么时候进入这段对话。"}, {"title": "真实场景：铃声响了，身体先抗拒", "body": "你看着屏幕，明明知道会接，还是想多等两秒。那两秒是在把私人状态收起来，换上一个能应对别人的自己。"}, {"title": "最容易误判自己的地方", "body": "你会以为自己冷、难联系、不够配合。其实你只是更依赖完整的注意力，一次突兀打断会比别人想象中更难恢复。"}, {"title": "把即时来电改成可协商的沟通", "body": "可以直接说：如果不是紧急情况，请先发一句来意，我看到后回复可通话时间。给电话加一道门，不等于把人拒之门外。"}, {"title": "建立下班后的来电规则", "body": "给工作来电划清紧急、可等待和非工作三类。真正紧急的接，其他统一在固定时间处理，避免每一声铃响都重新开启工作。"}], "quote": "你要守住的不是安静，是自己的时间仍由自己决定。", "advice": ["【7天观察】记录一周内每次被电话打断后恢复专注用了多久。", "【7天观察】给常联系的人说明一次你更舒服的联系方法。", "【30天练习】设置一个固定回拨时段，减少随时待命。", "【30天练习】为下班来电建立紧急判断标准并坚持执行。"], "reminder": "可联系不等于随时可被占用，你有权决定什么时候打开这扇门。"}}}</script><script>
const data=JSON.parse(document.getElementById('data').textContent);let idx=0,answers=[];

function gate(){bar.style.width='41.7%';document.getElementById('q').textContent='前5题只是倾向，后7题继续追问原因、误判点和真实需要';opts.innerHTML='<div class="gate"><div class="section-title">继续完成12题</div><div class="body">后7题不会重复前面的问法，会从不同生活场景继续拆解。</div><br><button onclick="renderQ()">继续</button></div>'}
function result(){quiz.classList.add('hidden');const c={A:0,B:0,C:0,D:0};answers.forEach(x=>c[x]++);const key=Object.entries(c).sort((a,b)=>b[1]-a[1]||'ABCD'.indexOf(a[0])-'ABCD'.indexOf(b[0]))[0][0],r=data.results[key];const ev=answers.slice(0,5).map((a,i)=>'<div class="evidence-item"><b>Q'+(i+1)+' · 你选了 '+a+'</b><br>'+data.questions[i].options[a]+'</div>').join('');resultEl=document.getElementById('result');resultEl.classList.remove('hidden');resultEl.innerHTML='<div class="result-head"><span class="badge">'+data.product+'</span><div class="rtype">'+r.name+'</div><div class="score">'+r.score+'</div><div class="subtitle">'+r.subtitle+'</div></div><div class="card"><div class="section-title">核心结论</div><div class="body">'+r.core+'</div></div><div class="card"><div class="section-title">答案证据</div>'+ev+'<div class="body">'+r.evidence+'</div></div>'+r.modules.map(m=>'<div class="card"><div class="section-title">'+m.title+'</div><div class="body">'+m.body+'</div></div>').join('')+'<div class="card"><div class="section-title">可截图金句</div><div class="quote">“'+r.quote+'”</div></div><div class="card"><div class="section-title">未来30天建议</div>'+r.advice.map(x=>'<div class="advice">'+x+'</div>').join('')+'</div><div class="card"><div class="section-title">关键提醒</div><div class="body">'+r.reminder+'</div></div><div class="disclaimer">本测试仅作自我探索参考，不构成心理诊断、医疗、财务建议或效果承诺。</div>';scrollTo(0,0)}
