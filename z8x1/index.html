<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>审美心理测试</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"PingFang SC","Microsoft YaHei",sans-serif;background:#0f0f1a;color:#e8e0d0;min-height:100vh;display:flex;justify-content:center}
.app{width:100%;max-width:500px;min-height:100vh;position:relative;overflow:hidden}
.screen{display:none;flex-direction:column;min-height:100vh;padding:28px 22px 40px}
.screen.active{display:flex}

.cover{justify-content:center;align-items:center;text-align:center;gap:20px}
.cover .icon{font-size:52px}
.cover h1{font-size:29px;font-weight:900;line-height:1.4;letter-spacing:1.5px;padding:0 6px}
.cover h1 .hl{color:#c9a96e}
.cover .sub{font-size:15px;color:#8a8070;line-height:1.7;max-width:300px}
.cover .btn-start{margin-top:10px;padding:15px 50px;font-size:18px;font-weight:700;background:linear-gradient(135deg,#c9a96e,#a6844d);color:#0f0f1a;border:none;border-radius:40px;cursor:pointer;letter-spacing:2px}
.cover .btn-start:active{transform:scale(.96)}
.cover .trust{font-size:12px;color:#4a4538;margin-top:6px}

.progress-wrap{padding:4px 0 14px}
.progress-bar{height:3px;background:#1e1e2e;border-radius:2px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,#c9a96e,#d4b87a);border-radius:2px;transition:width .3s}
.progress-label{font-size:13px;color:#5a5548;margin-top:6px;text-align:right}

.q-area{flex:1;display:flex;flex-direction:column;gap:16px}
.q-area .q-num{font-size:13px;color:#6a6558;letter-spacing:2px}
.q-area .q-text{font-size:23px;font-weight:700;line-height:1.5}
.options{display:flex;flex-direction:column;gap:10px}
.opt{padding:18px 16px;border-radius:14px;background:#16162a;border:1.5px solid #252540;cursor:pointer;transition:all .2s;display:flex;align-items:flex-start;gap:13px}
.opt:active{transform:scale(.98);border-color:#c9a96e;background:#1e1e34}
.opt .letter{width:33px;height:33px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;flex-shrink:0;background:rgba(201,169,110,.12);color:#c9a96e}
.opt .txt{font-size:15px;line-height:1.55;color:#c8c0b0;flex:1}

.gate-screen{justify-content:center;align-items:center;text-align:center;gap:24px}
.gate-screen .lock-icon{font-size:48px}
.gate-screen h2{font-size:26px;font-weight:800;line-height:1.4}
.gate-screen .gate-desc{font-size:15px;color:#a09880;line-height:1.7;max-width:300px}
.gate-screen .unlock-list{text-align:left;background:#16162a;border-radius:16px;padding:20px 24px;width:100%;max-width:320px}
.gate-screen .unlock-list li{font-size:14px;color:#b8b0a0;line-height:2;list-style:none}
.gate-screen .unlock-list li::before{content:"✓ ";color:#c9a96e;font-weight:700}
.gate-screen .btn-gate{margin-top:8px;padding:14px 44px;font-size:18px;font-weight:700;background:linear-gradient(135deg,#c9a96e,#a6844d);color:#0f0f1a;border:none;border-radius:40px;cursor:pointer;letter-spacing:2px}
.gate-screen .btn-gate:active{transform:scale(.96)}
.gate-screen .price{font-size:14px;color:#6a6558;margin-top:4px}

.loading{justify-content:center;align-items:center;text-align:center;gap:24px}
.loading .spinner{width:52px;height:52px;border:3px solid #1e1e2e;border-top-color:#c9a96e;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading .msg{font-size:16px;color:#a09880;letter-spacing:1px}

.result{padding:28px 22px 48px}
.result .badge{display:inline-block;padding:7px 16px;border:1px solid rgba(201,169,110,.25);border-radius:16px;font-size:13px;color:#c9a96e;letter-spacing:2px;margin-bottom:14px}
.result .type-name{font-size:36px;font-weight:900;margin-bottom:6px;line-height:1.2}
.result .type-sub{font-size:18px;color:#d4b87a;margin-bottom:20px;line-height:1.4}

.evidence-box{background:#16162a;border-radius:16px;padding:20px;margin-bottom:22px;border-left:3px solid #c9a96e}
.evidence-box h3{font-size:14px;color:#c9a96e;letter-spacing:2px;margin-bottom:10px}
.evidence-box p{font-size:14px;color:#b8b0a0;line-height:1.7}

.module{margin-bottom:20px}
.module h3{font-size:16px;color:#a09880;letter-spacing:1.5px;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid #1e1e2e}
.module p{font-size:14px;color:#b8b0a0;line-height:1.75;margin-bottom:6px}

.summary-box{background:linear-gradient(135deg,#1a1a2e,#1f1f34);border-radius:16px;padding:24px;margin:24px 0;text-align:center;border:1px solid rgba(201,169,110,.15)}
.summary-box .q-mark{font-size:28px;color:#c9a96e;margin-bottom:8px}
.summary-box p{font-size:17px;color:#d4b87a;line-height:1.7;letter-spacing:.5px}

.advice-box{margin-bottom:24px}
.advice-box h3{font-size:16px;color:#a09880;letter-spacing:2px;margin-bottom:12px}
.advice-box .advice-item{padding:12px 14px;margin-bottom:8px;background:#16162a;border-radius:12px;font-size:14px;color:#b8b0a0;line-height:1.6;display:flex;gap:10px}
.advice-box .advice-item .n{color:#c9a96e;font-weight:700;flex-shrink:0}

.reminder-box{background:#16162a;border-radius:16px;padding:20px;margin-bottom:28px;border:1px solid #2a2a40}
.reminder-box h3{font-size:15px;color:#c9a96e;letter-spacing:2px;margin-bottom:8px}
.reminder-box p{font-size:14px;color:#a09880;line-height:1.7}

.footer{text-align:center;padding:16px;font-size:11px;color:#3a3a48;border-top:1px solid #16162a;margin-top:auto}
</style>
</head>
<body>
<div class="app" id="app"></div>
<script>
// ========== 内容数据 ==========
const DATA = {
  title:"你的审美层次，<br>暴露了你和好看之间<br><span class='hl'>真正的距离</span>",
  subtitle:"不是测你的品味好不好——<br>是测你离「把自己觉得好看的东西变成现实」还有多远",

  questions:[
    {scene:"看到一张你觉得「好好看」的照片或设计，你的第一反应通常是什么？",A:"说不上来为什么，但一眼就知道——好看就是好看，不需要理由。你的直觉比别人快三秒",B:"脑子里自动浮现出类似的参考：这个配色像某某电影，这个排版像某某杂志——你的审美有一个「对比库」",C:"先感受——它让你觉得舒服/兴奋/安静？情绪比分析先到，而且你觉得这没什么不对",D:"先看细节：构图怎么切的、颜色怎么配的、留白够不够——你的眼睛会自动进入「拆解模式」"},
    {scene:"别人问你「你觉得这个好看在哪」，你通常怎么回答？",A:"「就是一种感觉吧……你看这个比例，就很对啊」——说到一半发现很难讲清楚，但你知道自己没错",B:"「你看这个配色是不是有点像某某的早期作品？而且材质选得很聪明」——你脑子里有参考库，信手拈来",C:"「它让我觉得很安心/很有力量/很想靠近」——你描述的是感受，不是特征。你觉得感受本身就是最好的解释",D:"「这个颜色的灰度处理得很好，材质的对比也恰好在视觉重心上」——你能拆开讲，而且讲得很清楚"},
    {scene:"朋友觉得一样东西美极了，你却完全get不到，你的反应是？",A:"在心里尊重TA的审美，但自己的判断不会动摇——各花入各眼，不需要谁说服谁",B:"好奇TA看到了什么——会追问、会观察、会试着从TA的角度再看一遍。你觉得这是学习的机会",C:"先怀疑自己：是不是我的审美有问题？过一会儿又觉得：不对，我就是不喜欢——感受没有对错",D:"能理解TA喜欢的点，但不代表自己也要认同——两个判断可以同时成立，这不矛盾"},
    {scene:"逛家居店/买衣服/挑手机壳——做审美选择时，你最接近哪种状态？",A:"第一眼喜欢的拿了就走——犹豫超过三秒的东西，买回去也不会真的喜欢。你的直觉值得信任",B:"先逛逛不急着买——回来做功课、看搭配、搜灵感图，确认是自己的风格再下手。你享受这个「养成」的过程",C:"看当天心情——同一件东西，心情好的时候觉得惊艳，心情差的时候觉得一般。审美和情绪是一体的",D:"拿起来反复看——面料、走线、接口、重量——每一个细节都对才考虑买。你不急，好东西经得起细看"},
    {scene:"别人觉得「丑」的东西，你却觉得有意思——这种情况多吗？",A:"不多。丑就是丑，但你觉得丑不妨碍你尊重喜欢它的人——审美没有标准答案",B:"经常。你会试着理解——也许不是它丑，是你还没看到它的好。你的审美一直在扩容",C:"偶尔。丑不丑不重要——它让你有感觉、有联想，那就值得多看几眼。情绪价值大于形式价值",D:"整体可能确实不好看，但总有某几个细节让你眼前一亮——一个扣子、一道弧线。你能在废墟里找到宝石"},
    {scene:"你自己动手做过什么跟审美有关的事吗？（布置房间、搭配衣服、拍照修图都算）",A:"做过，但做出来的效果和脑子里想的永远有差距——你知道什么是好的，但手跟不上脑子。这个落差让你有点沮丧",B:"做过不少——每次做完都会复盘：这次比上次好在哪，下次还可以参考谁的做法。你把审美当成一门能学会的手艺",C:"偶尔做，做完之后会反复看很久——它让你觉得「这个是我创造的」，成就感不在于好不好看，在于「这是我的」",D:"经常做——做完会把每个部分拆开看：这个角落对了，那个颜色差点意思。你在细节里找突破，乐此不疲"},
    {scene:"你的手机相册或社交收藏夹里，最多的内容是什么？",A:"大量美图——风景、设计、穿搭、氛围感——收藏的时候很激动，但很少回头翻。你享受的是「遇见美」那一刻的兴奋",B:"分好类的参考素材——按颜色、风格、用途整理过，需要的时候能快速找到。你的收藏夹是一个私人灵感库",C:"让你有情绪共鸣的东西——一张模糊的照片可能比一张高清大片更让你想保存。打动你的不是画质，是画面里的故事",D:"细节图——材质特写、结构拆解、对比图——你收藏的是「为什么好看」，不只是「好看」。你在建立一个视觉逻辑库"},
    {scene:"别人对你的空间（房间/工位/朋友圈）做过最多的评价是？",A:"「你挺有品味的」——但他们也说不出具体好在哪，就是一种感觉。你的审美有一种「说不清的准确」",B:"「一看就是你的风格」——你的空间有一种稳定的、可被识别的调性。别人不用看名字就知道这是你的",C:"「每次来你这里都觉得很舒服」——他们感受到的是氛围，不是技巧。你营造的不是「好看」，是「想待着不走」",D:"「你连这个都注意到了？」——你花心思的地方往往是别人忽略的地方。你的讲究藏在细节里，等有心人发现"},
    {scene:"你看到一个人的穿搭或空间明显「不太好看」，你的第一反应是？",A:"在心里默默替TA重新搭配了一遍——但不会说出来，审美是很私人的事。你的直觉很快，但你的表达很温柔",B:"「TA可能缺一个参考——如果有人给TA看几个更好的选择，TA会选的。」你相信品味是可以传递的",C:"「也许TA就是喜欢这样呢？我眼中的「不好看」可能是TA眼里的自在。」你先给理解，再给判断",D:"「问题出在三个地方：颜色太杂、比例不对、材质不搭——改一个就会好很多。」你已经在脑子里帮TA改好了"},
    {scene:"你的审美品味在哪个阶段发生过最明显的变化？",A:"突然开窍——某天看到一样东西，心里「叮」了一下：原来我喜欢的是这个方向。那种豁然开朗的感觉你到现在还记得",B:"大量输入之后——看多了、逛多了、比较多了，品味就慢慢长出来了。你的审美是「喂」出来的，不是「想」出来的",C:"人生状态变了之后——换了一座城市、结束了一段关系、开始了一份新工作——审美跟着生活一起变了。美是你生活状态的倒影",D:"学会某个关键原则之后——比如「少即是多」或「比例决定一切」——从此眼光就不一样了。一个原则打通了你之前所有困惑"},
    {scene:"你觉得自己和「好看」之间，真正的距离是什么？",A:"我能认出来什么是好的，但我做不出来、说不出来、也未必买得起——审美和执行力之间有一道你一直在想办法跨越的沟",B:"我积累了很多参考和知识，但有时候不确定：这是「我的审美」还是「我被教会的审美」？你怕自己的品味只是别人的影子",C:"我的审美随情绪波动太大——今天觉得好看的东西明天可能就没感觉了。你怕自己的审美太「善变」，不够可靠",D:"我能把每个细节都调对，但所有细节加起来，有时候不是「一个整体」——少了那口「气」。「对」和「美」之间还有一步之遥"},
    {scene:"如果「美」可以替你向世界说一句话，你最想让它说什么？",A:"「我相信我的直觉——它比任何解释都更接近真相。」",B:"「我的品味不是天生的——是我一点一点认真养出来的。」",C:"「美不是标准答案——是此刻我感受到的真实。」",D:"「魔鬼在细节里——但天使也是。」"}
  ],

  types:{
    A:{name:"你的直觉，比你想象的更准",tag:"你的审美是一把快刀——不用思考，一刀下去就是对的。你缺的不是品味，是把它说清楚的语言",icon:"🎯",
       score:"直觉审美力 88%",
       conclusion:"你的审美系统有一个非常珍贵的内核：快。快到不需要分析、不需要对比、不需要参考——你的眼睛碰到美的东西那一瞬间，身体就已经给了你答案。这种直觉不是凭空来的——是你看过很多、感受过很多之后，大脑帮你做完了所有计算，只留给你一个简洁的结论。你不需要解释自己为什么觉得好看——你觉得好看，这本身就是一个足够好的答案。你和「好看」之间真正的距离，不在于品味的高低，而在于：你能不能在不需要解释的情况下，依然信任自己的选择。",
       evidence_note:"你在前5题里展现了一个清晰的模式：第一眼判断最快最准（Q1），解释时有点「词不达意」但不影响你的确信（Q2），别人的审美很难动摇你（Q3），你靠第一感觉做选择且很少后悔（Q4），你对「丑」有明确的边界但不攻击别人的选择（Q5）。这些选择指向同一个特质：你的审美像一种本能——快速、精准、自带信心。你不需要学会「为什么好看」——你的直觉已经替你做完了这道题。",
       quote:"你不需要解释为什么觉得好看。你的直觉是你和世界之间最短的审美路径——它比语言更诚实，比分析更接近真相。",
       modules:[
         {title:"你的审美人格：直觉型品味者",content:"你的审美系统像一台高速运转的「感觉处理器」——输入一张图、一件衣服、一个空间，输出一个清晰的感觉：「好」或「不好」。中间的计算过程你看不到，但你不需要看到。这种能力来自你长期沉浸在美的环境里积累的「隐性知识」——你看过的每一张好照片、住过的每一个舒服的空间、穿过的每一件让你觉得「对了」的衣服，都在悄无声息地训练你的直觉。你不是不会分析——你是跳过了分析，直接抵达了答案。"},
         {title:"你的审美优势：快、准、不内耗",content:"大多数人要在「这个好不好看」上纠结很久——问朋友、查参考、反复对比。你不需要。你的审美判断几乎是即时的，而且回头看，你的第一感觉绝大多数时候是对的。这个优势在生活中的表现是：你选东西很快、搭配很少翻车、别人犹豫的时候你已经做出了选择。你不把时间花在「犹豫好不好看」上——你把时间花在了更重要的事情上。这是一种被低估的审美效率。"},
         {title:"你和「好看」之间真正的距离：表达能力",content:"你的品味在你脑子里是清晰的、强烈的、有方向的——但它出不来。当别人问你「为什么觉得这个好看」的时候，你常常卡在一半：「就是……一种感觉吧。」这种感觉不是你的弱点——它是你审美系统的运作方式。真正的问题在于：当你想把你的品味变成作品（布置空间、搭配衣服、甚至给别人建议）的时候，缺少「翻译」这一步。你的审美用的是直觉的语言，而世界用的是分析的语言——中间的翻译器，是你接下来可以慢慢搭建的。"},
         {title:"你的审美优势怎么变成日常超能力",content:"不要试图把自己的直觉「纠正」成分析型——那是在浪费你的天赋。相反，你可以做一件事：每次觉得什么东西好看的时候，逼自己多说一句——「因为它让我想起了……」「因为它的……让我觉得很……」哪怕只说一个词。慢慢地，你的直觉和分析之间的通道会被打通。不是让你变成「会分析的人」——是让你的直觉多了一个「被翻译」的可能。当你能说出哪怕一点点「为什么」，你的品味就不再只是你自己的秘密——它会变成别人也能感受到的力量。"},
         {title:"如何让你的品味成为别人记住你的理由",content:"直觉型品味者最迷人的地方在于：你选出来的东西有一种「说不清但就是高级」的质感。这是你最大的辨识度——不是「会搭配」，不是「懂品牌」，而是「选的东西就是对了」。你可以把这个特质放大：分享你第一眼看中的东西、推荐你觉得「不用说理由」的好东西、在你自己的空间里大胆地信任你的第一感觉。别人会慢慢发现：你说的不一定有道理——但你选的总是对的。这种信任一旦建立，你的审美就不再只是你自己的事——它会变成你的个人标识。"}
       ],
       advice:["【7天观察】这周每天记录一件你觉得「好看」的东西（可以是路边的一棵树、橱窗里的一件衣服、手机里的一张图），每件后面逼自己写一句「为什么」——不要求完整，一个词也行。七天之后回头看你写下的这些词，你会开始看到自己直觉背后的规律。","【7天观察】下次有人问「你觉得这个好看在哪」，先不急着说「就是一种感觉」。试着说：「它让我想起了……」——用一个具体的联想代替抽象的形容。你会发现这个小小的转换，让你的品味突然变得「可沟通」了。","【30天练习】挑一个你想提升审美的领域（穿搭/家居/摄影/排版），每天花5分钟看一张好图，看完之后用三个词形容它给你的感觉。一个月后你会有30个「感觉词库」——这些词就是你未来的审美语言。","【30天练习】做一件你觉得「好看但不知道为什么好看」的东西的深度拆解：用手机备忘录记录你对它的每一个观察，不管多零碎。一个月后把这些观察整理成一篇不超过500字的「审美笔记」——这是你直觉的「使用说明书」。"],
       reminder:"你不缺品味——你缺的只是把品味翻译出来的那一点点耐心。但即使你永远不翻译，你的直觉依然是你最可靠的审美导航。那些相信你的人，不需要你解释也会跟着你走。"
    },
    B:{name:"你的品味，是你一笔一笔画出来的",tag:"你的审美是一本笔记——每一页都写着「我看过了，我记住了，我现在有了自己的判断」。你缺的不是眼光，是署名权",icon:"📖",
       score:"学习型审美力 85%",
       conclusion:"你的审美不是天上掉下来的——是你自己养出来的。你看过很多、比较过很多、积累了很多，然后把它们内化成了自己的判断系统。这件事本身就值得尊敬：在这个「随便就好」的时代，你花了时间和心力去搞清楚「什么是好的」。你的品味是经过训练的、有来路的、经得起追问的——这比天生的直觉更不容易。你和「好看」之间真正的距离，不在于积累不够，而在于：你有时候分不清哪些是你真正喜欢的，哪些是你「学会应该喜欢」的。",
       evidence_note:"前5题勾勒出一个「学习型」的审美轨迹：你看到东西会自动比对参考（Q1），你回答「为什么好看」时有理有据（Q2），当别人跟你审美不同时你选择「再看一遍」而不是否定（Q3），你买东西前会做功课（Q4），你对「丑」的东西保持开放——愿意再看一眼、再学一次（Q5）。你的审美是一个一直在扩容的系统——不是封闭的、固定的，而是开放的、成长的。",
       quote:"你的品味不是天生的——是你一点一点认真养出来的。这件事本身就比任何天赋都更值得骄傲。",
       modules:[
         {title:"你的审美人格：学习型品味者",content:"你的审美系统像一本一直在更新的笔记本——你看到好的东西会记下来、会归类、会比较、会复盘。你可能关注了很多审美相关的账号、收藏了很多灵感图、买过几本设计或穿搭类的书——你不是在「随便看看」，你是在「有意识地输入」。这种学习习惯让你拥有了一个非常扎实的审美基础：你不是在凭感觉判断好坏——你是凭一个庞大的参考体系在判断。这种「有据可依」的审美，比直觉更稳定、更可复制、也更容易变强。"},
         {title:"你的审美优势：稳定、可迭代、会成长",content:"你的审美不会「今天喜欢明天后悔」——因为你的每一个偏好背后都有理由和参考。你选东西的时候知道自己为什么选、选了之后能用很久、搭配或布置的时候能说出逻辑。这种稳定性让你在需要持续输出审美判断的场合（比如布置一个家、建立一个衣橱体系、做一个品牌视觉）里特别可靠。而且你的审美会持续进步——因为你在持续输入。今天比昨天好一点，下个月比这个月清楚一点——你的品味曲线是一条稳稳上升的线。"},
         {title:"你和「好看」之间真正的距离：署名权",content:"你积累了很多——你可能知道某个配色来自哪个时期的艺术运动、某个版型适合哪种身材、某个风格参考了哪位设计师。但有一个问题偶尔会冒出来：去掉所有这些参考，我的审美还剩下什么？我真正喜欢的，和我「学会应该喜欢」的，它们之间的边界在哪里？这种「署名权」的缺失不是你的错——它是学习型品味者必然要经过的一站。当你积累了足够多的「别人的好」之后，下一步不是继续积累——是从这些积累里提炼出「自己的判断」。"},
         {title:"你的审美优势怎么变成日常超能力",content:"你可以做一件事来把「知识」变成「直觉」：在每次做审美决定之前，先不看任何参考——先自己做一次判断。哪怕这个判断后来被参考推翻了，那个「先做判断」的动作本身就是在训练你自己的审美肌肉。久而久之，你会发现你对参考的依赖在减少——不是因为你不尊重参考了，而是因为你自己的判断体系已经强到可以在没有参考的情况下独立运行。到那一天，参考不再是你的拐杖——它是你的对话者。"},
         {title:"如何让你的品味成为别人记住你的理由",content:"学习型品味者最迷人的地方在于：你的审美有来历、有故事、有逻辑——你可以告诉别人「为什么这个好」，而且说得清楚。这个能力在社交中是非常稀缺的：大多数人只会说「好看」或「不好看」，而你能说出「好看在哪」甚至「这个好看是因为它参考了什么」。把这种「能讲清楚」的能力放大——给你的每一次审美选择写一个短注释、给别人推荐的时候说出你的理由、在自己的空间里留下审美的「线索」。别人会记住你：不是因为你会挑东西——是因为你能让审美这件事变得「可以被理解」。"}
       ],
       advice:["【7天观察】这周做三次「不看参考」的审美练习：挑一件东西（一件衣服、一个杯子、一本书的封面），在查任何资料之前，先写下你自己的判断——好看吗？为什么？然后再去查参考。比较两次判断之间的差异——你可能会发现，你自己的判断比你想象的更独立。","【7天观察】翻你的收藏夹，标记出10条你「真正喜欢」的内容和10条你「觉得应该喜欢」的内容。看着这两组——问自己：它们的区别在哪？这个区别就是你的审美个性的轮廓。","【30天练习】选一个你一直在「学习」的审美领域，这个月停止摄入新的参考——只看你已经收藏过的东西。在旧的素材里重新挑选、重新组合、重新判断。你会发现：不增加新信息的时候，你自己的审美声音会变大。","【30天练习】做一份「我的审美宣言」：用30天时间，每天写一句话描述你喜欢什么、不喜欢什么、为什么。不用参考任何人的意见。月底把30句话连起来——那是你自己的审美纲领，只属于你。"],
       reminder:"你积累的每一条参考、每一次比较、每一个追问——都没有白费。它们是你的审美底子、你的底气和你的实力。你只是在从「知道很多好东西」到「确定自己的标准」这条路上走到了中间——前面不远处，就是那个只属于你的审美坐标。"
    },
    C:{name:"你的感受，就是最好的审美指南针",tag:"你的审美是一片海——有潮汐、有风浪、有晴有雨。每一种心情里的审美，都是真实的、有效的、值得被看见的",icon:"🌊",
       score:"情绪审美力 83%",
       conclusion:"你的审美不是用眼睛看的——是用心感受的。一样东西好不好看，对你来说不取决于它的形式、它的规则、它的「应该」——而取决于它有没有让你产生一种真实的、身体的、情绪的反应。这种审美方式在很多人看来「不够客观」——但它是最接近审美本质的：美从来不是一道数学题，美是一种体验。你的审美和你的情绪深度绑定——这既是你的天赋，也是让你偶尔不安的来源。你和「好看」之间真正的距离，不在于感受力不够——而在于你的感受太丰富、太流动，以至于你有时候抓不住它。",
       evidence_note:"前5题呈现出一个明显的「情绪驱动」模式：你看到东西先问感受而不是分析（Q1），你描述审美时用的是情绪词汇（Q2），别人的审美判断会让你短暂地怀疑自己——但你的感受最终会站住脚（Q3），你的审美选择深受当天情绪影响（Q4），你对「丑」的容忍度取决于它是否打动你——而不是它是否符合标准（Q5）。你的审美活在感受里——它是活的东西，不是死的东西。",
       quote:"美不是标准答案——是你此刻感受到的真实。你的感受会变，那不是你的弱点——那是你的审美在呼吸。",
       modules:[
         {title:"你的审美人格：情绪型品味者",content:"你的审美系统不靠头脑运行——它靠的是身体和情绪。一样东西好看，是因为它让你觉得自己被安抚了、被点燃了、被理解了。你选的不是「客观上最好的」——你选的是「此刻最对的」。这种审美方式让你在人群中有一个特别珍贵的品质：你离「美」的本质更近。因为美最初就不是用来分析的——美是用来感受的。当别人在用脑子审美的时候，你在用心审美——这让你选出的东西有一种难以复制的「温度」和「故事感」。"},
         {title:"你的审美优势：有温度、有故事、能共鸣",content:"你选的每一件东西背后都有一段情绪记忆——「这件T恤是我在某个下雨天买的，那天我心情特别差，穿上它之后好了很多。」这种和物品之间的情感连接，是你的审美最独特的地方。你用感受筛选出来的东西，往往比用标准筛选出来的更能打动别人——因为别人也能感受到你注入其中的情绪。这就是为什么你的空间「让人觉得舒服」、你的穿搭「让人想靠近」、你拍的照片「有故事感」——你选的不是东西，是情绪。"},
         {title:"你和「好看」之间真正的距离：一致性",content:"你的审美太依赖当下的情绪了——今天被感动的东西，明天可能就无感了。这不是审美本身的问题——它意味着你的感受力非常敏锐。但这种流动性也会让你感到不安：我到底喜欢什么？我的审美是不是太善变了？是不是不够「成熟」？答案不是让你的审美变「稳定」——而是接受「流动」本身就是你的审美特质。你的任务不是把自己固定下来——你的任务是在流动中找到属于你的那条河床。"},
         {title:"你的审美优势怎么变成日常超能力",content:"与其和你的情绪审美对抗，不如为它建立一个「记录系统」：每次被一样东西打动的时候，记下来——不只是记这个东西，更记下「它打动我的那个瞬间我的身体感觉到了什么」。是胸口一暖？是肩膀松了一下？是呼吸变慢了？这些身体信号是你审美系统最准确的导航。积累一段时间之后，你会发现在这些看似散乱的「被打动」记录里，有一条非常清晰的线——那就是你的审美核心。你不需要成为任何别人——你只需要更了解那个「被打动」的你自己。"},
         {title:"如何让你的品味成为别人记住你的理由",content:"情绪型品味者最迷人的地方在于：你的选择有一种「人味」。你不追求「高级」或「正确」——你追求「这一刻它让我觉得对了」。这种气质在你的空间、你的穿搭、你呈现给世界的一切里都能被感知到。最难能可贵的是：你让别人觉得「我也可以是这样的」——你的审美不是高高在上的标准，是一个可以被靠近、被感受、被共情的邀请。放大这一点：分享你的选择时多说一句「我选它是因为那天我觉得……」——让别人看到你的审美背后的情绪。他们会记住你的——不是因为你选的东西多高级，是因为你让审美这件事变得「有温度」。"}
       ],
       advice:["【7天观察】这周每天记录一次「被打动」的瞬间：可以是一张图、一首歌、路边一个场景——不用分析，只记录「它让我感觉到了什么」。七天之后把七条记录放在一起看——你会意外地发现：那些看似散乱的感动，其实有一条清晰的情绪线索。","【7天观察】去一次你常去的店（服装店、家居店、书店都行），但这次用完全不一样的心情进去——比如平时是放松地去，这次选一个有点焦虑的时候去。观察：你的审美选择在两种心情下有什么不同？这种不同会告诉你——你的审美不是「善变」，是「有弹性」。","【30天练习】做一个「情绪审美日志」：每天拍一张你觉得好看的画面，配一句话描述你当时的情绪状态（不是描述画面）。30天后翻看——你会发现你的审美有自己的「情绪季候」，不是乱的，是有规律的。","【30天练习】选一样你「心情好的时候觉得好看、心情差的时候觉得一般」的东西，在心情差的时候用一次——观察：是东西真的不好看了，还是你的情绪遮住了你的审美？如果是后者——你比你想象的更稳定。"],
       reminder:"你的审美不是「太情绪化」——它只是比别人多了一个维度。当别人在用「好不好看」做标准的时候，你在用「有没有打动我」做标准——后者才是审美最终要抵达的地方。不要试图让自己的审美变「客观」——你的主观，就是你的天赋。"
    },
    D:{name:"你看到的世界，比别人多一层",tag:"你的审美是一把放大镜——别人扫一眼就过去的地方，你能停十分钟。你缺的不是眼光，是把放大镜偶尔换成广角",icon:"🔍",
       score:"细节审美力 86%",
       conclusion:"你的审美有一项罕见的能力：你能看到别人看不到的东西。一个纽扣的光泽、一条缝线的走向、一块颜色的灰度偏差——这些在别人眼里是「背景」的细节，在你眼里是「主角」。你不是在看整体——你是在读局部。这种「显微镜式」的审美让你在细节上几乎不出错：你会选质感最好的面料、最对的比例、最考究的工艺。你和「好看」之间真正的距离，不在于细节不够好——而在于当所有细节都对的时候，你有时候会发现自己离「整体感」还差最后一步。",
       evidence_note:"前5题展示了一个「细节优先」的审美路径：你的第一反应是看细节而非整体（Q1），你能从结构、材质、比例的角度拆解审美（Q2），当别人跟你审美不同时你能看到双方各自的道理（Q3），你买东西时会把每一个细节检查到位（Q4），你能在整体不好看的东西里发现局部亮点（Q5）。你的眼睛是一台精密仪器——不会漏掉任何东西。",
       quote:"魔鬼在细节里——但天使也是。你能看到别人看不到的，这本身就已经是一种了不起的审美境界。",
       modules:[
         {title:"你的审美人格：细节型品味者",content:"你的审美系统像一台高倍显微镜——别人看一张照片看到的是「氛围」，你看同一张照片看到的是「构图的黄金分割比例、左下角的颜色灰度偏了两度、右下角的材质和其他区域不统一」。这种能力让你在需要「精准审美」的领域里是无可替代的：挑面料、选颜色、做排版、搭配材质——你做这些的时候几乎不出错。你的审美不是「感觉」——是「数据」和「判断」的精密结合。你不追求大感觉，你追求精确。"},
         {title:"你的审美优势：精致、考究、禁得起细看",content:"大多数人做审美选择的时候是在「远看」——站远了看整体感觉。你是在「近看」——凑近了看每一个局部的质量。这意味着你选出来的东西禁得起细看——甚至越细看越好看。这个优势在当下的审美语境里非常珍贵：满世界都是「第一眼好看、第二眼粗糙」的东西，而你选出来的东西是「第一眼挺好、第五眼更好」。你的审美有厚度、有层次、有让人反复回味的余地——这不是所有人都能做到的。"},
         {title:"你和「好看」之间真正的距离：整体感",content:"不是你不会看整体——是你太擅长看局部了，以至于有时候局部太抢镜，让你忘了退后一步。就像一幅画，每一笔都画得很对，但站远了看——画面好像少了一口「气」、一种流动、一个把所有局部串联起来的「魂」。这不是细节的错——细节是你的天赋。你只需要偶尔提醒自己：退后一步，虚掉眼睛，不看任何具体的局部，感受一下那个模糊的整体——它舒服吗？如果舒服，加上你的细节，就是无敌的。"},
         {title:"你的审美优势怎么变成日常超能力",content:"你可以保留你所有的细节敏感——但加一个「收尾检查」：每次做完一个审美决定（搭配好一套衣服、布置好一个角落、修完一张图），先不马上检查细节——先站远了看一眼。问自己：这整件事给我的第一感觉是什么？如果答案不是「舒服」，说明某些细节需要为了整体而调整。这不是要你放弃细节——是要你学会在细节和整体之间做取舍。一个真正厉害的细节型品味者，不是把每个细节做到极致——是知道哪些细节该放大、哪些该收起来。"},
         {title:"如何让你的品味成为别人记住你的理由",content:"细节型品味者最迷人的地方在于：你的讲究是「被发现」的，不是「被展示」的。别人第一次接触你的空间或穿搭时，觉得「挺好看的」；第二次再看——「等等，这个扣子……这个材质……这个颜色……」——他们会开始发现你藏在细节里的用心。这种「后劲」是一种非常高级的审美品质——它不是喧哗的、张扬的，它是沉静的、等待被发现的。把这个特质放大：不要一次性展示所有细节——让它们「藏」在不同的地方，等有心人一个一个地发现。每一次发现，都是别人对你审美的一次重新确认。"}
       ],
       advice:["【7天观察】这周做三次「退后一步」练习：搭配好一套衣服/布置好一个角落之后，站到三米外看五秒钟——只感受整体的第一印象，不看任何细节。把这个第一印象记下来，再走近看细节。比较两组感受——你可能会发现整体感告诉你的事情，细节没说。","【7天观察】找一个你喜欢的空间或穿搭（不是你的），先用「细节模式」分析——它的构图、材质、颜色；再用「虚焦模式」感受——不看任何具体的东西，只问自己：舒服吗？吸引我吗？为什么？这个练习会帮你建立「整体判断」的肌肉记忆。","【30天练习】每次做审美决定时，在最后一步加一个「舍弃练习」：从你已经选好的东西里，强制去掉一件——可能是颜色太跳的、材质太抢的、细节太满的。去掉之后再看整体——有时候少一个细节，整体反而强了。","【30天练习】做一本「细节笔记」：每天只记录一个你注意到的、别人可能忽略的审美细节（路边栏杆的弧度、咖啡杯手柄的比例、一本书的纸张质感）。30天后，把这些细节按「它们共同的特点」分类——你会看到你自己的审美偏好，比你想象的更清晰。"],
       reminder:"你能看到别人看不到的——这已经是你的天赋了。现在你只需要学会一件事：该仔细的时候仔细，该退后的时候退后。细节是你的武器，不是你的牢笼。站远一点看——你会看到另一个版本的「好看」，它一直在那里，只是之前你离得太近了。"
    }
  },

  productModules:[
    "你的审美人格类型",
    "你的审美直觉是怎么运作的",
    "你和「好看」之间真正的距离在哪",
    "你的审美优势怎么变成日常超能力",
    "如何让你的品味成为别人记住你的理由"
  ],

  disclaimer:"本测试仅为自我探索参考，不构成任何诊断、专业建议或效果承诺。审美是个人化的体验，请结合自己的实际感受判断。"
};

// ========== 引擎 ==========
let answers=[],currentQ=0,paid=false;

function $(id){return document.getElementById(id)}
const app = document.getElementById('app');

function cover(){
  app.innerHTML=`
    <div class="screen active cover">
      <div class="icon">🎨</div>
      <h1>${DATA.title}</h1>
      <div class="sub">${DATA.subtitle}</div>
      <button class="btn-start" onclick="start(true)">开始测试</button>
      <div class="trust">前5题免费 · 记下答案左滑查看报告预览</div>
    </div>`;
}

function start(free){answers=[];currentQ=0;paid=!free;renderQ()}

function renderQ(){
  if(currentQ>=DATA.questions.length){showResult();return;}
  if(currentQ===5 && !paid){showGate();return;}
  const q=DATA.questions[currentQ];
  const pct=Math.round((currentQ/DATA.questions.length)*100);
  const letters=['A','B','C','D'];
  app.innerHTML=`
    <div class="screen active">
      <div class="progress-wrap">
        <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
        <div class="progress-label">第 ${currentQ+1}/${DATA.questions.length} 题</div>
      </div>
      <div class="q-area">
        <div class="q-num">${currentQ<5?'免费测试 · 第'+(currentQ+1)+'题':'深度解锁 · 第'+(currentQ+1)+'题'}</div>
        <div class="q-text">${q.scene}</div>
        <div class="options">
          ${letters.map(l=>`<div class="opt" onclick="pick('${l}')"><div class="letter">${l}</div><div class="txt">${q[l]}</div></div>`).join('')}
        </div>
      </div>
      ${currentQ===4?'<div style="text-align:center;font-size:13px;color:#6a6558;padding:8px 0">记下5个答案，左滑查看报告预览 →</div>':''}
    </div>`;
}

function pick(letter){
  answers.push(letter);
  currentQ++;
  renderQ();
  window.scrollTo(0,0);
}

function showGate(){
  app.innerHTML=`
    <div class="screen active gate-screen">
      <div class="lock-icon">🔓</div>
      <h2>前5题只是倾向<br>完整12题才能看清全貌</h2>
      <div class="gate-desc">后7题继续拆解：你的审美直觉来自哪里、你和好看之间真正的距离、你的审美优势如何变成日常超能力</div>
      <ul class="unlock-list">
        ${DATA.productModules.map(m=>`<li>${m}</li>`).join('')}
      </ul>
      <button class="btn-gate" onclick="unlock()">继续完成12题 · 解锁完整报告</button>
      <div class="price">完整12题报告 · 做完自动解锁</div>
    </div>`;
}

function unlock(){paid=true;renderQ()}

function showResult(){
  const counts={A:0,B:0,C:0,D:0};
  for(let i=5;i<answers.length;i++){counts[answers[i]]++}
  const sorted=Object.entries(counts).sort((a,b)=>b[1]-a[1]);
  let typeKey=sorted[0][0];
  if(sorted[0][1]===sorted[1][1]&&sorted[0][0]==='A'&&(sorted[1][0]==='C'||sorted[1][0]==='D'))typeKey=sorted[1][0];
  if(sorted[0][1]===sorted[1][1]&&sorted[0][0]==='B'&&sorted[1][0]==='D')typeKey='D';
  const type=DATA.types[typeKey];

  const freeAnswers=answers.slice(0,5);
  const freeLabels=['第一眼本能反应','解释为什么喜欢','审美分歧时的反应','购物选择逻辑','对「丑」的包容度'];
  const freeDesc=[
    ['你一眼就知道好不好看，不需要理由——直觉快过思考','你先比对脑子里已有的参考——审美有对比库','你先问自己的感受——情绪比分析先到','你先注意到细节——构图、颜色、材质自动进入分析模式'],
    ['你说不太清楚，但就是觉得对——直觉型的「词不达意」','你能说出好几个理由，还能举出参考——学习型的「有理有据」','你说的是「它让我觉得…」而不是「它的特点是…」——情绪驱动型表达','你能从材质、结构、比例逐一分析——细节型的精确表达'],
    ['你坚持自己的判断但懒得争论——直觉型「不内耗」','你想了解对方看到了什么你没看到的——学习型「开放性」','你短暂怀疑自己但最终确认自己的感受——情绪型「回归自我」','你能同时理解两个视角，但保留自己的判断——细节型「兼容并蓄」'],
    ['你靠第一感觉做选择——犹豫的东西最后都不会真的喜欢','你会做功课——看评价、比价格、搜同款——享受「养成」的过程','你的选择取决于当时的心情和联想——情绪是审美选择的背景色','你会仔细检查每一个细节——做工、面料、走线——好东西经得起细看'],
    ['你有明确的边界但尊重别人——丑不妨碍你尊重喜欢它的人','你会试图理解——也许是自己还没看到它的好——审美一直在扩容','丑不丑不重要——它有情绪价值就值得多看几眼','整体不好看但能找到局部亮点——在废墟里找宝石']
  ];

  let evidenceHTML='<h3>📋 答案证据</h3><p>';
  for(let i=0;i<5;i++){
    const a=freeAnswers[i];
    const descIdx=a==='A'?0:a==='B'?1:a==='C'?2:3;
    evidenceHTML+=`<strong>Q${i+1}「${DATA.questions[i].scene.slice(0,18)}…」</strong>你选了${a}——${freeDesc[i][descIdx]}。<br><br>`;
  }
  evidenceHTML+=type.evidence_note+'</p>';

  let modulesHTML='';
  for(const m of type.modules){
    modulesHTML+=`<div class="module"><h3>${m.title}</h3><p>${m.content}</p></div>`;
  }

  let adviceHTML='';
  for(let i=0;i<type.advice.length;i++){
    adviceHTML+=`<div class="advice-item"><span class="n">0${i+1}</span><span>${type.advice[i]}</span></div>`;
  }

  app.innerHTML=`
    <div class="screen active result">
      <div class="badge">你的审美人格</div>
      <div class="type-name">${type.name}</div>
      <div class="type-sub">${type.tag}</div>

      <div style="font-size:15px;color:#d4b87a;margin-bottom:4px">${type.icon} ${type.score}</div>
      <p style="font-size:15px;color:#b8b0a0;line-height:1.75;margin-bottom:20px">${type.conclusion}</p>

      <div class="evidence-box">${evidenceHTML}</div>
      ${modulesHTML}

      <div class="summary-box">
        <div class="q-mark">"</div>
        <p>${type.quote}</p>
      </div>

      <div class="advice-box">
        <h3>📅 行动建议</h3>
        ${adviceHTML}
      </div>

      <div class="reminder-box">
        <h3>⚠️ 关键提醒</h3>
        <p>${type.reminder}</p>
      </div>

      <div style="font-size:13px;color:#6a6558;line-height:1.6;text-align:center;margin-bottom:24px">${DATA.disclaimer}</div>
      <div class="footer">以上结果为自我探索参考 · 每个选择都是了解自己的线索</div>
    </div>`;
  window.scrollTo(0,0);
}

// start
cover();
</script>
</body>
</html>
