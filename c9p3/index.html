<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>省钱心理测试</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"PingFang SC","Microsoft YaHei",sans-serif;background:#0f0f1a;color:#e8e0d0;min-height:100vh;display:flex;justify-content:center}
.app{width:100%;max-width:500px;min-height:100vh;position:relative;overflow:hidden}
.screen{display:none;flex-direction:column;min-height:100vh;padding:28px 22px 40px}
.screen.active{display:flex}

.cover{justify-content:center;align-items:center;text-align:center;gap:20px}
.cover .icon{font-size:52px}
.cover h1{font-size:29px;font-weight:900;line-height:1.4;letter-spacing:1.5px;padding:0 6px}
.cover h1 .hl{color:#c9a96e}
.cover .sub{font-size:15px;color:#8a8070;line-height:1.7;max-width:300px}
.cover .btn-start{margin-top:10px;padding:15px 50px;font-size:18px;font-weight:700;background:linear-gradient(135deg,#c9a96e,#a6844d);color:#0f0f1a;border:none;border-radius:40px;cursor:pointer;letter-spacing:2px}
.cover .btn-start:active{transform:scale(.96)}
.cover .trust{font-size:12px;color:#4a4538;margin-top:6px}

.progress-wrap{padding:4px 0 14px}
.progress-bar{height:3px;background:#1e1e2e;border-radius:2px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,#c9a96e,#d4b87a);border-radius:2px;transition:width .3s}
.progress-label{font-size:13px;color:#5a5548;margin-top:6px;text-align:right}

.q-area{flex:1;display:flex;flex-direction:column;gap:16px}
.q-area .q-num{font-size:13px;color:#6a6558;letter-spacing:2px}
.q-area .q-text{font-size:23px;font-weight:700;line-height:1.5}
.options{display:flex;flex-direction:column;gap:10px}
.opt{padding:18px 16px;border-radius:14px;background:#16162a;border:1.5px solid #252540;cursor:pointer;transition:all .2s;display:flex;align-items:flex-start;gap:13px}
.opt:active{transform:scale(.98);border-color:#c9a96e;background:#1e1e34}
.opt .letter{width:33px;height:33px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;flex-shrink:0;background:rgba(201,169,110,.12);color:#c9a96e}
.opt .txt{font-size:15px;line-height:1.55;color:#c8c0b0;flex:1}

.gate-screen{justify-content:center;align-items:center;text-align:center;gap:24px}
.gate-screen .lock-icon{font-size:48px}
.gate-screen h2{font-size:26px;font-weight:800;line-height:1.4}
.gate-screen .gate-desc{font-size:15px;color:#a09880;line-height:1.7;max-width:300px}
.gate-screen .unlock-list{text-align:left;background:#16162a;border-radius:16px;padding:20px 24px;width:100%;max-width:320px}
.gate-screen .unlock-list li{font-size:14px;color:#b8b0a0;line-height:2;list-style:none}
.gate-screen .unlock-list li::before{content:"✓ ";color:#c9a96e;font-weight:700}
.gate-screen .btn-gate{margin-top:8px;padding:14px 44px;font-size:18px;font-weight:700;background:linear-gradient(135deg,#c9a96e,#a6844d);color:#0f0f1a;border:none;border-radius:40px;cursor:pointer;letter-spacing:2px}
.gate-screen .btn-gate:active{transform:scale(.96)}
.gate-screen .price{font-size:14px;color:#6a6558;margin-top:4px}

.loading{justify-content:center;align-items:center;text-align:center;gap:24px}
.loading .spinner{width:52px;height:52px;border:3px solid #1e1e2e;border-top-color:#c9a96e;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading .msg{font-size:16px;color:#a09880;letter-spacing:1px}

.result{padding:28px 22px 48px}
.result .badge{display:inline-block;padding:7px 16px;border:1px solid rgba(201,169,110,.25);border-radius:16px;font-size:13px;color:#c9a96e;letter-spacing:2px;margin-bottom:14px}
.result .type-name{font-size:36px;font-weight:900;margin-bottom:6px;line-height:1.2}
.result .type-sub{font-size:18px;color:#d4b87a;margin-bottom:20px;line-height:1.4}

.evidence-box{background:#16162a;border-radius:16px;padding:20px;margin-bottom:22px;border-left:3px solid #c9a96e}
.evidence-box h3{font-size:14px;color:#c9a96e;letter-spacing:2px;margin-bottom:10px}
.evidence-box p{font-size:14px;color:#b8b0a0;line-height:1.7}

.module{margin-bottom:20px}
.module h3{font-size:16px;color:#a09880;letter-spacing:1.5px;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid #1e1e2e}
.module p{font-size:14px;color:#b8b0a0;line-height:1.75;margin-bottom:6px}

.summary-box{background:linear-gradient(135deg,#1a1a2e,#1f1f34);border-radius:16px;padding:24px;margin:24px 0;text-align:center;border:1px solid rgba(201,169,110,.15)}
.summary-box .q-mark{font-size:28px;color:#c9a96e;margin-bottom:8px}
.summary-box p{font-size:17px;color:#d4b87a;line-height:1.7;letter-spacing:.5px}

.advice-box{margin-bottom:24px}
.advice-box h3{font-size:16px;color:#a09880;letter-spacing:2px;margin-bottom:12px}
.advice-box .advice-item{padding:12px 14px;margin-bottom:8px;background:#16162a;border-radius:12px;font-size:14px;color:#b8b0a0;line-height:1.6;display:flex;gap:10px}
.advice-box .advice-item .n{color:#c9a96e;font-weight:700;flex-shrink:0}

.reminder-box{background:#16162a;border-radius:16px;padding:20px;margin-bottom:28px;border:1px solid #2a2a40}
.reminder-box h3{font-size:15px;color:#c9a96e;letter-spacing:2px;margin-bottom:8px}
.reminder-box p{font-size:14px;color:#a09880;line-height:1.7}

.footer{text-align:center;padding:16px;font-size:11px;color:#3a3a48;border-top:1px solid #16162a;margin-top:auto}
</style>
</head>

<div class="app" id="app"></div>
<script>
// ========== 内容数据 ==========
const DATA = {
  title:"你的省钱方式，<br>暴露了你小时候<br><span class='hl'>缺什么</span>",
  subtitle:"不是测你省得对不对——<br>是测你的省钱在替童年说什么",

  questions:[
    {scene:"看到打折两个字时，你内心的第一反应是什么？",A:"\"不买就亏了\"——心里开始盘算囤多少才够，打折的东西买了就是赚到，错过等于损失",B:"\"先看看是不是真的需要\"——警惕心瞬间上线，太多打折是陷阱，不想被营销套路牵着走",C:"\"我配吗\"——下意识觉得自己不应该花这个钱，哪怕是打折的，省下来才踏实",D:"\"先算算这个月预算还剩多少\"——不是不心动，是得先确认数字对不对，确认了才敢决定"},

    {scene:"朋友约你去一家很贵的餐厅，你最真实的心理活动是？",A:"\"大家开心就好，钱花了可以再赚\"——但心里已经开始默默算这个月还剩下多少预算",B:"\"能不能换个便宜点的\"——不是付不起一顿饭，是觉得没必要花好几百在一顿饭上",C:"\"去吧，但我不点贵的\"——去了但全程在控制自己的消费，沙拉加白水，吃得不尽兴",D:"\"我看人均多少再决定\"——先算清楚人均才答应，不喜欢模糊的消费预期，数字得先落地"},

    {scene:"别人说你\"抠门\"时，你心里最真实的声音是什么？",A:"\"我不是抠——我给在乎的人花钱从来不眨眼，我只是对自己抠，这怎么能叫抠\"",B:"\"我不是抠——我只是怕花完了就没了，那种空空的感觉不想再经历一次\"",C:"\"我不是抠——我只是觉得自己配不上太好的东西，不是不想花，是不敢花\"",D:"\"我不是抠——我只是想自己掌控自己的钱，不想被别人推着花，每一笔都得是我自己的决定\""},

    {scene:"当你为一笔消费纠结很久时，你真正在纠结的是什么？",A:"\"这钱花在自己身上值不值得\"——给在乎的人花从不犹豫，给自己花却要反复论证",B:"\"万一以后需要这笔钱怎么办\"——不是现在买不起，是怕以后要用的时候账户里没有了",C:"\"我是不是太贪心了\"——觉得自己不应该想要这个东西，有\"想要\"的念头本身就让自己不安",D:"\"这是我自己想买的，还是别人觉得我该买的\"——怕花钱的决定不是自己真正做的选择"},

    {scene:"路过一家很想进去的店，你通常的最终动作是什么？",A:"进去逛了一圈，给朋友买了个礼物——给自己什么都没拿，但心里觉得\"没白来一趟\"",B:"在门口站了一下，打开手机查价格——最后走了，跟自己说\"网上买更便宜，不急这一时\"",C:"进去了，拿起又放下反复好几次——最后空手出来，心里骂自己\"又浪费了时间纠结\"",D:"进去看完价格默默记下，决定\"下个月如果有结余再来\"——然后认真地标记在手机备忘录里"},

    {scene:"小时候关于钱最早的一个画面是什么？",A:"想要一个东西，大人说\"等发了工资再说\"——然后就没有然后了，你的需求被轻轻地放在了最后",B:"家里本来有的东西突然不见了——被拿去还债、被送人了、被卖了，你不知道发生了什么",C:"因为开口要一个东西被大人骂\"不懂事\"——从那以后你再也不敢开口要任何东西",D:"零花钱被严格规定用途——每一分都要报备怎么花的，没有一分钱是你自己说了算的"},

    {scene:"小时候家里花钱时的氛围，最接近下面哪一个？",A:"妈妈总说\"给你买好的\"但自己的东西能将就就将就——你一直记得她那个\"省自己\"的表情",B:"家里的经济状况像天气一样不可预测——好的时候什么都给买，差的时候连正常开销都要砍",C:"\"别的小朋友都有\"这句话从来说不出口——因为会被反问\"你是别的小朋友还是我们家的小朋友\"",D:"每次想买东西都要先经历一轮\"答辩\"——为什么要买、有什么用、能不能不买、有没有更便宜的"},

    {scene:"你现在最容易在哪个品类上对自己\"破例\"花钱？",A:"送别人的礼物——精挑细选、不看价格、包装都要最好看的，对方一笑你就觉得这钱花得值",B:"囤日用品和消耗品——护肤品、纸巾、食品，趁打折囤够一年才安心，不把柜子塞满就不踏实",C:"偶尔也买一件让自己开心的东西——但买完之后会有一种说不清的愧疚感，好像做错了什么事",D:"研究了很久的那件\"大件\"——做足功课、比较过所有参数之后买的那一件，买得心安理得"},

    {scene:"你最舍不得在哪个品类上给自己花钱？",A:"衣服和护肤品——\"够用就行\"\"旧的还能穿\"\"我不用那么好看\"，对自己的外在最省",B:"体验类消费——旅行、演出、自我提升的课程，\"以后再说吧\"这句话已经跟自己说了很多年",C:"任何\"只为自己开心\"的东西——一个人吃顿好的、做个按摩、买束花，总觉得自己不配享受",D:"冲动型消费——任何没有经过反复对比和计算的东西，花出去总觉得不安心、不踏实"},

    {scene:"你存钱真正的动力，最接近下面哪一种？",A:"\"万一我在乎的人需要我帮一把\"——你存的不是钱，是能在关键时刻保护别人的那份底气",B:"\"万一又回到那种什么都没有的日子\"——你存的不是钱，是防止过去的噩梦重演的那道堤坝",C:"\"存够了才有资格对自己好一点\"——但那个\"够了\"的数字好像永远都到不了，一直在涨",D:"\"只有我的钱才是我说了算的\"——存钱是这个世界上唯一完全由你一个人掌控的事情"},

    {scene:"如果有一笔意外之财，你花掉它时最强烈的情绪会是什么？",A:"先想一圈——这笔钱可以给谁买点什么，脑子里过了一圈在乎的人，最后才想到自己",B:"立刻存起来一大半——不是不想花，是存着才有安全感，花掉了心里就空了",C:"花完之后有一种淡淡的\"不配得感\"——好像做了一件不应该做的事，心里有点虚",D:"会花一小部分，但每一笔都记得清清楚楚——\"我得知道我花到哪里去了，一分都不能少\""},

    {scene:"如果穿越回去，对小时候的自己说一句关于钱的话，你会说什么？",A:"\"你可以想要东西——你想要的每一件都配得上，不用等别人先被满足了才轮到你\"",B:"\"别怕，你拥有的东西不会被突然拿走——以后你会有自己的钱，谁也拿不走的那种\"",C:"\"你想要一个东西不是贪心——是你的心在说这个能让我开心，这个理由本来就够了\"",D:"\"你的钱你说了算——花也好、存也好，不需要向任何人解释你的选择，你不需要谁的批准\""}
  ],

  types:{
    A:{name:"缺的不是钱，是\"被重视的感觉\"",tag:"你对别人大方对自己抠——你的省钱里藏着童年那个永远排在最后的小朋友",icon:"💝",
       score:"被重视需求 倾向 83%",
       conclusion:"你的省钱有一个奇怪的规律：给自己花要反复论证，给别人花只需要一个理由。你不是不会花钱——你是把\"被重视\"和\"为别人付出\"偷偷划了等号：小时候你的需求总被放在最后，所以你学会了——先满足别人，才轮到自己。省钱不是你的本能，是你从童年带出来的爱的语言。",
       evidence_note:"你对打折的第一反应是\"买了就是赚到\"，但你存的动力是\"万一在乎的人需要\"（Q10）；你纠结的是\"花在自己身上值不值\"（Q4），进了店也只给别人买了礼物（Q5）。你小时候的记忆里有一个画面：大人说\"等发了工资再说\"，然后就没有然后了（Q6）——你的需求被轻轻地放在了最后。你一直记得妈妈\"省自己\"的表情（Q7）。这些不是巧合——你长大后把\"省\"用在了一个方向：省自己，不省别人。因为你在用\"为别人花\"换取童年缺失的那份\"被看见\"。",
       quote:"那时候你是家里最懂事的那个孩子——好吃的先给别人，新东西先紧着别人。现在你可以告诉心里那个小孩：轮到了。给自己花钱不是浪费——是你对自己说\"你也是我在乎的人之一\"。",
       modules:[
         {title:"你的省钱人格类型",content:"你是\"利他型省钱者\"——你省钱不是为了自己，是为了能在别人需要的时候站出来。你的钱对别人是一条永远不会断的线，对自己却是一扇永远要敲好几次才能开的门。你的衣柜里可能有穿了五年的衣服，但送朋友的礼物包装精美到舍不得拆。这种不对称的省钱模式，根源不在\"不会花钱\"，而在于你从小习得的一个信念：我的需求是可以往后放的，别人的需求才是需要被优先解决的。这不是天生的善良——这是童年教你的生存策略。"},
         {title:"你在哪个品类最省、哪个品类最挥霍——背后的原因",content:"你最省的品类是自己的日常——衣服、护肤品、自己用的东西，\"够用就行\"是你的口头禅（Q9）。你最挥霍的品类是送人的礼物——精挑细选、不看价格、包装必须最好（Q8）。这两个极端背后的原因是一样的：你把自己值不值得花钱的判断标准放在了\"对别人有没有用\"上。给自己买——需要论证\"我配不配\"。给别人买——不需要论证，因为\"让别人开心\"在你的潜意识里等于\"我被需要\"，而\"被需要\"是你小时候唯一确认自己被重视的方式。"},
         {title:"小时候的什么经历在影响你现在的花钱方式",content:"你的童年里有一个画面——大人说\"等发了工资再说\"，然后你的需求就像一颗落进海里的石头，没有回音（Q6）。你还记得妈妈那个\"省自己\"的表情——她总把好的给你，自己将就（Q7）。这些经历教会了你两件事：第一，表达自己的需求是没有用的；第二，爱一个人的方式就是省自己、给别人。于是你长大后，把钱花在别人身上时感到心安理得，花在自己身上时反而觉得不安——因为小时候那个\"被放在最后\"的经验，已经长成了你花钱时的下意识。"},
         {title:"你的省钱是在保护自己，还是在限制自己",content:"你的省钱模式曾经保护了你——在童年那个资源有限的环境里，\"不给自己花\"是一种让家庭运转得更顺畅的策略。但成年后，这个策略开始限制你了：你赚的钱里有相当一部分是为了\"别人万一需要\"而存的，但那个人从来没有来过。你给自己花一百块钱要纠结半天，但给朋友买个三百块的礼物眼都不眨。这不是\"节俭\"——这是把童年\"被重视\"的缺失，变成了成年后\"只配在付出时存在\"的模式。保护变成了囚禁。"},
         {title:"怎么把钱花在真正能\"补到\"自己的地方",content:"第一，建立一个\"我也在场\"账户——每月固定一笔钱只能花在自己身上，金额不用大，但必须花完，不许给任何人。第二，下次给在乎的人花钱之前先问自己：\"我给自己买过等值的东西吗？\"如果没有——先给自己买，再给对方买。第三，试着在给别人花钱时\"少花一点点\"——少花的那一部分，用来给自己做一件同样让自己开心的事。第四，跟自己做一个约定：你在乎的人的名单里，必须有你自己。不是排在最后——是排在前面的。"}
       ],
       advice:["这周给自己花一笔\"不用论证\"的钱——金额不限，唯一的要求是不向任何人解释、不给任何人看，只让自己开心。","整理你最近三个月的消费记录，把你花在别人身上的和花在自己身上的分开。看看那个比例——然后决定下个月你想让它变成什么样。","找一件你想了很久但一直没给自己买的东西——买下来。买完之后对自己说：\"这是给你的——不是因为你做了什么，就是因为你是你。\"","下次有人夸你\"真会照顾人\"的时候，在心里默默加一句：\"我也在学着照顾自己了。\"——这不是自私，这是把那份照顾的名单补全。"],
       reminder:"你的省钱不是抠门——是小时候那个总是被排在最后的你在说：\"我先等等，万一有人比我更需要。\"但现在你已经不是那个只能等的小孩了。你可以决定谁排在前面——而那个名单上，应该有你自己的名字。给自己花的每一分钱，都是在告诉童年那个自己：你没有被遗忘。"
    },

    B:{name:"缺的不是东西，是\"稳定的预期\"",tag:"你囤的不是货——是对\"突然什么都没有了\"的恐惧，你的省钱里藏着一个总在准备过冬的小孩",icon:"📦",
       score:"稳定预期需求 倾向 86%",
       conclusion:"你的省钱有一个鲜明的特征：囤。护肤品囤一柜子、纸巾囤到明年、打折必出手。你不是贪便宜——你是用\"囤够\"来对抗一个藏得很深的恐惧：怕现在有的东西，明天就没了。这个恐惧不是今天才有的——它来自你的童年，来自那些\"本来好好的东西突然不见了\"的时刻。你省钱的方式不是你小气——是你一直在为那个不知道什么时候会来的\"冬天\"做准备。",
       evidence_note:"你对打折的第一反应是\"囤够才安心\"（Q1），你舍不得体验类消费是因为\"以后再说\"说了很多年（Q9），你存钱的动力是\"怕回到什么都没有的日子\"（Q10）。你的童年记忆里有一个画面：家里的东西突然不见了——被拿去还债、被送人、被卖掉了（Q6）。你还记得家里的经济像天气一样不可预测——好时什么都有，差时什么都不许（Q7）。这些经历在你的大脑里刻下了一条规则：东西是会突然消失的——所以趁有的时候多囤一点，趁有存的时候多存一点。你的省钱是在为过去那个\"突然失去\"的小孩建造一座物资充足的城堡。",
       quote:"那年家里东西被搬走的画面你可能记不太清了——但你囤货的那个姿势，你伸手去拿第三个备份时的那只手，你的身体一直记得。现在你的钱是你自己赚的，谁也拿不走。你买回家的每一件东西——都可以安心地用很久很久。",
       modules:[
         {title:"你的省钱人格类型",content:"你是\"囤积型省钱者\"——你省钱的方式不是不花，是\"趁便宜囤到满\"。打折对你来说不是省钱的信号，是\"现在不买以后就没了\"的警报。你的柜子里可能放着用一年也用不完的护肤品、能用到明年的纸巾、三瓶还没开封的洗发水。你存钱也一样——不是有目标地存，是\"存到心里那个数字\"才安心。这种囤积和储蓄冲动，表面上是精打细算，底层是童年时期\"稳定预期\"的缺失——你从来不敢假设明天和今天一样。"},
         {title:"你在哪个品类最省、哪个品类最挥霍——背后的原因",content:"你最舍不得花钱的是体验类消费——旅行、演出、课程（Q9）。因为这些消费的特点是\"花了就没了\"，没有实物留下来，这恰好触发了你最深的恐惧：东西消失。你最能花钱的是囤货——日用品、护肤品、消耗品（Q8）。因为这些看得见摸得着的\"存货\"给了你一种确定感：至少这些东西不会突然没掉。你的省钱逻辑不是\"花最少\"，而是\"花出去的每一分都要换成一个看得见的、不会消失的东西\"。体验虽然美好，但没有\"实物安全感\"——所以\"以后再说\"。"},
         {title:"小时候的什么经历在影响你现在的花钱方式",content:"你的童年里有一个你当时可能理解不了但现在懂了的情景：家里的东西一件件不见了（Q6）。也许是经济困难，也许是大人的决定——总之你体验过\"拥有\"和\"失去\"之间没有过渡期。你童年家里的经济像天气一样不可预测（Q7）——这个月想要什么都有，下个月连基本开销都在砍。在这样忽冷忽热的环境里长大的孩子，会用一生来建立\"确定性\"。你的囤货、你的\"趁便宜多买点\"、你的\"先存起来再说\"——都是你在给自己补那个童年缺席的\"稳定预期\"。你不是在买东西——你是在买\"不会突然消失\"。"},
         {title:"你的省钱是在保护自己，还是在限制自己",content:"囤货和过度储蓄曾经是你在不稳定的环境里活下来的策略——那时候多囤一包纸巾、多存一百块钱，真的能给你多一天的安全感。但现在你已经不在那个环境里了。你已经有了稳定的收入、自己的账户、谁也拿不走的财产。可你的大脑还不知道——它还以为你活在\"随时可能什么都没有\"的世界里。所以你现在不是在用钱生活——你是在用钱防御一个已经不存在的敌人。你的省钱保护了童年的你，但现在它正在限制成年的你去体验那些\"留不下实物但能留下回忆\"的美好。"},
         {title:"怎么把钱花在真正能\"补到\"自己的地方",content:"第一，试着花一笔\"不留东西\"的钱——一场演出、一次短途旅行、一堂课。不是替代囤货，是在囤货之外，允许自己有不留下实物的快乐。第二，给你的囤货设一个上限——比如纸巾最多囤三个月用量，护肤品最多囤两瓶未开封的。超过上限就停手，告诉自己：够用了。第三，每个月存一笔\"体验基金\"，金额和囤货基金一样——这笔钱必须要花掉，而且必须花在\"不留下实物\"的事情上。第四，跟自己的\"囤货安全感\"做一个实验：少囤一次，看看天有没有塌下来。大概率没有——让你安全的是你的能力，不是柜子里的存货。"}
       ],
       advice:["这周花一笔钱在\"不留下实物\"的事情上——看一场电影、听一场live、报一节体验课。提醒自己：花掉的钱不等于消失。","整理你的囤货柜子，把每件东西拿出来看——有多少是你\"怕没了\"才买的，有多少是你真的需要的。后者留着，前者到此为止。","下次遇到打折促销的时候，给自己一个24小时的冷静期。24小时后还觉得需要——再买。你会发现大部分\"必须现在囤\"的冲动都会过去。","每个月试着\"少囤一点，多体验一点\"——把省下来的囤货预算用在一次只有记忆不留实物的消费上。看看哪种让你更踏实。"],
       reminder:"你不是贪便宜——你是在用囤货和存钱来制造一个\"这个世界上至少还有东西不会突然消失\"的确定感。这个策略在你小时候保护了你，现在你已经安全了。你的安全感不再需要靠满柜子的库存来证明——它已经在你掌控生活的能力里了。让那些\"不需要囤也够\"的瞬间，成为你对自己说\"现在不一样了\"的证据。"
    },

    C:{name:"缺的不是物质，是\"被允许拥有\"",tag:"你买一件自己喜欢的东西会愧疚——你的省钱里藏着一个小时候不敢开口要任何东西的小孩",icon:"🌸",
       score:"被允许拥有 倾向 81%",
       conclusion:"你的省钱有一种\"不敢要\"的气质——不是不想要，是觉得自己\"不应该\"要。你偶尔也会给自己买一件东西，但买完之后心里会浮现一层薄薄的愧疚——好像做了一件需要解释的事。这个愧疚感不是来自你的财务状况，而是来自很久以前：当你还是小孩的时候，\"想要\"本身就是一件会被批评的事。你的省钱不是理性的财务决策——是童年那句\"你怎么这么不懂事\"的回声。",
       evidence_note:"你看到打折时心里的第一反应是\"我配吗\"（Q1），你纠结的不是预算而是\"我是不是太贪心了\"（Q4），你进了店拿起又放下最后空手出来（Q5）。你小时候因为开口要东西被骂\"不懂事\"（Q6），\"别的小朋友都有\"这句话你从来说不出口（Q7）。你偶尔买一件让自己开心的东西之后会有愧疚感（Q8），最舍不得的是\"只为自己开心\"的消费（Q9）。这些不是你不会花钱——是童年那句\"不懂事\"像一个封印，盖在了你每一次想对自己好的冲动上。",
       quote:"\"想要\"不是贪心——是你心里那个小孩在说\"这个能让我开心\"。你不必为让自己开心而道歉。小时候那些不敢开口要的东西，现在你可以买给那个小孩了——用你自己的钱，不需要任何人的批准。",
       modules:[
         {title:"你的省钱人格类型",content:"你是\"愧疚型省钱者\"——你省钱的原因不是没钱，是有一个内在的声音一直告诉你：你不应该对自己太好。你给自己买东西之前要经过一个无形的\"道德审查\"：这个东西我真的需要吗？我是不是太浪费了？别人会不会觉得我乱花钱？这个审查从来没有发生在给别人花钱的时候——只对你自己。这个内在声音不是你的，是你小时候内化了的大人的声音。你的省钱里有一个被\"不许要\"管了一辈子的孩子在偷偷想：\"我什么时候才配拥有一件只属于我的、只让我开心的东西。\""},
         {title:"你在哪个品类最省、哪个品类最挥霍——背后的原因",content:"你最舍不得花钱的是\"任何只为自己开心\"的东西（Q9）——一个人吃顿好的、做个按摩、买束花。这些消费的共同点是：纯享受、纯为自己、没有\"实用价值\"。你最能花钱的时刻是偶尔破例给自己买一件东西——但买完之后会有愧疚感（Q8）。你几乎没有\"挥霍\"的品类——因为你连正常给自己花钱都要自责。你的省钱逻辑是：花钱可以，但必须在\"不被别人说闲话\"的安全范围内。你的消费上限不是你的余额——是你的愧疚感。"},
         {title:"小时候的什么经历在影响你现在的花钱方式",content:"你小时候因为开口要一个东西被骂\"不懂事\"（Q6）。可能只是一个普通的玩具、一本想要的书、一件想要的衣服——但大人的反应让你明白了：\"想要\"这个动作本身，在你们家是不被欢迎的。\"别的小朋友都有\"这句话你从来说不出口——因为会被反问\"你是别的小朋友还是我们家的小朋友\"（Q7）。这句话的潜台词是：你不该跟别人比，你不该有和别人一样的期待。于是你学会了——在\"想要\"冒出来之前就把它掐灭。长大后这个习惯变成了：在给自己花钱之前先把自己\"审判\"一遍。"},
         {title:"你的省钱是在保护自己，还是在限制自己",content:"小时候不敢要东西是保护你——在那个环境下，不开口就不会被骂，不期待就不会失望。但现在你已经不需要那层保护了。你的钱是你自己赚的，你花的每一笔都是你自己的决定。可是你还在用一个小孩的策略——\"我不应该要\"——来管理一个成年人的财务。这个策略现在不再保护你，它在限制你：限制你享受自己赚的钱、限制你把\"让自己开心\"列入正当消费、限制你承认——你也值得被自己好好对待。被允许拥有，不是别人给的许可——是你给自己的。"},
         {title:"怎么把钱花在真正能\"补到\"自己的地方",content:"第一，每周为自己安排一笔\"罪恶消费\"——金额可以很小，但必须是纯享受、纯为自己、没有任何实用价值的。练习在花钱时不解释、不道歉。第二，下次愧疚感来的时候，不要赶走它——跟它对话。问它：\"你觉得我花这笔钱哪里不对？\"你可能会发现这个声音其实是你妈妈的、你爸爸的、你某个亲戚的——不是你的。第三，给你自己建立一个\"童年补偿基金\"——买那些小时候想要但不敢开口要的东西。第四，在手机备忘录里记下来：每一次给自己花钱之后你的真实感受是什么。你会发现——天没有塌下来，没有人骂你，而你可能还挺开心的。"}
       ],
       advice:["这周做一件\"只为自己开心\"的事——一个人去喜欢的餐厅点最想吃的、买一束花给自己、去电影院看一部想看的。不做任何\"值不值\"的计算。","列出小时候你想要但没敢开口要的五样东西——然后挑一样现在还想要的，买给自己。对心里那个小孩说：\"现在可以了。\"","下次愧疚感来的时候把它写下来：\"我因为______感到愧疚\"。写完看看——那个理由放在一个成年人身上合理吗？大概率不合理。","给自己设定一个\"快乐预算\"——每月一笔必须花完的、只为自己开心的钱。花不完的话下个月翻倍。这是给你自己的作业——学会享受。"],
       reminder:"你的省钱不是美德——是你小时候为了不被骂\"不懂事\"而学会的一套自我审查。你长大了，你有了自己的收入、自己的账户、自己的生活。没有人会再因为你想要一个东西而批评你——除了你自己脑子里那个来自童年的声音。下次那个声音说\"你不应该要\"的时候，试着回答它：\"我应该。我配。我可以。\"这三个词，是给你童年那无数个不敢开口的瞬间的补偿。"
    },

    D:{name:"缺的不是安全感，是\"选择的权利\"",tag:"你省钱不是抠——是钱让你第一次有了\"我说了算\"的东西，你的省钱里藏着一个从小没得选的小孩",icon:"🗝️",
       score:"选择权利需求 倾向 85%",
       conclusion:"你的省钱有一个说出来不怕人的内核：你需要你的钱完全在你的掌控之内。每一笔支出要记账、每一次消费要先比价、每一次\"冲动\"都要被反复计算。你不是信不过别人——你是太怕失去对钱的掌控权。因为在你的童年里，钱从来不是你的——零花钱的每一分都要报备，想买什么都要经过答辩，没有一分钱是你说了算的。你的省钱是你成年后给自己建立的第一块\"我的东西我做主\"的自留地。",
       evidence_note:"你看打折的第一反应是\"先算预算\"（Q1），去餐厅之前要先看人均（Q2），你纠结的是\"这是我自己想买的还是别人觉得我该买的\"（Q4），你看完价格标记在备忘录里\"下个月有结余再来\"（Q5）。你的童年记忆里零花钱被严格规定用途——每一分都要报备（Q6），每次想买东西都要经历一轮答辩——为什么要买、有什么用、能不能不买（Q7）。你最能花钱的是研究了很久的\"大件\"——做足功课之后买的那件让你心安理得（Q8），你最怕的是冲动型消费——没有经过计算的花钱让你不安（Q9）。所有这些选择指向同一个内核：你需要你的钱是\"你自己的\"——完全属于你的、由你决定的、不需要任何人批准的东西。",
       quote:"小时候每一分零花钱都要报备去向的感觉，像一个印章盖在了你的花钱方式上。现在你赚的每一分钱、你存的每一分钱、你花的每一分钱——都是你自己的决定。不用解释。不用论证。不用等待任何人的批准。你把选择权拿回来了——这比省下多少钱都重要。",
       modules:[
         {title:"你的省钱人格类型",content:"你是\"掌控型省钱者\"——你省钱的方式有一套精密的自制系统：比价、记账、预算、备忘录。你对每一笔消费都有一个\"审查流程\"，不是因为小气，是因为你需要确认：这笔钱是我决定花的，不是被任何人、任何环境推着花的。你的账户余额不只是数字——是你在成年后第一次拥有的\"不需要向任何人解释\"的东西。你的省钱在替你说一句从小说不出口的话：\"这是我的。我说了算。\"这是一种深层的自我赋权——钱是你拿回选择权的工具。"},
         {title:"你在哪个品类最省、哪个品类最挥霍——背后的原因",content:"你最舍得花钱的是\"研究很久的大件\"（Q8）——做足功课、比较过所有参数之后的那一件。你花得心安理得，因为它经过了你的\"审查系统\"，你确认了这个决定完全是你的。你最舍不得花钱的是冲动型消费（Q9）——任何没有经过反复计算的东西，花出去都让你不安。为什么？因为冲动消费让你觉得你在被情绪、被营销、被环境推着走——而这恰好是你童年最讨厌的感觉。你的省钱和花钱之间的那条线，不是\"贵不贵\"——是\"是不是我决定的\"。"},
         {title:"小时候的什么经历在影响你现在的花钱方式",content:"你的童年零花钱被严格规定用途——每一分都要报备（Q6）。想买东西要经历一轮\"答辩\"：为什么要买、有什么用、能不能不买、有没有更便宜的（Q7）。这些经历教会了你一个深刻的教训：钱不是你说了算的，是大人说了算的。你的需求需要一个\"充分的理由\"才能成立——\"我想要\"从来不构成理由。于是你长大后给自己建立了一套反制的系统：既然小时候别人控制我的钱，那我现在要自己控制每一分。你的记账、你的比价、你的预算——都是你在对孩子时期的自己说：现在没有人可以不经你同意动你的钱了。"},
         {title:"你的省钱是在保护自己，还是在限制自己",content:"对钱的掌控曾经是你从被控制中解脱的方式——小时候每一分钱都要看别人脸色，所以成年后你首先确保的是：我的钱必须完全在我手上。这个策略确实保护了你——你不会有失控的消费、不会被别人占便宜、不会因为钱陷入被动。但它也在限制你：你把太多精力花在了\"控制\"上而不是\"享受\"上。你每一次记账、每一次比价、每一次在备忘录里标\"下个月有结余再来\"——本质上都是在重复确认\"这是我的决定\"。但有些时候，你可以不经过审查就花一笔钱，然后发现——它仍然是你的决定。松一点，选择权不会丢。"},
         {title:"怎么把钱花在真正能\"补到\"自己的地方",content:"第一，每个月给自己一笔\"不记账的钱\"——金额固定，花完之后不许记账、不许比价、不许追究去向。这是给你的控制系统放一天假。第二，下一次冲动消费没忍住的时候，试着不要后悔——改成告诉自己：\"这也是我的决定。'买了'和'没买'都是我的权利。\"第三，在你的预算表里加一行\"自由支配\"——金额可以在合理范围但不需要细分。这笔钱的存在本身就是对你童年的纠偏——\"我决定花，不需要理由\"。第四，跟钱的关系从\"控制\"升级到\"管理\"——前者是你怕失控，后者是你有掌控力。两者的区别是：控制需要事事经手，管理允许你有策略地放手。"}
       ],
       advice:["这周花一笔\"不用记账\"的小钱——买一杯奶茶、一本杂志、一个可爱但不实用的东西。花完之后不记录、不计算、不后悔。","在你的记账App里单独建一个\"任性\"分类——每月放一笔进去，花完之后只需要写\"任性\"两个字，不需要其他理由。","下次想买一个东西的时候，试着少做一步功课——少比一个平台、少看一个评测。然后直接买。看看少了那一步功课，天有没有塌下来。","跟你的钱好好谈一次：\"你是我赚的、我管的、我花的。我不是在防你——我是在用你让我的生活更好。\"把这句话写在手机备忘录里。"],
       reminder:"你的省钱不是强迫症——是你小时候\"一分一毫都由不得自己\"的日子教会了你：掌控才是安全感的来源。但现在你已经离开了那个环境。你的钱是你的——不是因为你看得紧它才是你的，是因为你赚了它、你拥有它、你决定它去向。偶尔放一次手，让它自己待一会儿——你不会失去选择权。选择权从来不是看你怎么记账，是看你有没有权利决定\"今天不记账\"。"
    }
  },

  productModules:[
    "你的省钱人格类型",
    "你在哪个品类最省、哪个品类最挥霍——背后的原因",
    "小时候的什么经历在影响你现在的花钱方式",
    "你的省钱是在保护自己，还是在限制自己",
    "怎么把钱花在真正能\"补到\"自己的地方"
  ],

  disclaimer:"本测试仅为自我探索参考，不构成任何财务建议、心理诊断或效果承诺。消费习惯受多种因素影响，请结合自己的实际情况判断。"
};

// ========== 引擎 ==========
let answers=[],currentQ=0,paid=false;

function $(id){return document.getElementById(id)}
const app = document.getElementById('app');

function cover(){
  app.innerHTML=`
    <div class="screen active cover">
      <div class="icon">💰</div>
      <h1>${DATA.title}</h1>
      <div class="sub">${DATA.subtitle}</div>
      <button class="btn-start" onclick="start(true)">开始测试</button>
      <div class="trust">前5题免费 · 记下答案左滑查看报告预览</div>
    </div>`;
}

function start(free){answers=[];currentQ=0;paid=!free;renderQ()}

function renderQ(){
  if(currentQ>=DATA.questions.length){showResult();return;}
  if(currentQ===5 && !paid){showGate();return;}
  const q=DATA.questions[currentQ];
  const pct=Math.round((currentQ/DATA.questions.length)*100);
  const letters=['A','B','C','D'];
  app.innerHTML=`
    <div class="screen active">
      <div class="progress-wrap">
        <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
        <div class="progress-label">第 ${currentQ+1}/${DATA.questions.length} 题</div>
      </div>
      <div class="q-area">
        <div class="q-num">${currentQ<5?'免费测试 · 第'+(currentQ+1)+'题':'深度解锁 · 第'+(currentQ+1)+'题'}</div>
        <div class="q-text">${q.scene}</div>
        <div class="options">
          ${letters.map(l=>`<div class="opt" onclick="pick('${l}')"><div class="letter">${l}</div><div class="txt">${q[l]}</div></div>`).join('')}
        </div>
      </div>
      ${currentQ===4?'<div style="text-align:center;font-size:13px;color:#6a6558;padding:8px 0">记下5个答案，左滑查看报告预览 →</div>':''}
    </div>`;
}

function pick(letter){
  answers.push(letter);
  currentQ++;
  renderQ();
  window.scrollTo(0,0);
}

function showGate(){
  app.innerHTML=`
    <div class="screen active gate-screen">
      <div class="lock-icon">🔓</div>
      <h2>前5题只是倾向<br>完整12题才能看清全貌</h2>
      <div class="gate-desc">后7题继续拆解：你的省钱在替童年说什么、小时候什么经历在影响你、怎么把钱花在真正补自己的地方</div>
      <ul class="unlock-list">
        ${DATA.productModules.map(m=>`<li>${m}</li>`).join('')}
      </ul>
      <button class="btn-gate" onclick="unlock()">继续完成12题 · 解锁完整报告</button>
      <div class="price">完整12题报告 · 做完自动解锁</div>
    </div>`;
}

function unlock(){paid=true;renderQ()}

function showResult(){
  const counts={A:0,B:0,C:0,D:0};
  for(let i=5;i<answers.length;i++){counts[answers[i]]++}
  const sorted=Object.entries(counts).sort((a,b)=>b[1]-a[1]);
  let typeKey=sorted[0][0];
  if(sorted[0][1]===sorted[1][1]&&sorted[0][0]==='A'&&(sorted[1][0]==='C'||sorted[1][0]==='D'))typeKey=sorted[1][0];
  if(sorted[0][1]===sorted[1][1]&&sorted[0][0]==='B'&&sorted[1][0]==='D')typeKey='D';
  const type=DATA.types[typeKey];

  const freeAnswers=answers.slice(0,5);
  const freeLabels=['打折第一反应','贵价消费心态','被说抠门的内心','消费纠结的核心','想进店的最终动作'];
  const freeDesc=[
    ['你看到打折的第一反应是"不买就亏了"——省钱不等于吝啬，是对自己有策略',
     '你愿意为社交买单——\"大家开心\"在你心里的排名高于\"我省一点\"',
     '你对别人从不抠——你的省钱不对着在乎的人，只对着自己',
     '你纠结的是"花在自己身上值不值"——同一笔钱，给别人你从不犹豫',
     '你进了店，只给别人买了礼物——给自己什么都没拿但觉得没白来'],
    ['你的第一反应是警惕——\"是不是真的需要\"永远在\"便不便宜\"前面',
     '你心里在想\"换个便宜的吧\"——不是付不起，是消费的确定感比面子重要',
     '你怕的是花完之后那种\"空了\"的感觉——不是小气，是对不确定的恐惧',
     '你担心的是\"万一以后需要这笔钱\"——你的考虑从来不在当下，在未来',
     '你在门口查了价格然后走了——\"网上更便宜\"是你保护预算的经典动作'],
    ['你的第一反应是\"我配吗\"——打折了你也不一定买，省钱开关不在价格在\"被允许\"的感觉',
     '你去了但全程控制自己——不点贵的、不放开，省钱已经渗透进了每一次消费',
     '你觉得自己\"不配用太好的东西\"——省钱不是选择，是你的默认出厂设置',
     '你担心的是\"我是不是太贪心了\"——\"想要\"这件事本身就让你不安',
     '你拿起又放下最后空手出来——然后骂自己浪费了时间，省钱已成肌肉记忆'],
    ['你先算预算再做决定——你的省钱有一套精确的操作系统',
     '你先看人均才答应——模糊的消费预期让你不安，数字必须先落地',
     '你想自己掌控钱——不想被任何人推着花，每一笔都必须是你自己的决定',
     '你在确认\"这是我自己想买的\"——选择权对你来说比花了多少钱更重要',
     '你记下价格标记在备忘录——\"下个月有结余再来\"，省得有章法有计划'],
    ['你进了店，只给别人买了礼物——给自己什么都没拿，但觉得没白来',
     '你在门口查了价格然后走了——\"网上更便宜\"是你保护自己的方式',
     '你拿起又放下，最后空手出来——然后在心里骂自己为什么又这样',
     '你记下价格标记在备忘录——\"下个月有结余再来，这次先记下\"']
  ];

  let evidenceHTML='<h3>📋 答案证据</h3><p>';
  for(let i=0;i<5;i++){
    const a=freeAnswers[i];
    const descIdx=a==='A'?0:a==='B'?1:a==='C'?2:3;
    evidenceHTML+=`<strong>Q${i+1}「${DATA.questions[i].scene.slice(0,18)}…」</strong>你选了${a}——${freeDesc[i][descIdx]}。<br><br>`;
  }
  evidenceHTML+=type.evidence_note+'</p>';

  let modulesHTML='';
  for(const m of type.modules){
    modulesHTML+=`<div class="module"><h3>${m.title}</h3><p>${m.content}</p></div>`;
  }

  let adviceHTML='';
  for(let i=0;i<type.advice.length;i++){
    adviceHTML+=`<div class="advice-item"><span class="n">0${i+1}</span><span>${type.advice[i]}</span></div>`;
  }

  app.innerHTML=`
    <div class="screen active result">
      <div class="badge">你的省钱人格</div>
      <div class="type-name">${type.name}</div>
      <div class="type-sub">${type.tag}</div>

      <div style="font-size:15px;color:#d4b87a;margin-bottom:4px">${type.icon} ${type.score}</div>
      <p style="font-size:15px;color:#b8b0a0;line-height:1.75;margin-bottom:20px">${type.conclusion}</p>

      <div class="evidence-box">${evidenceHTML}</div>
      ${modulesHTML}

      <div class="summary-box">
        <div class="q-mark">"</div>
        <p>${type.quote}</p>
      </div>

      <div class="advice-box">
        <h3>📅 未来30天建议</h3>
        ${adviceHTML}
      </div>

      <div class="reminder-box">
        <h3>⚠️ 关键提醒</h3>
        <p>${type.reminder}</p>
      </div>

      <div style="font-size:13px;color:#6a6558;line-height:1.6;text-align:center;margin-bottom:24px">${DATA.disclaimer}</div>
      <div class="footer">以上结果为自我探索参考 · 每个选择都是了解自己的线索</div>
    </div>`;
  window.scrollTo(0,0);
}

// start
cover();
</script>
</body>
</html>
