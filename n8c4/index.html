<body>
<div class="wrap">

一句：如果这是朋友，我会怎么建议她？"}, {"title": "完整报告继续给你的东西", "body": "会帮你找到你在哪类选择最容易失焦，以及怎样把旁观者眼光用回自己身上。"}], "quote": "你给别人的肯定，也该轮到你自己。", "advice": ["【7天观察】记录一次你给朋友的建议，改成给自己的版本。", "【7天观察】买前先问“如果这是朋友，我会拦她吗？”", "【30天练习】每周做一次不问别人意见的小选择。", "【30天练习】保存三次“我选对了”的证据。"], "reminder": "你不是不懂自己，你只是还不习惯相信自己也值得被选择。"}, "B": {"name": "价值审判型", "subtitle": "你不是舍不得花，是每次都要证明这笔钱够值得", "score": 88, "core": "你给别人挑东西时能很清楚地判断需求，但给自己挑时会进入审判模式：值不值、配不配、会不会浪费。你买的不是物品，是一张自我许可。", "evidence": "前5题里你更靠近“预算、值不值、值得、一步到位”。这说明你的选择卡在价值审判，而不是眼光。", "modules": [{"title": "你的审判标准", "body": "别人买东西是满足需求，你给自己买东西却像要写一份报告：为什么必须买，为什么现在买，为什么我值得。"}, {"title": "真实场景", "body": "明明很喜欢，却要等打折、等理由、等别人也说值。最后不是买不到，是心里一直没批准。"}, {"title": "误判点", "body": "你会以为自己很理性，其实有时候是在用理性包装不敢对自己好。"}, {"title": "行动建议", "body": "给自己设置一个“小额无需证明预算”。在这个范围内，喜欢可以成为理由。"}, {"title": "完整报告继续给你的东西", "body": "会拆你最常在哪些消费上自我审判，以及如何把价值感从价格里拿出来。"}], "quote": "你不需要每一次对自己好，都拿出一份合理性证明。", "advice": ["【7天观察】记录三次你想买但立刻找理由否定的瞬间。", "【7天观察】给自己设一个无需解释的小额预算。", "【30天练习】每月买一次只为自己开心的小东西。", "【30天练习】买完不解释，练习让选择自然成立。"], "reminder": "对自己好不是浪费，它是你生活里需要被允许的一部分。"}, "C": {"name": "喜好压低型", "subtitle": "你知道自己喜欢什么，但不敢让它太明显", "score": 83, "core": "你帮别人挑得准，是因为你能看见她被忽略的亮点；但给自己时，你会把真正喜欢的东西压低，怕太夸张、太显眼、太不像平时的自己。", "evidence": "前5题里你偏向“敢试、喜欢不敢承认、自己也可以试”。说明你不是没喜好，而是不敢把喜好放到台面上。", "modules": [{"title": "你的真实喜好", "body": "你喜欢的东西可能比你表现出来的更鲜明、更有个性，只是你习惯先问别人会怎么看。"}, {"title": "真实场景", "body": "你会劝朋友试亮色、试新风格，但自己拿起来又放下，像喜欢本身需要被批准。"}, {"title": "误判点", "body": "你会把不敢尝试说成不适合。其实很多不适合，是你还没给它一次真实机会。"}, {"title": "行动建议", "body": "先从低风险尝试开始：一个配饰、一种颜色、一件可以退换的小单品。"}, {"title": "完整报告继续给你的东西", "body": "会帮你识别哪些喜好被压低，以及怎么安全地把它们放回生活里。"}], "quote": "你的喜欢不用一直站在角落里等别人同意。", "advice": ["【7天观察】截图三样你喜欢但没敢买/没敢穿的东西。", "【7天观察】写下你怕谁评价它。", "【30天练习】每周做一次低风险风格尝试。", "【30天练习】给自己的喜好建立一个不解释清单。"], "reminder": "喜欢不是冒犯别人，它只是你终于把自己放进选择里。"}, "D": {"name": "后悔预防型", "subtitle": "你不是选择差，是太怕一个选择变成错误证明", "score": 80, "core": "你给别人建议时很清楚，因为后果不在你身上。轮到自己，你会提前想后悔、想买错、想不完美，于是一个很小的选择也变得很重。", "evidence": "前5题里你更常选“会不会后悔、怕买错、反复加购删除”。说明你的选择困难来自后悔预防。", "modules": [{"title": "你的防错系统", "body": "你不是没有判断力，而是把每次选择都当成不能错的考试。"}, {"title": "真实场景", "body": "加购、删除、再加购，研究很多天，最后不是更清楚，而是更累。"}, {"title": "误判点", "body": "你会以为多比较就不会错。可很多生活选择本来就不是唯一正确答案。"}, {"title": "行动建议", "body": "把选择分级：小选择允许错，大选择设截止时间。不要让所有东西都变成大事。"}, {"title": "完整报告继续给你的东西", "body": "会拆你最怕承担哪类后悔，以及如何建立低成本试错机制。"}], "quote": "买错一次不会毁掉你，但永远不选会慢慢消耗你。", "advice": ["【7天观察】记录一次反复加购删除的过程，标出真正害怕的后果。", "【7天观察】给小选择设置15分钟截止。", "【30天练习】每月安排一次可退可换的小试错。", "【30天练习】复盘买错经验，只写下次规则，不写自我否定。"], "reminder": "你可以谨慎，但别让谨慎偷走你的体验。"}}}</script>
<script>
const data = JSON.parse(document.getElementById('data').textContent);
let idx = 0; const answers = [];
function start(){document.getElementById('home').classList.add('hidden');document.getElementById('quiz').classList.remove('hidden');renderQ();}
function renderQ(){
  const q = data.questions[idx];
  document.getElementById('bar').style.width = ((idx)/12*100)+'%';
  document.getElementById('stage').textContent = idx < 5 ? '免费测试 · 第 '+(idx+1)+' 题' : '深度解锁 · 第 '+(idx+1)+' 题';
  document.getElementById('count').textContent = '第 '+(idx+1)+'/12 题';
  document.getElementById('q').textContent = q.text;
  const box = document.getElementById('opts'); box.innerHTML = '';
  for (const k of ['A','B','C','D']) {
    const b = document.createElement('button'); b.className='opt';
    b.innerHTML = '<span class="letter">'+k+'</span><span class="text"></span>';
    b.querySelector('.text').textContent = q.options[k];
    b.onclick = () => choose(k);
    box.appendChild(b);
  }
}
function choose(k){
  answers[idx]=k; idx++;
  if(idx===5) showGate();
  else if(idx>=12) showResult();
  else renderQ();
}
function showGate(){
  document.getElementById('bar').style.width = '41.6%';
  document.getElementById('q').textContent = '前5题只是倾向，完整12题才能看清全貌';
  document.getElementById('opts').innerHTML = '<div class="gate"><div class="section-title">继续完成12题 · 自动解锁完整报告</div><div class="body">后7题会继续拆解：你的触发场景、误判入口、真正需求和未来30天调整方向。</div><br><button onclick="renderQ()">继续测试</button></div>';
}
function showResult(){
  document.getElementById('quiz').classList.add('hidden');
  const counts = {A:0,B:0,C:0,D:0}; answers.forEach(a=>counts[a]++);
  const top = Object.entries(counts).sort((a,b)=>b[1]-a[1] || 'ABCD'.indexOf(a[0])-'ABCD'.indexOf(b[0]))[0][0];
  const r = data.results[top];
  const ev = answers.slice(0,5).map((a,i)=>`Q${i+1} 你选了 ${a}：${data.questions[i].options[a]}`).join('<br>');
  document.getElementById('result').classList.remove('hidden');
  document.getElementById('result').innerHTML = `
    <div class="result-head"><div class="badge">${data.product}</div><div class="rtype">${r.name}</div><div class="score">${r.score}</div><div class="subtitle">${r.subtitle}</div></div>
    <div class="card"><div class="section-title">核心结论</div><div class="body">${r.core}</div></div>
    <div class="card"><div class="section-title">答案证据</div><div class="evidence">${ev}</div><br><div class="body">${r.evidence}</div></div>
    ${r.modules.map(m=>`<div class="card"><div class="section-title">${m.title}</div><div class="body">${m.body}</div></div>`).join('')}
    <div class="card"><div class="section-title">可截图金句</div><div class="quote">“${r.quote}”</div></div>
    <div class="card"><div class="section-title">未来30天建议</div><div class="advice">${r.advice.map(x=>`<div>${x}</div>`).join('')}</div></div>
    <div class="card"><div class="section-title">关键提醒</div><div class="body">${r.reminder}</div></div>
    <div class="disclaimer">本测试仅为自我探索参考，不构成心理诊断、医疗建议、财务建议或效果承诺。请结合自己的真实情况判断。</div>`;
  window.scrollTo(0,0);
}
</script>
