</style></head><body><main class="wrap"><section id="home" class="hero"><div class="badge">12题深度自测</div><h1>你帮别人挑东西很准，为什么给自己挑总差一点</h1><p class="lead">不是找标准答案，而是把同一个行为背后的不同动机拆开。</p><button onclick="start()">开始测试</button><p class="hint">凭第一反应选，别把自己修饰得太合理</p></section><section id="quiz" class="hidden"><div class="progress"><div id="bar" class="bar"></div></div><div class="meta"><span id="stage"></span><span id="count"></span></div><h2 id="q" class="q"></h2><div id="opts"></div></section><section id="result" class="hidden"></section></main>
<script id="data" type="application/json">{"title": "你帮别人挑东西很准，为什么给自己挑总差一点", "product": "审美判断力识别报告", "questions": [{"text": "帮朋友挑衣服时，你为什么一眼就知道适不适合？", "options": {"A": "我没有情感负担——朋友穿得好不好是她的选择。给自己选的时候，每个选择都像考试", "B": "我看到的是整体——看朋友的时候不用想她的衣橱、别人的眼光、今天要干什么", "C": "我知道她的风格——她的风格稳定，我只需判断\"这件像不像她\"。我自己的风格还没想好", "D": "我不用付钱——不是钱的问题，是不用为结果负责。给别人建议不用承担退换货的麻烦"}}, {"text": "给自己买东西时，最容易在哪一步犹豫？", "options": {"A": "最后一步——放进购物车了但不下单。不是不喜欢，是需要一个\"确认\"：别人也觉得好看才行", "B": "第一眼之后——\"可以是可以，但是不是有更好的？\"在等一个不会出现的完美答案", "C": "价格出现的时候——\"值不值得\"不是计算题，是自我审判：我配得上这个价格吗", "D": "选给哪个人格——\"这件像日常的我，那件像我想成为的我。\"最后选了那个不需要解释的——日常的一件"}}, {"text": "朋友问你意见你很坚定，自己下单前为什么反复看？", "options": {"A": "需要别人点头——你看别人的时候是你的判断做主，看自己的时候在等别人替你拍板", "B": "专门找缺点——帮别人挑你只看优点，给自己挑专找缺点", "C": "要回答更大的问题——\"我用这件东西替我说什么？\"", "D": "怕后悔。给朋友建议不存在后悔，自己买了后悔就是在骂自己"}}, {"text": "你给别人挑得很准，给自己却总买成什么样？", "options": {"A": "安全款。黑白基础色。不是不想要特别的，是\"以后再买\"。以后从来没来", "B": "和上次差不多的。上次被夸过，就一直买被确认过的东西", "C": "给朋友挑的你自己买回来试——然后发现完全不一样。你用朋友的脸试衣服，但你的身体不会说谎", "D": "便宜但不是最想要的。怕买错了浪费。结果买便宜的更浪费"}}, {"text": "最常对自己说哪句\"算了就这个吧\"？", "options": {"A": "\"穿着还行吧\"。不是满意，是放弃了更好。还行=接受不够好了", "B": "\"不会有人注意的\"。降低标准时告诉自己别人看不到。但你看到了", "C": "\"反正也穿不了几次\"。不是预感会后悔，是已经在后悔了，用少穿减少浪费感", "D": "\"至少不退不换了\"。不是满意这件东西，是满意这件事终于结束了"}}, {"text": "你最怕买错后的哪种感觉？", "options": {"A": "证明我眼光不行——替别人判断时你能迅速抓住重点，轮到自己却会把每个优点都重新怀疑一遍。", "B": "证明我浪费钱——你对别人的不完美容忍度很高，对自己却总要再证明一次才肯点头。", "C": "证明我不够了解自己——你真正担心的不是选错，而是钱、机会或期待花在自己身上以后没有得到回报。", "D": "证明我太容易冲动——你知道什么适合自己，却会在它太显眼、太像你时突然退回更安全的选择。"}}, {"text": "别人夸你挑得好，你心里最像哪句？", "options": {"A": "给别人我很清楚，给自己我就乱——替别人判断时你能迅速抓住重点，轮到自己却会把每个优点都重新怀疑一遍。", "B": "我知道标准，但我不敢用在自己身上——你对别人的不完美容忍度很高，对自己却总要再证明一次才肯点头。", "C": "我能看见别人，却看不见自己——你真正担心的不是选错，而是钱、机会或期待花在自己身上以后没有得到回报。", "D": "我只要不是当事人就很理性——你知道什么适合自己，却会在它太显眼、太像你时突然退回更安全的选择。"}}, {"text": "你给自己挑东西前最容易做什么？", "options": {"A": "问很多人意见——替别人判断时你能迅速抓住重点，轮到自己却会把每个优点都重新怀疑一遍。", "B": "看很多测评——你对别人的不完美容忍度很高，对自己却总要再证明一次才肯点头。", "C": "反复加购删除——你真正担心的不是选错，而是钱、机会或期待花在自己身上以后没有得到回报。", "D": "等一个更合适的时机——你知道什么适合自己，却会在它太显眼、太像你时突然退回更安全的选择。"}}, {"text": "你最容易在哪类选择上失灵？", "options": {"A": "衣服和风格——替别人判断时你能迅速抓住重点，轮到自己却会把每个优点都重新怀疑一遍。", "B": "贵一点的东西——你对别人的不完美容忍度很高，对自己却总要再证明一次才肯点头。", "C": "会被别人看到的东西——你真正担心的不是选错，而是钱、机会或期待花在自己身上以后没有得到回报。", "D": "真正让自己开心的东西——你知道什么适合自己，却会在它太显眼、太像你时突然退回更安全的选择。"}}, {"text": "如果把自己当朋友，你最想劝自己什么？", "options": {"A": "你不是不适合，是不敢选——替别人判断时你能迅速抓住重点，轮到自己却会把每个优点都重新怀疑一遍。", "B": "别每次都先审判自己——你对别人的不完美容忍度很高，对自己却总要再证明一次才肯点头。", "C": "喜欢本身就是理由——你真正担心的不是选错，而是钱、机会或期待花在自己身上以后没有得到回报。", "D": "买错一次不会毁掉你——你知道什么适合自己，却会在它太显眼、太像你时突然退回更安全的选择。"}}, {"text": "你最需要补回的选择能力是？", "options": {"A": "相信第一眼——替别人判断时你能迅速抓住重点，轮到自己却会把每个优点都重新怀疑一遍。", "B": "承认自己值得——你对别人的不完美容忍度很高，对自己却总要再证明一次才肯点头。", "C": "允许自己变化——你真正担心的不是选错，而是钱、机会或期待花在自己身上以后没有得到回报。", "D": "承担小失误——你知道什么适合自己，却会在它太显眼、太像你时突然退回更安全的选择。"}}, {"text": "完整报告最该帮你看清什么？", "options": {"A": "为什么别人身上你很准，自己身上就失焦——替别人判断时你能迅速抓住重点，轮到自己却会把每个优点都重新怀疑一遍。", "B": "你在哪些场景最容易自我否定——你对别人的不完美容忍度很高，对自己却总要再证明一次才肯点头。", "C": "你的真实喜好被谁的标准盖住了——你真正担心的不是选错，而是钱、机会或期待花在自己身上以后没有得到回报。", "D": "怎么把眼光用回自己身上——你知道什么适合自己，却会在它太显眼、太像你时突然退回更安全的选择。"}}], "results": {"A": {"name": "替别人清醒型", "subtitle": "看别人很准——看自己全是顾虑", "score": 85, "core": "你对别人的审美判断像一个专业买手——但轮到自己，那个买手突然变成世界上最纠结的顾客。不是因为你眼光不行——是因为你看别人用的是判断力，看自己用的是审判力。给别人建议你轻松、果断、不怕出错；给自己选的时候，你的\"审判官\"一上线，所有选项都变成了\"还不够好的我\"。你的审美判断力没有消失——只是被对自己的苛刻盖住了。", "evidence": "你帮别人一眼准是因为没有情感负担（Q1-A），给自己买卡在最后一步——需要别人确认（Q2-A），自己下单反复看是因为需要别人替你拍板（Q3-A），你给自己买安全款因为不想选错（Q4-A），你说\"还行\"是在放弃更好的（Q5-A）。你的判断力在别人身上是自由的——在自己身上是戴着镣铐的。", "modules": [{"title": "你的审美在别人身上是专家，在自己身上是实习生", "body": "帮朋友的时候，你大脑里只有一个问题：\"这件好不好看？\"轮到自己，大脑开始放弹幕：\"这件太贵了吧\"\"别人会怎么想\"\"我配得上吗\"\"万一穿不出去呢\"。同一个大脑，两种完全不同的模式。不是你不会判断——是你的判断在自己身上被太多声音盖住了。"}, {"title": "你对自己不是选东西——是在审判自己", "body": "你看别人的时候——她是你的朋友，她的缺点你知道但你觉得是她的特点。你看自己的时候——你是你自己的法官，每一个不完美都是证据：\"你看，你就是不够好\"。你的审美被你的自我审判绑架了。"}, {"title": "容易误判：你以为自己眼光不行", "body": "你说\"我不太会挑自己的东西\"。不是眼光不行——是你对自己的期待太高，任何不完美的选择都变成了\"我做错了\"。你帮朋友挑的时候允许她不够完美——但你不允许自己。"}, {"title": "误会了\"适合我\"——不是要最完美，是要最能代表现在的我", "body": "适合你的不是穿上立刻变成另一个人——是穿上之后你觉得\"这是我在穿衣服，不是衣服在穿我\"。那件\"还不错\"的衣服可能就是最适合你的——它不是满分，但它是你每一天都会选来穿的。那种让你朋友看到会心仪的风格——一样的，开始慢慢拿来给自己用。"}, {"title": "怎么把好朋友的眼光用回自己身上", "body": "给自己挑的时候，先问自己一句：如果是我最好的朋友站在镜子前，穿着这件，我会怎么评价？然后把那句评价说给自己听。你的判断力还在——只需要换个对象。前两周：每次给自己买东西前，先拿给朋友挑的\"标准眼\"来看——那件你会推荐给朋友吗？后两周：允许自己选一件\"不完美但想穿\"的东西——就一件，不用跟任何人解释。"}], "quote": "\"你给朋友挑的每一件东西，都是你不敢给自己选的。下一次，假装你是自己的朋友——给那个人挑一件'你值得'的。\"", "advice": ["【7天观察】下次逛街时，拿出一件你觉得\"适合朋友但不适合我\"的衣服——穿上。不是为了买，是为了问：我为什么觉得朋友配得上但我配不上？", "【7天观察】记录一周里你和朋友的口头禅——对她：\"这个你穿一定好看！\"对自己：\"我再看看。\"对比你们之间的差距。", "【30天练习】下一次给自己买东西时，先对自己说一句：\"我是给自己的朋友买。这个人值得被认真对待。\"", "【30天练习】拿出手机备忘录，给自己写一段话——像你给朋友挑东西时她会听到的那种：\"这个颜色你穿会很衬你。\"\"你上次不是就想试这个风格吗？别想了，拿回去试！\""], "reminder": "你给朋友挑东西的时候，你不光在挑东西——你在确认她值得拥有好东西。你对自己也需要做同样的事情。那个值得的你不存在于未来某天——你现在就是那个人。现在就值得。现在就买。"}, "B": {"name": "对自己苛刻型", "subtitle": "别人及格就好——自己必须完美才敢买", "score": 83, "core": "你给别人的标准是\"还不错就可以试试\"。给自己的标准是\"必须完美、必须显瘦、必须值、必须百搭、必须不会被后悔\"。完美不存在——所以你永远不买，永远不够好看。不是你的审美出了问题——是你的及格线拉得太高。别人穿一件\"只是还行\"的你也会说\"好看！\"，但自己穿你需要所有人的肯定才够。你对自己用的是另一个标准——一个永远不会满意的标准。", "evidence": "你帮别人一眼准是因为看到了整体——没有多余负担（Q1-B），你给自己买第一眼之后就开始找更好的（Q2-B），你给自己挑专门找缺点（Q3-B），你买东西永远是和上次差不多的因为上次被确认过（Q4-B），你说\"不会有人注意\"其实你自己注意到了（Q5-B）。你不是选不出——你是不允许自己选不够好的。", "modules": [{"title": "：你的标准是给别人用的——给自己的是另一套", "body": "你帮朋友——一件差不多对、颜色不错、长度还行——你说\"可以！超好看\"。给自己——你要考它：颜色友好吗、材质耐穿吗、场合多吗、和现有衣服搭吗、能穿几次、如果后悔了能退吗。朋友只要看到60分就可以买了，自己至少要考90分。90分的从未出现——你永远在等。"}, {"title": "：标准太高，等于不给选择", "body": "当你把标准拉到完美，你就不再在选择——你在等。等一个不会有的答案。你拒绝的不是衣服——是允许自己\"差不多就行\"。而这种\"差不多\"是你给朋友最常说的两个字。"}, {"title": "：被确认不是你的需求——是你对自己的信任不够", "body": "你一直买\"上次被夸过的类似款\"——不是在挑好看，是在寻求确认。你买\"被确认过\"的东西是因为你不确定自己的判断对不对。但你帮朋友的每一个决定都是正确的——你的判断在朋友身上是正确的。为什么不信任自己的同一个判断？"}, {"title": "：完美不是标准——完美是恐惧", "body": "\"必须完美\"的背后是\"不能买错\"。买错=浪费=我太差了。\"不是不喜欢——是太怕后果。但完美不是挑剔——是拖延。\""}, {"title": "：给自己定一个\"朋友标准\"", "body": "下一件东西，问自己两个问题：我会推荐给朋友吗？朋友穿上我会说什么？如果答案是\"还不错/适合你/可以试试\"——那就够了。不需要是完美的——是足够像你的。"}], "quote": "\"你对自己用的标准，是你从来不会给别人用的。给自己一次——像你给别人那样的宽松。\"", "advice": ["【7天观察】列一个\"我给朋友的标准\"和\"我给自己标准\"的两栏对比。每天看一次。看出差距了吗？", "【7天观察】当你下一次对自己说\"不够好的时候\"，问自己：如果是朋友穿这个，我会跟她说这几个理由吗？", "【30天练习】买一件\"只是还行\"但你想穿的东西。只穿一次不要担心以后——看看会不会发生可怕的事情。大概率不会。", "【30天练习】下次被朋友的穿搭惊艳到——问她一个问题：\"这件你当时买的时候犹豫过吗？\"听听看——她也犹豫过。但她也跟你一样——不够完美但她现在穿得很开心。给自己同样的许可。"], "reminder": "你不需要完美——你需要的是给自己一个机会。给自己一次\"朋友标准\"就够。不是降级——是人间。"}, "C": {"name": "怕浪费型", "subtitle": "不是没眼光——是太怕买错", "score": 80, "core": "你帮朋友挑东西的时候毫不犹豫——因为不用为结果付钱。给自己买的时候每一笔都在心里转：\"值不值\"\"会不会后悔\"\"万一不合适\"。你不是不会挑——是你太清楚自己\"不会不管结果\"。你怕的也不是那笔钱——是买错之后对自己的指责。\"又浪费了。\"你的眼光是对的——你的恐惧压住了你的信心。", "evidence": "你帮别人准是因为不用付钱不用为结果负责（Q1-D），给自己买在价格出现的时候开始审判自己（Q2-C），你给自己买便宜的但不是最想要的因为怕买错浪费（Q4-D），你说\"至少不退不换了\"—不是满意，是满意这件事终于结束了（Q5-D）。你怕的不是花钱——是花钱之后后悔的自己。", "modules": [{"title": "你的真实喜好", "body": "你喜欢的东西可能比你表现出来的更鲜明、更有个性，只是你习惯先问别人会怎么看。真实场景是：你给朋友挑礼物十分钟就能下单，给自己买同价位的东西却会比较几天，因为你把‘不浪费’只用来审查自己。"}, {"title": "真实场景", "body": "你会劝朋友试亮色、试新风格，但自己拿起来又放下，像喜欢本身需要被批准。真实场景是：你给朋友挑礼物十分钟就能下单，给自己买同价位的东西却会比较几天，因为你把‘不浪费’只用来审查自己。"}, {"title": "误判点", "body": "你会把不敢尝试说成不适合。其实很多不适合，是你还没给它一次真实机会。真实场景是：你给朋友挑礼物十分钟就能下单，给自己买同价位的东西却会比较几天，因为你把‘不浪费’只用来审查自己。"}, {"title": "行动建议", "body": "先从低风险尝试开始：一个配饰、一种颜色、一件可以退换的小单品。真实场景是：你给朋友挑礼物十分钟就能下单，给自己买同价位的东西却会比较几天，因为你把‘不浪费’只用来审查自己。"}, {"title": "完整报告继续给你的东西", "body": "会帮你识别哪些喜好被压低，以及怎么安全地把它们放回生活里。真实场景是：你给朋友挑礼物十分钟就能下单，给自己买同价位的东西却会比较几天，因为你把‘不浪费’只用来审查自己。"}], "quote": "\"你省的不是钱，是怕买了之后发现自己配不上。但你帮朋友的时候从来不觉得她不配——给自己同样的许可。\"", "advice": ["【7天观察】翻你的购物记录——看那些\"因为怕浪费而退掉/没买\"的东西。其中有没有你现在还是想要的？", "【7天观察】下一次你给自己买东西时心里说贵——深呼吸一次。那口叹息是怕浪费——不是真的不值。", "【30天练习】每个月有一个不计算的购物日——在那天的预算内，买一件\"想买但理由不足\"的东西。不看值不值，只问今天穿了想不想笑。", "【30天练习】在你手机备忘录里记下：\"我为自己花这笔钱，不是因为钱多——是因为我值得被我自己好好对待。\""], "reminder": "省的不是钱——是\"允许自己值得\"。你已经为别人花了很多了——给自己一点点。那点钱不会让你亏空——但那种\"给自己痛快的允许\"会给你持续的踏实。"}, "D": {"name": "不敢显眼型", "subtitle": "知道什么好看——但不敢让自己真的被看见", "score": 77, "core": "你不是没品味——你知道什么好看，你帮别人能挑得很好，你觉得那件特别的设计很美——但你不敢穿给自己。因为\"别人会多看我一眼\"\"会不会太显眼了\"\"会被评价吧\"。你把自己的审美判断力用在了\"照亮别人\"上，自己一直藏在暗处。你不是不想要好看——你是怕\"被看见\"之后必须承担\"被评价\"的风险。", "evidence": "你买了不敢穿——怕太显眼怕别人说你（Q1-C），你的问题是在别人身上好看搬到自己就不对了（Q2-D），你照镜子时怀疑自己\"我穿得不对\"（Q3-C），你被夸过但后面总跟着但是（Q4-C），你怕别人会多想所以换掉了（Q5-C）。你不是不需要好看——是怕站在有光的地方。", "modules": [{"title": "你的防错系统", "body": "你不是没有判断力，而是把每次选择都当成不能错的考试。真实场景是：你明明一眼看中更有辨识度的那件，最后却拿了最不容易被评价的版本；差的不是眼光，是允许自己被看见的底气。"}, {"title": "真实场景", "body": "加购、删除、再加购，研究很多天，最后不是更清楚，而是更累。真实场景是：你明明一眼看中更有辨识度的那件，最后却拿了最不容易被评价的版本；差的不是眼光，是允许自己被看见的底气。"}, {"title": "误判点", "body": "你会以为多比较就不会错。可很多生活选择本来就不是唯一正确答案。真实场景是：你明明一眼看中更有辨识度的那件，最后却拿了最不容易被评价的版本；差的不是眼光，是允许自己被看见的底气。"}, {"title": "行动建议", "body": "把选择分级：小选择允许错，大选择设截止时间。不要让所有东西都变成大事。真实场景是：你明明一眼看中更有辨识度的那件，最后却拿了最不容易被评价的版本；差的不是眼光，是允许自己被看见的底气。"}, {"title": "完整报告继续给你的东西", "body": "会拆你最怕承担哪类后悔，以及如何建立低成本试错机制。真实场景是：你明明一眼看中更有辨识度的那件，最后却拿了最不容易被评价的版本；差的不是眼光，是允许自己被看见的底气。"}], "quote": "\"你帮别人发光，自己躲在暗处。但你也值得被看见——不是因为完美，是因为你站在那里就是你了。\"", "advice": ["【7天观察】每天看自己一眼：我今天穿了什么，是在躲还是自在？躲的时候——是在躲谁的注意力？", "【7天观察】列出你不敢穿的\"那三件\"——每件旁边加一句：如果我帮朋友挑它会怎么推荐？", "【30天练习】每周穿一次\"那件你帮朋友也会挑的\"——从最简单的场景开始——去便利店、超市。而不是婚礼。", "【30天练习】如果一个人盯着你看——练习不躲开，只看回去一秒。那一秒里，你不道歉——你只是被注意到了。"], "reminder": "你不用每时每刻都站在有光的地方——但至少从今天起，走出一步。光不是用来审你的——是让被你看到的人也看见你。"}}}</script><script>

function choose(k){answers[idx]=k;idx++;if(idx===5)gate();else if(idx===12)result();else renderQ()}
function gate(){bar.style.width='41.7%';document.getElementById('q').textContent='前5题只是倾向，后7题继续追问原因、误判点和真实需要';opts.innerHTML='<div class="gate"><div class="section-title">继续完成12题</div><div class="body">后7题不会重复前面的问法，会从不同生活场景继续拆解。</div><br><button onclick="renderQ()">继续</button></div>'}
function result(){quiz.classList.add('hidden');const c={A:0,B:0,C:0,D:0};answers.forEach(x=>c[x]++);const key=Object.entries(c).sort((a,b)=>b[1]-a[1]||'ABCD'.indexOf(a[0])-'ABCD'.indexOf(b[0]))[0][0],r=data.results[key];const ev=answers.slice(0,5).map((a,i)=>'<div class="evidence-item"><b>Q'+(i+1)+' · 你选了 '+a+'</b><br>'+data.questions[i].options[a]+'</div>').join('');resultEl=document.getElementById('result');resultEl.classList.remove('hidden');resultEl.innerHTML='<div class="result-head"><span class="badge">'+data.product+'</span><div class="rtype">'+r.name+'</div><div class="score">'+r.score+'</div><div class="subtitle">'+r.subtitle+'</div></div><div class="card"><div class="section-title">核心结论</div><div class="body">'+r.core+'</div></div><div class="card"><div class="section-title">答案证据</div>'+ev+'<div class="body">'+r.evidence+'</div></div>'+r.modules.map(m=>'<div class="card"><div class="section-title">'+m.title+'</div><div class="body">'+m.body+'</div></div>').join('')+'<div class="card"><div class="section-title">可截图金句</div><div class="quote">“'+r.quote+'”</div></div><div class="card"><div class="section-title">未来30天建议</div>'+r.advice.map(x=>'<div class="advice">'+x+'</div>').join('')+'</div><div class="card"><div class="section-title">关键提醒</div><div class="body">'+r.reminder+'</div></div><div class="disclaimer">本测试仅作自我探索参考，不构成心理诊断、医疗、财务建议或效果承诺。</div>';scrollTo(0,0)}
</script></body></html>
