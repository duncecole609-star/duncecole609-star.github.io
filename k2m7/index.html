<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>隐形攻击性报告</title>
<style>*{box-sizing:border-box}body{margin:0;background:#f6eaec;color:#312024;font-family:-apple-system,BlinkMacSystemFont,'Microsoft YaHei',sans-serif}.app{max-width:540px;margin:0 auto;min-height:100vh;padding:22px 18px 34px}.top{display:flex;justify-content:space-between;border-bottom:1px solid #d9c1c5;padding-bottom:14px;color:#9d4350;font-weight:800;font-size:14px}.hero{padding:34px 0}.pill{display:inline-flex;padding:7px 14px;border-radius:999px;background:#edd1d5;color:#9d4350;font-weight:800;font-size:13px;margin-bottom:16px}h1{font-size:30px;line-height:1.25;margin:0;font-weight:900}.sub{font-size:15px;line-height:1.7;margin-top:14px;color:#77656a}.card,.section{background:#fffdf8;border:1px solid #d9c1c5;border-radius:18px;padding:18px;margin-top:16px;color:#211c18}button{border:none;border-radius:14px;padding:14px 16px;font-size:16px;font-weight:850;cursor:pointer}.primary{width:100%;background:#312024;color:#fff;margin-top:14px}.secondary{background:#eee2d3;color:#201b16}.quiz,.result{display:none}.progress{height:8px;background:#eadcca;border-radius:99px;overflow:hidden;margin-bottom:18px}.bar{height:100%;background:#9d4350;width:0}.qnum{color:#9d4350;font-size:13px;font-weight:850;margin-bottom:8px}.qtext{font-size:21px;line-height:1.4;font-weight:900;margin-bottom:18px;color:#211c18}.option{width:100%;display:grid;grid-template-columns:34px 1fr;gap:12px;align-items:start;background:#fff;border:1px solid #d9c1c5;border-radius:14px;margin:10px 0;padding:13px 12px;text-align:left;font-size:15px;line-height:1.5;color:#211c18}.letter{width:30px;height:30px;border-radius:50%;display:grid;place-items:center;background:#edd1d5;color:#9d4350;font-weight:900}.result{text-align:center}.score{font-size:52px;color:#9d4350;font-weight:950;margin:14px 0 4px}.tag{display:inline-block;margin:4px;padding:7px 11px;border-radius:999px;background:#edd1d5;color:#9d4350;font-size:13px;font-weight:800}.section{text-align:left;line-height:1.7}.section h3{margin:0 0 10px;color:#9d4350;font-size:15px}.section p,.section li{color:#3b332c;font-size:14px;line-height:1.75}.section ul{padding-left:18px;margin:8px 0 0}.footer{font-size:12px;line-height:1.6;margin-top:18px;text-align:center;color:#77656a}</style></head>
<body><main class="app"><div class="top"><span>隐形攻击性报告</span><span>12题报告</span></div><section id="intro" class="hero"><span class="pill">自我探索测试</span><h1>你的隐形攻击性，最容易伤到谁？</h1><p class="sub">按第一反应完成 12 题，看看这件事背后真正牵动你的是什么。她想知道：我真的有攻击性吗？我伤人的方式是什么？为什么越亲近越容易刺痛对方？</p><div class="card"><div id="gainList"></div><button class="primary" onclick="startTest()">开始测试</button></div></section><section id="quiz" class="card quiz"><div class="progress"><div id="bar" class="bar"></div></div><div id="qnum" class="qnum"></div><div id="qtext" class="qtext"></div><div id="options"></div><button class="secondary" onclick="prevQuestion()">上一题</button></section><section id="result" class="result hero"><span class="pill">你的完整报告</span><h1 id="rname"></h1><div id="score" class="score"></div><div id="summary" class="section"></div><div id="sections"></div><p class="footer">本测试为自我探索参考，不构成专业判断、志愿填报建议、职业建议或效果承诺。请结合现实情况判断。</p></section></main>
<script>const data={"title":"你的隐形攻击性，最容易伤到谁？","product":"隐形攻击性报告","intro":"按第一反应完成 12 题，看看这件事背后真正牵动你的是什么。她想知道：我真的有攻击性吗？我伤人的方式是什么？为什么越亲近越容易刺痛对方？","questions":[{"text":"你最容易在什么时候说出带刺的话？","options":["对方反复忽略你的感受时","你觉得自己已经退让太多时","对方装作没事、回避问题时","你明明很在意却不想承认时"]},{"text":"你伤人最常见的方式更像？","options":["冷淡，让对方感到被排除","反讽，用玩笑说出真实不满","翻旧账，把之前没说的都带出来","突然撤退，让关系陷入空白"]},{"text":"你最容易刺痛哪类人？","options":["真正靠近你、也最容易让你有期待的人","反应慢、看不懂你情绪的人","总是轻描淡写你感受的人","让你觉得自己不被选择的人"]},{"text":"事后你最常出现的感觉是？","options":["有点后悔，但又觉得对方确实该明白","觉得自己说重了，却不知道怎么补救","表面没事，心里还在反复想","觉得委屈更多，好像没人看见你为什么这样"]},{"text":"如果把攻击性往前翻一层，你最可能看到什么？","options":["长期没被认真对待的失望","害怕自己又一次太在意","想被主动理解的期待","不想再独自消化的疲惫"]},{"text":"你的攻击性最容易在哪个瞬间冒出来？","options":["被亲近的人忽视，还要装作没事","对方明知道你介意，却继续试探","你已经让步很多，对方还觉得理所当然","你想被重视，却只能用反话提醒对方"]},{"text":"你最常用哪种方式把委屈藏成锋利？","options":["嘴上说随便，语气已经变冷","用玩笑反刺对方最在意的地方","突然变得很讲道理，不再讲感受","表面继续配合，心里开始慢慢扣分"]},{"text":"你最容易伤到的人，通常具备哪种特点？","options":["越亲近你，越以为你不会真的走","总让你等回应，却不给明确答案","把你的包容当成默认同意","一边需要你，一边不认真对待你"]},{"text":"完整报告最该帮你拆清哪件事？","options":["我的反击到底是在保护什么","我为什么越在意越容易刺人","哪些话是边界，哪些话是在伤人","怎么表达委屈才不变成攻击"]},{"text":"攻击性上来时，你最想立刻证明什么？","options":["我不是没人脾气","你不能一直这样对我","我没有你想得那么好拿捏","我其实已经很委屈了"]},{"text":"你事后最容易误判自己的地方是什么？","options":["只记得自己说重了，忘了前面忍了很久","把所有问题都归成自己太尖锐","觉得只要不说，就不会伤害关系","用后悔抵消了真正需要被看见的边界"]},{"text":"下一次你更想把反击换成哪种表达？","options":["直接说我在意这件事，不再绕弯","把期待说清楚，不让对方猜","先暂停，不在情绪最高点开口","只对值得沟通的人解释一次"]}],"results":[{"name":"冷刺退场型","score":84,"summary":"你的攻击性不吵闹，但很有距离感。你一旦受伤，会用撤退让对方感受到失去。","sections":[["你最容易刺痛的人","最容易被你刺痛的，往往是已经靠近你、也让你有期待的人。你对陌生人反而没那么用力，因为你没有把希望放进去。"],["攻击性背后的真实委屈","你委屈的是：我已经给过信号了，为什么你还是看不见？冷下来不是为了赢，而是为了证明自己不是可以一直被忽略的人。"],["你容易误判自己的地方","你以为自己只是冷静，其实对方感受到的是被切断。你以为沉默能让对方反思，但很多人只会更慌或更防御。"],["更柔和但不委屈的表达方式","把退场前那句话说出来：这件事让我很受伤，我需要距离，但我也希望它被认真处理。"]],"days":["记录你想退场前的真实原因","练习表达失望而非消失","给关系一次清晰反馈","不要用冷淡测试所有人"],"reminder":"你不是不在乎，正因为在乎才会退。"},{"name":"反讽防御型","score":76,"summary":"你最容易用玩笑、反问、轻描淡写的刺来保护自己。话像随口一说，其实里面有很多没被接住的不舒服。","sections":[["你最容易刺痛的人","最容易被你刺痛的是反应慢、听不出你情绪的人。你越希望对方懂，越容易用拐弯的方式提醒他。"],["攻击性背后的真实委屈","你不想显得自己很受伤，所以把真实情绪包装成调侃。你真正想要的是对方主动意识到：你不是无所谓。"],["你容易误判自己的地方","你会低估反讽的杀伤力。你觉得自己只是轻轻点一下，对方听到的可能是被否定、被嘲讽。"],["更柔和但不委屈的表达方式","把反讽翻译成需求：我刚才其实有点不舒服，我希望你不要这样说。直接一点，反而更不伤关系。"]],"days":["记下最近3句带刺玩笑","翻译成真实需求","少用阴阳怪气测试对方","允许自己直接表达不满"],"reminder":"真诚比反讽更容易让你被靠近。"},{"name":"旧账清算型","score":89,"summary":"你的攻击性常常在一次冲突里爆出很多旧事。不是你爱翻旧账，是那些账从来没有被真正结掉。","sections":[["你最容易刺痛的人","最容易被你刺痛的是那些反复让你失望、却以为事情已经过去的人。你记得很清楚，只是之前没说。"],["攻击性背后的真实委屈","你的委屈来自长期没有被修复的小伤口。你不是想证明自己记仇，而是想证明：我不是突然难受。"],["你容易误判自己的地方","你容易把“证明我没错”放在“解决这件事”前面。旧账一次倒出来时，对方会先防御，而不是听懂你的痛点。"],["更柔和但不委屈的表达方式","一次只谈一件事。旧账可以记录，但不要一次全部倒出来。先处理最关键的一笔，关系才有机会修。"]],"days":["把旧账分成大事和小事","只选最关键一件沟通","说影响而不是控诉","观察对方是否愿意承担"],"reminder":"旧账不是不能谈，但要一笔一笔结。"},{"name":"委屈求证型","score":81,"summary":"你越在意，攻击性越容易出现。因为你真正想确认的是：我对你到底重不重要。","sections":[["你最容易刺痛的人","最容易被你刺痛的是你最想确认关系位置的人。你对普通人可以很平静，但对在意的人会变得别扭。"],["攻击性背后的真实委屈","你害怕主动后显得廉价，所以会用反话、试探和冷句子确认对方有没有把你放在心上。"],["你容易误判自己的地方","你以为自己在保护尊严，其实有时候是在给对方制造答题压力。对方越紧张，你越觉得他不够懂你。"],["更柔和但不委屈的表达方式","直接说“我需要确认”比绕着刺对方更有效。你的需求不丢人，说清楚反而更有力量。"]],"days":["识别自己的反话","练习一次直接请求","不要用伤人换安全感","把需求说具体"],"reminder":"你想要的不是赢，是被坚定选择。"}],"gains":["你的隐形攻击性类型","你最容易刺痛的人","攻击性背后的真实委屈","你容易误判自己的地方","更柔和但不委屈的表达方式"]};let index=0;const answers=[];const letters=['A','B','C','D'];document.getElementById('gainList').innerHTML=data.gains.map(x=>`<div class="tag">${x}</div>`).join('');function startTest(){document.getElementById('intro').style.display='none';document.getElementById('quiz').style.display='block';renderQuestion();}function renderQuestion(){const q=data.questions[index];document.getElementById('bar').style.width=((index)/data.questions.length*100)+'%';document.getElementById('qnum').textContent=`第 ${index+1} / ${data.questions.length} 题`;document.getElementById('qtext').textContent=q.text;document.getElementById('options').innerHTML=q.options.map((t,i)=>`<button class="option" onclick="choose(${i})"><span class="letter">${letters[i]}</span><span>${t}</span></button>`).join('');}function choose(i){answers[index]=i;if(index<data.questions.length-1){index++;renderQuestion();}else showResult();}function prevQuestion(){if(index>0){index--;renderQuestion();}}function showResult(){const counts=[0,0,0,0];answers.forEach(x=>counts[x]++);let max=0;for(let i=1;i<4;i++)if(counts[i]>counts[max])max=i;const r=data.results[max];document.getElementById('quiz').style.display='none';document.getElementById('result').style.display='block';document.getElementById('rname').textContent=r.name;document.getElementById('score').textContent=r.score;document.getElementById('summary').innerHTML=`<h3>${data.gains[0]}</h3><p><strong>${r.name}</strong>：${r.summary}</p>`;const sections=(r.sections||[]).concat([['未来30天建议',r.days],['关键提醒',r.reminder]]);document.getElementById('sections').innerHTML=sections.map(([h,v])=>Array.isArray(v)?`<div class="section"><h3>${h}</h3><ul>${v.map(x=>`<li>${x}</li>`).join('')}</ul></div>`:`<div class="section"><h3>${h}</h3><p>${v}</p></div>`).join('');window.scrollTo({top:0,behavior:'smooth'});}</script></body></html>
