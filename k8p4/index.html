<body><main class="app"><div class="top"><span>边界感自查报告</span><span>12题报告</span></div><section id="intro" class="hero"><span class="pill">自我探索测试</span><h1>你每次心软，其实都在让出边界</h1><p class="sub">这不是教你变冷漠，而是帮你看清：你在哪些关系里总把自己往后放。</p><div class="card"><div class="list"><div>你的边界让渡类型</div><div>你最容易心软的场景</div><div>你害怕拒绝的真正原因</div><div>关系里最该守住的底线</div><div>更不内耗的表达方式</div></div><button class="primary" onclick="startTest()">开始测试</button></div></section><section id="quiz" class="card quiz"><div class="progress"><div id="bar" class="bar"></div></div><div id="qnum" class="qnum"></div><div id="qtext" class="qtext"></div><div id="options"></div><button class="secondary" onclick="prevQuestion()">上一题</button></section><section id="result" class="result hero"><span class="pill">你的完整报告</span><h1 id="rname"></h1><p id="rsub" class="sub"></p><div id="score" class="score"></div><div id="sections"></div><p class="footer">本测试为自我探索参考，不构成诊断、志愿填报建议、职业建议或承诺。请结合现实情况判断。</p></section></main>
<script>const data={"account":"账号1","folder":"02_xinruan-bianjie","path":"k8p4","publish_time":"下午5点","cover_title":"你每次心软，其实都在让出边界","note_title":"明明不想答应，为什么最后还是你让步？","product_title":"边界感自查报告","direction":"边界感","visual":"boundary_phone","colors":{"bg":"#f7ebe6","qbg":"#fbf3ee","ink":"#2e2526","accent":"#c46863","soft":"#f0d6cf","muted":"#806f6e","line":"#dfc9c2","report_bg":"#241c22","report_ink":"#fff2ec","report_muted":"#c9b3ae","report_card":"#30252c","report_line":"#51404b","locked_bg":"#fff7f0","locked_ink":"#2f2522"},"gains":["你的边界让渡类型","你最容易心软的场景","你害怕拒绝的真正原因","关系里最该守住的底线","更不内耗的表达方式"],"product_desc":"这不是教你变冷漠，而是帮你看清：你在哪些关系里总把自己往后放。","product_main":"你失去的不是一次拒绝，是自己的位置","preview_type":"过度让步型","preview_sub":"有些心软不是善良，是太怕关系因为你而变冷。","core":"你让出边界背后的关系恐惧","gap":"哪一次心软，其实已经越过自己的底线","questions":[{"text":"别人临时求你帮忙，你明明不想答应时会？","options":["先答应下来，之后再自己想办法消化麻烦，怕拒绝显得自己不近人情","犹豫很久，最后说可以，但心里其实已经开始委屈","找理由拖延，不敢直接说不，只希望对方自己看懂","看对方是谁，如果很重要的人开口，你会立刻把自己往后放"]},{"text":"你最怕拒绝别人后发生什么？","options":["对方觉得你变了，不再像以前那么好说话","关系变尴尬，下次见面不知道怎么相处","自己被说自私，像是做错了一件很严重的事","对方真的失望，于是你会反过来怀疑自己是不是太冷"]},{"text":"你让步之后，最常出现的感觉是？","options":["表面没事，心里反复想为什么又是我在迁就","开始对对方有一点怨，但又觉得是自己答应的","觉得自己很没出息，明知道不舒服还是说不出口","短暂松一口气，至少关系没有立刻坏掉"]},{"text":"你最容易在哪类关系里丢边界？","options":["亲近的人，因为太熟所以更难讲清楚规则","上级或强势的人，怕拒绝会带来后果","情绪脆弱的人，怕自己一拒绝就伤害到对方","让你在意评价的人，怕对方从此觉得你不好"]},{"text":"如果明天开始练习边界，你最想先做到哪一步？","options":["先不立刻答应，给自己一点思考时间","把拒绝说得更温和，但不再绕很远","分清帮忙和牺牲，不再把别人的急事全接过来","允许别人不高兴，也不马上把责任揽回自己身上"]}],"h5_questions":[{"text":"别人临时求你帮忙，你明明不想答应时会？","options":["先答应下来，之后再自己想办法消化麻烦，怕拒绝显得自己不近人情","犹豫很久，最后说可以，但心里其实已经开始委屈","找理由拖延，不敢直接说不，只希望对方自己看懂","看对方是谁，如果很重要的人开口，你会立刻把自己往后放"]},{"text":"你最怕拒绝别人后发生什么？","options":["对方觉得你变了，不再像以前那么好说话","关系变尴尬，下次见面不知道怎么相处","自己被说自私，像是做错了一件很严重的事","对方真的失望，于是你会反过来怀疑自己是不是太冷"]},{"text":"你让步之后，最常出现的感觉是？","options":["表面没事，心里反复想为什么又是我在迁就","开始对对方有一点怨，但又觉得是自己答应的","觉得自己很没出息，明知道不舒服还是说不出口","短暂松一口气，至少关系没有立刻坏掉"]},{"text":"你最容易在哪类关系里丢边界？","options":["亲近的人，因为太熟所以更难讲清楚规则","上级或强势的人，怕拒绝会带来后果","情绪脆弱的人，怕自己一拒绝就伤害到对方","让你在意评价的人，怕对方从此觉得你不好"]},{"text":"如果明天开始练习边界，你最想先做到哪一步？","options":["先不立刻答应，给自己一点思考时间","把拒绝说得更温和，但不再绕很远","分清帮忙和牺牲，不再把别人的急事全接过来","允许别人不高兴，也不马上把责任揽回自己身上"]},{"text":"如果别人不理解你的选择，你最真实的反应是？","options":["先不解释，自己再观察一阵。你不想为了证明自己，把还没想清楚的东西说得太满","有点失落，但还是会继续。你希望被支持，可你也知道最后只能自己负责","开始怀疑是不是自己太在意。别人一句话就能让你重新审视自己的判断","反而更想证明这件事重要。被不理解时，你会更想把答案做出来"]},{"text":"你最怕完整报告里看见什么？","options":["我其实没有想象中稳定，只是一直靠习惯撑着，让日子看起来没有问题","我一直在用旧方式保护自己，所以很多新选择还没开始就被我先否定了","我真正想要的和现在差很多，这意味着我可能已经不满足很久了","我已经忍了太久却还没行动，最怕报告把那个被我压下去的念头说出来"]},{"text":"你希望这次测试最后帮你确认什么？","options":["给我一个更清晰的倾向，至少让我知道自己不是随便被情绪带着走","告诉我真正卡住我的点，我想知道自己为什么反复在同一个地方犹豫","让我知道怎么开始改变，不要太宏大，只要一个能马上做的小入口","帮我确认我不是一个人在这样，有些感受被说出来，本身就会轻一点"]},{"text":"别人评价你时，哪句话最容易让你记很久？","options":["你其实很有潜力，因为这句话像是在提醒你，自己还有没被用出来的一面","你不用这么辛苦，听到这句会突然松一下，也会发现自己真的撑了很久","你很有自己的感觉，这会让你确认自己不是普通复制粘贴的人","你该更相信自己一点，因为你知道很多时候不是没能力，是太常怀疑自己"]},{"text":"完整报告里你最想看哪一部分？","options":["类型结论。想先知道自己属于哪种模式，给现在的状态一个名字","形成原因。想知道为什么自己会这样，而不是只拿到一个标签","误判点。想看自己最容易在哪些地方把需求、关系或选择看错","具体建议。想知道接下来怎么做，才能不只停留在看懂自己"]},{"text":"哪种情况最容易让你明知道不舒服，还是把边界让出去？","options":["对方说自己很难，你会觉得这时候拒绝显得太冷血","关系已经很熟，你怕一拒绝就像在否定过去的情分","你担心对方不高兴，所以先把自己的麻烦往后放","你觉得解释很累，最后干脆答应，至少当下不用冲突"]},{"text":"如果要守住边界又不撕破脸，你最需要练习哪一步？","options":["先把“不方便”说出来，不等自己忍到爆炸才拒绝","拒绝时只解释必要原因，不把自己放到被审判的位置","区分对方的失望和你的责任，不把所有情绪都接过来","提前说清规则，让关系不靠临时心软维持"]}],"score":86,"score_name":"倾向指数","cover_sub":"有些心软不是善良，是太怕关系因为你而变冷。"};const letters=['A','B','C','D'];let index=0;const answers=[];const resultTexts=['你属于观察型倾向：反应慢一点，不代表没有答案，只是你更需要确定感。','你属于清晰型倾向：你已经知道自己在意什么，只是还需要一个更稳的表达方式。','你属于强牵动倾向：这个主题已经明显影响你的判断和状态，适合认真复盘。'];function startTest(){document.getElementById('intro').style.display='none';document.getElementById('quiz').style.display='block';renderQuestion();}function renderQuestion(){const q=data.h5_questions[index];document.getElementById('bar').style.width=(index/data.h5_questions.length*100)+'%';document.getElementById('qnum').textContent=`第 ${index+1} / ${data.h5_questions.length} 题`;document.getElementById('qtext').textContent=q.text;document.getElementById('options').innerHTML=q.options.map((t,i)=>`<button class="option" onclick="choose(${i})"><span class="letter">${letters[i]}</span><span>${t}</span></button>`).join('');}function choose(i){answers[index]=i;if(index<data.h5_questions.length-1){index++;renderQuestion();}else showResult();}function prevQuestion(){if(index>0){index--;renderQuestion();}}function showResult(){const sum=answers.reduce((a,b)=>a+b,0);const level=sum<=10?0:(sum<=24?1:2);document.getElementById('quiz').style.display='none';document.getElementById('result').style.display='block';document.getElementById('rname').textContent=data.preview_type;document.getElementById('rsub').textContent=resultTexts[level];document.getElementById('score').textContent=[62,78,86][level];const bodies=[data.core,'你最需要看的不是一个标签，而是这个模式在什么场景里被触发。','这类倾向容易让你把外界反应当成判断标准，忘了自己真正想要什么。','更适合把答案拆成具体动作：一次表达练习、一个边界复盘、一个习惯调整。','接下来30天，先做一个可执行的小改变，不要靠一时冲动推翻全部生活。'];document.getElementById('sections').innerHTML=data.gains.map((g,i)=>`<div class="section"><h3>${i+1}. ${g}</h3><p>${bodies[i]}</p></div>`).join('')+`<div class="section"><h3>你的30天行动建议</h3><div class="grid"><div>记录3个最常触发你的场景</div><div>做一次低成本小尝试</div><div>观察自己是放松还是更紧绷</div><div>7天后复盘真实反馈</div></div></div>`;window.scrollTo({top:0,behavior:'smooth'});}</script></body></html>
