<style>*{box-sizing:border-box}body{margin:0;background:#eef6f5;color:#173132;font-family:-apple-system,BlinkMacSystemFont,'Microsoft YaHei',sans-serif}.app{max-width:540px;margin:0 auto;min-height:100vh;padding:22px 18px 34px}.top{display:flex;justify-content:space-between;border-bottom:1px solid #bfd6d4;padding-bottom:14px;color:#4b8584;font-weight:800;font-size:14px}.hero{padding:34px 0}.pill{display:inline-flex;padding:7px 14px;border-radius:999px;background:#d8e9e7;color:#4b8584;font-weight:800;font-size:13px;margin-bottom:16px}h1{font-size:30px;line-height:1.25;margin:0;font-weight:900}.sub{font-size:15px;line-height:1.7;margin-top:14px;color:#637978}.card,.section{background:#fffdf8;border:1px solid #bfd6d4;border-radius:18px;padding:18px;margin-top:16px;color:#211c18}button{border:none;border-radius:14px;padding:14px 16px;font-size:16px;font-weight:850;cursor:pointer}.primary{width:100%;background:#173132;color:#fff;margin-top:14px}.secondary{background:#eee2d3;color:#201b16}.quiz,.result{display:none}.progress{height:8px;background:#eadcca;border-radius:99px;overflow:hidden;margin-bottom:18px}.bar{height:100%;background:#4b8584;width:0}.qnum{color:#4b8584;font-size:13px;font-weight:850;margin-bottom:8px}.qtext{font-size:21px;line-height:1.4;font-weight:900;margin-bottom:18px;color:#211c18}.option{width:100%;display:grid;grid-template-columns:34px 1fr;gap:12px;align-items:start;background:#fff;border:1px solid #bfd6d4;border-radius:14px;margin:10px 0;padding:13px 12px;text-align:left;font-size:15px;line-height:1.5;color:#211c18}.letter{width:30px;height:30px;border-radius:50%;display:grid;place-items:center;background:#d8e9e7;color:#4b8584;font-weight:900}.result{text-align:center}.score{font-size:52px;color:#4b8584;font-weight:950;margin:14px 0 4px}.tag{display:inline-block;margin:4px;padding:7px 11px;border-radius:999px;background:#d8e9e7;color:#4b8584;font-size:13px;font-weight:800}.section{text-align:left;line-height:1.7}.section h3{margin:0 0 10px;color <body><main class="app"><div class="top"><span>社交位置识别报告</span><span>12题报告</span></div><section id="intro" class="hero"><span class="pill">自我探索测试</span><h1>你在人群里，是被依赖还是被观察？</h1><p class="sub">这份报告不测你外向还是内向，而是拆你在人群里到底被怎样使用：别人为什么找你、为什么看你反应、为什么默认你会负责。看完会更清楚哪些关系值得接住，哪些只是把你当成稳定工具。</p><div class="card"><div id="gainList"></div><button class="primary" onclick="startTest()">开始测试</button></div></section><section id="quiz" class="card quiz"><div class="progress"><div id="bar" class="bar"></div></div><div id="qnum" class="qnum"></div><div id="qtext" class="qtext"></div><div id="options"></div><button class="secondary" onclick="prevQuestion()">上一题</button></section><section id="result" class="result hero"><span class="pill">你的完整报告</span><h1 id="rname"></h1><div id="score" class="score"></div><div id="summary" class="section"></div><div id="sections"></div><p class="footer">本测试为自我探索参考，不构成诊断、职业建议、投资建议或效果承诺。请结合现实情况判断。</p></section></main>
<script>const data={"title": "你在人群里，是被依赖还是被观察？", "product": "社交位置识别报告", "intro": "这份报告不测你外向还是内向，而是拆你在人群里到底被怎样使用：别人为什么找你、为什么看你反应、为什么默认你会负责。看完会更清楚哪些关系值得接住，哪些只是把你当成稳定工具。", "questions": [{"text": "一群人在一起时，你最常进入哪种状态？", "options": ["我不一定说很多，但别人会偷偷看我赞不赞成", "大家乱起来时，我会自动变成那个收拾局面的人", "我看起来在听，其实心里已经把关系远近分好了", "我明明想轻松一点，却总有人把情绪倒给我"]}, {"text": "别人最常因为什么来找你？", "options": ["想听我判断这件事靠不靠谱", "希望我帮忙稳住一个尴尬或混乱的场面", "想从我这里得到一点安慰和确认", "想知道我到底站在哪边、怎么看他们"]}, {"text": "你在人群里最容易累的点是？", "options": ["我总要保持清醒，好像不能跟着大家一起乱", "别人默认我会负责，却很少问我愿不愿意", "我接住太多情绪，最后自己的感受没人管", "我不想被看穿，但又很难真的置身事外"]}, {"text": "你最怕别人误会你哪一点？", "options": ["以为我强势，其实我只是不想局面失控", "以为我好说话，其实我心里有很多边界", "以为我冷，其实我只是在观察谁值得靠近", "以为我能安慰所有人，其实我也会被消耗"]}, {"text": "你在人际里最该保留什么？", "options": ["不急着给所有人判断和答案", "不替别人收拾每一个烂摊子", "不把自己的情绪空间全部让出去", "不为了合群交出所有真实想法"]}, {"text": "你最容易被推到哪个位置？", "options": ["最后拍板的人", "负责收尾的人", "情绪垃圾桶", "安静观察者"]}, {"text": "你最不喜欢哪种社交消耗？", "options": ["被迫表态", "被默认帮忙", "被反复倾倒情绪", "被过度打探真实想法"]}, {"text": "别人观察你时，最可能在确认什么？", "options": ["你认不认可", "你会不会不高兴", "你愿不愿意帮忙", "你是不是把他们放在心上"]}, {"text": "你最容易低估自己哪种影响力？", "options": ["一句评价会影响别人判断", "沉默也会让人紧张", "过度接住会让别人依赖", "退一步会让人以为你默认"]}, {"text": "你适合哪种社交节奏？", "options": ["少表态，但表态就说清楚", "能帮忙，但范围要提前说", "能倾听，但不负责治愈所有人", "先观察，再决定靠近到哪里"]}, {"text": "未来30天，你最该练习哪件事？", "options": ["不急着给判断", "不替别人收尾", "不接住所有情绪", "不解释自己的每一次沉默"]}, {"text": "如果只保留一个边界，你最需要哪一个？", "options": ["我可以有判断，但不必负责所有结果", "我可以帮忙，但不替你承担后果", "我可以听你说，但不做你的情绪出口", "我可以安静，但不代表我没有立场"]}], "results": [{"name": "清醒判断型", "score": 88, "summary": "你在人群里像一根隐形标尺。你不一定最热闹，但别人很在意你怎么看。", "why": "你观察细、判断稳，所以别人会把你的反应当成信号。", "signals": ["别人会看你赞不赞成", "常有人问你靠不靠谱", "你不轻易表态"], "mistake": "你容易把判断变成负担，好像每句话都要足够准确。", "need": "你需要的是保留判断权，同时不替所有人做决定。", "action": "可以晚一点表态，也可以只说你的观察，不给结论。", "days": ["减少立刻评价", "说清这是我的感受", "不替别人拍板", "把判断留给重要问题"], "reminder": "你有判断力，但不必成为所有人的方向盘。", "modules": [{"title": "你的人群角色类型", "body": "你在人群里像一根隐形标尺。你不一定最热闹，但别人很在意你怎么看。 你在人群里的位置，不是外向或内向能解释的，而是别人会怎么使用你的稳定、判断、情绪承接或边界感。你越习惯这个角色，越容易忘了自己也可以不接。"}, {"title": "别人靠近你的真实原因", "body": "你观察细、判断稳，所以别人会把你的反应当成信号。 别人靠近你的原因常常体现在：别人会看你赞不赞成；常有人问你靠不靠谱；你不轻易表态。他们未必说出口，但会下意识从你这里找判断、安慰、秩序或态度。"}, {"title": "你最容易被使用的位置", "body": "你容易把判断变成负担，好像每句话都要足够准确。 你最容易被使用的位置，通常就是你最擅长的地方。擅长稳场不代表必须负责，擅长理解不代表要接住所有情绪。"}, {"title": "社交里的误判风险", "body": "你需要的是保留判断权，同时不替所有人做决定。 社交里的误判风险，是把“被需要”误会成“被珍惜”。有些人靠近你，是因为你让事情更省力，不一定是因为他们真的看见了你。"}, {"title": "更舒服的人际边界", "body": "可以晚一点表态，也可以只说你的观察，不给结论。 更舒服的边界不是突然冷掉，而是提前说清自己能给到哪里。未来30天先做：减少立刻评价；说清这是我的感受。"}]}, {"name": "隐形收尾型", "score": 84, "summary": "你最容易被依赖，因为大家知道你会把局面收拾好。", "why": "你很怕事情悬着，也不喜欢混乱，所以会自动补位。", "signals": ["混乱时你会出手", "别人默认你负责", "你常在最后收尾"], "mistake": "你容易把别人的烂摊子变成自己的任务。", "need": "你需要的是把帮忙范围说清，而不是每次都默默接住。", "action": "先问自己：我是在帮忙，还是在替别人承担后果？", "days": ["只接一部分任务", "提前说边界", "让对方也承担步骤", "不为所有局面负责"], "reminder": "会收尾是能力，不该变成别人偷懒的理由。", "modules": [{"title": "你的人群角色类型", "body": "你最容易被依赖，因为大家知道你会把局面收拾好。 你在人群里的位置，不是外向或内向能解释的，而是别人会怎么使用你的稳定、判断、情绪承接或边界感。你越习惯这个角色，越容易忘了自己也可以不接。"}, {"title": "别人靠近你的真实原因", "body": "你很怕事情悬着，也不喜欢混乱，所以会自动补位。 别人靠近你的原因常常体现在：混乱时你会出手；别人默认你负责；你常在最后收尾。他们未必说出口，但会下意识从你这里找判断、安慰、秩序或态度。"}, {"title": "你最容易被使用的位置", "body": "你容易把别人的烂摊子变成自己的任务。 你最容易被使用的位置，通常就是你最擅长的地方。擅长稳场不代表必须负责，擅长理解不代表要接住所有情绪。"}, {"title": "社交里的误判风险", "body": "你需要的是把帮忙范围说清，而不是每次都默默接住。 社交里的误判风险，是把“被需要”误会成“被珍惜”。有些人靠近你，是因为你让事情更省力，不一定是因为他们真的看见了你。"}, {"title": "更舒服的人际边界", "body": "先问自己：我是在帮忙，还是在替别人承担后果？ 更舒服的边界不是突然冷掉，而是提前说清自己能给到哪里。未来30天先做：只接一部分任务；提前说边界。"}]}, {"name": "情绪承接型", "score": 77, "summary": "你在人群里常常像一个安全出口。别人不一定问你累不累，却会把情绪放到你这里。", "why": "你敏感、会听、反应不刺人，所以别人容易觉得你适合倾诉。", "signals": ["别人常找你说心事", "你会照顾气氛", "你听完自己也会累"], "mistake": "你容易把倾听当成关系里的义务。", "need": "你需要的是给情绪承接设置容量。", "action": "可以听，但要告诉对方你现在能听多久、能接到哪里。", "days": ["减少深夜情绪倾倒", "不立刻给建议", "听完做情绪清理", "允许自己不回复"], "reminder": "你可以温柔，但不必把自己变成所有人的容器。", "modules": [{"title": "你的人群角色类型", "body": "你在人群里常常像一个安全出口。别人不一定问你累不累，却会把情绪放到你这里。 你在人群里的位置，不是外向或内向能解释的，而是别人会怎么使用你的稳定、判断、情绪承接或边界感。你越习惯这个角色，越容易忘了自己也可以不接。"}, {"title": "别人靠近你的真实原因", "body": "你敏感、会听、反应不刺人，所以别人容易觉得你适合倾诉。 别人靠近你的原因常常体现在：别人常找你说心事；你会照顾气氛；你听完自己也会累。他们未必说出口，但会下意识从你这里找判断、安慰、秩序或态度。"}, {"title": "你最容易被使用的位置", "body": "你容易把倾听当成关系里的义务。 你最容易被使用的位置，通常就是你最擅长的地方。擅长稳场不代表必须负责，擅长理解不代表要接住所有情绪。"}, {"title": "社交里的误判风险", "body": "你需要的是给情绪承接设置容量。 社交里的误判风险，是把“被需要”误会成“被珍惜”。有些人靠近你，是因为你让事情更省力，不一定是因为他们真的看见了你。"}, {"title": "更舒服的人际边界", "body": "可以听，但要告诉对方你现在能听多久、能接到哪里。 更舒服的边界不是突然冷掉，而是提前说清自己能给到哪里。未来30天先做：减少深夜情绪倾倒；不立刻给建议。"}]}, {"name": "安静观察型", "score": 81, "summary": "你在人群里有一种不出声的存在感。别人会好奇你在想什么，也会担心你是不是已经看穿了什么。", "why": "你不急着靠近，也不轻易暴露态度，所以你的沉默会变成一种信息。", "signals": ["你会先观察再靠近", "别人会猜你的想法", "你不喜欢被强行热络"], "mistake": "你容易被误会成冷淡或不好接近。", "need": "你需要的是保留观察，同时给重要的人一点入口。", "action": "在安全关系里主动释放一点小信号，不必一下子交出全部。", "days": ["主动回应一次善意", "减少过度防备", "说出一个真实偏好", "区分观察和隔绝"], "reminder": "你可以慢热，但别让所有人都只能猜。", "modules": [{"title": "你的人群角色类型", "body": "你在人群里有一种不出声的存在感。别人会好奇你在想什么，也会担心你是不是已经看穿了什么。 你在人群里的位置，不是外向或内向能解释的，而是别人会怎么使用你的稳定、判断、情绪承接或边界感。你越习惯这个角色，越容易忘了自己也可以不接。"}, {"title": "别人靠近你的真实原因", "body": "你不急着靠近，也不轻易暴露态度，所以你的沉默会变成一种信息。 别人靠近你的原因常常体现在：你会先观察再靠近；别人会猜你的想法；你不喜欢被强行热络。他们未必说出口，但会下意识从你这里找判断、安慰、秩序或态度。"}, {"title": "你最容易被使用的位置", "body": "你容易被误会成冷淡或不好接近。 你最容易被使用的位置，通常就是你最擅长的地方。擅长稳场不代表必须负责，擅长理解不代表要接住所有情绪。"}, {"title": "社交里的误判风险", "body": "你需要的是保留观察，同时给重要的人一点入口。 社交里的误判风险，是把“被需要”误会成“被珍惜”。有些人靠近你，是因为你让事情更省力，不一定是因为他们真的看见了你。"}, {"title": "更舒服的人际边界", "body": "在安全关系里主动释放一点小信号，不必一下子交出全部。 更舒服的边界不是突然冷掉，而是提前说清自己能给到哪里。未来30天先做：主动回应一次善意；减少过度防备。"}]}], "gains": ["你的人群角色类型", "别人靠近你的真实原因", "你最容易被使用的位置", "社交里的误判风险", "更舒服的人际边界"]};let index=0;const answers=[];const letters=['A','B','C','D'];document.getElementById('gainList').innerHTML=data.gains.map(x=>`<div class="tag">${x}</div>`).join('');function startTest(){document.getElementById('intro').style.display='none';document.getElementById('quiz').style.display='block';renderQuestion();}function renderQuestion(){const q=data.questions[index];document.getElementById('bar').style.width=((index)/data.questions.length*100)+'%';document.getElementById('qnum').textContent=`第 ${index+1} / ${data.questions.length} 题`;document.getElementById('qtext').textContent=q.text;document.getElementById('options').innerHTML=q.options.map((t,i)=>`<button class="option" onclick="choose(${i})"><span class="letter">${letters[i]}</span><span>${t}</span></button>`).join('');}function choose(i){answers[index]=i;if(index<data.questions.length-1){index++;renderQuestion();}else showResult();}function prevQuestion(){if(index>0){index--;renderQuestion();}}function showResult(){const counts=[0,0,0,0];answers.forEach(x=>counts[x]++);let max=0;for(let i=1;i<4;i++)if(counts[i]>counts[max])max=i;const r=data.results[max];document.getElementById('quiz').style.display='none';document.getElementById('result').style.display='block';document.getElementById('rname').textContent=r.name;document.getElementById('score').textContent=r.score;document.getElementById('summary').innerHTML=`<h3>核心结论</h3><p>${r.summary}</p>`;let sections=(r.modules||[]).map(m=>[m.title,m.body]);if(!sections.length)sections=[[data.gains[0]||'类型解释',r.summary],[data.gains[1]||'形成原因',r.why],[data.gains[2]||'误判提醒',r.mistake],[data.gains[3]||'真实需求',r.need],[data.gains[4]||'行动建议',r.action]];sections=sections.concat([['30天建议',r.days],['关键提醒',r.reminder]]);const picks=answers.map((a,i)=>({n:i+1,l:letters[a],t:data.questions[i].options[a]}));const keyIdx=[0,1,2,4,6,10].filter(i=>i<picks.length&&picks[i]);const evidence=`<div class="section"><h3>你的答案线索</h3><ul>${keyIdx.map(i=>`<li>第 ${picks[i].n} 题选 ${picks[i].l}：${picks[i].t}</li>`).join('')}</ul><p>这些选择共同把结果推向「${r.name}」：不是只看某一个答案，而是看你反复出现的判断方式。</p></div>`;document.getElementById('sections').innerHTML=evidence+sections.map(([h,v])=>Array.isArray(v)?`<div class="section"><h3>${h}</h3><ul>${v.map(x=>`<li>${x}</li>`).join('')}</ul></div>`:`<div class="section"><h3>${h}</h3><p>${v}</p></div>`).join('');window.scrollTo({top:0,behavior:'smooth'});}</script></body></html>
