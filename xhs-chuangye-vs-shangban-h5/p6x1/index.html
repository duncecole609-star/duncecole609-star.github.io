<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>沉默压迫感报告</title>
<style>*{box-sizing:border-box}body{margin:0;background:#eef5f8;color:#172d3b;font-family:-apple-system,BlinkMacSystemFont,'Microsoft YaHei',sans-serif}.app{max-width:540px;margin:0 auto;min-height:100vh;padding:22px 18px 34px}.top{display:flex;justify-content:space-between;border-bottom:1px solid #c6d7df;padding-bottom:14px;color:#527fa0;font-weight:800;font-size:14px}.hero{padding:34px 0}.pill{display:inline-flex;padding:7px 14px;border-radius:999px;background:#d9e8ef;color:#527fa0;font-weight:800;font-size:13px;margin-bottom:16px}h1{font-size:30px;line-height:1.25;margin:0;font-weight:900}.sub{font-size:15px;line-height:1.7;margin-top:14px;color:#647783}.card,.section{background:#fffdf8;border:1px solid #c6d7df;border-radius:18px;padding:18px;margin-top:16px;color:#211c18}button{border:none;border-radius:14px;padding:14px 16px;font-size:16px;font-weight:850;cursor:pointer}.primary{width:100%;background:#172d3b;color:#fff;margin-top:14px}.secondary{background:#eee2d3;color:#201b16}.quiz,.result{display:none}.progress{height:8px;background:#eadcca;border-radius:99px;overflow:hidden;margin-bottom:18px}.bar{height:100%;background:#527fa0;width:0}.qnum{color:#527fa0;font-size:13px;font-weight:850;margin-bottom:8px}.qtext{font-size:21px;line-height:1.4;font-weight:900;margin-bottom:18px;color:#211c18}.option{width:100%;display:grid;grid-template-columns:34px 1fr;gap:12px;align-items:start;background:#fff;border:1px solid #c6d7df;border-radius:14px;margin:10px 0;padding:13px 12px;text-align:left;font-size:15px;line-height:1.5;color:#211c18}.letter{width:30px;height:30px;border-radius:50%;display:grid;place-items:center;background:#d9e8ef;color:#527fa0;font-weight:900}.result{text-align:center}.score{font-size:52px;color:#527fa0;font-weight:950;margin:14px 0 4px}.tag{display:inline-block;margin:4px;padding:7px 11px;border-radius:999px;background:#d9e8ef;color:#527fa0;font-size:13px;font-weight:800}.section{text-align:left;line-height:1.7}.section h3{margin:0 0 10px;color:#527fa0;font-size:15px}.section p,.section li{color:#3b332c;font-size:14px;line-height:1.75}.section ul{padding-left:18px;margin:8px 0 0}.footer{font-size:12px;line-height:1.6;margin-top:18px;text-align:center;color:#647783}</style></head>
<body><main class="app"><div class="top"><span>沉默压迫感报告</span><span>12题报告</span></div><section id="intro" class="hero"><span class="pill">自我探索测试</span><h1>你一沉默，别人到底在怕你什么？</h1><p class="sub">按第一反应完成 12 题，看看这件事背后真正牵动你的是什么。她想知道：我沉默时别人看到的是冷静、失望、审判，还是压迫？我到底在用沉默保护自己还是控制关系？</p><div class="card"><div id="gainList"></div><button class="primary" onclick="startTest()">开始测试</button></div></section><section id="quiz" class="card quiz"><div class="progress"><div id="bar" class="bar"></div></div><div id="qnum" class="qnum"></div><div id="qtext" class="qtext"></div><div id="options"></div><button class="secondary" onclick="prevQuestion()">上一题</button></section><section id="result" class="result hero"><span class="pill">你的完整报告</span><h1 id="rname"></h1><div id="score" class="score"></div><div id="summary" class="section"></div><div id="sections"></div><p class="footer">本测试为自我探索参考，不构成专业判断、志愿填报建议、职业建议或效果承诺。请结合现实情况判断。</p></section></main>
<script>const data={"title":"你一沉默，别人到底在怕你什么？","product":"沉默压迫感报告","intro":"按第一反应完成 12 题，看看这件事背后真正牵动你的是什么。她想知道：我沉默时别人看到的是冷静、失望、审判，还是压迫？我到底在用沉默保护自己还是控制关系？","questions":[{"text":"你突然不想说话时，心里更接近哪种状态？","options":["我已经说过很多次，不想再重复","我怕一开口就变成争吵，所以先收住","我在观察对方到底会不会主动意识到问题","我其实很失望，但不想显得自己太在意"]},{"text":"别人问你“怎么了”时，你最常见的反应是？","options":["说没事，因为解释起来太累","先忍住，等情绪过去再看要不要说","反问对方自己想想，想知道他是否真的懂","直接变得很礼貌，不再给对方进入的机会"]},{"text":"你最不想让沉默变成什么？","options":["变成惩罚，让关系更僵","变成示弱，好像我非要对方哄","变成误会，让对方觉得我不在乎","变成失控，一开口就把话说重"]},{"text":"你的沉默最容易出现在什么关系里？","options":["越亲近越容易，因为期待更高","需要反复解释的关系里，因为太消耗","对方不守承诺时，因为信任感会迅速掉下去","自己没有安全感时，因为不知道该怎么开口"]},{"text":"如果要让别人不那么怕你的沉默，你最需要补哪句话？","options":["我现在需要一点时间，不是不想解决","我不是生气你一个动作，是这件事累积很久了","我会说，但我想先把情绪整理好","我在意这件事，所以才会变沉默"]},{"text":"你沉默之前，通常是哪一刻先让你失去表达欲？","options":["解释过几次，对方还是只听自己想听的","你刚开口就被打断或轻描淡写","你发现说出来也只会变成争辩","你怕情绪太重，干脆先把自己收住"]},{"text":"别人感到紧张时，最可能误读了你的哪种沉默？","options":["你只是在整理感受，却被当成冷处理","你想降温，却被理解成惩罚对方","你在重新评估关系，却被当成生气","你需要安全距离，却被说成难接近"]},{"text":"你最不想让别人看见沉默背后的哪种需要？","options":["其实很想被主动追问和确认","很怕自己一开口就显得狼狈","需要一点时间判断关系还安不安全","希望对方不用你解释也能懂分寸"]},{"text":"完整报告里，你最想知道自己为什么会沉默？","options":["是防御，还是对关系失望","是压迫感，还是表达方式太硬","是习惯独自消化，还是怕冲突升级","是冷淡，还是太在意所以先撤退"]},{"text":"当你想重新开口时，最卡住你的是哪一步？","options":["不知道怎么说才不变成指责","怕对方觉得你小题大做","已经冷太久，找不到自然入口","担心说完以后对方还是不会改"]},{"text":"哪种关系最容易把你的沉默变成压力？","options":["对方很依赖你的即时回应","对方习惯用追问逼你表态","对方从不复盘，只等你自己好","对方一紧张就把责任推给你"]},{"text":"你接下来最需要练习的表达是什么？","options":["先说明我需要时间，而不是直接消失","把不舒服说成事实，不说成审判","冷静后补一句真实原因","给关系留入口，也给自己留边界"]}],"results":[{"name":"冷场切断型","score":84,"summary":"你的沉默会让空气突然变冷。你不是没话说，而是那一刻已经不想继续把自己摊开给对方看。","sections":[["别人最容易误读你的地方","别人会以为你在惩罚、摆脸色、故意让人难受。其实你更多是在判断：这段对话还值不值得继续解释。"],["你沉默背后的真实需求","你需要的是被认真听见，而不是被逼着立刻回应。你很怕自己一开口，就又要承担解释、安抚和维持关系的责任。"],["关系里最容易冷掉的瞬间",["你说了很多次，对方还是没懂","对方把你的沉默当成默认","你发现继续讲只会让自己更累"]],["更不伤人的表达方式","沉默前先给一句边界：我现在不想继续争，但不是没事。等我整理好再说。这样能减少对方的恐慌，也保留你的空间。"]],"days":["练习在沉默前说一句暂停","区分冷静和冷处理","把真正不舒服的点写下来","复盘哪类人最容易让你闭嘴"],"reminder":"沉默可以保护你，但不要让它替你说完所有话。"},{"name":"审视压迫型","score":88,"summary":"你的沉默带着观察感。你不说话时，对方会感觉自己正在被评估，所以很容易紧张。","sections":[["别人最容易误读你的地方","别人会觉得你很有压迫感、在心里给他判分。你真实的状态可能只是：我需要先看清楚对方到底是什么态度。"],["你沉默背后的真实需求","你需要确定对方是否可靠、是否尊重你，而不是只听对方嘴上怎么说。你更相信行动和细节。"],["关系里最容易冷掉的瞬间",["对方解释很多但没有行动","你看见细节里的敷衍","你发现自己再热情会显得廉价"]],["更不伤人的表达方式","把审视变成具体反馈：我在意的是这件事有没有被处理，而不是你说了多少。这样比一直沉默更容易让对方知道重点。"]],"days":["写下你真正观察的3个信号","不要只用冷淡测试对方","给对方一次明确反馈","看行动，不只听解释"],"reminder":"你的判断力很强，但关系也需要一点可沟通的入口。"},{"name":"委屈冻结型","score":77,"summary":"你的沉默不是冷，而是委屈到不知道怎么开口。你怕一说就显得自己太在意，所以干脆停住。","sections":[["别人最容易误读你的地方","别人可能觉得你突然变难哄、情绪化，其实你是在努力不让自己说出更重的话。"],["你沉默背后的真实需求","你想被主动发现、被温柔询问，而不是每次都由你来解释自己为什么难受。"],["关系里最容易冷掉的瞬间",["你期待对方懂，但对方没有问","你越等越失望","你把“算了”说出口时，其实还没真的放下"]],["更不伤人的表达方式","给对方一个可以接住你的句子：我现在有点委屈，不太想争，但希望你能问问我。"]],"days":["把委屈写成一句需求","少用“没事”替代真实感受","选择一个安全的人练习表达","观察谁会认真接住你的停顿"],"reminder":"你不是太敏感，你只是希望有人不用你喊疼也能看见。"},{"name":"抽离自保型","score":72,"summary":"你的沉默更像抽离。你不想把情绪继续投进去，因为你已经感觉这段关系让你消耗。","sections":[["别人最容易误读你的地方","别人会觉得你突然不在乎了，但你不是无情，而是把自己从反复失望里撤出来。"],["你沉默背后的真实需求","你需要恢复掌控感，需要确认自己不是一直被对方节奏牵着走。"],["关系里最容易冷掉的瞬间",["对方反复消耗你的解释欲","你意识到自己一直在迁就","你开始觉得不说比说更省力"]],["更不伤人的表达方式","抽离前给自己和对方一个清楚交代：我需要减少投入，因为这段互动让我累。"]],"days":["给关系设一个观察期限","减少无效解释","保留必要沟通，不突然消失","把精力收回到自己的生活秩序"],"reminder":"抽离不是错，但清楚地抽离会让你更有力量。"}],"gains":["你的沉默压迫感类型","别人最容易误读你的地方","你沉默背后的真实需求","关系里最容易冷掉的瞬间","更不伤人的表达方式"]};let index=0;const answers=[];const letters=['A','B','C','D'];document.getElementById('gainList').innerHTML=data.gains.map(x=>`<div class="tag">${x}</div>`).join('');function startTest(){document.getElementById('intro').style.display='none';document.getElementById('quiz').style.display='block';renderQuestion();}function renderQuestion(){const q=data.questions[index];document.getElementById('bar').style.width=((index)/data.questions.length*100)+'%';document.getElementById('qnum').textContent=`第 ${index+1} / ${data.questions.length} 题`;document.getElementById('qtext').textContent=q.text;document.getElementById('options').innerHTML=q.options.map((t,i)=>`<button class="option" onclick="choose(${i})"><span class="letter">${letters[i]}</span><span>${t}</span></button>`).join('');}function choose(i){answers[index]=i;if(index<data.questions.length-1){index++;renderQuestion();}else showResult();}function prevQuestion(){if(index>0){index--;renderQuestion();}}function showResult(){const counts=[0,0,0,0];answers.forEach(x=>counts[x]++);let max=0;for(let i=1;i<4;i++)if(counts[i]>counts[max])max=i;const r=data.results[max];document.getElementById('quiz').style.display='none';document.getElementById('result').style.display='block';document.getElementById('rname').textContent=r.name;document.getElementById('score').textContent=r.score;document.getElementById('summary').innerHTML=`<h3>${data.gains[0]}</h3><p><strong>${r.name}</strong>：${r.summary}</p>`;const sections=(r.sections||[]).concat([['未来30天建议',r.days],['关键提醒',r.reminder]]);document.getElementById('sections').innerHTML=sections.map(([h,v])=>Array.isArray(v)?`<div class="section"><h3>${h}</h3><ul>${v.map(x=>`<li>${x}</li>`).join('')}</ul></div>`:`<div class="section"><h3>${h}</h3><p>${v}</p></div>`).join('');window.scrollTo({top:0,behavior:'smooth'});}</script></body></html>
