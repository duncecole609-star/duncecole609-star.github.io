<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>高级感距离报告</title>
<style>*{box-sizing:border-box}body{margin:0;background:#f0f2ee;color:#23302c;font-family:-apple-system,BlinkMacSystemFont,'Microsoft YaHei',sans-serif}.app{max-width:540px;margin:0 auto;min-height:100vh;padding:22px 18px 34px}.top{display:flex;justify-content:space-between;border-bottom:1px solid #cdd6c7;padding-bottom:14px;color:#6f7f5d;font-weight:800;font-size:14px}.hero{padding:34px 0}.pill{display:inline-flex;padding:7px 14px;border-radius:999px;background:#dde3d5;color:#6f7f5d;font-weight:800;font-size:13px;margin-bottom:16px}h1{font-size:30px;line-height:1.25;margin:0;font-weight:900}.sub{font-size:15px;line-height:1.7;margin-top:14px;color:#6a7068}.card,.section{background:#fffdf8;border:1px solid #cdd6c7;border-radius:18px;padding:18px;margin-top:16px;color:#211c18}button{border:none;border-radius:14px;padding:14px 16px;font-size:16px;font-weight:850;cursor:pointer}.primary{width:100%;background:#23302c;color:#fff;margin-top:14px}.secondary{background:#eee2d3;color:#201b16}.quiz,.result{display:none}.progress{height:8px;background:#eadcca;border-radius:99px;overflow:hidden;margin-bottom:18px}.bar{height:100%;background:#6f7f5d;width:0}.qnum{color:#6f7f5d;font-size:13px;font-weight:850;margin-bottom:8px}.qtext{font-size:21px;line-height:1.4;font-weight:900;margin-bottom:18px;color:#211c18}.option{width:100%;display:grid;grid-template-columns:34px 1fr;gap:12px;align-items:start;background:#fff;border:1px solid #cdd6c7;border-radius:14px;margin:10px 0;padding:13px 12px;text-align:left;font-size:15px;line-height:1.5;color:#211c18}.letter{width:30px;height:30px;border-radius:50%;display:grid;place-items:center;background:#dde3d5;color:#6f7f5d;font-weight:900}.result{text-align:center}.score{font-size:52px;color:#6f7f5d;font-weight:950;margin:14px 0 4px}.tag{display:inline-block;margin:4px;padding:7px 11px;border-radius:999px;background:#dde3d5;color:#6f7f5d;font-size:13px;font-weight:800}.section{text-align:left;line-height:1.7}.section h3{margin:0 0 10px;color:#6f7f5d;font-size:15px}.section p,.section li{color:#3b332c;font-size:14px;line-height:1.75}.section ul{padding-left:18px;margin:8px 0 0}.footer{font-size:12px;line-height:1.6;margin-top:18px;text-align:center;color:#6a7068}</style></head>
<body><main class="app"><div class="top"><span>高级感距离报告</span><span>12题报告</span></div><section id="intro" class="hero"><span class="pill">自我探索测试</span><h1>你的高级感，是清冷还是难靠近？</h1><p class="sub">按第一反应完成 12 题，看看这件事背后真正牵动你的是什么。她想知道：别人看到的是高级感还是冷淡？我的距离感是气质加分，还是阻止别人靠近？</p><div class="card"><div id="gainList"></div><button class="primary" onclick="startTest()">开始测试</button></div></section><section id="quiz" class="card quiz"><div class="progress"><div id="bar" class="bar"></div></div><div id="qnum" class="qnum"></div><div id="qtext" class="qtext"></div><div id="options"></div><button class="secondary" onclick="prevQuestion()">上一题</button></section><section id="result" class="result hero"><span class="pill">你的完整报告</span><h1 id="rname"></h1><div id="score" class="score"></div><div id="summary" class="section"></div><div id="sections"></div><p class="footer">本测试为自我探索参考，不构成专业判断、志愿填报建议、职业建议或效果承诺。请结合现实情况判断。</p></section></main>
<script>const data={"title":"你的高级感，是清冷还是难靠近？","product":"高级感距离报告","intro":"按第一反应完成 12 题，看看这件事背后真正牵动你的是什么。她想知道：别人看到的是高级感还是冷淡？我的距离感是气质加分，还是阻止别人靠近？","questions":[{"text":"别人第一次见你，最可能先感受到什么？","options":["干净克制，不会过度热情","有距离，不是谁都能马上靠近","安静但有细节，越看越耐看","有点冷，像不太想被打扰"]},{"text":"你最希望自己的高级感来自哪里？","options":["松弛和干净，不需要刻意证明","审美和细节，让人越看越有记忆点","边界和分寸，不轻易被打乱","气场和冷感，让人不敢随便靠近"]},{"text":"你最怕别人把你误会成什么？","options":["太冷淡，其实只是慢热","太难懂，其实只是需要时间","太端着，其实是不想用力讨好","太有距离，其实是不想被随便评价"]},{"text":"你被夸时，哪句话最戳你？","options":["你很舒服，不会给人压力","你很有质感，不是第一眼但很耐看","你很特别，说不出但会记住","你很有边界，不是谁都能靠近"]},{"text":"如果要保留高级感但更容易被喜欢，你最需要调整什么？","options":["多一点温度，不让干净变成疏离","多一个记忆点，不让低调用成透明","多一点主动，不让边界变成拒绝","少一点防备，不让冷感变成压力"]},{"text":"你的高级感最容易在哪个场景被看见？","options":["人多时不急着抢话，但存在感很稳","细节很干净，让人觉得你有选择标准","拒绝别人时不慌，也不解释过度","情绪不外放，却让人想继续观察你"]},{"text":"别人把你误会成难靠近时，通常漏看了什么？","options":["你不是冷，只是热情给得比较慢","你不是端着，只是不想用力讨好","你不是没兴趣，只是在观察安全感","你不是高傲，只是边界很清楚"]},{"text":"哪种细节最容易拉低你原本的质感？","options":["为了合群突然说很多违心的话","过度解释自己的选择和审美","把边界做得太硬，让人只感到压力","明明有标准，却为了不尴尬随便妥协"]},{"text":"完整报告里，你最想知道哪种高级感答案？","options":["我属于清冷、松弛还是贵气","别人第一眼为什么这样记住我","我该放大哪种气质关键词","怎么保留距离感但更容易被喜欢"]},{"text":"当你想让自己更有吸引力时，最怕变成什么？","options":["太用力，反而失去原本的留白","太冷，别人根本没有靠近入口","太追流行，看起来不像自己","太想被懂，显得不够稳定"]},{"text":"你的距离感更像来自哪里？","options":["习惯慢热，需要时间确认人和场合","审美标准明确，不想随便被带偏","边界感强，不喜欢被贸然打扰","有一点防备，怕真实自己被评价"]},{"text":"未来30天，你最适合先调整哪一个细节？","options":["保留冷感，但多给一句温和回应","减少过度解释，让选择更稳定","固定一个自己的风格记忆点","给安全的人一点靠近入口"]}],"results":[{"name":"清冷留白型","score":86,"summary":"你的高级感来自干净和克制。你不急着让所有人喜欢你，越留白越容易让真正敏感的人想靠近。","sections":[["别人第一眼误读你的原因","你的安静容易被看成冷淡。别人不知道你不是没温度，而是不习惯一开始就把情绪、热情和私人感全部放出来。"],["你最适合放大的气质关键词",["干净","克制","留白","慢热","不讨好"]],["容易拉低质感的细节","过度解释、为了合群而降低标准、频繁证明自己，都容易冲掉你的留白感。你越急着被懂，越容易显得不稳。"],["更自然的表达/穿搭建议","表达上保留简洁，但增加一个温和入口；穿搭上适合低饱和、干净线条、少量记忆点，不需要堆满元素。"]],"days":["保留一个个人标志物","减少过冷表达","主动释放一次善意","观察谁能读懂你的留白"],"reminder":"高级感不是没有温度，而是温度有分寸。"},{"name":"质感细节型","score":80,"summary":"你的高级感不靠第一眼冲击，而靠细节耐看。别人越靠近，越容易发现你不是随便拼出来的。","sections":[["别人第一眼误读你的原因","别人可能一开始觉得你普通或低调，因为你的吸引力不是大声出现，而是在细节里慢慢变明显。"],["你最适合放大的气质关键词",["耐看","细节","质感","秩序","舒服"]],["容易拉低质感的细节","为了追流行而堆元素、每个细节都想用力、把审美变成紧绷要求，都会让你的质感变得不自然。"],["更自然的表达/穿搭建议","保留1-2个重点就够了：一个颜色、一个材质、一个稳定风格。表达上少一点解释，多一点稳定输出。"]],"days":["做一次风格减法","保留最像你的颜色","减少跟风购买","用舒服状态承接审美"],"reminder":"真正耐看的质感，是看得出你很自在。"},{"name":"边界贵气型","score":89,"summary":"你的高级感带一点边界。你不是讨好型的人，别人会感觉你有自己的标准和选择权。","sections":[["别人第一眼误读你的原因","别人容易把你的边界看成傲气。其实你只是对靠近有筛选，不喜欢被随便评价、打扰或安排。"],["你最适合放大的气质关键词",["边界","选择权","贵气","稳定","不随便"]],["容易拉低质感的细节","把边界做成敌意、用冷场替代回应、过度强调“我不需要”，会让贵气变成压迫感。"],["更自然的表达/穿搭建议","表达上适合清楚但柔和：可以拒绝，但不用让人难堪。穿搭适合利落剪裁、低调质感、少量有分量的配饰。"]],"days":["给熟悉的人一点入口","减少过度防备","表达喜欢和不喜欢","区分边界和隔绝"],"reminder":"边界是高级感的一部分，但不是全部。"},{"name":"防备冷感型","score":73,"summary":"你的高级感里有一部分来自防备。别人看到的是冷感，你自己其实是在避免被看穿。","sections":[["别人第一眼误读你的原因","别人会觉得你不好接近，因为你习惯先观察、先保留，不想太快暴露自己的喜好、脆弱和真实需要。"],["你最适合放大的气质关键词",["神秘","冷感","独立","观察力","保护感"]],["容易拉低质感的细节","如果防备太重，会让人觉得你一直在审判别人，或者没有任何进入空间。冷感一旦过头，就会变成距离压力。"],["更自然的表达/穿搭建议","保留冷感，但增加一点可读性：一句明确回应、一个稳定表情、一个柔和细节，都能让你更有吸引力而不是更难靠近。"]],"days":["写下你害怕被看见的部分","选择一个安全对象练习表达","保留边界但减少敌意","给关系一点试错空间"],"reminder":"你不需要变热情，只需要别把所有靠近都当危险。"}],"gains":["你的高级感距离类型","别人第一眼误读你的原因","你最适合放大的气质关键词","容易拉低质感的细节","更自然的表达/穿搭建议"]};let index=0;const answers=[];const letters=['A','B','C','D'];document.getElementById('gainList').innerHTML=data.gains.map(x=>`<div class="tag">${x}</div>`).join('');function startTest(){document.getElementById('intro').style.display='none';document.getElementById('quiz').style.display='block';renderQuestion();}function renderQuestion(){const q=data.questions[index];document.getElementById('bar').style.width=((index)/data.questions.length*100)+'%';document.getElementById('qnum').textContent=`第 ${index+1} / ${data.questions.length} 题`;document.getElementById('qtext').textContent=q.text;document.getElementById('options').innerHTML=q.options.map((t,i)=>`<button class="option" onclick="choose(${i})"><span class="letter">${letters[i]}</span><span>${t}</span></button>`).join('');}function choose(i){answers[index]=i;if(index<data.questions.length-1){index++;renderQuestion();}else showResult();}function prevQuestion(){if(index>0){index--;renderQuestion();}}function showResult(){const counts=[0,0,0,0];answers.forEach(x=>counts[x]++);let max=0;for(let i=1;i<4;i++)if(counts[i]>counts[max])max=i;const r=data.results[max];document.getElementById('quiz').style.display='none';document.getElementById('result').style.display='block';document.getElementById('rname').textContent=r.name;document.getElementById('score').textContent=r.score;document.getElementById('summary').innerHTML=`<h3>${data.gains[0]}</h3><p><strong>${r.name}</strong>：${r.summary}</p>`;const sections=(r.sections||[]).concat([['未来30天建议',r.days],['关键提醒',r.reminder]]);document.getElementById('sections').innerHTML=sections.map(([h,v])=>Array.isArray(v)?`<div class="section"><h3>${h}</h3><ul>${v.map(x=>`<li>${x}</li>`).join('')}</ul></div>`:`<div class="section"><h3>${h}</h3><p>${v}</p></div>`).join('');window.scrollTo({top:0,behavior:'smooth'});}</script></body></html>
