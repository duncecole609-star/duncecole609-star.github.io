<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>底线反应报告</title>
<style>*{box-sizing:border-box}body{margin:0;background:#fbefec;color:#302326;font-family:-apple-system,BlinkMacSystemFont,'Microsoft YaHei',sans-serif}.app{max-width:540px;margin:0 auto;min-height:100vh;padding:22px 18px 34px}.top{display:flex;justify-content:space-between;border-bottom:1px solid #dfc5bf;padding-bottom:14px;color:#bd635d;font-weight:800;font-size:14px}.hero{padding:34px 0}.pill{display:inline-flex;padding:7px 14px;border-radius:999px;background:#f1d8d3;color:#bd635d;font-weight:800;font-size:13px;margin-bottom:16px}h1{font-size:30px;line-height:1.25;margin:0;font-weight:900}.sub{font-size:15px;line-height:1.7;margin-top:14px;color:#7a6866}.card,.section{background:#fffdf8;border:1px solid #dfc5bf;border-radius:18px;padding:18px;margin-top:16px;color:#211c18}button{border:none;border-radius:14px;padding:14px 16px;font-size:16px;font-weight:850;cursor:pointer}.primary{width:100%;background:#302326;color:#fff;margin-top:14px}.secondary{background:#eee2d3;color:#201b16}.quiz,.result{display:none}.progress{height:8px;background:#eadcca;border-radius:99px;overflow:hidden;margin-bottom:18px}.bar{height:100%;background:#bd635d;width:0}.qnum{color:#bd635d;font-size:13px;font-weight:850;margin-bottom:8px}.qtext{font-size:21px;line-height:1.4;font-weight:900;margin-bottom:18px;color:#211c18}.option{width:100%;display:grid;grid-template-columns:34px 1fr;gap:12px;align-items:start;background:#fff;border:1px solid #dfc5bf;border-radius:14px;margin:10px 0;padding:13px 12px;text-align:left;font-size:15px;line-height:1.5;color:#211c18}.letter{width:30px;height:30px;border-radius:50%;display:grid;place-items:center;background:#f1d8d3;color:#bd635d;font-weight:900}.result{text-align:center}.score{font-size:52px;color:#bd635d;font-weight:950;margin:14px 0 4px}.tag{display:inline-block;margin:4px;padding:7px 11px;border-radius:999px;background:#f1d8d3;color:#bd635d;font-size:13px;font-weight:800}.section{text-align:left;line-height:1.7}.section h3{margin:0 0 10px;color:#bd635d;font-size:15px}.section p,.section li{color:#3b332c;font-size:14px;line-height:1.75}.section ul{padding-left:18px;margin:8px 0 0}.footer{font-size:12px;line-height:1.6;margin-top:18px;text-align:center;color:#7a6866}</style></head>
<body><main class="app"><div class="top"><span>底线反应报告</span><span>12题报告</span></div><section id="intro" class="hero"><span class="pill">自我探索测试</span><h1>你不是脾气差，是哪条底线被碰了？</h1><p class="sub">按第一反应完成 12 题，看看这件事背后真正牵动你的是什么。她想知道：我到底是情绪化，还是底线真的被越过了？哪句话、哪种人、哪种关系最容易触发我？</p><div class="card"><div id="gainList"></div><button class="primary" onclick="startTest()">开始测试</button></div></section><section id="quiz" class="card quiz"><div class="progress"><div id="bar" class="bar"></div></div><div id="qnum" class="qnum"></div><div id="qtext" class="qtext"></div><div id="options"></div><button class="secondary" onclick="prevQuestion()">上一题</button></section><section id="result" class="result hero"><span class="pill">你的完整报告</span><h1 id="rname"></h1><div id="score" class="score"></div><div id="summary" class="section"></div><div id="sections"></div><p class="footer">本测试为自我探索参考，不构成专业判断、志愿填报建议、职业建议或效果承诺。请结合现实情况判断。</p></section></main>
<script>const data={"title":"你不是脾气差，是哪条底线被碰了？","product":"底线反应报告","intro":"按第一反应完成 12 题，看看这件事背后真正牵动你的是什么。她想知道：我到底是情绪化，还是底线真的被越过了？哪句话、哪种人、哪种关系最容易触发我？","questions":[{"text":"别人哪种行为最容易让你突然变冷？","options":["反复试探你的时间和精力，好像你的配合是理所当然","把玩笑开到你在意的地方，还说你太敏感","明明答应过的事又轻轻带过，让你觉得不被尊重","在人前替你做决定，让你连拒绝的空间都没有"]},{"text":"你真正生气之前，通常已经发生了什么？","options":["提醒过很多次，但对方像没听见一样继续","你一直在给台阶，最后发现对方根本没想接住","你压着不说，是因为怕一说就显得自己不好相处","你已经感觉被消耗，却还在试图维持表面和平"]},{"text":"冲突发生时，你最怕自己变成哪种样子？","options":["话说得太重，把关系推到无法回头的位置","突然沉默，让对方猜不到你到底怎么了","越解释越委屈，最后像是在求对方理解","表面没事，心里把这段关系慢慢扣分"]},{"text":"你最希望别人先理解你哪一点？","options":["我不是不能迁就，只是不想一直被默认可以牺牲","我不是小题大做，是这件事已经重复太多次","我不是想赢，我只是想确认自己被认真对待","我不是突然冷淡，是之前很多小失望累起来了"]},{"text":"如果要更稳地表达底线，你最缺哪一步？","options":["更早说出不舒服，而不是等到已经爆炸","把边界说具体，不再只说“随便你”","允许自己拒绝，不把拒绝等同于伤害别人","看清哪些关系值得解释，哪些只需要保持距离"]},{"text":"这段关系里，哪种细节最容易让你觉得底线被踩？","options":["对方总把你的时间安排得很随意","你认真说的话被对方当成情绪","你拒绝一次就被说成不近人情","对方一边道歉一边继续重复同样的事"]},{"text":"你最常把哪种反应误认为自己脾气不好？","options":["明明很受伤，却先怪自己反应太大","冷下来以后，还在心里反复审判自己","说清边界时，总觉得自己像在伤人","对方不改时，你才敢承认自己很失望"]},{"text":"当别人说你太敏感时，你心里最真实的念头是？","options":["我不是敏感，是你一直没有认真听","我已经忍很久了，只是你没看见","我也想好好说，但你总让我没余地","我其实很怕一说出口关系就变差"]},{"text":"你最需要完整报告帮你分清哪件事？","options":["哪些关系值得继续解释","哪里是底线，哪里只是情绪","怎样说不，才不显得像翻脸","我为什么总是忍到最后才爆发"]},{"text":"如果下次再被碰到底线，你最想先做到什么？","options":["第一次不舒服就说清具体原因","不再用沉默等对方自己发现","拒绝后不急着补偿对方情绪","看见对方行动后再决定要不要继续"]},{"text":"你最容易在哪类人面前放低自己的底线？","options":["关系很近、让你舍不得翻脸的人","表面很强势、让你怕冲突的人","对你忽冷忽热、让你想证明的人","总说自己不容易、让你心软的人"]},{"text":"你现在最该保留的边界提醒是什么？","options":["不舒服出现得早，边界就要说得早","你可以温和，但不用一直退让","真正重视你的人不会反复踩同一点","解释一次就够了，剩下看对方行动"]}],"results":[{"name":"积累爆发型","score":82,"summary":"你不是一直脾气差，而是很多次不舒服都先压下去了。真正让你爆发的不是这一件事，而是“我已经忍了很久，你却还以为没关系”。","sections":[["最容易触发你的关系场景","反复提醒无效、对方把你的退让当默认、你的感受被轻描淡写时，你最容易从好说话变成突然很硬。越亲近的人越容易触发，因为你对他们原本有更多期待。"],["你是防御还是攻击的判断点",["前期会解释、提醒、给台阶","中期开始沉默、减少分享、心里扣分","后期一旦开口，语气会比事情本身更重"]],["容易被误会成脾气差的地方","别人只看到你最后那一下爆发，看不到前面很多次忍让，所以会觉得你小题大做。其实你不是想赢，而是想让对方终于认真看见边界。"],["更稳的边界表达方式","不要等到情绪满格再说。第一次不舒服时就把话说具体：哪件事、哪里不接受、希望对方怎么调整。语气可以平，但边界要清楚。"]],"days":["记录最近3次不舒服的共同点","提前说出一次“这件事我不接受”","把解释控制在一次，不反复证明自己","观察对方是否真的调整，而不是只看道歉"],"reminder":"真正的边界不是爆发，而是提前让别人知道哪里不能踩。"},{"name":"防御冷却型","score":74,"summary":"你碰到底线后不一定会吵，更多是突然变冷、撤回热情。你不是没情绪，而是在用距离保护自己不要继续被消耗。","sections":[["最容易触发你的关系场景","对方让你觉得不被尊重、被忽略、被安排，或者你的表达被当成麻烦时，你会很快把自己收起来。"],["你是防御还是攻击的判断点",["回复变慢，但不是故意吊着","语气变礼貌，分享欲下降","表面没事，心里已经拉开距离"]],["容易被误会成脾气差的地方","别人可能觉得你冷暴力，但你真实的状态更像是“我不知道怎么说才不会再受伤”。你的沉默不是惩罚，而是自保。"],["更稳的边界表达方式","在消失前留一句清楚的话：我现在不舒服，需要一点时间，之后再谈。这样既保留边界，也减少误会。"]],"days":["给情绪设置一个冷静时限","冷静后补一句真实感受","区分“不安全”和“不喜欢”","不要用完全消失处理所有关系"],"reminder":"你的冷不是问题，问题是别人不知道你为什么冷。"},{"name":"原则清算型","score":88,"summary":"你最在意的不是面子，而是原则有没有被认真对待。别人一旦踩到你的秩序感，你很难再装作没发生。","sections":[["最容易触发你的关系场景","失约、敷衍、公开让你难堪、答应后反悔，这类“态度问题”比事情大小更容易刺中你。"],["你是防御还是攻击的判断点",["你会先看对方有没有意识到问题","如果对方轻描淡写，你会迅速变硬","你不需要被哄，更需要对方承担"]],["容易被误会成脾气差的地方","你容易把态度问题上升到关系判断，别人会觉得你太严格。但对你来说，这不是小事，而是对方是否尊重你的证据。"],["更稳的边界表达方式","先说事实，再说影响，最后说你要的调整。少用审判句，多用规则句，让对方知道怎么修正。"]],"days":["列出3条不可退让的原则","减少含糊试探，直接说标准","观察对方是否愿意修正","不要把所有关系都按最高标准考核"],"reminder":"原则是用来保护你的，不是用来审判所有人的。"},{"name":"委屈反击型","score":79,"summary":"你的攻击性常常来自委屈。你越想被看见，越容易说出带刺的话，因为你希望对方终于知道你有多难受。","sections":[["最容易触发你的关系场景","你付出了、等待了、解释了，但对方还是没有回应你的需要时，你会从委屈变成反击。"],["你是防御还是攻击的判断点",["很想被懂，却说成指责","越解释越激动","事后容易后悔，但又觉得自己没被理解"]],["容易被误会成脾气差的地方","别人听到的是攻击，没听见你背后的请求。你真正想说的可能是：我需要你认真一点，我不是无缘无故这样。"],["更稳的边界表达方式","把“你总是”换成“我需要”。先说感受，再说具体请求，比让对方猜你的委屈更有效。"]],"days":["把一句指责改成一句需求","冲突前暂停10分钟","写下真正想要的回应","复盘哪句话会扩大冲突"],"reminder":"你不是攻击性强，你只是太久没有好好说出委屈。"}],"gains":["你的底线反应类型","最容易触发你的关系场景","你是防御还是攻击的判断点","容易被误会成脾气差的地方","更稳的边界表达方式"]};let index=0;const answers=[];const letters=['A','B','C','D'];document.getElementById('gainList').innerHTML=data.gains.map(x=>`<div class="tag">${x}</div>`).join('');function startTest(){document.getElementById('intro').style.display='none';document.getElementById('quiz').style.display='block';renderQuestion();}function renderQuestion(){const q=data.questions[index];document.getElementById('bar').style.width=((index)/data.questions.length*100)+'%';document.getElementById('qnum').textContent=`第 ${index+1} / ${data.questions.length} 题`;document.getElementById('qtext').textContent=q.text;document.getElementById('options').innerHTML=q.options.map((t,i)=>`<button class="option" onclick="choose(${i})"><span class="letter">${letters[i]}</span><span>${t}</span></button>`).join('');}function choose(i){answers[index]=i;if(index<data.questions.length-1){index++;renderQuestion();}else showResult();}function prevQuestion(){if(index>0){index--;renderQuestion();}}function showResult(){const counts=[0,0,0,0];answers.forEach(x=>counts[x]++);let max=0;for(let i=1;i<4;i++)if(counts[i]>counts[max])max=i;const r=data.results[max];document.getElementById('quiz').style.display='none';document.getElementById('result').style.display='block';document.getElementById('rname').textContent=r.name;document.getElementById('score').textContent=r.score;document.getElementById('summary').innerHTML=`<h3>${data.gains[0]}</h3><p><strong>${r.name}</strong>：${r.summary}</p>`;const sections=(r.sections||[]).concat([['未来30天建议',r.days],['关键提醒',r.reminder]]);document.getElementById('sections').innerHTML=sections.map(([h,v])=>Array.isArray(v)?`<div class="section"><h3>${h}</h3><ul>${v.map(x=>`<li>${x}</li>`).join('')}</ul></div>`:`<div class="section"><h3>${h}</h3><p>${v}</p></div>`).join('');window.scrollTo({top:0,behavior:'smooth'});}</script></body></html>
