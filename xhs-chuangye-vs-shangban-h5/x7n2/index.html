<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>反差吸引力报告</title>
<style>*{box-sizing:border-box}body{margin:0;background:#fbf4ea;color:#2a2722;font-family:-apple-system,BlinkMacSystemFont,'Microsoft YaHei',sans-serif}.app{max-width:540px;margin:0 auto;min-height:100vh;padding:22px 18px 34px}.top{display:flex;justify-content:space-between;border-bottom:1px solid #dccab1;padding-bottom:14px;color:#a77a3f;font-weight:800;font-size:14px}.hero{padding:34px 0}.pill{display:inline-flex;padding:7px 14px;border-radius:999px;background:#eadcc8;color:#a77a3f;font-weight:800;font-size:13px;margin-bottom:16px}h1{font-size:30px;line-height:1.25;margin:0;font-weight:900}.sub{font-size:15px;line-height:1.7;margin-top:14px;color:#756b5e}.card,.section{background:#fffdf8;border:1px solid #dccab1;border-radius:18px;padding:18px;margin-top:16px;color:#211c18}button{border:none;border-radius:14px;padding:14px 16px;font-size:16px;font-weight:850;cursor:pointer}.primary{width:100%;background:#2a2722;color:#fff;margin-top:14px}.secondary{background:#eee2d3;color:#201b16}.quiz,.result{display:none}.progress{height:8px;background:#eadcca;border-radius:99px;overflow:hidden;margin-bottom:18px}.bar{height:100%;background:#a77a3f;width:0}.qnum{color:#a77a3f;font-size:13px;font-weight:850;margin-bottom:8px}.qtext{font-size:21px;line-height:1.4;font-weight:900;margin-bottom:18px;color:#211c18}.option{width:100%;display:grid;grid-template-columns:34px 1fr;gap:12px;align-items:start;background:#fff;border:1px solid #dccab1;border-radius:14px;margin:10px 0;padding:13px 12px;text-align:left;font-size:15px;line-height:1.5;color:#211c18}.letter{width:30px;height:30px;border-radius:50%;display:grid;place-items:center;background:#eadcc8;color:#a77a3f;font-weight:900}.result{text-align:center}.score{font-size:52px;color:#a77a3f;font-weight:950;margin:14px 0 4px}.tag{display:inline-block;margin:4px;padding:7px 11px;border-radius:999px;background:#eadcc8;color:#a77a3f;font-size:13px;font-weight:800}.section{text-align:left;line-height:1.7}.section h3{margin:0 0 10px;color:#a77a3f;font-size:15px}.section p,.section li{color:#3b332c;font-size:14px;line-height:1.75}.section ul{padding-left:18px;margin:8px 0 0}.footer{font-size:12px;line-height:1.6;margin-top:18px;text-align:center;color:#756b5e}</style></head>
<body><main class="app"><div class="top"><span>反差吸引力报告</span><span>12题报告</span></div><section id="intro" class="hero"><span class="pill">自我探索测试</span><h1>你最让人上头的反差感是什么？</h1><p class="sub">按第一反应完成 12 题，看看这件事背后真正牵动你的是什么。她想知道：我让人上头的是温柔反差、冷感反差、成熟反差，还是隐藏的脆弱？</p><div class="card"><div id="gainList"></div><button class="primary" onclick="startTest()">开始测试</button></div></section><section id="quiz" class="card quiz"><div class="progress"><div id="bar" class="bar"></div></div><div id="qnum" class="qnum"></div><div id="qtext" class="qtext"></div><div id="options"></div><button class="secondary" onclick="prevQuestion()">上一题</button></section><section id="result" class="result hero"><span class="pill">你的完整报告</span><h1 id="rname"></h1><div id="score" class="score"></div><div id="summary" class="section"></div><div id="sections"></div><p class="footer">本测试为自我探索参考，不构成专业判断、志愿填报建议、职业建议或效果承诺。请结合现实情况判断。</p></section></main>
<script>const data={"title":"你最让人上头的反差感是什么？","product":"反差吸引力报告","intro":"按第一反应完成 12 题，看看这件事背后真正牵动你的是什么。她想知道：我让人上头的是温柔反差、冷感反差、成熟反差，还是隐藏的脆弱？","questions":[{"text":"别人越了解你，最容易发现哪种反差？","options":["看起来冷，其实很细腻","看起来好说话，其实很有原则","看起来松弛，其实心里标准很高","看起来独立，其实也很需要稳定回应"]},{"text":"你最希望别人被你哪一点吸引？","options":["不张扬但很有记忆点","温柔但不是没有底线","冷静但关键时刻很可靠","有距离但靠近后很真实"]},{"text":"你最怕自己的反差被误读成什么？","options":["装冷淡","忽冷忽热","不好伺候","太矛盾"]},{"text":"当你在意一个人时，最明显的变化是？","options":["从冷变细心，但不会大张旗鼓","会多解释一点自己的想法","会开始在细节上照顾对方","会暴露一点平时不让人看的脆弱"]},{"text":"你的反差感最需要被谁看懂？","options":["能读懂你安静里细节的人","尊重你边界但不被吓退的人","看见你努力但不催你表现的人","接得住你柔软也尊重你独立的人"]},{"text":"你的反差感最容易在哪个瞬间被人记住？","options":["平时很淡，却在细节里突然很认真","看起来温和，关键时刻却很有原则","外表松弛，但选择标准一点不低","看起来独立，却偶尔露出真实柔软"]},{"text":"别人被你上头后，最可能误会哪一点？","options":["把你的克制误会成不在乎","把你的温柔误会成没边界","把你的松弛误会成随便都可以","把你的独立误会成不需要陪伴"]},{"text":"你反差感背后最真实的需要是什么？","options":["被看见细节，而不是被要求热情","被尊重边界，而不是被消耗温柔","保留自由，同时被认真选择","有人靠近，但不控制你的节奏"]},{"text":"完整报告里，你最想知道哪种吸引力答案？","options":["我最让人上头的瞬间是什么","哪类人最容易被我的反差吸引","我的反差为什么也容易被误解","怎么保留魅力但不被关系消耗"]},{"text":"当你在意一个人时，哪种反差最容易暴露？","options":["从冷到细心，但仍然不声张","从好说话到突然非常坚定","从随和到开始认真挑细节","从独立到愿意说一点需要"]},{"text":"你最怕自己的吸引力变成哪种负担？","options":["别人只爱你的神秘，不接住你的真实","别人享受你的温柔，却忽视你的边界","别人靠近你的松弛，却不尊重标准","别人依赖你的独立，却忘了你也需要回应"]},{"text":"未来30天，你最适合放大哪种魅力表达？","options":["把一个细腻回应说出口","提前亮出温柔里的原则","在选择上更明确一点","允许自己提出一个小需求"]}],"results":[{"name":"冷感细腻型","score":88,"summary":"你最让人上头的地方，是外表克制，内里细腻。别人一旦发现你的温度，会觉得很难忘。","sections":[["别人最容易上头的瞬间","当你原本很淡，却在某个细节里突然显出认真、照顾或记得对方的小事时，反差会非常强。"],["你反差感背后的真实需求","你需要的是被真正看见，而不是被要求一直热情。你希望有人能读懂你不明显但很真实的在意。"],["容易被误会的地方","前期容易被误会成不感兴趣、太冷、难靠近。别人如果只看表面，可能会错过你的细腻。"],["更适合你的魅力表达方式","保留冷感，但偶尔把细腻说出来。一个明确回应、一句记得、一次主动，会比突然热烈更有吸引力。"]],"days":["主动表达一次在意","保留你的克制但别完全隐藏","观察谁能读懂细节","不要用冷淡测试所有人"],"reminder":"你的温度不是少，只是出现得很有选择。"},{"name":"温柔有刃型","score":82,"summary":"你的反差来自温柔和原则并存。你可以很好说话，但不代表没有边界。","sections":[["别人最容易上头的瞬间","当别人发现你既能温柔照顾，又能在关键时刻坚定说不，会突然意识到你不是没有锋芒。"],["你反差感背后的真实需求","你想被喜欢，但更想被尊重。你希望自己的温柔不是被消耗，而是被认真珍惜。"],["容易被误会的地方","你前期太包容，别人容易以为你没有底线；等你变硬时，又会觉得你突然变脸。"],["更适合你的魅力表达方式","早点把原则轻轻放出来。温柔不需要无限让步，边界清楚反而会让你更有吸引力。"]],"days":["列出3个不可退让点","在早期说清边界","少用沉默试探","给善意也给规则"],"reminder":"温柔不是无限让步，原则会让温柔更有力量。"},{"name":"松弛高标型","score":85,"summary":"你看起来松弛，但心里有自己的标准。别人越接近，越会发现你不是随便的人。","sections":[["别人最容易上头的瞬间","你不急、不抢、不刻意表现，但在选择、审美和关系标准上很清楚，这种反差会让人想继续了解。"],["你反差感背后的真实需求","你需要的是自由和质量同时存在。你不想被框住，也不想为了热闹降低自己的标准。"],["容易被误会的地方","别人可能以为你好说话、无所谓，甚至可以被随便安排。其实你只是懒得把标准挂在嘴边。"],["更适合你的魅力表达方式","保持松弛，但在关键处明确表达选择。不要让别人把你的不计较误会成没要求。"]],"days":["明确一次你的偏好","保留松弛感但不模糊标准","减少为了合群而妥协","把选择权拿回自己手里"],"reminder":"你的松弛不是没标准，而是不需要一直证明标准。"},{"name":"独立柔软型","score":79,"summary":"你看起来独立，但内里有柔软需求。真正让人上头的是：你不依附，却也不是没有情感。","sections":[["别人最容易上头的瞬间","当你平时很能自己处理事情，却偶尔露出一点真实脆弱或需要时，会让人感到强烈反差。"],["你反差感背后的真实需求","你需要的是稳定陪伴，而不是被控制。你想保留自己的空间，也希望有人懂你不是永远不需要人。"],["容易被误会的地方","别人容易以为你太独立、不需要照顾，或者把你的沉默当成不在乎。"],["更适合你的魅力表达方式","允许自己表达一点需要。不是依赖，而是让关系有机会进入你的真实生活。"]],"days":["说出一个小需求","接受一次善意帮助","不要把脆弱全部藏起来","选择能尊重你独立的人靠近"],"reminder":"你的独立很迷人，但柔软会让人真正靠近。"}],"gains":["你的反差吸引力类型","别人最容易上头的瞬间","你反差感背后的真实需求","容易被误会的地方","更适合你的魅力表达方式"]};let index=0;const answers=[];const letters=['A','B','C','D'];document.getElementById('gainList').innerHTML=data.gains.map(x=>`<div class="tag">${x}</div>`).join('');function startTest(){document.getElementById('intro').style.display='none';document.getElementById('quiz').style.display='block';renderQuestion();}function renderQuestion(){const q=data.questions[index];document.getElementById('bar').style.width=((index)/data.questions.length*100)+'%';document.getElementById('qnum').textContent=`第 ${index+1} / ${data.questions.length} 题`;document.getElementById('qtext').textContent=q.text;document.getElementById('options').innerHTML=q.options.map((t,i)=>`<button class="option" onclick="choose(${i})"><span class="letter">${letters[i]}</span><span>${t}</span></button>`).join('');}function choose(i){answers[index]=i;if(index<data.questions.length-1){index++;renderQuestion();}else showResult();}function prevQuestion(){if(index>0){index--;renderQuestion();}}function showResult(){const counts=[0,0,0,0];answers.forEach(x=>counts[x]++);let max=0;for(let i=1;i<4;i++)if(counts[i]>counts[max])max=i;const r=data.results[max];document.getElementById('quiz').style.display='none';document.getElementById('result').style.display='block';document.getElementById('rname').textContent=r.name;document.getElementById('score').textContent=r.score;document.getElementById('summary').innerHTML=`<h3>${data.gains[0]}</h3><p><strong>${r.name}</strong>：${r.summary}</p>`;const sections=(r.sections||[]).concat([['未来30天建议',r.days],['关键提醒',r.reminder]]);document.getElementById('sections').innerHTML=sections.map(([h,v])=>Array.isArray(v)?`<div class="section"><h3>${h}</h3><ul>${v.map(x=>`<li>${x}</li>`).join('')}</ul></div>`:`<div class="section"><h3>${h}</h3><p>${v}</p></div>`).join('');window.scrollTo({top:0,behavior:'smooth'});}</script></body></html>
