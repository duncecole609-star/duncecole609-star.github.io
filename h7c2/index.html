<body><main class="app"><div class="top"><span>隐形压迫感报告</span><span>12题报告</span></div><section id="intro" class="hero"><span class="pill">自我探索测试</span><h1>你看起来好相处，其实压迫感有多强？</h1><p class="sub">这不是攻击性评判，而是帮你看清：你身上哪些不自觉的表达，会让别人觉得有压力。</p><div class="card"><p>□ 你的隐形压迫感类型</p><p>□ 别人感到紧张的真实原因</p><p>□ 你最容易露出锋芒的场景</p><p>□ 容易被误会的关系细节</p><p>□ 更柔和但不失边界的表达方式</p><button class="primary" onclick="startTest()">开始测试</button></div></section><section id="quiz" class="card quiz"><div class="progress"><div id="bar" class="bar"></div></div><div id="qnum" class="qnum"></div><div id="qtext" class="qtext"></div><div id="options"></div><button class="secondary" onclick="prevQuestion()">上一题</button></section><section id="result" class="result hero"><span class="pill">你的完整报告</span><h1 id="rname"></h1><p id="rsub" class="sub"></p><div id="score" class="score"></div><div id="sections"></div><p class="footer">本测试为自我探索参考，不构成诊断、志愿填报建议、职业建议或承诺。请结合现实情况判断。</p></section></main>
<script>const data={"account":"账号1","folder":"01_yinxing-yapogan","path":"h7c2","publish_time":"早上8点","cover_title":"你看起来好相处，其实压迫感有多强？","note_title":"你看起来好相处，其实压迫感有多强？","product_title":"隐形压迫感报告","direction":"隐形攻击性","visual":"glass_distance","colors":{"bg":"#eaf2e8","qbg":"#f5f8f1","ink":"#18332d","accent":"#6d8d64","soft":"#d9e7d0","muted":"#647462","line":"#c9d7c2","report_bg":"#14201b","report_ink":"#f5fff0","report_muted":"#b7c5ad","report_card":"#203028","report_line":"#405348","locked_bg":"#fbfff5","locked_ink":"#1d271f"},"gains":["你的隐形压迫感类型","别人感到紧张的真实原因","你最容易露出锋芒的场景","容易被误会的关系细节","更柔和但不失边界的表达方式"],"product_desc":"这不是攻击性评判，而是帮你看清：你身上哪些不自觉的表达，会让别人觉得有压力。","product_main":"你不是不好相处，只是某些表达太有重量","preview_type":"边界压迫型","preview_sub":"你看起来讲道理，但别人可能会在你面前变得小心。","core":"你身上让人紧张的表达细节","gap":"你的压迫感到底来自原则、控制感，还是不自觉的防御","questions":[{"text":"别人做事没达到你的标准时，你第一反应更像？","options":["先忍着，但心里已经开始扣分，之后会明显变冷","直接指出问题，希望对方赶紧修正，不想浪费时间","问清楚原因，但语气可能比自己想象中更硬","表面说没事，后面减少信任和合作"]},{"text":"你最容易在哪种关系里显得有压迫感？","options":["越亲近越容易，因为你会默认对方应该懂你","合作关系里，因为你很在意效率和结果","暧昧或亲密关系里，因为不确定会让你想掌控节奏","朋友关系里，因为你不喜欢反复解释同一件事"]},{"text":"当别人让你失望时，你通常会怎么处理？","options":["不立刻爆发，但会把对方从重要位置往外挪","把问题讲得很清楚，希望对方知道严重性","用反问让对方意识到哪里不对","开始冷处理，让对方自己感受到距离"]},{"text":"别人最可能误会你的地方是？","options":["以为你冷，其实你只是对不靠谱很敏感","以为你强势，其实你只是想把事情讲清楚","以为你不好惹，其实你只是不想被糊弄","以为你不在乎，其实你已经在心里很失望"]},{"text":"如果要降低压迫感，你最需要练习的是？","options":["先说感受，再说问题，不一上来就下判断","给对方解释空间，不把一次失误当成人品结论","把标准说出来，而不是靠冷淡让对方猜","允许关系里有一点笨拙，不急着把主动权收回来"]}],"h5_questions":[{"text":"别人做事没达到你的标准时，你第一反应更像？","options":["先忍着，但心里已经开始扣分，之后会明显变冷","直接指出问题，希望对方赶紧修正，不想浪费时间","问清楚原因，但语气可能比自己想象中更硬","表面说没事，后面减少信任和合作"]},{"text":"你最容易在哪种关系里显得有压迫感？","options":["越亲近越容易，因为你会默认对方应该懂你","合作关系里，因为你很在意效率和结果","暧昧或亲密关系里，因为不确定会让你想掌控节奏","朋友关系里，因为你不喜欢反复解释同一件事"]},{"text":"当别人让你失望时，你通常会怎么处理？","options":["不立刻爆发，但会把对方从重要位置往外挪","把问题讲得很清楚，希望对方知道严重性","用反问让对方意识到哪里不对","开始冷处理，让对方自己感受到距离"]},{"text":"别人最可能误会你的地方是？","options":["以为你冷，其实你只是对不靠谱很敏感","以为你强势，其实你只是想把事情讲清楚","以为你不好惹，其实你只是不想被糊弄","以为你不在乎，其实你已经在心里很失望"]},{"text":"如果要降低压迫感，你最需要练习的是？","options":["先说感受，再说问题，不一上来就下判断","给对方解释空间，不把一次失误当成人品结论","把标准说出来，而不是靠冷淡让对方猜","允许关系里有一点笨拙，不急着把主动权收回来"]},{"text":"如果别人不理解你的选择，你最真实的反应是？","options":["先不解释，自己再观察一阵。你不想为了证明自己，把还没想清楚的东西说得太满","有点失落，但还是会继续。你希望被支持，可你也知道最后只能自己负责","开始怀疑是不是自己太在意。别人一句话就能让你重新审视自己的判断","反而更想证明这件事重要。被不理解时，你会更想把答案做出来"]},{"text":"你最怕完整报告里看见什么？","options":["我其实没有想象中稳定，只是一直靠习惯撑着，让日子看起来没有问题","我一直在用旧方式保护自己，所以很多新选择还没开始就被我先否定了","我真正想要的和现在差很多，这意味着我可能已经不满足很久了","我已经忍了太久却还没行动，最怕报告把那个被我压下去的念头说出来"]},{"text":"你希望这次测试最后帮你确认什么？","options":["给我一个更清晰的倾向，至少让我知道自己不是随便被情绪带着走","告诉我真正卡住我的点，我想知道自己为什么反复在同一个地方犹豫","让我知道怎么开始改变，不要太宏大，只要一个能马上做的小入口","帮我确认我不是一个人在这样，有些感受被说出来，本身就会轻一点"]},{"text":"别人评价你时，哪句话最容易让你记很久？","options":["你其实很有潜力，因为这句话像是在提醒你，自己还有没被用出来的一面","你不用这么辛苦，听到这句会突然松一下，也会发现自己真的撑了很久","你很有自己的感觉，这会让你确认自己不是普通复制粘贴的人","你该更相信自己一点，因为你知道很多时候不是没能力，是太常怀疑自己"]},{"text":"完整报告里你最想看哪一部分？","options":["类型结论。想先知道自己属于哪种模式，给现在的状态一个名字","形成原因。想知道为什么自己会这样，而不是只拿到一个标签","误判点。想看自己最容易在哪些地方把需求、关系或选择看错","具体建议。想知道接下来怎么做，才能不只停留在看懂自己"]},{"text":"你最容易让别人感到压力的瞬间是？","options":["对方没做到你期待时，你会先沉默观察，心里已经开始重新评估这段关系","事情反复讲不清时，你会直接接管节奏，先把结果推进再说感受","感到不安时，你会用反问确认对方态度，语气比自己想象中更锋利","边界被碰到时，你会立刻把距离拉开，不想再解释第二遍"]},{"text":"如果要保留边界又降低压迫感，你最愿意先改哪一步？","options":["开口前先说明自己的感受，而不是一上来就给对方下判断","给对方一次解释空间，不把一次失误马上归为不值得信任","把自己的标准说清楚，不靠冷淡、沉默或反问让别人猜","拒绝时多给一句理由，让边界依然清楚，但不像是在推开人"]}],"score":86,"score_name":"倾向指数","cover_sub":"你看起来讲道理，但别人可能会在你面前变得小心。","profiles":[{"name":"冷静审判型","score":72,"summary":"你不一定会发火，但你的沉默、扣分和抽离会让人很紧张。","why":"你的压迫感来自高标准和低容错。你希望关系和合作都清楚、可靠、少消耗，所以一旦对方反复失误，你会迅速降低投入。","signs":["对方犯错后，你表面平静但心里已经重新排序","你很少大吵，却会突然变得礼貌、疏离、难靠近","别人会觉得你没有骂人，但自己像被判了分"],"mistake":"你容易把一次不靠谱直接推导成“这个人不值得信任”。这会保护你，但也会让一些可修复的关系提前冷掉。","advice":["指出问题前先补一句：我不是否定你，只是这件事我在意","给重要关系设置一次解释机会，不马上内心出局","把“我需要什么标准”说清楚，不只让对方感受你的冷","记录3次你想抽离的瞬间，看是事实问题还是旧失望被触发"],"reminder":"你不需要降低标准，但需要让别人知道你不是在审判他。"},{"name":"高效控制型","score":84,"summary":"你追求效率和确定感，别人容易在你面前怕出错。","why":"你对混乱、拖延、反复沟通的耐受度很低。你不是故意压人，而是太习惯用“快点解决”处理所有不舒服。","signs":["别人讲原因时，你会急着找解决方案","你会不自觉接管节奏，让对方变成执行者","你说“我只是讲事实”，但对方听到的是压力"],"mistake":"你容易把“效率”当作唯一正确。可关系里的安全感，有时候来自被听完，而不是被立刻修正。","advice":["开口前先问一句：你想让我听你说，还是一起解决","每次提建议只提一个最关键点，别一次性压满","把“你应该”换成“我会更希望我们这样试试”","遇到低效的人，先区分是不愿意配合，还是暂时没跟上"],"reminder":"你的清醒很有力量，但别让它变成别人靠近你的门槛。"},{"name":"关系防御型","score":78,"summary":"你越在意一段关系，越容易用强硬保护自己的不安。","why":"亲密关系里的不确定会放大你的敏感。你害怕失控、被忽略或被糊弄，所以会提前拿回判断权。","signs":["对方回复慢，你会开始分析态度和位置","嘴上说随便，心里其实已经在看对方表现","越在意越容易说反话、冷一点、硬一点"],"mistake":"你容易把“我需要安全感”表达成“你必须按我的方式来”。对方接收到的不是需要，而是压力。","advice":["把质问改成描述：我刚刚有点不安，而不是你怎么又这样","情绪上来时先等20分钟再发消息","把你的底线写成一句可执行的话，不用靠试探验证","不要用冷处理测试对方在不在乎，直接说你需要什么"],"reminder":"你真正想要的不是控制对方，而是确认自己被认真对待。"},{"name":"边界锋芒型","score":80,"summary":"你有清晰边界，但表达太硬时会让别人觉得被推开。","why":"你很怕被冒犯、被占便宜、被反复消耗，所以你会提前把边界立得很明显。这个能力本身是优点，只是有时少了一点缓冲。","signs":["别人刚靠近一点，你会先判断对方有没有分寸","你不喜欢反复解释，第二次就会明显不耐烦","你很少讨好，但也容易让人觉得没台阶"],"mistake":"你容易把“温和表达”误会成退让。其实边界可以坚定，也可以让对方听得进去。","advice":["拒绝时保留一句理由，不需要长篇解释","把“别这样”换成“我更能接受的是这样”","对不重要的人简单边界，对重要的人多给一点说明","练习先肯定对方意图，再表达自己的不可接受"],"reminder":"锋芒不是问题，问题是别让它挡住你真正想留住的关系。"}]};const letters=['A','B','C','D'];let index=0;const answers=[];function startTest(){document.getElementById('intro').style.display='none';document.getElementById('quiz').style.display='block';renderQuestion();}function renderQuestion(){const q=data.h5_questions[index];document.getElementById('bar').style.width=(index/data.h5_questions.length*100)+'%';document.getElementById('qnum').textContent=`第 ${index+1} / ${data.h5_questions.length} 题`;document.getElementById('qtext').textContent=q.text;document.getElementById('options').innerHTML=q.options.map((t,i)=>`<button class="option" onclick="choose(${i})"><span class="letter">${letters[i]}</span><span>${t}</span></button>`).join('');}function choose(i){answers[index]=i;if(index<data.h5_questions.length-1){index++;renderQuestion();}else showResult();}function prevQuestion(){if(index>0){index--;renderQuestion();}}function showResult(){const counts=[0,0,0,0];answers.forEach(a=>counts[a]++);let max=0;for(let i=1;i<4;i++)if(counts[i]>counts[max])max=i;const r=data.profiles[max];document.getElementById('quiz').style.display='none';document.getElementById('result').style.display='block';document.getElementById('rname').textContent=r.name;document.getElementById('rsub').textContent=r.summary;document.getElementById('score').textContent=r.score;document.getElementById('sections').innerHTML=`<div class="section"><h3>一、核心结论</h3><p>${r.summary}</p></div><div class="section"><h3>二、形成原因</h3><p>${r.why}</p></div><div class="section"><h3>三、典型表现</h3><ul>${r.signs.map(x=>`<li>${x}</li>`).join('')}</ul></div><div class="section"><h3>四、容易误判的地方</h3><p>${r.mistake}</p></div><div class="section"><h3>五、30天行动建议</h3><div class="advice">${r.advice.map(x=>`<div>${x}</div>`).join('')}</div></div><div class="section"><h3>六、关键提醒</h3><p>${r.reminder}</p></div>`;window.scrollTo({top:0,behavior:'smooth'});}</script></body></html>
