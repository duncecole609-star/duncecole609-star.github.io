<body><main class="app"><div class="top"><span>近期状态拆解报告</span><span>12题报告</span></div><section id="intro" class="hero"><span class="pill">自我探索测试</span><h1>你最近最该松开的，是责任还是期待？</h1><p class="sub">这份报告不是劝你摆烂，而是把你最近的消耗拆清楚：哪些责任其实不是你的，哪些期待一直在吊着你，哪些坚持只是怕别人失望。看完会知道你该先松开哪一件事，而不是继续用力。</p><div class="card"><div id="gainList"></div><button class="primary" onclick="startTest()">开始测试</button></div></section><section id="quiz" class="card quiz"><div class="progress"><div id="bar" class="bar"></div></div><div id="qnum" class="qnum"></div><div id="qtext" class="qtext"></div><div id="options"></div><button class="secondary" onclick="prevQuestion()">上一题</button></section><section id="result" class="result hero"><span class="pill">你的完整报告</span><h1 id="rname"></h1><div id="score" class="score"></div><div id="summary" class="section"></div><div id="sections"></div><p class="footer">本测试为自我探索参考，不构成诊断、职业建议、投资建议或效果承诺。请结合现实情况判断。</p></section></main>
<script>const data={"title": "你最近最该松开的，是责任还是期待？", "product": "近期状态拆解报告", "intro": "这份报告不是劝你摆烂，而是把你最近的消耗拆清楚：哪些责任其实不是你的，哪些期待一直在吊着你，哪些坚持只是怕别人失望。看完会知道你该先松开哪一件事，而不是继续用力。", "questions": [{"text": "最近最让你累的，往往不是哪件事本身，而是什么？", "options": ["事情还没开始，我已经先替所有结果焦虑了一遍", "明明不是我的责任，我还是会下意识接过来", "别人一句没说清的话，我能在心里反复想很久", "我不是不知道累，是怕一停下来就没人托住"]}, {"text": "你最容易在哪个瞬间觉得自己又撑过头了？", "options": ["别人只是随口拜托，我却已经开始想怎么收尾", "想休息的时候，脑子里立刻冒出“这样不好吧”", "明明委屈了，还会先替对方找理由", "已经很累了，却还想证明自己可以再扛一下"]}, {"text": "如果现在让你松开一点，你最舍不得放下什么？", "options": ["别人对我靠谱、懂事、能处理的印象", "那个我再坚持一下就会变好的幻想", "不想让任何人失望的习惯", "对某个结果必须按我预想发生的控制感"]}, {"text": "你最害怕别人看见你哪种状态？", "options": ["其实我也会撑不住，只是平时太会装没事", "我不是一直稳定，我只是不好意思麻烦别人", "我没有那么洒脱，很多事我真的很在意", "我已经不想负责了，但又怕自己显得自私"]}, {"text": "你接下来最该先松开的，可能是哪一步？", "options": ["别再提前替所有人兜底，先看清谁该负责", "别再把一次回应当成全部答案，先把期待收回来", "别再用懂事换安全感，先说一次真实需要", "别再逼自己马上变好，先允许状态慢一点回来"]}, {"text": "你最容易把哪件事误判成必须马上解决？", "options": ["别人暂时没回，我就觉得关系可能变了", "计划稍微偏一点，我就开始怀疑自己不够好", "有人情绪不好，我会默认自己也要负责", "事情没有立刻变好，我就觉得前面都白做了"]}, {"text": "哪种期待最容易把你吊在原地？", "options": ["希望别人主动看见我的辛苦，但又不想明说", "希望努力一定有回报，所以不敢承认累", "希望关系保持原样，所以一直迁就对方", "希望自己永远稳定，所以不允许崩一下"]}, {"text": "你最常把哪句话咽回去？", "options": ["这件事其实我不想管了", "我也需要有人替我想一想", "我不是没事，我只是说了也怕麻烦", "我现在真的没有力气再解释"]}, {"text": "你现在最需要分清哪条边界？", "options": ["帮忙和兜底不是一回事", "期待和执念不是一回事", "努力和硬撑不是一回事", "体面和压抑不是一回事"]}, {"text": "别人最容易误会你的地方是？", "options": ["以为我能扛，其实我只是不知道怎么拒绝", "以为我想太多，其实我很需要确定感", "以为我好说话，其实我已经忍了很多次", "以为我冷静，其实我只是没地方崩"]}, {"text": "未来30天，你最该做的一个小动作是？", "options": ["把一个不属于你的责任还回去", "把一个等不到的回应先放一放", "把一句“我没事”改成真实感受", "给自己安排一次不解释的休息"]}, {"text": "如果只保留一个提醒，你现在最需要哪一句？", "options": ["不是所有事都要由你兜底", "不是所有期待都值得继续等", "不是所有懂事都会换来被珍惜", "不是所有停下都叫失败"]}], "results": [{"name": "责任兜底型", "score": 86, "summary": "你最近最累的不是做事，而是总在别人还没开口前，就先把后果背到自己身上。", "why": "你习惯可靠，也害怕场面失控，所以别人一迟钝、一混乱，你就会自动进入收尾模式。", "signals": ["别人只是随口拜托，你已经开始想怎么收尾", "你容易把帮忙做成兜底", "你最怕自己不够负责"], "mistake": "你容易把“我能处理”误当成“我必须处理”。", "need": "你真正需要的是把责任分回去，而不是继续证明自己很稳。", "action": "先问一句：这件事本来是谁该负责？再决定要不要帮。", "days": ["第1周记录自己多扛的3件事", "第2周拒绝一个不必要的临时请求", "第3周把帮忙范围说具体", "第4周观察别人是否也能承担"], "reminder": "你可以可靠，但不必成为所有人的备用方案。", "modules": [{"title": "近期状态消耗类型", "body": "责任兜底型是这份报告给你的主判断，不是随便贴上的标签。你最近最累的不是做事，而是总在别人还没开口前，就先把后果背到自己身上。把它放回“你最近最该松开的，是责任还是期待？”这个问题里看，你会更容易分清自己是在顺势选择，还是在被旧习惯推着走。"}, {"title": "你最容易多扛的责任", "body": "你习惯可靠，也害怕场面失控，所以别人一迟钝、一混乱，你就会自动进入收尾模式。落到真实生活里，常见信号是：别人只是随口拜托，你已经开始想怎么收尾；你容易把帮忙做成兜底；你最怕自己不够负责。这一部分会把这些反应拆开看，帮你知道自己不是无缘无故这样，而是有一套很固定的触发路径。"}, {"title": "真正放不下的期待", "body": "你容易把“我能处理”误当成“我必须处理”。如果这一点没被看见，你很容易继续用同一种方式解释自己，甚至把本来可以调整的事变成自责。完整报告会指出最容易误判的入口，让你少绕一层。"}, {"title": "正在透支你的坚持", "body": "你真正需要的是把责任分回去，而不是继续证明自己很稳。这不是一句抽象的安慰，而是你在这个选题里最需要被回应的部分。看清它以后，你会更知道自己真正想要的是被理解、被允许、被确认，还是被托住。"}, {"title": "未来30天松手顺序", "body": "先问一句：这件事本来是谁该负责？再决定要不要帮。接下来不用立刻把自己推翻重来，可以先做：第1周记录自己多扛的3件事；第2周拒绝一个不必要的临时请求。这部分给的是能马上落地的小调整，让结果不只停留在“说得准”。"}]}, {"name": "期待悬挂型", "score": 78, "summary": "你最难松开的不是人或事，而是那个“也许再等等就会好”的期待。", "why": "你很容易被一个还没落地的回应牵住，明明知道消耗，却还想再确认一次。", "signals": ["别人没说清，你会在心里反复想", "你总想等一个更明确的态度", "你怕自己先放下就显得输"], "mistake": "你容易把期待当希望，其实有些期待已经变成消耗。", "need": "你需要的是把主动权拿回来，不再让一个不确定的人或结果决定你的状态。", "action": "给期待设置期限，过了就回到自己的节奏里。", "days": ["写下你正在等什么", "给它设一个结束日期", "减少反复查看和猜测", "把注意力放回能执行的事"], "reminder": "真正救你的不是等到答案，而是不再被答案吊住。", "modules": [{"title": "近期状态消耗类型", "body": "期待悬挂型是这份报告给你的主判断，不是随便贴上的标签。你最难松开的不是人或事，而是那个“也许再等等就会好”的期待。把它放回“你最近最该松开的，是责任还是期待？”这个问题里看，你会更容易分清自己是在顺势选择，还是在被旧习惯推着走。"}, {"title": "你最容易多扛的责任", "body": "你很容易被一个还没落地的回应牵住，明明知道消耗，却还想再确认一次。落到真实生活里，常见信号是：别人没说清，你会在心里反复想；你总想等一个更明确的态度；你怕自己先放下就显得输。这一部分会把这些反应拆开看，帮你知道自己不是无缘无故这样，而是有一套很固定的触发路径。"}, {"title": "真正放不下的期待", "body": "你容易把期待当希望，其实有些期待已经变成消耗。如果这一点没被看见，你很容易继续用同一种方式解释自己，甚至把本来可以调整的事变成自责。完整报告会指出最容易误判的入口，让你少绕一层。"}, {"title": "正在透支你的坚持", "body": "你需要的是把主动权拿回来，不再让一个不确定的人或结果决定你的状态。这不是一句抽象的安慰，而是你在这个选题里最需要被回应的部分。看清它以后，你会更知道自己真正想要的是被理解、被允许、被确认，还是被托住。"}, {"title": "未来30天松手顺序", "body": "给期待设置期限，过了就回到自己的节奏里。接下来不用立刻把自己推翻重来，可以先做：写下你正在等什么；给它设一个结束日期。这部分给的是能马上落地的小调整，让结果不只停留在“说得准”。"}]}, {"name": "懂事压抑型", "score": 82, "summary": "你松不开的是别人眼里的懂事。你怕一表达真实需要，就变成麻烦、任性或不体面。", "why": "你习惯先照顾气氛，再照顾自己，所以很多委屈不是没有，而是被你包装得太安静。", "signals": ["你明明委屈，还会替对方找理由", "你常把没关系说得很顺口", "你害怕别人觉得你难搞"], "mistake": "你容易把懂事当成安全感，但过度懂事会让别人忘记你也有需求。", "need": "你需要的是允许自己有一点“不好说话”的空间。", "action": "从一个低风险场景开始，练习说出具体需求。", "days": ["把一句没事改成我有点介意", "停止替对方解释一次", "说清楚你能接受到哪里", "观察关系是否因此崩掉"], "reminder": "真正稳定的关系，不需要你一直懂事来维持。", "modules": [{"title": "近期状态消耗类型", "body": "懂事压抑型是这份报告给你的主判断，不是随便贴上的标签。你松不开的是别人眼里的懂事。你怕一表达真实需要，就变成麻烦、任性或不体面。把它放回“你最近最该松开的，是责任还是期待？”这个问题里看，你会更容易分清自己是在顺势选择，还是在被旧习惯推着走。"}, {"title": "你最容易多扛的责任", "body": "你习惯先照顾气氛，再照顾自己，所以很多委屈不是没有，而是被你包装得太安静。落到真实生活里，常见信号是：你明明委屈，还会替对方找理由；你常把没关系说得很顺口；你害怕别人觉得你难搞。这一部分会把这些反应拆开看，帮你知道自己不是无缘无故这样，而是有一套很固定的触发路径。"}, {"title": "真正放不下的期待", "body": "你容易把懂事当成安全感，但过度懂事会让别人忘记你也有需求。如果这一点没被看见，你很容易继续用同一种方式解释自己，甚至把本来可以调整的事变成自责。完整报告会指出最容易误判的入口，让你少绕一层。"}, {"title": "正在透支你的坚持", "body": "你需要的是允许自己有一点“不好说话”的空间。这不是一句抽象的安慰，而是你在这个选题里最需要被回应的部分。看清它以后，你会更知道自己真正想要的是被理解、被允许、被确认，还是被托住。"}, {"title": "未来30天松手顺序", "body": "从一个低风险场景开始，练习说出具体需求。接下来不用立刻把自己推翻重来，可以先做：把一句没事改成我有点介意；停止替对方解释一次。这部分给的是能马上落地的小调整，让结果不只停留在“说得准”。"}]}, {"name": "控制透支型", "score": 89, "summary": "你最该松开的是对结果的控制感。你不是不努力，而是太怕事情不按预想发展。", "why": "你对失控很敏感，所以会提前演练、反复确认、把每一步都抓得很紧。", "signals": ["计划一偏，你就开始怀疑自己", "你很难接受模糊和等待", "你累的是脑子一直不肯停"], "mistake": "你容易把控制当安全，其实控制越多，精力越被耗空。", "need": "你需要的是先恢复弹性，而不是把每个结果都按住。", "action": "把一个大结果拆成下一步动作，只负责能执行的部分。", "days": ["每天只盯一个关键动作", "允许计划有10%的偏差", "减少无效预演", "用复盘替代自责"], "reminder": "你不需要掌控所有结果，先把自己从紧绷里放出来。", "modules": [{"title": "近期状态消耗类型", "body": "控制透支型是这份报告给你的主判断，不是随便贴上的标签。你最该松开的是对结果的控制感。你不是不努力，而是太怕事情不按预想发展。把它放回“你最近最该松开的，是责任还是期待？”这个问题里看，你会更容易分清自己是在顺势选择，还是在被旧习惯推着走。"}, {"title": "你最容易多扛的责任", "body": "你对失控很敏感，所以会提前演练、反复确认、把每一步都抓得很紧。落到真实生活里，常见信号是：计划一偏，你就开始怀疑自己；你很难接受模糊和等待；你累的是脑子一直不肯停。这一部分会把这些反应拆开看，帮你知道自己不是无缘无故这样，而是有一套很固定的触发路径。"}, {"title": "真正放不下的期待", "body": "你容易把控制当安全，其实控制越多，精力越被耗空。如果这一点没被看见，你很容易继续用同一种方式解释自己，甚至把本来可以调整的事变成自责。完整报告会指出最容易误判的入口，让你少绕一层。"}, {"title": "正在透支你的坚持", "body": "你需要的是先恢复弹性，而不是把每个结果都按住。这不是一句抽象的安慰，而是你在这个选题里最需要被回应的部分。看清它以后，你会更知道自己真正想要的是被理解、被允许、被确认，还是被托住。"}, {"title": "未来30天松手顺序", "body": "把一个大结果拆成下一步动作，只负责能执行的部分。接下来不用立刻把自己推翻重来，可以先做：每天只盯一个关键动作；允许计划有10%的偏差。这部分给的是能马上落地的小调整，让结果不只停留在“说得准”。"}]}], "gains": ["近期状态消耗类型", "你最容易多扛的责任", "真正放不下的期待", "正在透支你的坚持", "未来30天松手顺序"]};let index=0;const answers=[];const letters=['A','B','C','D'];document.getElementById('gainList').innerHTML=data.gains.map(x=>`<div class="tag">${x}</div>`).join('');function startTest(){document.getElementById('intro').style.display='none';document.getElementById('quiz').style.display='block';renderQuestion();}function renderQuestion(){const q=data.questions[index];document.getElementById('bar').style.width=((index)/data.questions.length*100)+'%';document.getElementById('qnum').textContent=`第 ${index+1} / ${data.questions.length} 题`;document.getElementById('qtext').textContent=q.text;document.getElementById('options').innerHTML=q.options.map((t,i)=>`<button class="option" onclick="choose(${i})"><span class="letter">${letters[i]}</span><span>${t}</span></button>`).join('');}function choose(i){answers[index]=i;if(index<data.questions.length-1){index++;renderQuestion();}else showResult();}function prevQuestion(){if(index>0){index--;renderQuestion();}}function showResult(){const counts=[0,0,0,0];answers.forEach(x=>counts[x]++);let max=0;for(let i=1;i<4;i++)if(counts[i]>counts[max])max=i;const r=data.results[max];document.getElementById('quiz').style.display='none';document.getElementById('result').style.display='block';document.getElementById('rname').textContent=r.name;document.getElementById('score').textContent=r.score;document.getElementById('summary').innerHTML=`<h3>核心结论</h3><p>${r.summary}</p>`;let sections=(r.modules||[]).map(m=>[m.title,m.body]);if(!sections.length)sections=[[data.gains[0]||'类型解释',r.summary],[data.gains[1]||'形成原因',r.why],[data.gains[2]||'误判提醒',r.mistake],[data.gains[3]||'真实需求',r.need],[data.gains[4]||'行动建议',r.action]];sections=sections.concat([['30天建议',r.days],['关键提醒',r.reminder]]);document.getElementById('sections').innerHTML=sections.map(([h,v])=>Array.isArray(v)?`<div class="section"><h3>${h}</h3><ul>${v.map(x=>`<li>${x}</li>`).join('')}</ul></div>`:`<div class="section"><h3>${h}</h3><p>${v}</p></div>`).join('');window.scrollTo({top:0,behavior:'smooth'});}</script></body></html>
