<style>:root{--bg:#101216;--panel:#171b22;--text:#f4f1e8;--muted:#9da3ad;--gold:#d6ad48;--line:rgba(214,173,72,.24)}*{box-sizing:border-box}body{margin:0;min-height:100vh;background:radial-gradient(circle at top,#2a241d 0,#101216 52%,#090a0c 100%);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Microsoft YaHei',sans-serif;letter-spacing:0}.app{width:min(520px,100%);min-height:100vh;margin:0 auto;padding:22px 18px 34px}.topline{display:flex;justify-content:space-between;align-items:center;color:var(--gold);font-size:13px;font-weight:700;border-bottom:1px solid var(--line);padding-bottom:14px}.label{color:#737985;font-size:11px;letter-spacing:2px}.hero{padding:34px 0 22px;text-align:center}.pill{display:inline-flex;padding:7px 14px;border-radius:999px;background:rgba(214,173,72,.12);color:var(--gold);font-size:13px;font-weight:700;margin-bottom:16px}h1{margin:0;font-size:31px;line-height:1.2;font-weight:850}.subtitle{margin:14px auto 0;color:var(--muted);font-size:15px;line-height:1.65;max-width:360px}.card,.summary,.section,.quote{border-radius:16px}.card{background:linear-gradient(180deg,rgba(32,38,49,.96),rgba(21,25,33,.96));border:1px solid rgba(255,255,255,.08);box-shadow:0 18px 60px rgba(0,0,0,.26);padding:20px;margin:18px 0}.progress{height:8px;background:#252b35;border-radius:999px;overflow:hidden;margin-bottom:18px}.bar{height:100%;width:0;background:linear-gradient(90deg,#b88b2b,#f3d37a);transition:width .25s}.q-num{color:var(--gold);font-size:13px;font-weight:800;margin-bottom:8px}.question{font-size:21px;font-weight:800;line-height:1.42;margin-bottom:18px}.option{width:100%;display:grid;grid-template-columns:34px 1fr;gap:12px;align-items:center;padding:14px 12px;margin:10px 0;border-radius:14px;border:1px solid rgba(255,255,255,.08);background:#11151b;color:var(--text);text-align:left;font-size:15px;line-height:1.45;cursor:pointer}.option:hover,.option.selected{border-color:rgba(214,173,72,.66);background:rgba(214,173,72,.1)}.letter{width:30px;height:30px;display:grid;place-items:center;border-radius:50%;background:#252b35;color:var(--gold);font-weight:800}.actions{display:flex;gap:12px;margin-top:18px}button.primary,button.secondary{border:none;border-radius:14px;padding:14px 16px;font-size:16px;font-weight:800;cursor:pointer}button.primary{flex:1;background:linear-gradient(135deg,#c99c37,#f0d27a);color:#14100a}button.secondary{background:#242a34;color:var(--text)}.result{display:none}.score{margin:14px auto 8px;color:var(--gold);font-size:42px;line-height:1;font-weight:900}.score-label{color:var(--muted);font-size:13px}.summary{margin-top:18px;background:#151a22;border:1px solid rgba(255,255,255,.08);padding:16px;color:#e8e4d8;line-height:1.75;text-align:left;font-size:15px}.quote{margin-top:18px;padding:16px;background:rgba(214,173,72,.1);color:#f2d47e;line-height:1.65;font-size:15px;font-weight:800;text-align:left}.section{margin-top:16px;background:rgba(255,255,255,.045);border:1px solid rgba(255,255,255,.08);padding:16px;text-align:left}.section h3{margin:0 0 10px;color:var(--gold);font-size:15px}.section p{margin:0;color:#e5e8ee;line-height:1.75;font-size:14px}.title{margin:24px 0 10px;color:var(--gold);font-size:15px;font-weight:800;text-align:left}.grid,.list{display:grid;gap:10px;margin-top:10px;text-align:left}.grid div,.list div{padding:12px;border-radius:12px;background:#11151b;color:#d5d9df;line-height:1.55;font-size:14px}.footer{margin-top:22px;color:#7f8793;font-size:12px;line-height:1.6;text-align:center}</style></head><body><main class="app"><div class="topline"><span>你的行动卡点报告</span><span class="label">ACTION · REPORT</span></div><section id="intro" class="hero"><span class="pill">自我探索测试</span><h1>你一直没开始，是懒，还是太怕做错？</h1><p class="subtitle">按第一反应选择。这个测试会帮你看清：你现在真正卡住的是哪一步。</p><div class="card"><div class="title">测试完成后你将看到</div><div class="list"><div>你的核心类型与倾向</div><div>你为什么会反复卡在这里</div><div>你最容易误判自己的地方</div><div>未来 30 天更稳的调整建议</div></div><div class="actions"><button class="primary" onclick="startTest()">开始测试</button></div></div></section><section id="quiz" class="card" style="display:none"><div class="progress"><div id="bar" class="bar"></div></div><div id="qnum" class="q-num"></div><div id="qtext" class="question"></div><div id="options"></div><div class="actions"><button class="secondary" onclick="prevQuestion()">上一题</button></div></section><section id="result" class="result hero"><span class="pill">你的类型</span><h1 id="resultName"></h1><p id="tagline" class="subtitle"></p><div class="score" id="score"></div><div class="score-label">参考指数</div><div class="summary" id="summary"></div><div class="quote" id="quote"></div><div class="section"><h3>一、你真正卡住的地方</h3><p id="root"></p></div><div class="section"><h3>二、更适合你的调整方式</h3><p id="path"></p></div><div class="section"><h3>三、你最容易误判自己的地方</h3><p id="risk"></p></div><div class="title">你的 30 天调整建议</div><div class="grid" id="actions"></div><p class="footer">本测试为自我探索参考，不构成诊断或承诺。请结合自身现实情况判断。</p></section></main><script>const data={"folder": "02_meikaishi-vs-pa-zuocuo", "link": "https://duncecole609-star.github.io/a2s/", "report_code": "ACTION · REPORT", "topline": "你的行动卡点报告", "title": "你一直没开始，是懒，还是太怕做错？", "short_title": "没开始/怕做错", "cover_lines": ["你一直没开始，", "是懒，", "还是太怕做错？"], "cover_sub": "别急着骂自己拖延，先看清你到底卡在开始前的哪一步。", "style": "checklist", "preview_type": "完美准备型", "preview_sub": "你不是没有行动力，你是总想准备到不会出错再开始", "score": 76, "score_label": "启动阻力指数", "core": "你的答案显示，你一直没开始，不是因为真的懒，而是因为你把第一步想得太重了。你需要的不是更多计划，而是一个低压力、可失败的小开始。", "quote": "你不是不想动，你是太怕第一步证明自己不行。", "gap": "行动卡点", "product_desc": "不是催你自律，而是帮你看清：你到底是懒，还是太怕开始后发现自己做不好。", "free_questions": [["你最常把事情卡在什么时候？", ["想做，但不知道第一步怎么拆", "计划很多，但总觉得还没准备好", "怕做出来不好，被别人看见", "开始两天后就没劲了"]], ["如果今天必须开始一件事，你最怕什么？", ["方向选错，白忙一场", "准备不够，做出来很粗糙", "别人评价我不专业", "坚持不了，最后又打脸"]], ["看到别人已经做起来了，你心里最真实的声音是？", ["他是不是早就准备很久了", "我也想，但我还差一点条件", "万一我做得很烂怎么办", "我可能就是三分钟热度"]], ["你最常用哪个理由拖住自己？", ["再研究研究，别走错路", "等状态好一点再开始", "等我做得更像样再发出去", "反正现在开始也不一定坚持"]], ["如果一个月后你还是没开始，你最可能怪哪里？", ["我不知道自己到底该做什么", "我准备太慢，总是想太多", "我太怕丢脸，不敢交出去", "我执行力太差，总是断掉"]]], "h5_questions": [["你最常把事情卡在什么时候？", ["想做，但不知道第一步怎么拆", "计划很多，但总觉得还没准备好", "怕做出来不好，被别人看见", "开始两天后就没劲了"]], ["如果今天必须开始一件事，你最怕什么？", ["方向选错，白忙一场", "准备不够，做出来很粗糙", "别人评价我不专业", "坚持不了，最后又打脸"]], ["看到别人已经做起来了，你心里最真实的声音是？", ["他是不是早就准备很久了", "我也想，但我还差一点条件", "万一我做得很烂怎么办", "我可能就是三分钟热度"]], ["你最常用哪个理由拖住自己？", ["再研究研究，别走错路", "等状态好一点再开始", "等我做得更像样再发出去", "反正现在开始也不一定坚持"]], ["如果一个月后你还是没开始，你最可能怪哪里？", ["我不知道自己到底该做什么", "我准备太慢，总是想太多", "我太怕丢脸，不敢交出去", "我执行力太差，总是断掉"]], ["你对第一步的要求通常是？", ["先搞清楚方向", "最好准备得完整一点", "至少不能太难看", "越简单越好，不然坚持不了"]], ["你更怕哪种结果？", ["发现方向根本不适合", "做了很多准备还是失败", "被别人看到不成熟的一面", "又一次半途而废"]], ["你最羡慕哪种人？", ["方向感很清楚的人", "不完美也敢先发的人", "敢被评价还继续做的人", "每天都能稳定推进的人"]], ["一个计划没完成，你通常会？", ["重新找更适合的方向", "继续优化计划", "觉得自己很丢脸", "干脆先放一放"]], ["你最不适合哪种开始方式？", ["目标太大，没有第一步", "准备期太长，迟迟不交付", "一上来就公开接受评价", "全靠热情，没有固定节奏"]], ["如果只能做一个很小的动作，你会选？", ["确定一个方向", "先做一个粗糙版本", "发给一个人看", "连续做三天"]], ["你现在最需要的不是动力，而是？", ["一个更清楚的第一步", "允许自己不完美", "承受评价的安全感", "一个能坚持的最小节奏"]]], "result_types": {"A": ["方向雾里型", "你不是不行动，你是一直没看清第一步该往哪走。", "你的卡点在于方向太散。你会想很多可能性，但越想越不知道该选哪一个。", "你不是懒，你是怕走错以后白费力气。", "你真正需要的是收窄方向，而不是继续扩大选择。", "你适合先做一个 7 天小实验，不要一开始决定长期路线。", "你容易被新想法带跑，导致一直没有样本。", ["第1周：只保留一个方向。", "第2周：把目标拆成每天15分钟动作。", "第3周：不换方向，只改方法。", "第4周：用实际反馈决定下一步。"]], "B": ["完美准备型", "你不是没有行动力，你是总想准备到不会出错再开始。", "你很容易把准备当成安全感。资料越看越多，计划越写越细，但真正交出去的东西很少。", "你不是不想动，你是太怕第一步证明自己不行。", "你真正卡住的是对不完美的容忍度。", "你适合先交一个粗糙版本，让现实反馈帮你修正。", "你容易用准备拖延开始。", ["第1周：做一个60分版本。", "第2周：发给一个低风险对象看。", "第3周：只改一个最明显的问题。", "第4周：重复一次发布，而不是重做计划。"]], "C": ["评价恐惧型", "你不是不能开始，你是太怕被看见不够好。", "你对外界评价很敏感。事情本身不一定难，难的是被别人看见还不成熟的过程。", "你真正害怕的不是失败，而是失败被别人看见。", "你需要的是安全曝光，而不是闭门变强。", "你适合从小范围、低风险公开开始。", "你容易把别人可能的评价想得过重。", ["第1周：把作品发给一个友好的人。", "第2周：公开一个过程，不公开结果。", "第3周：记录真实反馈，不猜测评价。", "第4周：做一次轻量发布。"]], "D": ["节奏断电型", "你不是没想法，你是很难靠热情撑完整个过程。", "你的问题不是开始，而是持续。你容易被一阵兴奋推着走，但缺少稳定的最小节奏。", "你不是没有自律，你是把行动设计得太依赖状态。", "你真正需要的是不用靠心情也能完成的小动作。", "你适合固定时间、固定动作、固定交付。", "你容易三分钟热度后自责。", ["第1周：每天只做一个10分钟动作。", "第2周：把任务固定在同一时间。", "第3周：不加量，只求不断。", "第4周：复盘哪种节奏最不消耗。"]]}};const letters=['A','B','C','D'];let index=0;const answers=[];function startTest(){document.getElementById('intro').style.display='none';document.getElementById('quiz').style.display='block';renderQuestion()}function renderQuestion(){const q=data.h5_questions[index];document.getElementById('bar').style.width=(index/data.h5_questions.length*100)+'%';document.getElementById('qnum').textContent=`第 ${index+1} / ${data.h5_questions.length} 题`;document.getElementById('qtext').textContent=q[0];document.getElementById('options').innerHTML=q[1].map((text,i)=>`<button class="option${answers[index]===letters[i]?' selected':''}" onclick="choose('${letters[i]}')"><span class="letter">${letters[i]}</span><span>${text}</span></button>`).join('')}function choose(letter){answers[index]=letter;if(index<data.h5_questions.length-1){index++;renderQuestion()}else showResult()}function prevQuestion(){if(index>0){index--;renderQuestion()}}function showResult(){const counts={A:0,B:0,C:0,D:0};answers.forEach(a=>counts[a]++);const winner=[...letters].sort((a,b)=>counts[b]-counts[a])[0];const r=data.result_types[winner];document.getElementById('quiz').style.display='none';document.getElementById('result').style.display='block';document.getElementById('resultName').textContent=r[0];document.getElementById('tagline').textContent=r[1];document.getElementById('score').textContent=68+counts[winner]*5;document.getElementById('summary').textContent=r[2];document.getElementById('quote').textContent=r[3];document.getElementById('root').textContent=r[4];document.getElementById('path').textContent=r[5];document.getElementById('risk').textContent=r[6];document.getElementById('actions').innerHTML=r[7].map(x=>`<div>${x}</div>`).join('');window.scrollTo({top:0,behavior:'smooth'})}</script></body></html>
