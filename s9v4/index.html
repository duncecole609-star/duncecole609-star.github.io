<body><main class="app"><div class="top"><span>关系攻击性报告</span><span>12题报告</span></div><section id="intro" class="hero"><span class="pill">自我探索测试</span><h1>你最容易在哪种关系里露出攻击性？</h1><p class="sub">这不是说你脾气差，而是帮你看清：你在哪类关系里最容易失去柔软。</p><div class="card"><p>□ 你的关系攻击性类型</p><p>□ 最容易触发你的关系场景</p><p>□ 你攻击背后的真实需求</p><p>□ 容易伤到关系的表达细节</p><p>□ 更稳的沟通修复方式</p><button class="primary" onclick="startTest()">开始测试</button></div></section><section id="quiz" class="card quiz"><div class="progress"><div id="bar" class="bar"></div></div><div id="qnum" class="qnum"></div><div id="qtext" class="qtext"></div><div id="options"></div><button class="secondary" onclick="prevQuestion()">上一题</button></section><section id="result" class="result hero"><span class="pill">你的完整报告</span><h1 id="rname"></h1><p id="rsub" class="sub"></p><div id="score" class="score"></div><div id="sections"></div><p class="footer">本测试为自我探索参考，不构成诊断、志愿填报建议、职业建议或承诺。请结合现实情况判断。</p></section></main>
<script>const data={"account":"账号1","folder":"03_guanxi-gongjixing","path":"s9v4","publish_time":"晚上10点","cover_title":"你最容易在哪种关系里露出攻击性？","note_title":"你最容易在哪种关系里露出攻击性？","product_title":"关系攻击性报告","direction":"关系攻击性","visual":"red_thread","colors":{"bg":"#f3e8e8","qbg":"#faf2f1","ink":"#302023","accent":"#9b3f4c","soft":"#ead0d3","muted":"#78666a","line":"#dcc4c7","report_bg":"#24171b","report_ink":"#fff2f2","report_muted":"#c9b1b5","report_card":"#302127","report_line":"#513a41","locked_bg":"#fff7f7","locked_ink":"#2e2224"},"gains":["你的关系攻击性类型","最容易触发你的关系场景","你攻击背后的真实需求","容易伤到关系的表达细节","更稳的沟通修复方式"],"product_desc":"这不是说你脾气差，而是帮你看清：你在哪类关系里最容易失去柔软。","product_main":"越在意的关系，越容易露出没被照顾好的刺","preview_type":"亲密刺痛型","preview_sub":"攻击性往往不是突然出现，而是某个需求长期没被看见。","core":"你在哪类关系里最容易从保护自己变成刺伤别人","gap":"你的攻击性背后是委屈、怕输、怕被忽略，还是怕失控","questions":[{"text":"你最容易在谁面前说话变冲？","options":["越亲近的人越容易，因为你觉得他应该懂你","让你感觉被忽视的人，尤其是对方明明可以回应却没有","总挑战你原则的人，你会忍不住想压回去","让你觉得自己不被尊重的人，你会立刻竖起防御"]},{"text":"关系里最容易点燃你的瞬间是？","options":["你已经说过很多次，对方还是没放在心上","你很需要回应时，对方却轻描淡写","对方质疑你的判断，好像你小题大做","你感觉自己被比较、被否定、被放低"]},{"text":"你攻击别人时，最常用哪种方式？","options":["冷下来，不解释，让对方自己感受你的失望","话变锋利，专挑对方最应该改的地方说","反问和讽刺，想让对方知道自己哪里离谱","翻旧账，因为你觉得这些问题其实一直没解决"]},{"text":"事后你最常出现的感觉是？","options":["有点后悔，但也觉得自己不是无缘无故这样","委屈，觉得为什么每次都要你先好好说","担心关系变糟，但又不想立刻低头","觉得自己说重了，可当时真的控制不住"]},{"text":"如果要修复关系，你最需要练习的是？","options":["把“你从来不”换成“这件事让我很难受”","先说需求，不先用攻击证明自己受伤","就事论事，不把所有旧问题一次性倒出来","允许自己先暂停，不在情绪最高点决定关系走向"]}],"h5_questions":[{"text":"你最容易在谁面前说话变冲？","options":["越亲近的人越容易，因为你觉得他应该懂你","让你感觉被忽视的人，尤其是对方明明可以回应却没有","总挑战你原则的人，你会忍不住想压回去","让你觉得自己不被尊重的人，你会立刻竖起防御"]},{"text":"关系里最容易点燃你的瞬间是？","options":["你已经说过很多次，对方还是没放在心上","你很需要回应时，对方却轻描淡写","对方质疑你的判断，好像你小题大做","你感觉自己被比较、被否定、被放低"]},{"text":"你攻击别人时，最常用哪种方式？","options":["冷下来，不解释，让对方自己感受你的失望","话变锋利，专挑对方最应该改的地方说","反问和讽刺，想让对方知道自己哪里离谱","翻旧账，因为你觉得这些问题其实一直没解决"]},{"text":"事后你最常出现的感觉是？","options":["有点后悔，但也觉得自己不是无缘无故这样","委屈，觉得为什么每次都要你先好好说","担心关系变糟，但又不想立刻低头","觉得自己说重了，可当时真的控制不住"]},{"text":"如果要修复关系，你最需要练习的是？","options":["把“你从来不”换成“这件事让我很难受”","先说需求，不先用攻击证明自己受伤","就事论事，不把所有旧问题一次性倒出来","允许自己先暂停，不在情绪最高点决定关系走向"]},{"text":"如果别人不理解你的选择，你最真实的反应是？","options":["先不解释，自己再观察一阵。你不想为了证明自己，把还没想清楚的东西说得太满","有点失落，但还是会继续。你希望被支持，可你也知道最后只能自己负责","开始怀疑是不是自己太在意。别人一句话就能让你重新审视自己的判断","反而更想证明这件事重要。被不理解时，你会更想把答案做出来"]},{"text":"你最怕完整报告里看见什么？","options":["我其实没有想象中稳定，只是一直靠习惯撑着，让日子看起来没有问题","我一直在用旧方式保护自己，所以很多新选择还没开始就被我先否定了","我真正想要的和现在差很多，这意味着我可能已经不满足很久了","我已经忍了太久却还没行动，最怕报告把那个被我压下去的念头说出来"]},{"text":"你希望这次测试最后帮你确认什么？","options":["给我一个更清晰的倾向，至少让我知道自己不是随便被情绪带着走","告诉我真正卡住我的点，我想知道自己为什么反复在同一个地方犹豫","让我知道怎么开始改变，不要太宏大，只要一个能马上做的小入口","帮我确认我不是一个人在这样，有些感受被说出来，本身就会轻一点"]},{"text":"别人评价你时，哪句话最容易让你记很久？","options":["你其实很有潜力，因为这句话像是在提醒你，自己还有没被用出来的一面","你不用这么辛苦，听到这句会突然松一下，也会发现自己真的撑了很久","你很有自己的感觉，这会让你确认自己不是普通复制粘贴的人","你该更相信自己一点，因为你知道很多时候不是没能力，是太常怀疑自己"]},{"text":"完整报告里你最想看哪一部分？","options":["类型结论。想先知道自己属于哪种模式，给现在的状态一个名字","形成原因。想知道为什么自己会这样，而不是只拿到一个标签","误判点。想看自己最容易在哪些地方把需求、关系或选择看错","具体建议。想知道接下来怎么做，才能不只停留在看懂自己"]},{"text":"你最容易把攻击性藏在哪种反应里？","options":["嘴上说没事，但语气和距离已经开始让对方感到压力","用讲道理代替表达受伤，让对方觉得自己正在被审问","故意变冷、变忙、变客气，用撤退让对方意识到问题","抓住一个细节反复追问，其实是在确认自己有没有被轻视"]},{"text":"如果想减少关系里的伤害，你最需要先练习什么？","options":["在反击前先说出受伤点，而不是直接把对方推到对立面","把“不舒服”说清楚，不用阴阳怪气让对方猜","区分对方的无心和故意，不把旧伤自动套到当下","给重要关系一个修复入口，不让一次冲突直接变成冷战"]}],"score":86,"score_name":"倾向指数","cover_sub":"攻击性往往不是突然出现，而是某个需求长期没被看见。","profiles":[{"name":"亲密高期待型","score":84,"summary":"你最容易在亲近的人面前露出刺，因为你对亲近关系有很高期待。","why":"你不是对所有人都攻击性强，而是越在意越容易失望。你希望对方懂你、记得你说过的话、主动照顾你的感受。","signs":["对外人能忍，对亲近的人反而更容易冲","一句“你怎么还不懂”背后藏着很多委屈","你会把反复没做到看成不在乎"],"mistake":"你容易把“我很失望”表达成“你真的很差”。这会让对方先防御，而不是听见你的受伤。","advice":["先说这件事让我失望，而不是你总是这样","把期待说成具体动作，不让对方猜","一次只谈一个问题，不把旧账全部打开","冲突后24小时内做一次低强度修复，不拖到关系结冰"],"reminder":"你真正想要的是被放在心上，不是赢过对方。"},{"name":"回应敏感型","score":86,"summary":"你最容易被冷淡和敷衍激怒，因为回应决定了你的安全感。","why":"当你需要回应时，对方的轻描淡写会让你感觉自己被放低。你的攻击性往往是在替不安争一个位置。","signs":["对方回得慢，你会开始脑补态度","你会用更硬的话确认对方到底在不在乎","越想被安抚，越容易把话说得难听"],"mistake":"你容易用攻击换回应，但换来的回应常常是防御、沉默或更远。","advice":["把质问换成请求：我现在需要你认真回我一下","不要在最想确认时发最长的一段话","观察持续回应，不被一次冷淡直接带走","把自己的安全感分散到生活和朋友里，不全压在一个人身上"],"reminder":"你值得被回应，但不必用刺痛别人来证明。"},{"name":"原则反击型","score":79,"summary":"你最容易在原则被挑战时变锋利，因为你不想被糊弄或越界。","why":"你对规则、分寸和尊重很敏感。一旦对方反复踩线，你会迅速从讲理切换到反击。","signs":["你能忍小事，但不能忍被冒犯","对方越装糊涂，你越想把话说透","你讨厌无效沟通，所以语气容易变硬"],"mistake":"你容易把锋利当成清晰。可太锋利的表达，会让对方只记得被刺痛，忘了问题本身。","advice":["先界定边界，再表达后果，不直接升级情绪","把反问改成陈述：这件事我不能接受","给对方一次修正路径，不只给压力","区分无心冒犯和长期不尊重，别用同样强度处理"],"reminder":"边界可以有力量，也可以不靠伤人来成立。"},{"name":"自尊防御型","score":82,"summary":"你最容易在被比较、被否定时露出攻击性，因为那会碰到你的自尊。","why":"你很怕被看低，也怕自己被放到不重要的位置。所以当对方的话让你感觉掉价，你会立刻保护自己。","signs":["别人一句轻视会让你记很久","你会用强硬证明自己不是好欺负","你很难在被否定后继续柔和沟通"],"mistake":"你容易把对方的一句话当成整体评价，于是反击强度超过事件本身。","advice":["先确认对方是在评价事情，还是评价你这个人","感到被看低时先暂停，不急着证明自己","把“你凭什么”换成“你这样说我会不舒服”","练习把自尊从单次评价里抽离出来"],"reminder":"你不需要靠反击证明自己有价值，你本来就不该被随便贬低。"}]};const letters=['A','B','C','D'];let index=0;const answers=[];function startTest(){document.getElementById('intro').style.display='none';document.getElementById('quiz').style.display='block';renderQuestion();}function renderQuestion(){const q=data.h5_questions[index];document.getElementById('bar').style.width=(index/data.h5_questions.length*100)+'%';document.getElementById('qnum').textContent=`第 ${index+1} / ${data.h5_questions.length} 题`;document.getElementById('qtext').textContent=q.text;document.getElementById('options').innerHTML=q.options.map((t,i)=>`<button class="option" onclick="choose(${i})"><span class="letter">${letters[i]}</span><span>${t}</span></button>`).join('');}function choose(i){answers[index]=i;if(index<data.h5_questions.length-1){index++;renderQuestion();}else showResult();}function prevQuestion(){if(index>0){index--;renderQuestion();}}function showResult(){const counts=[0,0,0,0];answers.forEach(a=>counts[a]++);let max=0;for(let i=1;i<4;i++)if(counts[i]>counts[max])max=i;const r=data.profiles[max];document.getElementById('quiz').style.display='none';document.getElementById('result').style.display='block';document.getElementById('rname').textContent=r.name;document.getElementById('rsub').textContent=r.summary;document.getElementById('score').textContent=r.score;document.getElementById('sections').innerHTML=`<div class="section"><h3>一、核心结论</h3><p>${r.summary}</p></div><div class="section"><h3>二、形成原因</h3><p>${r.why}</p></div><div class="section"><h3>三、典型表现</h3><ul>${r.signs.map(x=>`<li>${x}</li>`).join('')}</ul></div><div class="section"><h3>四、容易误判的地方</h3><p>${r.mistake}</p></div><div class="section"><h3>五、30天行动建议</h3><div class="advice">${r.advice.map(x=>`<div>${x}</div>`).join('')}</div></div><div class="section"><h3>六、关键提醒</h3><p>${r.reminder}</p></div>`;window.scrollTo({top:0,behavior:'smooth'});}</script></body></html>
