<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>消息回复心理测试</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"PingFang SC","Microsoft YaHei",sans-serif;background:#0f0f1a;color:#e8e0d0;min-height:100vh;display:flex;justify-content:center}
.app{width:100%;max-width:500px;min-height:100vh;position:relative;overflow:hidden}
.screen{display:none;flex-direction:column;min-height:100vh;padding:28px 22px 40px}
.screen.active{display:flex}

.cover{justify-content:center;align-items:center;text-align:center;gap:20px}
.cover .icon{font-size:52px}
.cover h1{font-size:29px;font-weight:900;line-height:1.4;letter-spacing:1.5px;padding:0 6px}
.cover h1 .hl{color:#c9a96e}
.cover .sub{font-size:15px;color:#8a8070;line-height:1.7;max-width:300px}
.cover .btn-start{margin-top:10px;padding:15px 50px;font-size:18px;font-weight:700;background:linear-gradient(135deg,#c9a96e,#a6844d);color:#0f0f1a;border:none;border-radius:40px;cursor:pointer;letter-spacing:2px}
.cover .btn-start:active{transform:scale(.96)}
.cover .trust{font-size:12px;color:#4a4538;margin-top:6px}

.progress-wrap{padding:4px 0 14px}
.progress-bar{height:3px;background:#1e1e2e;border-radius:2px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,#c9a96e,#d4b87a);border-radius:2px;transition:width .3s}
.progress-label{font-size:13px;color:#5a5548;margin-top:6px;text-align:right}

.q-area{flex:1;display:flex;flex-direction:column;gap:16px}
.q-area .q-num{font-size:13px;color:#6a6558;letter-spacing:2px}
.q-area .q-text{font-size:23px;font-weight:700;line-height:1.5}
.options{display:flex;flex-direction:column;gap:10px}
.opt{padding:18px 16px;border-radius:14px;background:#16162a;border:1.5px solid #252540;cursor:pointer;transition:all .2s;display:flex;align-items:flex-start;gap:13px}
.opt:active{transform:scale(.98);border-color:#c9a96e;background:#1e1e34}
.opt .letter{width:33px;height:33px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;flex-shrink:0;background:rgba(201,169,110,.12);color:#c9a96e}
.opt .txt{font-size:15px;line-height:1.55;color:#c8c0b0;flex:1}

.gate-screen{justify-content:center;align-items:center;text-align:center;gap:24px}
.gate-screen .lock-icon{font-size:48px}
.gate-screen h2{font-size:26px;font-weight:800;line-height:1.4}
.gate-screen .gate-desc{font-size:15px;color:#a09880;line-height:1.7;max-width:300px}
.gate-screen .unlock-list{text-align:left;background:#16162a;border-radius:16px;padding:20px 24px;width:100%;max-width:320px}
.gate-screen .unlock-list li{font-size:14px;color:#b8b0a0;line-height:2;list-style:none}
.gate-screen .unlock-list li::before{content:"✓ ";color:#c9a96e;font-weight:700}
.gate-screen .btn-gate{margin-top:8px;padding:14px 44px;font-size:18px;font-weight:700;background:linear-gradient(135deg,#c9a96e,#a6844d);color:#0f0f1a;border:none;border-radius:40px;cursor:pointer;letter-spacing:2px}
.gate-screen .btn-gate:active{transform:scale(.96)}
.gate-screen .price{font-size:14px;color:#6a6558;margin-top:4px}

.loading{justify-content:center;align-items:center;text-align:center;gap:24px}
.loading .spinner{width:52px;height:52px;border:3px solid #1e1e2e;border-top-color:#c9a96e;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading .msg{font-size:16px;color:#a09880;letter-spacing:1px}

.result{padding:28px 22px 48px}
.result .badge{display:inline-block;padding:7px 16px;border:1px solid rgba(201,169,110,.25);border-radius:16px;font-size:13px;color:#c9a96e;letter-spacing:2px;margin-bottom:14px}
.result .type-name{font-size:36px;font-weight:900;margin-bottom:6px;line-height:1.2}
.result .type-sub{font-size:18px;color:#d4b87a;margin-bottom:20px;line-height:1.4}

.evidence-box{background:#16162a;border-radius:16px;padding:20px;margin-bottom:22px;border-left:3px solid #c9a96e}
.evidence-box h3{font-size:14px;color:#c9a96e;letter-spacing:2px;margin-bottom:10px}
.evidence-box p{font-size:14px;color:#b8b0a0;line-height:1.7}

.module{margin-bottom:20px}
.module h3{font-size:16px;color:#a09880;letter-spacing:1.5px;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid #1e1e2e}
.module p{font-size:14px;color:#b8b0a0;line-height:1.75;margin-bottom:6px}

.summary-box{background:linear-gradient(135deg,#1a1a2e,#1f1f34);border-radius:16px;padding:24px;margin:24px 0;text-align:center;border:1px solid rgba(201,169,110,.15)}
.summary-box .q-mark{font-size:28px;color:#c9a96e;margin-bottom:8px}
.summary-box p{font-size:17px;color:#d4b87a;line-height:1.7;letter-spacing:.5px}

.advice-box{margin-bottom:24px}
.advice-box h3{font-size:16px;color:#a09880;letter-spacing:2px;margin-bottom:12px}
.advice-box .advice-item{padding:12px 14px;margin-bottom:8px;background:#16162a;border-radius:12px;font-size:14px;color:#b8b0a0;line-height:1.6;display:flex;gap:10px}
.advice-box .advice-item .n{color:#c9a96e;font-weight:700;flex-shrink:0}

.reminder-box{background:#16162a;border-radius:16px;padding:20px;margin-bottom:28px;border:1px solid #2a2a40}
.reminder-box h3{font-size:15px;color:#c9a96e;letter-spacing:2px;margin-bottom:8px}
.reminder-box p{font-size:14px;color:#a09880;line-height:1.7}

.footer{text-align:center;padding:16px;font-size:11px;color:#3a3a48;border-top:1px solid #16162a;margin-top:auto}
</style>
</head>
<body>
<div class="app" id="app"></div>
<script>
// ========== 内容数据 ==========
const DATA = {
  title:"谁让你秒回，<br>谁让你假装没看到<br><span class='hl'>你的回复速度在替你说什么</span>",
  subtitle:"不是测你回得快不快——<br>是测你的回复节奏里藏着的关系地图",

  questions:[
    {scene:"早上醒来打开手机，看到三条未读消息——分别来自同事、好朋友、和一个你最近有点在意的人。你先点开谁的？",A:"先看那个「最近有点在意的人」——不是因为最重要，是因为跟他聊天最不紧张。安全的人先回",B:"先看同事——工作消息有明确的时间压力，先把正事处理掉再安心聊天。这跟亲疏无关，是效率",C:"先看好朋友——但点开之后可能要缓一缓再回，因为不知道说什么。情感含量越高的消息越需要酝酿",D:"看心情。心情好的时候先回谁都有可能，心情不好的时候可能三个都不回——没有固定顺序"},
    {scene:"有一条消息你隔了很久都没回——对方发了一个「？」，你的第一反应是？",A:"立刻解释为什么没回，然后认真回原消息——不是因为愧疚，是因为不想让这个人觉得我不在乎他",B:"扫一眼原消息，如果是正事就马上处理，如果是闲聊就继续放着——不是每条消息都需要被回复",C:"心跳加速了一下。打开对话框又关掉，反复了几次——因为不知道怎样回复才能不让对方多想",D:"看看自己当时的情绪状态——状态好就回，状态不好就再放一放，勉强回了反而更敷衍"},
    {scene:"翻你和不同人的聊天记录，回复间隔最短的人是谁？",A:"那个从来不会评价我的人——在他面前我不需要想「这样说好不好」，想到什么就直接打出来发了",B:"工作关系里最有效率的那几个人——不是因为亲，是因为对方回得也快，形成了一种尊重彼此时间的默契",C:"说实话……是那些对我没什么期待的人。越不在意我回不回的人，我反而回得越快——因为没有负担",D:"没有固定的规律——有时候对同一个人，上午隔三分钟下午隔三小时。我的回复速度像天气，不是时钟"},
    {scene:"你假装没看到某条消息的最常见原因是什么？",A:"不是不想回，是我现在状态不好，回了也是敷衍。对在乎的人，我不想用一句敷衍的话代替真正的回应",B:"那条消息不需要回复——闲聊、表情包、没有明确目的的信息，不在我的回复清单上。这不是冷漠，是注意力管理",C:"那条消息带着某种情感期待——对方想要安慰、关注或者一个承诺。我怕我给了之后就被这种期待套住了",D:"纯粹是因为当下不想社交。跟对方是谁没什么关系，换谁都一样。那一刻我需要的不是对话，是安静"},
    {scene:"你有没有对同一个人，既秒回过、也假装没看到过？如果有，区别在哪？",A:"有——区别在我当时的状态。状态好的时候我能秒回所有人，状态差的时候连最亲的人都拖。但拖完之后最愧疚的也是那个最亲的人",B:"有——区别在消息内容。正事秒回，闲聊随缘。对方早就习惯了，不会因为这种事觉得我不在乎他",C:"有——区别在对方那条消息的「情绪重量」。轻松的秒回，沉重的不敢碰。怕一打开就收不住，要花很多时间去承接",D:"有——区别在我今天的心情和精力。这不是针对谁，这是我的节奏。但确实有人不理解，觉得我忽冷忽热"},
    {scene:"如果微信有一个功能，可以让你看到「谁在等你的回复等了最久」——你最不想看到排在第一的人是谁？",A:"那个对我最好的人。因为我拖他的消息不是因为不在乎——恰恰是因为太在乎了，不想用一句敷衍的话打发他",B:"某个工作伙伴。不是因为愧疚——是因为我确实把那件事排在了后面。但我不打算改这个排序，因为它合理",C:"某个对我有情感需求的人。看到他等那么久我会很有压力——但压力不会让我回得更快，反而让我更想逃避",D:"谁也不意外——我大概能猜到是谁。但我也接受这个排名，因为我的精力有限，不可能对所有人都保持同样的回复速度"},
    {scene:"你觉得自己回复速度最快的那一天，和回复速度最慢的那一天——差别在哪儿？",A:"最快那天：内心平静没有焦虑，回消息像聊天不是任务。最慢那天：自己状态很差，怕把负能量带进对话里",B:"最快那天：工作高效，消息都是正事，回得干脆利落。最慢那天：全是闲聊和需要应酬的消息，自动进入低电量模式",C:"最快那天：收到的都是轻松的、没有压力的消息。最慢那天：有好几条带着情绪期待的消息，每一条都像一张考卷",D:"最快那天：精力充沛心情好。最慢那天：什么都不想干。区别就是自己的电量条——跟对方是谁、消息是什么都没太大关系"},
    {scene:"如果你必须在一个月内对所有人都「秒回」——不能犹豫不能拖——你最累的地方是什么？",A:"最累的是：对某些人秒回之后还要继续聊下去。秒回不难，难的是秒回之后不知道自己能不能接住后面的对话",B:"最累的是：有些消息根本不值得秒回。把时间切碎去应付那些低信息量的消息，会让我觉得自己的时间被偷走了",C:"最累的是：回复那些带着情感期待的人——秒回意味着你「在」，意味着你要进入一段你不知道什么时候才能退出的对话",D:"最累的是：在自己不想社交的时候还要装热情。秒回是一种表演——演一个「在线的人」，但那天我根本不在线"},
    {scene:"有没有一个人，你从来没对他假装没看到过？你觉得为什么？",A:"有——因为在他面前我可以回得乱七八糟、前言不搭后语、甚至直接说「我现在回不了」。他知道我不是不在乎，只是需要一点空间。跟安全的人不需要演技",B:"有——因为他发的每条消息都有明确目的。不浪费彼此时间的人，值得每一次秒回。这不是感情，是互相尊重",C:"目前没有——但我希望有一个。希望有一个人让我觉得：不管我怎么回、什么时候回，他都不会因此改变对我的看法",D:"没有——因为我的回复节奏和对方是谁关系不大。即使是最亲的人，我状态不好的时候也会拖。这是我的方式，不是针对谁"},
    {scene:"你最近一次「秒回」了一个人，打开对话框到发出去用了不到三秒——那个人是谁？为什么这么快？",A:"是一个老朋友。他发了一句「最近还好吗」——我秒回了，因为我知道他不是在客套。他问的时候是真的在问，所以我可以真的答",B:"是一个合作伙伴。他发了一个需要确认的信息，我秒回了「收到」——不是热情，是效率。双方的时间都值得被尊重",C:"是一个不怎么熟的人。他发了一个很轻松的话题——我秒回了，因为没有负担。越是没期待的关系，我越敢快速回应",D:"说不上是谁——就是那一刻刚好有心情、刚好看到了、刚好想回。跟对方的关系深浅无关，纯粹是时机对了"},
    {scene:"如果把你所有的聊天对象按回复速度排一个榜——排在最后的几个人，你对他们有什么共同的感觉？",A:"他们让我觉得「回消息是一件需要准备的事」——不是因为他们凶，是因为我太在意他们对我的看法。越在意，越不敢随便回",B:"他们发消息的方式让我不舒服——没有重点、纯闲聊、或者总是半夜发。不是我不尊重他们，是他们不尊重我的时间和注意力",C:"他们每次发消息都带着某种期待——需要我回应情绪、给出态度、或者做一个决定。我不是不想回，我是还没准备好面对那些期待",D:"没有什么共同感觉——纯粹是因为他们运气不好，总是发在我电量低的时候。如果换成我状态好的时候，他们可能排在前几位"},
    {scene:"如果你的回复速度会说话——它正在用你现在的方式，告诉世界一件什么事？",A:"「我回得快不是因为你有权力——是因为你让我觉得安全。安全的人才值得秒回，剩下的需要排队等我的勇气」",B:"「我回得快或慢不是随机的——是我在用自己的方式告诉你：你在我生命里的位置。秒回是前排，已读不回是你不在名单上」",C:"「我拖不是不在乎——是我还没准备好把自己交出去。回消息对我来说不是打字，是打开一扇门。我需要知道门后面是安全的」",D:"「别把我的回复速度当成评价我们关系的标尺——我回得快是今天心情好，回得慢是今天电量低。跟你是谁没关系，跟今天的我是什么状态有关系」"}
  ],

  types:{
    A:{name:"安全优先型",tag:"你的秒回不是给最重要的人——是给让你最不紧张的人",icon:"🛡️",
       score:"安全优先指数 86%",
       conclusion:"你回消息的速度和对方的「重要性」关系不大——和对方让你感觉「多安全」关系很大。那个让你秒回的人，不一定是你在世界上最在乎的人，但一定是你在对话框面前最不需要斟酌的人。在他面前，你可以打错字、说废话、前言不搭后语——因为你知道他不会因为这些就改变对你的看法。而那些你假装没看到的人，也不是不在乎——恰恰是因为太在乎他们对你的看法，所以每一条回复都像一场小心翼翼的考试。",
       evidence_note:"你最先打开的是让你不紧张的人的消息（Q1），被追问时会立刻解释因为不想让对方觉得被冷落（Q2），回复最快的是从不评价你的人（Q3），拖延是因为不想用敷衍伤害在乎的人（Q4），状态差时最愧疚的是拖了最亲的人（Q5）。你的回复速度不是一个排行榜——它是一个精确的安全感测量仪。越安全的人回得越快，不是因为他们在你心里排第一，是因为在他们面前你不需要排练。",
       quote:"你不是回得快——你是在那个人面前不需要排练。秒回不是因为手机刚好在手边，是因为在对话框打开之前你就已经知道：说错也没关系。",
       modules:[
         {title:"你的回复人格：安全感驱动型回应者",content:"你的回复速度模式有一个清晰的核心逻辑：不是谁最重要就回谁最快——是谁让你觉得「在这个人面前我不需要绷着」就回谁最快。你可能自己都没注意到这个规律——你以为是随机、是凑巧、是刚好看到了。但翻一翻你的聊天记录就会发现：秒回的那几个人身上，都写着同一句话——「对这个人，我不需要想太久」。那些让你犹豫的、斟酌的、反复删改的，不是不重要，是太重要了——重要到你觉得随便回就是在怠慢他。这种模式的形成，很可能源于你曾经在某些关系里吃过「说错话」的亏——从那以后，你在所有让你觉得不够安全的人面前，都自动开启了审查模式。"},
         {title:"你的回复速度在替你说什么",content:"它在说：「我能快速回应你，不是因为你催得急——是因为你让我觉得我的回应会被接住，不会被审判。」你的回复速度里藏着一份不动声色的信任——你信任某些人不会因为你回得随意就觉得你敷衍，不会因为你回得慢就觉得你冷漠，不会因为你打了错别字就开始重新评估你这个人。而那些让你回复变慢的人，往往不是他们做错了什么——是他们让你觉得：回消息这件事，在你和他们的关系里，容错率很低。"},
         {title:"别人从你的回复速度里读到了什么（可能不是你想表达的）",content:"别人可能读到了「偏心」——你回某些人快、回某些人慢，容易让人觉得你在区别对待。但你不是在排优先级，你是在找安全感。也可能有人读到了「忽冷忽热」——你今天秒回明天已读不回，对方会困惑：是我做错了什么吗？但你其实什么都没变——变的是你当天的状态和面对他的勇气。还有可能有人读到的是「高冷」——你延迟回复和简短的句子让人觉得你不太想搭理。但你心里清楚：你不是不想搭理，你是在对话框里写了又删、删了又写，最后发出去的还是那句最简单的。"},
         {title:"最容易掉进的回复误区",content:"你有时候会把「等我状态好了再回」当成一个合理的拖延理由——但状态好的那一天很少主动来。你等的是一个完美的回复时机，但那个时机可能永远不会自己出现。另一个误区是：你对越亲近的人越敢拖——因为你相信他们会理解。但他们理解归理解，那条没有回的消息在他们的聊天列表里一直往下掉的感觉，你可能低估了。还有一个误区：你把回消息当成了一件需要「完整精力」的事——但其实有些人需要的只是你一句「收到了，晚点聊」，而不是一篇满分作文。"},
         {title:"怎么让你的回复速度更贴近你想成为的关系模式",content:"给「安全的人」一个特权：允许自己先回一句「现在不太方便，晚点找你」，而不是等到有时间长篇大论。你会发现——安全的人之所以安全，就是因为他们不需要你每次都满分。给「在意的人」一个提醒：告诉他们「我看到你的消息了，我需要一点时间想好怎么回」。有时候一句主动的进度更新，比沉默三天然后发一长段解释，更能让对方感觉被重视。练习区分「需要准备的回复」和「只需要确认的回复」——不是每条消息都需要酝酿。有的消息只需要四个字：看到了，好。"}
       ],
       advice:["7天观察：每天睡前翻一遍今天的聊天列表，圈出那个你回得最快的人和回得最慢的人——问自己：快的那个哪里让我觉得安全？慢的那个哪里让我觉得需要排练？只观察，不逼自己改变。","7天观察：找一个你平时会拖的人，下次他发消息时，在十分钟内回一句简单的——不需要完美，只需要表明你「在」。观察：天有没有塌下来？对方有没有因为你回得不够好而改变对你的态度？","30天练习：把「等我状态好了再回」改成「我先告诉你我看到了」。面对你在意的人，允许自己先发一句预告：「看到了，忙完回你」「想好了回复你」。让沉默变成有进度的等待，而不是消失。","30天练习：每月挑三个你一直在拖的对话框——主动发一条消息过去。不需要解释为什么没回、不需要长篇大论。只需要一句：「之前一直没想好怎么说，其实我想说的是」——然后把你想说的说出来。给自己一个不完美的权利。"],
       reminder:"你不是回消息慢——你是太想把每一条回复都写好。但那些真正安全的人，不需要你的满分作文。他们只需要知道：你还在。而那些让你反复斟酌的人——有没有一种可能：他们才是你最需要练习「允许自己不够完美」的对象？"
    },
    B:{name:"地位排序型",tag:"你的回复速度不是随机的——是你给每个人悄悄排的优先级",icon:"📊",
       score:"排序意识指数 83%",
       conclusion:"你对「回什么消息、回谁、什么时候回」有一套自己的系统——只是你可能从来没把它写下来。你的回复速度不是一个随机的波动——它是一个你下意识执行的排序表。正事排在闲聊前面，高效的人排在低效的人前面，有明确需求的消息排在「不知道发来干嘛」的消息前面。你不是冷漠——你是对注意力有边界感。你觉得每条消息都在对你的时间发起一次请求，而你有权利决定审批速度。那些被秒回的人，不是因为你在乎他们——是因为他们值得被高效对待。那些被已读不回的人，也不是因为你讨厌他们——是因为那条消息不值得消耗你的注意力。",
       evidence_note:"你按消息类型决定回复优先级——正事先回、闲聊随缘（Q1、Q2），你回复最快的是工作关系里最有效率的搭档（Q3），你假装没看到是因为那条消息不需要回复（Q4），正事秒回闲聊随缘这个规则对方已经习惯了（Q5）。你的回复模式背后是一套不写在纸上的效率系统：消息被分类、被排序、被安排进不同的时间窗口。这不是冷血——是你对时间的尊重延伸到了聊天框里。",
       quote:"你回的每一条消息都是一张票——秒回是VIP席位，轮回是普通座，已读不回是你根本没进场。这不是心机，是你的注意力太贵了。",
       modules:[
         {title:"你的回复人格：效率型排序者",content:"你在回复消息这件事上，有一套潜意识里的「消息分级系统」。一级：正事、确认、需要你给反馈的——秒回。二级：熟人、明确话题、不需要太费脑子的——有空就回。三级：闲聊、表情包、半夜发的「在吗」——视心情和精力而定。四级：带着模糊情感期待、让你不知道对方到底想要什么的消息——排在最后，有时直接沉底。你不是不想回——你是不想把精力花在揣摩「这条消息到底是什么意思」上。你的注意力对你来说是有限的资源，你有权利分配它。"},
         {title:"你的回复速度在替你说什么",content:"它在说：「不是所有人的消息都值得我立刻停下手上的事去回复。这不代表我不尊重你——代表我有自己的节奏。」你的回复速度是你给世界的一组信号：你用秒回告诉某些人「你在我的一级清单上」，用轮回告诉某些人「你不是不重要，但你的消息不急」，用沉默告诉某些人「这条消息不构成一个需要我回应的请求」。会有人觉得这样太冷酷——但你没做错。你只是比大多数人更早想通了一件事：时间不是无限的，注意力不是免费的。"},
         {title:"别人从你的回复速度里读到了什么（可能不是你想表达的）",content:"别人可能读到「傲慢」——你回某些人快回某些人慢，容易让人觉得你在摆谱。但你不是傲慢，你是有分类标准。也有人读到「功利」——你回正事快回闲聊慢，让人觉得你只在乎「有用的」关系。但你只是对信息密度有要求：废话不值得分配精力。还可能有人读到「看人下菜」——你对领导秒回对同事轮回，让人觉得你在讨好上位者。但你自己清楚——你秒回领导的原因和人无关，和工作节奏有关。这些误读最麻烦的地方在于：你越解释越像在掩饰，不解释又像默认。"},
         {title:"最容易掉进的回复误区",content:"你有时候会把「效率」当成唯一的衡量标准——但关系不是靠效率维系的。那些在你清单上排在后面的闲聊，可能恰恰是别人向你伸出手的方式。另一个误区是：你默认「别人应该理解你的排序逻辑」——但你从来没有跟对方说过你的规则。对方看到的就是你不回消息，然后自己脑补了一万个理由。还有一个误区：你把所有「没有明确目的」的消息都归类为低优先级——但有些人的「在吗」「想你」「今天吃了什么」，目的就是靠近你。把每一次靠近都当成打扰，最后就没有人靠近了。"},
         {title:"怎么让你的回复速度更贴近你想成为的关系模式",content:"在你的排序系统里，给「感情维护」单独开一档。不需要多高——但要有一档。承认有些消息虽然效率低，但它们存在的意义不是交换信息，是维持一个关系的温度。对那些你在意但经常排不进优先级的人，定期主动发一条消息——不需要理由，不需要正事。让你的回复速度从「被动排序」变成「主动选择」——哪怕只是一周一次，让别人感觉到你也在靠近。"}
       ],
       advice:["7天观察：翻一遍你最近的聊天记录，把所有你隔了很久才回或者没回的消息找出来——每一条旁边写下：如果抛开「有没有用」的标准，这个人发这条消息的时候，最可能的动机是什么？有时候你会发现：那些低信息量的消息，其实是在说「我想你了」。","7天观察：这周找一个人——一个经常被你排在「闲聊」档但和你有感情基础的人——主动给他发一条没有任何正事要说、纯粹是「突然想到你」的消息。观察对方的反应和你自己的感受。","30天练习：在你的消息处理系统里，新建一个类别叫做「温度维护」。每周从这个类别里至少处理三条消息——不需要秒回，但不要让它沉底。三条消息，三个你在乎但不是工作关系的人。连续坚持四周。","30天练习：练习「表达排序」——当你要拖一个人的消息时，给他发一句：「你的消息我看到了，手上有些事先处理完，今晚/明早回你。」让你的排序系统对外透明。不是每个人都需要理解你的规则——但那些你在乎的人，值得知道他们在你的清单上不是被遗忘的那一栏。"],
       reminder:"你不是冷血——你是太擅长管理注意力了，擅长到忘了注意力和感情有时候需要共用一条通道。那些被你排到后面的闲聊里，藏着很多人笨拙的靠近。效率不会帮你留住人——偶尔的「低效率」才会。"
    },
    C:{name:"回避保护型",tag:"你拖的不是消息——是那些消息后面藏着的、你还没准备好面对的情感",icon:"🚪",
       score:"回避保护指数 81%",
       conclusion:"你回消息的速度和对方发来的「情感重量」成反比——消息越轻回得越快，消息越重拖得越久。你不是不在乎——恰恰相反，你太在乎了。你在乎到觉得每一条带着情感期待的消息都需要你「准备好」才能接——准备好心情、准备好时间、准备好一段你一旦打开就不确定什么时候能退出的对话。轻快的、没有负担的消息你回得飞快，因为它们不要求你交出自己。沉重的、需要你共情的、对方明显在等一个你在乎的信号的——这些消息会在你的聊天列表里一直往下掉，直到对方又发来一条新的，或者直到你终于攒够了勇气打开那个对话框。",
       evidence_note:"你看到带着情感期待的消息会心跳加速（Q2），回复最快的是对你没期待的人（Q3），拖延是因为消息带着情感期待怕被套住（Q4），秒回和拖延的区别在于消息的情绪重量（Q5），最不想看到等你回复的是对你有情感需求的人（Q6）。你的回复模式在说一句话：「我可以打字，但我还没准备好把心交出去。请再给我一点时间。」",
       quote:"你拖的不是消息——你拖的是那条消息后面站着的、一双在等你的眼睛。你怕的不是回复本身，是你一旦回了，就要面对那个人全部的情感重量。",
       modules:[
         {title:"你的回复人格：回避型情感保护者",content:"你有一个自己可能都没意识到的条件反射：当一条消息带着情感期待出现在屏幕上，你的第一反应不是打开——是微微往后退。不是心理意义上的退，是真实的生理反应：心跳快了一下，手指悬在屏幕上方，然后划走去做别的事。你告诉自己「等下再回」「想好了再回」「状态好了再回」——但其实你在等的不是时间，是那条消息自动变成一条不需要你交出情感的消息。你怕的不是聊天——你怕的是聊天背后的东西：对方需要你、期待你、或者在等你的一个态度。那些轻松的消息之所以回得快，是因为它们不对你提出情感要求——你只需要打字，不需要交心。"},
         {title:"你的回复速度在替你说什么",content:"它在说：「我不是不想理你——我是还没想好怎样用一颗还没准备好的心去接住你需要的东西。」你的回复速度是你情感边界的一个温度计。越慢的回复，说明那条消息在你心里激起的涟漪越大。那些被你秒回的人可能会觉得你随时在线、热情、好相处——但他们收到的其实只是你不需要设防的那一面。而那些被你轮回的人，往往才是真正能触碰到你核心情感的人——只是你还不确定要不要让他们碰到。"},
         {title:"别人从你的回复速度里读到了什么（可能不是你想表达的）",content:"别人可能读到「你不在乎」——你拖了三天没回，对方会想：大概我在他心里也没那么重要。但事实恰好相反：正是因为太重要了，你才不敢随便回。也可能有人读到「你在躲我」——这个倒是读对了一半。你不是在躲他这个人，你是在躲他带来的情感浓度。还有人读到「忽冷忽热」——你回轻松话题的时候热情四射，回沉重话题的时候沉默得像换了个人。对方会困惑：这个人是喜欢我还是不喜欢我？但你没变——你只是在不同情感重量的消息面前，启动了不同程度的自我审查。"},
         {title:"最容易掉进的回复误区",content:"你有时候会把「等我准备好了再回」当成一个永远不会兑现的支票——但「准备好」这三个字没有截止日期。你等的那一天从来不是自动到来的——它是在你终于鼓起勇气打开对话框的那一刻才到来的。另一个误区是：你习惯了用「不知道说什么」当作不回复的理由——但有时候对方要的不是你的完美回应，对方只是想知道你还在、你看到了、你没有假装他这个人不存在。最深的误区是：你以为回避是在保护自己——但回避久了之后，那些对你重要的人会陆续离开。不是因为你不值得，是因为你从来没有让他们知道：你不是不在乎，你只是怕接不住。"},
         {title:"怎么让你的回复速度更贴近你想成为的关系模式",content:"给情感消息设一个「最小回应」——不需要长篇大论，不需要完整共情，只需要让对方知道：「我看到了，我在想怎么回你」或者「这件事对我来说也需要消化一下，但我会回你的」。把沉默变成有进度的回应。识别哪些情感期待是你被投射的、不是你该接的——不是每条带着情绪的消息都需要你去承载。学会区分「这是我的责任」和「这是对方的期待」——前者必须回应，后者可以选择范围和方式。最重要的是：允许自己在还没完全准备好的时候就做出回应——有时候你回得磕磕绊绊，反而比沉默更真实、更让人愿意靠近。"}
       ],
       advice:["7天观察：把你最近一周所有「拖了超过一天还没回」的消息找出来——每一条旁边写下：这条消息里，对方在等什么？那个东西如果给你，你觉得最坏的结果是什么？你会发现很多你害怕的后果，其实没有你想象中那么大的代价。","7天观察：下一次收到一条让你想拖的情感消息时——在五分钟内回复一句：「看到了，我消化一下再回你。」只需要这一句。观察两件事：对方的反应（多半比你以为的温和得多），和你自己的感觉（多半比你以为的轻松得多）。","30天练习：给自己建一个「勇敢回复」日志。每次你回了那条让你害怕的消息——哪怕只回了一句——记下来：回了什么、对方的反应、你的感受。一个月后回看，你会发现：那些你曾经害怕回的消息，大部分都没有发生你担心的剧情。","30天练习：练习区分「情感消息」的轻重。不是每条带着情绪的消息都是重型的——学会识别：对方只是在分享感受，还是真的在向你索取一个解决方案或承诺？前者不需要你接住，只需要你看见。后者才需要你的认真对待。一个月后，你会发现自己对情感消息的敏感度阈值在慢慢调整。"],
       reminder:"你不是冷漠——你是太敏感了，敏感到每一条消息背后的情感你都接收到了，然后被那些情感的重量吓到了。但你不需要每次都接住所有人。有时候你需要做的只是说一句「我在」——不是替你解决问题，是替你在关系中开一条不会被堵住的门缝。那些值得你的人，不会因为你回得不够完美就跑掉。那些跑掉的，是来找解决方案的，不是来找你的。"
    },
    D:{name:"波动反应型",tag:"你的回复节奏和对方是谁关系不大——它只是你内心天气的晴雨表",icon:"🌊",
       score:"波动反应指数 79%",
       conclusion:"你回消息的速度本质上不是由「对方」决定的——是由「今天的你」决定的。心情好的时候，你可以对所有人秒回，甚至主动打开一些沉了很久的对话框；心情不好的时候，连最亲的人发来的消息你都会把手机翻过去。你不是不在乎谁——你只是对「回复消息」这件事的能量门槛高度敏感。电量足的时候，回消息是一件很自然的事，不需要思考、不需要准备；电量低的时候，回一个「嗯」都像在完成一项任务。你被误解得最多的一件事就是：别人觉得你在针对他们——但你从来没有针对任何一个人。你只是在针对自己当天的状态。",
       evidence_note:"你打开消息的顺序取决于心情（Q1），被追问时先看自己的状态（Q2），回复速度没有固定规律——同一个人间隔可以差几十倍（Q3），拖延的原因是当下不想社交跟对方无关（Q4），区分秒回和拖延的标准是当天的精力（Q5），接受自己的回复速度排行榜因为精力有限（Q6），速度和对方、消息类型关系都不大（Q7、Q9），秒回是因为时机对了（Q10）。你的回复模式是一张情绪心电图——起伏的不是关系和态度，是你自己的状态曲线。",
       quote:"别用我的回复速度来衡量你在我心里的位置——我回得快是今天太阳好，我回得慢是今天电量低。你从头到尾都没有变过，变的是我对这个世界的耐受力。",
       modules:[
         {title:"你的回复人格：情绪波动型反应者",content:"你的回复速度像一面镜子——但它映照的不是对方的脸，是你自己的心情。你可能是所有类型里被误解最深的一个：别人把你的慢解读为冷淡、把你的快解读为热情、把你的忽冷忽热解读为「你是不是对我有意见」。但你自己知道——你回消息的速度和你对一个人的感情几乎无关。你可以在最爱一个人那天一条消息都不回，也可以在对一个人完全无感的时候聊得热火朝天。不是你不真诚——是你对社交的能量门槛比大多数人更低。回消息这件事对你来说不是举手之劳——它是一个需要消耗心力的动作。心力充沛的时候，它是举手之劳；心力枯竭的时候，它是负重跋涉。"},
         {title:"你的回复速度在替你说什么",content:"它在说：「我现在能给的和你值不值得无关——只和我今天的库存有关。」你的回复速度透露的不是关系的温度，是你自己的状态。那些把你秒回当成「你在乎我」的人，会在你沉默的时候觉得「你不在乎我了」——然后你需要花很多精力去解释、去安抚。但真正理解你的人，会看懂你的节奏：你今天回得快不是因为有求于我，你今天回得慢不是因为你讨厌我——你今天就是这样。这是一种需要被周围人学习的语言——而你的任务，是让那些重要的人学会读这门语言。"},
         {title:"别人从你的回复速度里读到了什么（可能不是你想表达的）",content:"这可能是被误解最严重的一种回复模式。别人读到的信息和你实际想传达的，中间隔着一整个太平洋。他们读到「忽冷忽热」「捉摸不定」「你是不是不喜欢我了」「上次明明秒回的为什么这次不回」「你是不是在故意冷落我」——但没有一件是真的。你真的只是在过自己的生活——有时候精力满格，有时候在省电模式。但问题是：没有被告知过的人，会用自己的逻辑来解释你的行为。而人类解释模糊信号的默认设置是：往坏处想。所以你需要做的不是改变自己的节奏——是提前告诉那些重要的人：我的节奏跟你没关系。"},
         {title:"最容易掉进的回复误区",content:"你有时候会用「这是我的方式」来合理化所有延迟——但方式再好，如果有人的感受被持续忽视，关系还是会受损。你不是故意忽视——但你确实没有给对方一个理解你的框架。对方收到的只有沉默，没有解释。另一个误区是：你在状态好的时候过度社交——秒回所有人、打开所有对话框、聊到停不下来——然后在状态差的时候全面消失。这种剧烈波动会让周围的人无所适从：你到底是一个热情的人还是一个冷淡的人？他们不知道该期待哪一个你。还有一个误区：你以为情绪波动是自己的事，跟别人无关。但其实，任何一段亲密关系里，一个人的情绪波动都会传导给另一个人。你不说，对方就会猜。而猜的答案，通常比你真实的状况更糟。"},
         {title:"怎么让你的回复速度更贴近你想成为的关系模式",content:"首先——不需要改变你的波动模式本身。你的情绪敏感度和精力波动是你的出厂设置，不是bug。但你需要加一个「说明书」。对那些你在乎的人，告诉他们你的模式——不是道歉，是告知：「我回消息的速度跟我对你的感觉没关系，纯粹跟我当天的电量有关。如果我没回，不是不在乎，是今天自己状态不太好。」多数人会理解——因为多数人自己也有这种时候，只是不好意思说。另外，给自己设一个「最低回复标准」——即使状态再差，给最重要的人发一个状态更新：「今天不多聊了，明天找你」。这不是在委屈自己——是在保护那些你不想失去的关系。"}
       ],
       advice:["7天观察：每天晚上记录今天回消息的状态——是「秒回模式」还是「省电模式」还是「静音模式」？旁边写下：今天的情绪和精力水平是怎样的？一周后你会看到一条规律曲线——那条曲线告诉你：不是你在忽冷忽热，是你在回应自己的状态。","7天观察：找三个你在乎的人，各发一条消息告诉他们：「我有时候回消息快有时候慢，跟对你的感觉完全没关系，纯粹是我自己的状态波动。如果我没回，不是不在乎。」不做任何解释之外的道歉——只做告知。观察他们的反应和你自己的感觉。","30天练习：即使状态再差，每天给一个最重要的人发一条消息——不需要聊天，只需要状态更新。比如「今天状态一般就不多聊了」「今天心情不错想跟你分享一下」。保持连接的最低限度，不让任何重要的人觉得你消失了。","30天练习：在日历上标记你未来四周的「预估状态」——哪几天你觉得会比较累（工作忙、生理期、有压力的社交），提前告诉重要的人：「那几天我可能会低电量，回消息比较慢。」不是请假——是预报。让重要的人提前知道天气，就不用在事后解释为什么下雨。"],
       reminder:"你的波动不是缺陷——是你的神经系统在替你管理有限的能量。那些因为你的节奏快慢就轻易离开的人，本来也没有准备好在你的真实世界里停留。而那些留下来的、理解了你的节奏的——才是你不需要「解释自己」就能回消息的人。对他们好一点，用你状态最好的时候。"
    }
  },

  productModules:[
    "你的回复速度模式诊断——秒回和已读不回背后的心理逻辑",
    "你的回复速度在替你说什么——那些你没说出口的关系语言",
    "别人从你的回复速度里读到了什么——常见误读与修复方式",
    "最容易掉进的回复误区——你以为的「没关系」可能是「有关系」",
    "怎么用回复速度经营你想成为的关系——从被动模式到主动选择"
  ],

  disclaimer:"本测试仅为自我探索参考，不构成任何心理诊断、治疗建议或效果承诺。每个人的社交节奏不同，请结合自己的实际感受判断。"
};

// ========== 引擎 ==========
let answers=[],currentQ=0,paid=false;

function $(id){return document.getElementById(id)}
const app = document.getElementById('app');

function cover(){
  app.innerHTML=`
    <div class="screen active cover">
      <div class="icon">💬</div>
      <h1>${DATA.title}</h1>
      <div class="sub">${DATA.subtitle}</div>
      <button class="btn-start" onclick="start(true)">开始测试</button>
      <div class="trust">前5题免费 · 记下答案左滑查看报告预览</div>
    </div>`;
}

function start(free){answers=[];currentQ=0;paid=!free;renderQ()}

function renderQ(){
  if(currentQ>=DATA.questions.length){showResult();return;}
  if(currentQ===5 && !paid){showGate();return;}
  const q=DATA.questions[currentQ];
  const pct=Math.round((currentQ/DATA.questions.length)*100);
  const letters=['A','B','C','D'];
  app.innerHTML=`
    <div class="screen active">
      <div class="progress-wrap">
        <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
        <div class="progress-label">第 ${currentQ+1}/${DATA.questions.length} 题</div>
      </div>
      <div class="q-area">
        <div class="q-num">${currentQ<5?'免费测试 · 第'+(currentQ+1)+'题':'深度解锁 · 第'+(currentQ+1)+'题'}</div>
        <div class="q-text">${q.scene}</div>
        <div class="options">
          ${letters.map(l=>`<div class="opt" onclick="pick('${l}')"><div class="letter">${l}</div><div class="txt">${q[l]}</div></div>`).join('')}
        </div>
      </div>
      ${currentQ===4?'<div style="text-align:center;font-size:13px;color:#6a6558;padding:8px 0">记下5个答案，左滑查看报告预览 →</div>':''}
    </div>`;
}

function pick(letter){
  answers.push(letter);
  currentQ++;
  renderQ();
  window.scrollTo(0,0);
}

function showGate(){
  app.innerHTML=`
    <div class="screen active gate-screen">
      <div class="lock-icon">🔓</div>
      <h2>前5题只是倾向<br>完整12题才能看清全貌</h2>
      <div class="gate-desc">后7题继续拆解：你的回复速度在替你说什么、别人读到了什么、你最深的回复模式是什么</div>
      <ul class="unlock-list">
        ${DATA.productModules.map(m=>`<li>${m}</li>`).join('')}
      </ul>
      <button class="btn-gate" onclick="unlock()">继续完成12题 · 解锁完整报告</button>
      <div class="price">完整12题报告 · 做完自动解锁</div>
    </div>`;
}

function unlock(){paid=true;renderQ()}

function showResult(){
  const counts={A:0,B:0,C:0,D:0};
  for(let i=5;i<answers.length;i++){counts[answers[i]]++}
  const sorted=Object.entries(counts).sort((a,b)=>b[1]-a[1]);
  let typeKey=sorted[0][0];
  if(sorted[0][1]===sorted[1][1]&&sorted[0][0]==='A'&&(sorted[1][0]==='C'||sorted[1][0]==='D'))typeKey=sorted[1][0];
  if(sorted[0][1]===sorted[1][1]&&sorted[0][0]==='B'&&sorted[1][0]==='D')typeKey='D';
  const type=DATA.types[typeKey];

  const freeAnswers=answers.slice(0,5);
  const freeLabels=['最先打开谁','被追问的反应','回复最快的人','假装没看到的原因','秒回与拖延的差异'];
  const freeDesc=[
    ['先打开最安全的人——安全感排序高于重要性','先处理有时间压力的正事——效率优先','先打开情感安全的人——但需要酝酿','心情决定一切——没有固定的先后顺序'],
    ['立刻解释并真诚回复——不想让安全的人感到被冷落','判断消息类型——正事秒回闲聊继续放着','心跳加速反复开关对话框——怕引发更多期待','看自己的状态——好就回不好就放'],
    ['从不评价你的人——不需要斟酌措辞就能发','最有效率的搭档——快速回复是互相尊重的默契','对你没期待的人——越不在意越敢快回','没有规律——同一个人间隔可以差几十倍'],
    ['状态不好怕敷衍——对在乎的人不想用敷衍代替回应','消息不需要回复——闲聊不值得消耗有限的注意力','消息带着情感期待——害怕回应之后被套住','当下不想社交——跟对方是谁没有关系'],
    ['区别在自身状态——状态好秒回状态差拖所有人','区别在消息内容——正事秒回闲聊随缘对方早已习惯','区别在情绪重量——轻松的秒回沉重的不敢碰','区别在当天精力——不是针对谁是自身节奏']
  ];

  let evidenceHTML='<h3>📋 答案证据</h3><p>';
  for(let i=0;i<5;i++){
    const a=freeAnswers[i];
    const descIdx=a==='A'?0:a==='B'?1:a==='C'?2:3;
    evidenceHTML+=`<strong>Q${i+1}「${DATA.questions[i].scene.slice(0,18)}…」</strong>你选了${a}——${freeDesc[i][descIdx]}。<br><br>`;
  }
  evidenceHTML+=type.evidence_note+'</p>';

  let modulesHTML='';
  for(const m of type.modules){
    modulesHTML+=`<div class="module"><h3>${m.title}</h3><p>${m.content}</p></div>`;
  }

  let adviceHTML='';
  for(let i=0;i<type.advice.length;i++){
    adviceHTML+=`<div class="advice-item"><span class="n">0${i+1}</span><span>${type.advice[i]}</span></div>`;
  }

  app.innerHTML=`
    <div class="screen active result">
      <div class="badge">你的回复人格</div>
      <div class="type-name">${type.name}</div>
      <div class="type-sub">${type.tag}</div>

      <div style="font-size:15px;color:#d4b87a;margin-bottom:4px">${type.icon} ${type.score}</div>
      <p style="font-size:15px;color:#b8b0a0;line-height:1.75;margin-bottom:20px">${type.conclusion}</p>

      <div class="evidence-box">${evidenceHTML}</div>
      ${modulesHTML}

      <div class="summary-box">
        <div class="q-mark">"</div>
        <p>${type.quote}</p>
      </div>

      <div class="advice-box">
        <h3>📅 未来30天建议</h3>
        ${adviceHTML}
      </div>

      <div class="reminder-box">
        <h3>⚠️ 关键提醒</h3>
        <p>${type.reminder}</p>
      </div>

      <div style="font-size:13px;color:#6a6558;line-height:1.6;text-align:center;margin-bottom:24px">${DATA.disclaimer}</div>
      <div class="footer">以上结果为自我探索参考 · 每个选择都是了解自己的线索</div>
    </div>`;
  window.scrollTo(0,0);
}

// start
cover();
</script>
</body>
</html>
