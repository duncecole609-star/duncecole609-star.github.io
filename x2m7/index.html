</style></head><body><main class="wrap"><section id="home" class="hero"><div class="badge">12题深度自测</div><h1>你和好看之间，差的不是钱也不是长相</h1><p class="lead">不是找标准答案，而是把同一个行为背后的不同动机拆开。</p><button onclick="start()">开始测试</button><p class="hint">凭第一反应选，别把自己修饰得太合理</p></section><section id="quiz" class="hidden"><div class="progress"><div id="bar" class="bar"></div></div><div class="meta"><span id="stage"></span><span id="count"></span></div><h2 id="q" class="q"></h2><div id="opts"></div></section><section id="result" class="hidden"></section></main>
<script id="data" type="application/json">{"title": "你和好看之间，差的不是钱也不是长相", "product": "穿搭卡点识别报告", "questions": [{"text": "你买衣服时最容易在哪一步翻车？", "options": {"A": "在店里觉得好看，回家穿出去就后悔了。那件衣服需要试衣间的灯光和镜子，不需要你的生活", "B": "看模特图觉得好看，穿到自己身上像借来的。你买的是模特穿的感觉，你没有那个感觉", "C": "买了不敢穿——怕太显眼、怕不适合、怕别人会说你。你的衣橱不缺好看，缺的是出门的勇气", "D": "穿几次就腻了。不是质量差，是你买的都是别人觉得好看的东西，不是你真正想穿的"}}, {"text": "明明单品好看，穿到一起为什么不对？", "options": {"A": "每件都在用力——上衣要精致，裤子要时髦，鞋子要有态度。全身都在说话，没有一句是休止符", "B": "质感不统一——上衣高级，裤子像快销品，鞋子是另一个世界的。它们来自三个不同的人", "C": "今天是这个风格，明天想试那个——你还没有一个\"这就是我\"的主线", "D": "在别人身上好看的那些搭配，搬到自己身上就不对了——你穿的是别人的公式，不是自己的解法"}}, {"text": "你照镜子时，最先盯着哪里挑错？", "options": {"A": "整体感觉——\"说不上哪里不对，就是不顺。\"第一眼看整体氛围，如果不对就开始拆单品", "B": "细节——发型不合适、鞋子和包不搭、腰线位置不对。你看到的是零件，别人看到的是人", "C": "自己——\"是我穿得不对，不是我不好看。\"你开始怀疑自己的身材、肤色、气质", "D": "和别人比——\"她穿这种就很好看，为什么我不行？\"你第一反应不是看镜子，看别人"}}, {"text": "别人夸你好看时，你为什么不太信？", "options": {"A": "因为你觉得\"他们只是在客气\"——你不会把别人的夸奖当真，因为你还没觉得自己过关了", "B": "因为你看到了他们没看到的细节——\"这件的线头他们没看见吧？这个颜色其实不适合我吧？\"", "C": "因为你以前被夸的时候，后面总会跟一个\"但是\"——\"好看是好看，但是……\"你在等那个但是", "D": "因为你觉得自己还不够稳定——今天夸了明天可能就不好看了。你不相信\"好看\"是个持久的东西"}}, {"text": "出门前最后换掉一件东西，通常是因为什么？", "options": {"A": "觉得\"太用力了\"——那件东西本身很好看，但在今天的组合里显得多余。你是用减法来纠错", "B": "和今天要做的事不搭——不是东西不好，是场景不对", "C": "怕别人多想——\"今天穿这个，会不会显得我在暗示什么？\"", "D": "\"算了，太麻烦了\"——你不是不想穿，是觉得\"今天不值得\"或者\"反正没人会在意\""}}, {"text": "你最怕别人看出什么？", "options": {"A": "我其实不太会搭——你通常先看单品本身，却很少把它放回身形、动作和当天场景里检查。", "B": "我很努力在变好看——你不是没审美，而是容易在领口、鞋包、发型或材质这些收尾处突然断掉。", "C": "我站在那里不够自然——你会被当下流行吸引，但穿到自己身上时，还没形成稳定的取舍标准。", "D": "我生活里没有那么精致——你在镜子和照片里反复校正，却忽略了走路、坐下和真实生活里的状态。"}}, {"text": "你觉得自己最好看的时候通常是？", "options": {"A": "偶然搭对了——你通常先看单品本身，却很少把它放回身形、动作和当天场景里检查。", "B": "刚做完造型——你不是没审美，而是容易在领口、鞋包、发型或材质这些收尾处突然断掉。", "C": "被别人抓拍——你会被当下流行吸引，但穿到自己身上时，还没形成稳定的取舍标准。", "D": "状态松下来以后——你在镜子和照片里反复校正，却忽略了走路、坐下和真实生活里的状态。"}}, {"text": "你最容易忽略哪个细节？", "options": {"A": "颜色比例——你通常先看单品本身，却很少把它放回身形、动作和当天场景里检查。", "B": "材质质感——你不是没审美，而是容易在领口、鞋包、发型或材质这些收尾处突然断掉。", "C": "鞋包和发型——你会被当下流行吸引，但穿到自己身上时，还没形成稳定的取舍标准。", "D": "衣服和场景——你在镜子和照片里反复校正，却忽略了走路、坐下和真实生活里的状态。"}}, {"text": "如果好看差一点，最像差在哪里？", "options": {"A": "差一条清晰主线——你通常先看单品本身，却很少把它放回身形、动作和当天场景里检查。", "B": "差一点收住用力——你不是没审美，而是容易在领口、鞋包、发型或材质这些收尾处突然断掉。", "C": "差身体状态参与——你会被当下流行吸引，但穿到自己身上时，还没形成稳定的取舍标准。", "D": "差生活感支撑——你在镜子和照片里反复校正，却忽略了走路、坐下和真实生活里的状态。"}}, {"text": "你看到别人很有氛围，最羡慕什么？", "options": {"A": "她知道自己适合什么——你通常先看单品本身，却很少把它放回身形、动作和当天场景里检查。", "B": "她不需要证明——你不是没审美，而是容易在领口、鞋包、发型或材质这些收尾处突然断掉。", "C": "她怎么动都成立——你会被当下流行吸引，但穿到自己身上时，还没形成稳定的取舍标准。", "D": "她连随便都好看——你在镜子和照片里反复校正，却忽略了走路、坐下和真实生活里的状态。"}}, {"text": "你最适合先调整什么？", "options": {"A": "减少颜色和风格数量——你通常先看单品本身，却很少把它放回身形、动作和当天场景里检查。", "B": "把夸张单品降频——你不是没审美，而是容易在领口、鞋包、发型或材质这些收尾处突然断掉。", "C": "练姿态和表情——你会被当下流行吸引，但穿到自己身上时，还没形成稳定的取舍标准。", "D": "整理日常背景和细节——你在镜子和照片里反复校正，却忽略了走路、坐下和真实生活里的状态。"}}, {"text": "你真正想要的好看是？", "options": {"A": "稳定成立——你通常先看单品本身，却很少把它放回身形、动作和当天场景里检查。", "B": "不费力——你不是没审美，而是容易在领口、鞋包、发型或材质这些收尾处突然断掉。", "C": "自然可信——你会被当下流行吸引，但穿到自己身上时，还没形成稳定的取舍标准。", "D": "生活里也能落地——你在镜子和照片里反复校正，却忽略了走路、坐下和真实生活里的状态。"}}], "results": {"A": {"name": "单品都对整体不对型", "subtitle": "每件都好看——放到一起就没有呼吸感", "score": 84, "core": "你的衣橱不缺好东西——缺\"敢于不够好\"。每件单品都在用力表现自己，上衣要精致、裤子要态度、鞋子要点睛。全身都在说话，但没有一句是休止符。你不是不会搭——是太怕浪费每一件的价值，结果搭在一起失去了自己。好看有时候是做减法，不是加法。", "evidence": "你买衣服的翻车点是\"店里好看，出门就后悔\"（Q1-A），你的单品问题在于每件都在用力（Q2-A），照镜子时你第一眼看整体氛围（Q3-A），你觉得别人夸你是客气因为还没过关（Q4-A），出门前最后换掉是因为觉得太用力了（Q5-A）。你不是不会穿——是太想把每件都穿好，反而把整体穿坏了。", "modules": [{"title": "你的衣橱是\"好学生\"的衣橱", "body": "每件单品都经过你的筛选——质感过关、颜色对、款式好。但问题在于你不敢让任何一件\"不够好\"。结果是全身都太对了——对了，但没有灵魂。真正好看的穿搭，往往有一件是\"错了才对的\"。"}, {"title": "你缺的不是好衣服——是空白", "body": "你每次出门都在担心\"哪里还少了什么\"。其实更该担心的是\"哪里太多了\"。取下一件比你多加一件更难——因为取下需要信任自己。信任\"少一件也能好看\"。"}, {"title": "容易误判自己的地方", "body": "你以为自己需要更多的搭配技巧——其实你需要的是减法信心。你以为\"好看\"来自完善，其实来自于\"知道什么时候该停\"。你已经会加法太久了——下一步是学会不用加法。"}, {"title": "别人眼里的你比你松", "body": "你照镜子时看得太紧。别人从外面看你的穿搭时，他们看到的是整体——而不是你盯着的那件线头。你担心的点别人根本没注意到。练习用别人的眼睛看自己一次——不加审判地看。"}, {"title": "怎么从\"用力\"走到\"松弛\"", "body": "每次出门前问自己：\"今天我身上哪个元素最需要被看见？\"然后让其他所有东西都退后。如果你想让裙子被看见——鞋子、包、首饰都退一步。主角不能超过两个。前两周练习：每天去掉一件出门前觉得\"不能少\"的东西。后两周练习：一周有一次不打扮就去见人——不是不穿，是不加东西。"}], "quote": "\"你穿的不是衣服，是每一件都想被看见的焦虑。好看有时候是——让一件衣服当主角，其他的当哑巴。\"", "advice": ["【7天观察】每天出门前拍一张全身照，回看时不是挑错——是找哪个元素已经够了，哪个在\"叫得太大声\"。", "【7天观察】记录一周里你换掉最后一件东西的次数。在什么情况下觉得\"太用力\"——工作、社交、还是日常？", "【30天练习】每周拿出10分钟选一套\"只留3个元素\"的搭配——让主角只有一个，其他人静默。看看会发生什么。", "【30天练习】故意穿一件你觉得\"不够完美但很想穿\"的单品，不搭其他——只让它说。练习让一件东西当主角。"], "reminder": "你不需要把每一件好东西同时穿在身上。好东西可以等——它们在你的衣橱里不赶时间。今天只穿一件喜欢的，让其他的再待一会儿。好看不是一场展览——是一次选择。"}, "B": {"name": "细节断层型", "subtitle": "衣服对了——但发型/鞋包/状态断了", "score": 81, "core": "你选单品的眼光没问题——但你的注意力停在了衣服上，忘了衣服下面还有一个人。发型没跟上、鞋子是另一套、配饰是\"随便拿的\"、状态写着\"赶时间\"。你不是不会搭——是把注意力都给了衣服，没给整体。好看不止是衣服——是一个人往前走的姿态。", "evidence": "你翻车的点是\"模特图好看，穿身上不对\"（Q1-B），你的单品问题是质感不统一（Q2-B），你照镜子先盯细节（Q3-B），你不信别人的夸奖是因为你看到了他们没看到的细节（Q4-B），你出门前换掉是因为和今天要做的事不搭（Q5-B）。你的好看断层在\"连接处\"——衣服和现实之间的桥没连上。", "modules": [{"title": "你看到的是零件，别人看到的是结果", "body": "你很在意细节——这本身是优势。但当你只看到细节时，你就忘了一个人在看你的时候不是逐件拆开的——是整体盖过一切的。你的细节侦查能力很好——但请先看整体，再回到细节。"}, {"title": "你从95分掉到80分的那个瞬间", "body": "衣服95分，发型70分，鞋子不搭——平均就80了。你花最多时间在穿搭上，但最少时间在协调上。你需要的不是更专注的衣服——而是把衣服和现实接上。最重要的一件你不是从衣橱里拿出来——是你的状态。"}, {"title": "最容易忽略的断层：状态", "body": "你没注意到自己出门时是什么心情。赶时间、焦虑、累了——这些比任何一双鞋都更影响你的好看。你穿得再好看但状态塌着——整体就落了。"}, {"title": "别人注意到的其实是你——不是你的线头", "body": "别人看到你时，最先注意到的是你这个人——你的笑、你的姿态、你说话的方式。衣服是背景。你以为他们在看你没搭好的那条线——但实际上他们在看你的眼睛。不是你不够精致——是你太精致了忘了放松。"}, {"title": "怎么把断层接上", "body": "每次出门前最后30秒不要调衣服——看自己整体：脖子以上的发型、脸上的表情、站姿。让最舒服的那个你自己站到衣服前面来。把鞋子和发型提前一天和衣服一起放进一个脑子里——不只是衣橱。"}], "quote": "\"好看不是衣服自己完成的——是衣服+状态+今天的你一起完成的。你只给衣服打了满分，没给其他科目及格。\"", "advice": ["【7天观察】每天记录自己出门时的心情——从容/赶/焦虑/无所谓。看哪种心情穿搭最差、哪种最好。你的表情可能就是最后那条断的线。", "【7天观察】拍一张不是只有衣服的照片——从外面拍整体。看那个人而不是只看那件衣服。", "【30天练习】选一个周末，提前一晚把发型+鞋+配饰和明天要穿的衣服放在一起——当成一个整体。观察第二天出门前少了什么补丁动作。", "【30天练习】每个月有一次\"不换衣服，只换发型\"，观察别人对同套衣服的反应差异。不是衣服不行，是你的状态在说话。"], "reminder": "你不需要看得更仔细——你已经看得够仔细了。你需要的是让细节退后，让整体走到前面来。好看不是一个一个零件——是你走出来那一瞬间的全部。"}, "C": {"name": "风格摇摆型", "subtitle": "今天学这个，明天学那个——你的风格还没落地", "score": 79, "core": "你的衣橱什么都有——极简、复古、甜美、酷。每种风格你都试过，但每种都没坚持。你不是没品味，是还没找到那个\"这就是我\"的东西。你的风格在衣柜里各种方向都有——就是不落地。好看不是找到最流行的——是找到最像你的，然后住进去。", "evidence": "你买衣服的翻车点是\"穿几次就腻了\"——因为买的不是自己真正想穿的（Q1-D），你的单品问题是风格太散没有一个主线（Q2-C），你照镜子时在和别人比\"她穿好看为什么我不行\"（Q3-D），你不信别人的夸奖是因为好看不稳定\"今天可以明天不知道\"（Q4-D），出门前换掉是因为觉得太麻烦不值了（Q5-D）。风格不是一次性的灵感——是你愿意反复穿的那件。", "modules": [{"title": "你的风格是被别人牵引的", "body": "每看到一个博主你就想\"我也想试试\"——不是不行，是每次试完你就换了下一个。你的风格没有积累——只有替换。你不是在找自己——是在找上一秒那个让你心动的样子。但风格不是被吸引出来的——是被留下来的。"}, {"title": "你卡在\"想成为\"和\"已经是\"之间", "body": "你的衣橱里，藏着\"我想成为的人\"和\"我已经是的人\"两个不同世界的衣服。你每次选的都不是自己——是一个你想试试的版本。不是不够好——是没搬进自己的皮肤。"}, {"title": "容易误判自己：你不是没有风格", "body": "你觉得自己\"没风格\"。其实你是在经历风格过渡。每一段风格尝试都在告诉你——这个像我、那个不太像、那个有一点点像但还不够。每一件不合适的衣服都让你更靠近你自己。"}, {"title": "风格不是被找到的——是被坚持出来的", "body": "真正有风格的人不是比你更会挑——是比你更坚定。\"这件像我\"\"这个也是我\"，不是每件都完美——是每件都有一个\"我\"在里面。"}, {"title": "怎么让风格落地", "body": "找出你的衣橱里过去一年穿最多的一件——不是最喜欢，是穿最多的那件。从那件出发，问自己：什么颜色、材质、版型反复出现在我身上？那是你已经有的风格——只是你还没给它起名字。起一个名字——三个词以内。前两周只穿符合这三个词的。后两周把这名字延伸到其他品类——不只是衣服，也是你拍照、吃东西、说话的方式。"}], "quote": "\"别人穿是风格，你穿像在模仿。不是因为你不够好——是你还没搬进属于自己的房子。你一直在别人家的沙发上坐着。\"", "advice": ["【7天观察】过去一年最常被穿的3件衣服是哪几件？不看好看——看频率。高频中藏着你的风格影子。", "【7天观察】每次试完衣服后问：\"这件像我吗？\"不是像某个博主、某个时间、某个感觉。\"像我。\"如果犹豫了，放回去。", "【30天练习】给未来30天的自己写一个三个词的风格公式。每次买/穿之前看那三个词。不吻合就不穿——不是不买，是不管它多漂亮都不是你。", "【30天练习】如果你必须一辈子只选一种风格——那个风格叫什么名字？不必真的只选一种——但这个问题会帮你清理衣橱里一半以上的不再属于你的。"], "reminder": "你不用再试更多风格了。你已经试够了。现在你需要的是——留下来。在一个风格里待够——直到它长得像你自己。"}, "D": {"name": "生活感缺席型", "subtitle": "拍照好看——但走进真实生活就不对劲了", "score": 76, "core": "你不是穿得不好看——是你的好看还没走进你的真实生活。镜子前好看，出门后就不对了；拍照时好看，坐地铁、走路、吃饭、下午开会就不再是那个感觉。不是因为你穿错了——是你的穿搭和你每天实际的生活还没接上。好看不是展览——是运动中的，是风吹过的，是你在生活里走来走去的状态。", "evidence": "你的翻车是\"买了不敢穿——怕太显眼、怕别人说你\"（Q1-C），你的单品问题是\"在别人身上好看搬到自己就不对\"（Q2-D），你照镜子时在怀疑自己（Q3-C），你不信夸奖是因为以前总被跟一个\"但是\"（Q4-C），你出门前换掉是因为怕别人会多想（Q5-C）。你的好看没走进现实——还停在镜子前。", "modules": [{"title": "你的好看停在镜子前", "body": "你在镜子前好看——那个瞬间你站着不动、灯光刚好、没人在看。但出门之后——风、地铁、长时间坐着、上楼——镜子里的那条没有在陪你走。不是衣服不能穿——是它只能静止。"}, {"title": "你穿的是\"想象中的那个自己\"", "body": "每次买一件\"以后会穿的\"——那个以后一直没来。你买的不是那件衣服——是\"那个场景下穿这件的人\"。但你不是那个人，她有另一个生活。"}, {"title": "容易误判：怕被看见", "body": "最里面一层不是搭配不合适——而是穿上之后觉得自己\"太显眼了\"\"像在装什么\"。你不是不适合——是没准备好被看见。但你的好看不是奢侈——是日常。值得被看到。"}, {"title": "把好看放回你的真实日常", "body": "好看不是周末、旅行、聚餐才启用的东西——它是活着的样子。你每天来回走、坐、站、拿东西、弯腰——你的穿搭必须受得住日常。不追求完美——追求哪怕在电梯里也觉得自在。"}, {"title": "怎么让穿搭落地", "body": "拿出最有生活感的那件单品——不是最好看，是穿最多、最舒服的那件。把其他东西围绕它来搭——而不是日常围绕\"好看\"来削自己。好看不是削减生活——是把生活放进去。每天的穿搭都应该回答一个问题：\"今天上班能穿——且今天下班接着穿不会想换。\""}], "quote": "\"买的时候高级，穿出去像赶时间。不是衣服的错——是你的生活还没给你的好看腾出位置。\"", "advice": ["【7天观察】记录一周里你\"好看感\"和\"生活感\"打架的时刻：赶电梯/坐下后/吃东西后/下午开完会。哪个时刻你的穿搭最让你不舒服？", "【7天观察】找一个你日常最自在的那件单品——把它放到你最好的穿搭组合里。看看好看感是不是立刻变得不自觉地会延续更久。", "【30天练习】给自己规定：出镜时穿的和\"这件我可以穿着逛菜市场\"是同一件衣服。不贴身但自在——把美带到地面。", "【30天练习】如果你只能留30件单品过一年——你会选哪30件？不是最好看的/最贵的——是每天被穿的。这30件就是你的风格的基本单位。"], "reminder": "好看不是打扮好了站在那里等人拍照。好看是走在大街上、正在去上班路上、正在回家的你。把你的好看从镜子前搬到门口——下电梯、走出去。它会在日常生活中活着，而不只是试衣间的灯光里存在。"}}}</script><script>
const data=JSON.parse(document.getElementById('data').textContent);let idx=0,answers=[];
function start(){home.classList.add('hidden');quiz.classList.remove('hidden');renderQ()}
function renderQ(){const q=data.questions[idx];bar.style.width=(idx/12*100)+'%';stage.textContent=idx<5?'免费测试 · 第'+(idx+1)+'题':'深度解锁 · 第'+(idx+1)+'题';count.textContent=(idx+1)+'/12';document.getElementById('q').textContent=q.text;opts.innerHTML='';for(const k of ['A','B','C','D']){const b=document.createElement('button');b.className='opt';b.innerHTML='<span class="letter">'+k+'</span><span class="text"></span>';b.querySelector('.text').textContent=q.options[k];b.onclick=()=>choose(k);opts.appendChild(b)}}
function choose(k){answers[idx]=k;idx++;if(idx===5)gate();else if(idx===12)result();else renderQ()}
function gate(){bar.style.width='41.7%';document.getElementById('q').textContent='前5题只是倾向，后7题继续追问原因、误判点和真实需要';opts.innerHTML='<div class="gate"><div class="section-title">继续完成12题</div><div class="body">后7题不会重复前面的问法，会从不同生活场景继续拆解。</div><br><button onclick="renderQ()">继续</button></div>'}
function result(){quiz.classList.add('hidden');const c={A:0,B:0,C:0,D:0};answers.forEach(x=>c[x]++);const key=Object.entries(c).sort((a,b)=>b[1]-a[1]||'ABCD'.indexOf(a[0])-'ABCD'.indexOf(b[0]))[0][0],r=data.results[key];const ev=answers.slice(0,5).map((a,i)=>'<div class="evidence-item"><b>Q'+(i+1)+' · 你选了 '+a+'</b><br>'+data.questions[i].options[a]+'</div>').join('');resultEl=document.getElementById('result');resultEl.classList.remove('hidden');resultEl.innerHTML='<div class="result-head"><span class="badge">'+data.product+'</span><div class="rtype">'+r.name+'</div><div class="score">'+r.score+'</div><div class="subtitle">'+r.subtitle+'</div></div><div class="card"><div class="section-title">核心结论</div><div class="body">'+r.core+'</div></div><div class="card"><div class="section-title">答案证据</div>'+ev+'<div class="body">'+r.evidence+'</div></div>'+r.modules.map(m=>'<div class="card"><div class="section-title">'+m.title+'</div><div class="body">'+m.body+'</div></div>').join('')+'<div class="card"><div class="section-title">可截图金句</div><div class="quote">“'+r.quote+'”</div></div><div class="card"><div class="section-title">未来30天建议</div>'+r.advice.map(x=>'<div class="advice">'+x+'</div>').join('')+'</div><div class="card"><div class="section-title">关键提醒</div><div class="body">'+r.reminder+'</div></div><div class="disclaimer">本测试仅作自我探索参考，不构成心理诊断、医疗、财务建议或效果承诺。</div>';scrollTo(0,0)}
